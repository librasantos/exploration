  update() {
    if (this.gameEnded) return;
    if (this._paused) return;
    const W = this.W, H = this.H;

    // Standard movement
    const accel = 0.55;
    this.astroVx += this.joystick.dx * accel;
    this.astroVy += this.joystick.dy * accel;
    this.astroVx *= 0.88; this.astroVy *= 0.88;
    const sp = Math.hypot(this.astroVx, this.astroVy);
    if (sp > 4) { this.astroVx = (this.astroVx / sp) * 4; this.astroVy = (this.astroVy / sp) * 4; }
    this.astronaut.x += this.astroVx;
    this.astronaut.y += this.astroVy;
    this.astronaut.x = Phaser.Math.Clamp(this.astronaut.x, 24, W - 24);
    this.astronaut.y = Phaser.Math.Clamp(this.astronaut.y, 70, H - 24);

    // Mirror twin (mirror level): position is mirrored relative to W/2
    if (this.mirrorTwin) {
      const targetX = W - this.astronaut.x;
      const targetY = this.astronaut.y;
      this.mirrorTwin.x += (targetX - this.mirrorTwin.x) * 0.18;
      this.mirrorTwin.y += (targetY - this.mirrorTwin.y) * 0.18;
      // Keep the blue tint overlay glued to the twin
      if (this.mirrorTwinTint) {
        this.mirrorTwinTint.x = this.mirrorTwin.x;
        this.mirrorTwinTint.y = this.mirrorTwin.y;
      }
      // NOTE: Twin no longer steals gems. The mirroring movement alone is the level's
      // challenge — having the twin also steal gems made the level unwinnable for kids
      // (gems would disappear without explanation, leaving them stuck at 3/5 forever).
    }

    // Pickup gems (universal)
    for (const g of this.gems) {
      if (g.collected) continue;
      const d = Phaser.Math.Distance.Between(this.astronaut.x, this.astronaut.y, g.x, g.y);
      if (d < 30) this.collectGem(g);
    }

    // Per-theme hazards
    if (this.bonus === "gemstone" && this.lasers) {
      for (const l of this.lasers) {
        if (Math.abs(this.astronaut.y - l.y) < 8) {
          this.takeHit("Laser hit!");
          break;
        }
      }
    }
    if (this.bonus === "voidspace" && this.rifts) {
      for (const r of this.rifts) {
        const d = Phaser.Math.Distance.Between(r.x, r.y, this.astronaut.x, this.astronaut.y);
        if (d < r.collisionRadius) {
          // Teleport to random location
          this.astronaut.x = 60 + Math.random() * (W - 120);
          this.astronaut.y = 100 + Math.random() * (H - 200);
          this.astroVx = 0; this.astroVy = 0;
          showDangerPrompt(this, "Rift teleported you!");
          this.cameras.main.flash(200, 200, 100, 200);
        }
      }
    }
    if (this.bonus === "solar" && this.flares) {
      for (const f of this.flares) {
        f.x += f.vx;
        const d = Phaser.Math.Distance.Between(f.x, f.y, this.astronaut.x, this.astronaut.y);
        if (d < f.collisionRadius + 14) {
          this.takeHit("Solar flare!");
          f.destroy();
          this.flares = this.flares.filter(x => x !== f);
        }
      }
    }
    if (this.bonus === "galactic") {
      // Black hole gravity (strong)
      for (const bh of this.bHoles) {
        const dx = bh.x - this.astronaut.x;
        const dy = bh.y - this.astronaut.y;
        const dist = Math.hypot(dx, dy);
        if (dist < bh.gravityRadius) {
          const pull = (1 - dist / bh.gravityRadius) * 0.85;
          this.astroVx += (dx / dist) * pull;
          this.astroVy += (dy / dist) * pull;
          if (dist < bh.collisionRadius) {
            this.takeHit("Black hole!");
            this.astronaut.x -= (dx / dist) * 30;
            this.astronaut.y -= (dy / dist) * 30;
          }
        }
      }
      for (const wh of this.wHoles) {
        const d = Phaser.Math.Distance.Between(wh.x, wh.y, this.astronaut.x, this.astronaut.y);
        if (d < wh.collisionRadius + 16) {
          this.takeHit("White hole!");
          const ang = Math.atan2(this.astronaut.y - wh.y, this.astronaut.x - wh.x);
          this.astroVx = Math.cos(ang) * 9;
          this.astroVy = Math.sin(ang) * 9;
        }
      }
    }

    // Exit portal
    if (this.exitPortal && this.exitPortal.unlocked) {
      const d = Phaser.Math.Distance.Between(this.exitPortal.x, this.exitPortal.y, this.astronaut.x, this.astronaut.y);
      if (d < this.exitPortal.collisionRadius) this.complete();
    }
  }

  collectGem(g) {
    g.collected = true;
    this.tweens.add({ targets: g.obj, scale: 1.5, alpha: 0, duration: 400, onComplete: () => g.obj.destroy() });
    for (let i = 0; i < 8; i++) {
      const angle = Math.random() * Math.PI * 2;
      const sp = this.add.circle(g.x, g.y, 2, this.lvlInfo.color);
      this.tweens.add({ targets: sp, x: g.x + Math.cos(angle) * 30, y: g.y + Math.sin(angle) * 30, alpha: 0, duration: 500, onComplete: () => sp.destroy() });
    }
    this.collected++;
    STATE.xp += 30;
    saveGame(STATE);
    this.scoreText.setText(`✨ ${this.collected}/${this.target}`);
    updateGoalBanner(this, this.collected);
    if (this.collected >= this.target && !this.exitPortal.unlocked) {
      this.exitPortal.unlock();
      showObjective(this, "🌟 Find the EXIT!");
      this.cameras.main.flash(300, 255, 240, 180);
    }
  }

  takeHit(message) {
    if (this.invincible) return;
    this.invincible = true;
    this.health--;
    this.healthIcons[this.health]?.setAlpha(0.2);
    showDangerPrompt(this, message);
    this.cameras.main.shake(150, 0.008);
    this.cameras.main.flash(150, 200, 80, 200);
    this.tweens.add({ targets: this.astronaut, alpha: { from: 0.3, to: 1 }, duration: 200, yoyo: true, repeat: 3 });
    this.time.delayedCall(isKidMode() ? 1500 : 900, () => this.invincible = false);
    if (this.health <= 0) this.gameOver();
  }

  complete() {
    this.gameEnded = true;
    this.joystick.destroy();
    this.flareEvent?.remove();
    if (!STATE.levelsCompleted.includes(this.levelNum)) {
      STATE.levelsCompleted.push(this.levelNum);
      STATE.xp += 100;
      saveGame(STATE);
    }
    showMissionResult(this, {
      passed: true,
      levelNum: this.levelNum,
      passSubtitle: `${this.lvlInfo.world} bonus world conquered!`,
      rewards: { xp: 100 },
    });
  }

  gameOver() {
    if (this.gameEnded) return;
    this.gameEnded = true;
    this.joystick.destroy();
    if (this.iceSpawnEvent) this.iceSpawnEvent.remove();
    if (this.avalancheTimer) this.avalancheTimer.remove();
    if (this.bossAttackEvent) this.bossAttackEvent.remove();
    if (this.flareEvent) this.flareEvent.remove();
    showMissionResult(this, {
      passed: false,
      levelNum: this.levelNum,
      failSubtitle: `${this.collected || 0}/${this.target} collected. Bonus levels are tough!`,
    });
  }

  exit() {
    this.joystick?.destroy();
    this.flareEvent?.remove();
    this.scene.start("LevelSelectScene");
  }
}

// ══════════════════════════════════════════════════════════════════
// LEVEL EDITOR — Custom Levels (My Levels list, Editor, Player)
// ══════════════════════════════════════════════════════════════════

// Theme metadata for editor + player
const EDITOR_THEMES = {
  ocean:  { name: "Ocean",   bg: [0x60B0E0, 0x102060], accent: 0x80E5FF, particle: 0x80FFE0 },
  lava:   { name: "Lava",    bg: [0xC03018, 0x180404], accent: 0xFF8030, particle: 0xFFE060 },
  ice:    { name: "Ice",     bg: [0x90D0F0, 0x103060], accent: 0xA0E0FF, particle: 0xFFFFFF },
  jungle: { name: "Jungle",  bg: [0x387048, 0x051808], accent: 0x5DBE9A, particle: 0xC0FF80 },
  space:  { name: "Space",   bg: [0x080A20, 0x000000], accent: 0x80E5FF, particle: 0xFFFFFF },
};

// Palette items the editor can place
const EDITOR_PALETTE = [
  { id: "pickup",        label: "Star",      icon: "⭐", category: "pickup",  desc: "Goal item to collect" },
  { id: "alien",         label: "Alien",     icon: "👽", category: "pickup",  desc: "Friendly alien to rescue" },
  { id: "meteor",        label: "Meteor",    icon: "☄️",  category: "hazard",  desc: "Bouncing rock hazard" },
  { id: "blackhole",     label: "Black Hole",icon: "🕳️", category: "hazard",  desc: "Pulls you in" },
  { id: "whitehole",     label: "White Hole",icon: "✨", category: "hazard",  desc: "Pushes you away" },
  { id: "exit",          label: "Exit",      icon: "🚪", category: "exit",    desc: "Goal portal (1 per level)" },
];

// Helper: paint themed background
function paintEditorBackground(scene, theme) {
  const W = scene.scale.width, H = scene.scale.height;
  const t = EDITOR_THEMES[theme] || EDITOR_THEMES.ocean;
  const bg = scene.add.graphics();
  bg.fillGradientStyle(t.bg[0], t.bg[0], t.bg[1], t.bg[1]);
  bg.fillRect(0, 0, W, H);
  // Sparse particles for ambience
  for (let i = 0; i < 25; i++) {
    const p = scene.add.circle(Math.random() * W, Math.random() * H, 1 + Math.random() * 1.5, t.particle, 0.5);
    scene.tweens.add({ targets: p, alpha: { from: 0.2, to: 0.7 }, duration: 1500 + Math.random() * 1500, yoyo: true, repeat: -1 });
  }
  return bg;
}

// Helper: spawn a placed item visually (used by editor + player)
function spawnEditorItem(scene, item) {
  let obj = null;
  if (item.type === "pickup") {
    obj = scene.add.container(item.x, item.y);
    const glow = scene.add.circle(0, 0, 14, 0xFFE060, 0.4);
    const star = scene.add.text(0, 0, "⭐", { fontSize: 26 }).setOrigin(0.5);
    obj.add([glow, star]);
    scene.tweens.add({ targets: glow, scale: { from: 0.85, to: 1.2 }, alpha: { from: 0.3, to: 0.6 }, duration: 1100, yoyo: true, repeat: -1 });
    scene.tweens.add({ targets: star, y: -4, duration: 800, yoyo: true, repeat: -1 });
    obj.collisionRadius = 18;
  } else if (item.type === "alien") {
    obj = createSquidlet(scene, item.x, item.y);
    obj.collisionRadius = 22;
  } else if (item.type === "meteor") {
    obj = createRockyMeteor(scene, item.x, item.y, 18);
    // Gentle drift
    obj.vx = (Math.random() - 0.5) * 1.6;
    obj.vy = (Math.random() - 0.5) * 1.6;
  } else if (item.type === "blackhole") {
    obj = createBlackHole(scene, item.x, item.y, 22);
  } else if (item.type === "whitehole") {
    obj = createWhiteHole(scene, item.x, item.y, 16);
  } else if (item.type === "exit") {
    obj = createExitPortal(scene, item.x, item.y);
  }
  return obj;
}

// ══════════════════════════════════════════════════════════════════
// MY LEVELS — list of saved custom levels
// ══════════════════════════════════════════════════════════════════
class MyLevelsScene extends Phaser.Scene {
  constructor() { super("MyLevelsScene"); }
  create() {
    const W = this.scale.width, H = this.scale.height;
    this.W = W; this.H = H;
    this.mobile = isMobile();

    // Background
    paintEditorBackground(this, "space");

    // Title bar
    this.add.rectangle(0, 0, W, 56, 0x000000, 0.7).setOrigin(0, 0).setDepth(200);
    this.add.text(W / 2, 28, "MY LEVELS", {
      fontFamily: "system-ui", fontSize: 22, fontStyle: "bold", color: "#FFE9A8", letterSpacing: 3,
    }).setOrigin(0.5).setDepth(201);
    createBackButton(this, "← back", () => this.scene.start("LevelSelectScene"));

    this.drawList();
  }

  drawList() {
    const W = this.W, H = this.H;
    const levels = loadCustomLevels();

    // "+ Create New Level" button (always at top of list)
    const createBtn = this.add.rectangle(W / 2, 96, Math.min(W - 32, 400), 56, 0x5DBE9A).setStrokeStyle(2, 0x3E8E6C).setInteractive({ useHandCursor: true });
    const createTxt = this.add.text(W / 2, 96, "+ Create New Level", {
      fontFamily: "system-ui", fontSize: 22, fontStyle: "bold", color: "#FFFFFF",
    }).setOrigin(0.5);
    createBtn.on("pointerdown", () => {
      Audio.click();
      this.scene.start("EditorScene", { levelId: null });
    });

    if (levels.length === 0) {
      this.add.text(W / 2, H * 0.5, "No custom levels yet.\n\nTap '+ Create New Level' to start!", {
        fontFamily: "system-ui", fontSize: 18, color: "#A8D0FF", align: "center",
      }).setOrigin(0.5);
      return;
    }

    // List custom levels (each as a card)
    const startY = 170;
    const cardH = 70;
    const gap = 10;
    levels.forEach((lvl, i) => {
      const y = startY + i * (cardH + gap);
      const card = this.add.container(W / 2, y).setDepth(50);
      const cardW = Math.min(W - 32, 400);
      const t = EDITOR_THEMES[lvl.theme] || EDITOR_THEMES.ocean;
      const bg = this.add.rectangle(0, 0, cardW, cardH, 0x101830, 0.95).setStrokeStyle(2, t.accent);
      // Theme color stripe on left
      const stripe = this.add.rectangle(-cardW / 2 + 4, 0, 4, cardH - 4, t.accent);
      // Name
      const nameTxt = this.add.text(-cardW / 2 + 14, -10, lvl.name, {
        fontFamily: "system-ui", fontSize: 19, fontStyle: "bold", color: "#FFFFFF",
      }).setOrigin(0, 0.5);
      // Stats line
      const itemCount = (lvl.items || []).length;
      const stats = this.add.text(-cardW / 2 + 14, 12, `${t.name} • ${itemCount} items • Goal: ${lvl.target}`, {
        fontFamily: "system-ui", fontSize: 15, color: "#A8D0FF",
      }).setOrigin(0, 0.5);

      // Play button
      const playBtn = this.add.rectangle(cardW / 2 - 90, 0, 50, 36, 0x5DBE9A).setStrokeStyle(1.5, 0x3E8E6C).setInteractive({ useHandCursor: true });
      const playTxt = this.add.text(cardW / 2 - 90, 0, "▶", { fontSize: 20, color: "#FFFFFF" }).setOrigin(0.5);
      playBtn.on("pointerdown", (p, x, y, e) => {
        if (e && e.stopPropagation) e.stopPropagation();
        Audio.click();
        this.scene.start("CustomLevelScene", { levelId: lvl.id });
      });

      // Edit button
      const editBtn = this.add.rectangle(cardW / 2 - 36, 0, 50, 36, 0x4080A0).setStrokeStyle(1.5, 0xFFFFFF, 0.4).setInteractive({ useHandCursor: true });
      const editTxt = this.add.text(cardW / 2 - 36, 0, "✏", { fontSize: 18, color: "#FFFFFF" }).setOrigin(0.5);
      editBtn.on("pointerdown", (p, x, y, e) => {
        if (e && e.stopPropagation) e.stopPropagation();
        Audio.click();
        this.scene.start("EditorScene", { levelId: lvl.id });
      });

      card.add([bg, stripe, nameTxt, stats, playBtn, playTxt, editBtn, editTxt]);

      // Long-press to delete (3 second hold)
      bg.setInteractive({ useHandCursor: true });
      bg.on("pointerdown", (p, x, y, e) => {
        // Make sure tap on Play/Edit doesn't fire delete confirm
        if (p.x > W / 2 + cardW / 2 - 120) return;
        // Confirm delete
        this.confirmDelete(lvl);
      });
    });
  }

  confirmDelete(lvl) {
    const W = this.W, H = this.H;
    const overlay = this.add.rectangle(W / 2, H / 2, W, H, 0x000000, 0.85).setDepth(960).setInteractive();
    const card = this.add.container(W / 2, H / 2).setDepth(961);
    const cardBg = this.add.rectangle(0, 0, Math.min(W - 40, 320), 200, 0x101830).setStrokeStyle(2, 0xFF6080);
    const title = this.add.text(0, -60, "Delete this level?", {
      fontFamily: "system-ui", fontSize: 20, fontStyle: "bold", color: "#FFFFFF",
    }).setOrigin(0.5);
    const sub = this.add.text(0, -30, `"${lvl.name}"`, {
      fontFamily: "system-ui", fontSize: 17, color: "#A8D0FF",
    }).setOrigin(0.5);
    const yes = this.add.rectangle(-65, 30, 110, 38, 0xFF4060).setStrokeStyle(1.5, 0xA02040).setInteractive({ useHandCursor: true });
    const yesTxt = this.add.text(-65, 30, "🗑 Delete", { fontFamily: "system-ui", fontSize: 17, fontStyle: "bold", color: "#FFFFFF" }).setOrigin(0.5);
    const no = this.add.rectangle(65, 30, 110, 38, 0x404870).setStrokeStyle(1.5, 0xFFFFFF, 0.5).setInteractive({ useHandCursor: true });
    const noTxt = this.add.text(65, 30, "Cancel", { fontFamily: "system-ui", fontSize: 17, color: "#FFFFFF" }).setOrigin(0.5);
    card.add([cardBg, title, sub, yes, yesTxt, no, noTxt]);
    yes.on("pointerdown", (p, x, y, e) => {
      if (e && e.stopPropagation) e.stopPropagation();
      const all = loadCustomLevels().filter(l => l.id !== lvl.id);
      saveCustomLevels(all);
      this.scene.restart();
    });
    no.on("pointerdown", (p, x, y, e) => {
      if (e && e.stopPropagation) e.stopPropagation();
      overlay.destroy(); card.destroy();
    });
  }
}

// ══════════════════════════════════════════════════════════════════
// EDITOR — place items by tapping
// ══════════════════════════════════════════════════════════════════
class EditorScene extends Phaser.Scene {
  constructor() { super("EditorScene"); }
  init(data) { this.editingId = data?.levelId || null; }
  create() {
    const W = this.scale.width, H = this.scale.height;
    this.W = W; this.H = H;
    this.mobile = isMobile();

    // Load existing level if editing, else new
    if (this.editingId) {
      const all = loadCustomLevels();
      this.level = all.find(l => l.id === this.editingId) || this.newLevel();
    } else {
      this.level = this.newLevel();
    }

    // Paint themed background
    this.bgRefs = [];
    this.repaintBackground();

    // Title bar (taller for bigger fonts)
    this.titleBar = this.add.rectangle(0, 0, W, 64, 0x000000, 0.7).setOrigin(0, 0).setDepth(800);
    this.add.text(W / 2, 32, "EDITOR", {
      fontFamily: "system-ui", fontSize: 20, fontStyle: "bold", color: "#FFE9A8", letterSpacing: 3,
    }).setOrigin(0.5).setDepth(801);
    createBackButton(this, "← back", () => this.scene.start("MyLevelsScene"));

    // Action buttons in a row below the title bar to avoid the EDITOR title text
    const actionY = 92;
    const actionH = 38;

    // Save button (top-right)
    const saveBtn = this.add.rectangle(W - 56, actionY, 88, actionH, 0x5DBE9A).setStrokeStyle(2, 0x3E8E6C).setDepth(820).setInteractive({ useHandCursor: true });
    this.add.text(W - 56, actionY, "💾 Save", { fontFamily: "system-ui", fontSize: 16, fontStyle: "bold", color: "#FFFFFF" }).setOrigin(0.5).setDepth(821);
    saveBtn.on("pointerdown", (p, x, y, e) => {
      if (e && e.stopPropagation) e.stopPropagation();
      Audio.click();
      this.openSaveDialog();
    });

    // Test button
    const testBtn = this.add.rectangle(W - 152, actionY, 88, actionH, 0xFFA830).setStrokeStyle(2, 0x804020).setDepth(820).setInteractive({ useHandCursor: true });
    this.add.text(W - 152, actionY, "▶ Test", { fontFamily: "system-ui", fontSize: 16, fontStyle: "bold", color: "#FFFFFF" }).setOrigin(0.5).setDepth(821);
    testBtn.on("pointerdown", (p, x, y, e) => {
      if (e && e.stopPropagation) e.stopPropagation();
      Audio.click();
      // Save current state to a temp slot then play
      this.tempPlay();
    });

    // Bottom palette bar
    this.paletteY = H - 88;
    this.add.rectangle(0, this.paletteY, W, 88, 0x000000, 0.85).setOrigin(0, 0).setDepth(810);
    this.selectedTool = "pickup";
    this.paletteRefs = [];
    this.drawPalette();

    // Theme switcher (above palette) — wider buttons, more space for theme names
    const themeY = this.paletteY - 36;
    this.add.rectangle(0, themeY, W, 32, 0x000000, 0.55).setOrigin(0, 0).setDepth(810);
    const themeLabel = this.add.text(8, themeY + 16, "Theme:", { fontFamily: "system-ui", fontSize: 14, color: "#A8D0FF" }).setOrigin(0, 0.5).setDepth(811);
    this.themeButtons = [];
    const themeStartX = 64;
    const themeBtnW = Math.min((W - themeStartX - 8) / Object.keys(EDITOR_THEMES).length - 4, 60);
    Object.keys(EDITOR_THEMES).forEach((tk, i) => {
      const t = EDITOR_THEMES[tk];
      const x = themeStartX + themeBtnW / 2 + i * (themeBtnW + 4);
      const tb = this.add.rectangle(x, themeY + 16, themeBtnW, 24, this.level.theme === tk ? t.accent : 0x404870, this.level.theme === tk ? 0.9 : 0.6).setStrokeStyle(1, t.accent, 0.8).setDepth(811).setInteractive({ useHandCursor: true });
      const ttxt = this.add.text(x, themeY + 16, t.name, { fontFamily: "system-ui", fontSize: 12, fontStyle: "bold", color: "#FFFFFF" }).setOrigin(0.5).setDepth(812);
      tb.on("pointerdown", (p, lx, ly, e) => {
        if (e && e.stopPropagation) e.stopPropagation();
        Audio.click();
        this.level.theme = tk;
        this.repaintBackground();
        // Update theme button highlights
        this.themeButtons.forEach((btn) => {
          btn.btn.setFillStyle(this.level.theme === btn.tk ? EDITOR_THEMES[btn.tk].accent : 0x404870, this.level.theme === btn.tk ? 0.9 : 0.6);
        });
      });
      this.themeButtons.push({ btn: tb, txt: ttxt, tk });
    });

    // Canvas area: between title bar (y=64) and theme switcher (y=themeY)
    this.canvasMinY = 140; // below action buttons
    this.canvasMaxY = themeY - 4;

    // Helper text
    this.helpText = this.add.text(W / 2, this.canvasMinY + 16, "Tap canvas to place • Tap an item to delete", {
      fontFamily: "system-ui", fontSize: 14, color: "#FFFFFF", alpha: 0.7,
    }).setOrigin(0.5).setDepth(802).setAlpha(0.8);

    // Render existing items
    this.itemRefs = []; // [{ obj, item }]
    this.level.items.forEach(item => this.renderItem(item));

    // Click to place / delete on canvas
    this.input.on("pointerdown", (pointer) => {
      // Ignore taps on UI bars
      if (pointer.y < this.canvasMinY || pointer.y > this.canvasMaxY) return;
      // Try to delete tapped item first
      const hitItem = this.findItemAt(pointer.x, pointer.y);
      if (hitItem) {
        this.removeItem(hitItem);
        Audio.click();
      } else {
        // Place new item
        this.placeItem(pointer.x, pointer.y);
      }
    });
  }

  newLevel() {
    return {
      id: Date.now(),
      name: "Untitled Level",
      theme: "ocean",
      target: 3, // collect/rescue 3 items by default
      items: [],
      created: Date.now(),
      updated: Date.now(),
    };
  }

  repaintBackground() {
    this.bgRefs.forEach(r => r.destroy());
    this.bgRefs = [];
    const t = EDITOR_THEMES[this.level.theme];
    const bg = this.add.graphics();
    bg.fillGradientStyle(t.bg[0], t.bg[0], t.bg[1], t.bg[1]);
    bg.fillRect(0, 0, this.W, this.H);
    this.bgRefs.push(bg);
  }

  drawPalette() {
    const W = this.W;
    const itemW = Math.floor((W - 16) / EDITOR_PALETTE.length);
    EDITOR_PALETTE.forEach((p, i) => {
      const x = 8 + i * itemW + itemW / 2;
      const y = this.paletteY + 38;
      const isSelected = this.selectedTool === p.id;
      const bg = this.add.rectangle(x, y, itemW - 6, 60, isSelected ? 0xFFE9A8 : 0x404870, isSelected ? 0.95 : 0.6).setStrokeStyle(1.5, 0xFFE9A8, isSelected ? 1 : 0.5).setDepth(812).setInteractive({ useHandCursor: true });
      const icon = this.add.text(x, y - 12, p.icon, { fontSize: 22 }).setOrigin(0.5).setDepth(813);
      const label = this.add.text(x, y + 14, p.label, { fontFamily: "system-ui", fontSize: 13, color: isSelected ? "#1A2543" : "#FFFFFF", fontStyle: "bold" }).setOrigin(0.5).setDepth(813);
      bg.on("pointerdown", (pointer, lx, ly, e) => {
        if (e && e.stopPropagation) e.stopPropagation();
        Audio.click();
        this.selectedTool = p.id;
        this.refreshPalette();
      });
      this.paletteRefs.push({ bg, icon, label, id: p.id });
    });
  }
  refreshPalette() {
    this.paletteRefs.forEach(r => {
      const sel = this.selectedTool === r.id;
      r.bg.setFillStyle(sel ? 0xFFE9A8 : 0x404870, sel ? 0.95 : 0.6);
      r.label.setColor(sel ? "#1A2543" : "#FFFFFF");
    });
  }

  placeItem(x, y) {
    // For "exit" type, only allow one
    if (this.selectedTool === "exit") {
      const existingExit = this.level.items.find(it => it.type === "exit");
      if (existingExit) {
        // Replace its position
        existingExit.x = x; existingExit.y = y;
        // Re-render
        const ref = this.itemRefs.find(r => r.item === existingExit);
        if (ref) {
          ref.obj.destroy();
          this.itemRefs = this.itemRefs.filter(r => r !== ref);
        }
        this.renderItem(existingExit);
        Audio.pickup();
        return;
      }
    }
    const item = { type: this.selectedTool, x, y };
    this.level.items.push(item);
    this.renderItem(item);
    Audio.pickup();
  }

  renderItem(item) {
    const obj = spawnEditorItem(this, item);
    if (obj) {
      obj.setDepth(50);
      this.itemRefs.push({ obj, item });
    }
  }

  findItemAt(x, y) {
    // Find the closest item within a tap radius
    const tapRadius = 28;
    let best = null;
    let bestDist = Infinity;
    for (const r of this.itemRefs) {
      const d = Phaser.Math.Distance.Between(x, y, r.item.x, r.item.y);
      if (d < tapRadius && d < bestDist) {
        bestDist = d;
        best = r;
      }
    }
    return best;
  }

  removeItem(ref) {
    ref.obj.destroy();
    this.level.items = this.level.items.filter(it => it !== ref.item);
    this.itemRefs = this.itemRefs.filter(r => r !== ref);
  }

  openSaveDialog() {
    // Validate
    if (this.level.items.length === 0) {
      this.showToast("Add some items first!");
      return;
    }
    const hasExit = this.level.items.some(it => it.type === "exit");
    if (!hasExit) {
      this.showToast("Place an Exit portal (🚪) first!");
      return;
    }
    const hasPickup = this.level.items.some(it => it.type === "pickup" || it.type === "alien");
    if (!hasPickup) {
      this.showToast("Add at least one Star or Alien to collect!");
      return;
    }

    const W = this.W, H = this.H;
    const overlay = this.add.rectangle(W / 2, H / 2, W, H, 0x000000, 0.85).setDepth(960).setInteractive();
    const card = this.add.container(W / 2, H / 2).setDepth(961);
    const cardW = Math.min(W - 32, 320);
    const cardBg = this.add.rectangle(0, 0, cardW, 240, 0x101830).setStrokeStyle(2, 0x5DBE9A);
    const title = this.add.text(0, -90, "Save your level", { fontFamily: "system-ui", fontSize: 20, fontStyle: "bold", color: "#FFFFFF" }).setOrigin(0.5);
    const lbl = this.add.text(0, -55, "Name:", { fontFamily: "system-ui", fontSize: 15, color: "#A8D0FF" }).setOrigin(0.5);
    // Predefined name buttons (since prompt() is awkward on iOS)
    const namesPresets = ["My Level 1", "Cool Level", "Adventure!", "Hard Mode", "Easy Fun", "Boss Run"];
    let chosenName = this.level.name;
    const nameDisplay = this.add.text(0, -34, chosenName, {
      fontFamily: "system-ui", fontSize: 17, fontStyle: "bold", color: "#FFE9A8",
      backgroundColor: "#000000", padding: { x: 10, y: 4 },
    }).setOrigin(0.5);
    // Suggested name buttons
    const presetY = -8;
    const cols = 3;
    namesPresets.forEach((n, i) => {
      const px = -cardW / 2 + 16 + (i % cols) * ((cardW - 32) / cols) + ((cardW - 32) / cols) / 2;
      const py = presetY + Math.floor(i / cols) * 28;
      const pBtn = this.add.rectangle(px, py, (cardW - 40) / cols, 22, 0x404870, 0.7).setStrokeStyle(1, 0xFFFFFF, 0.5).setInteractive({ useHandCursor: true });
      const pTxt = this.add.text(px, py, n, { fontFamily: "system-ui", fontSize: 14, color: "#FFFFFF" }).setOrigin(0.5);
      pBtn.on("pointerdown", (p, x, y, e) => {
        if (e && e.stopPropagation) e.stopPropagation();
        Audio.click();
        chosenName = n;
        nameDisplay.setText(n);
      });
      card.add([pBtn, pTxt]);
    });

    // Save button
    const saveBtn = this.add.rectangle(0, 80, 220, 40, 0x5DBE9A).setStrokeStyle(2, 0x3E8E6C).setInteractive({ useHandCursor: true });
    const saveTxt = this.add.text(0, 80, "💾 Save Level", { fontFamily: "system-ui", fontSize: 18, fontStyle: "bold", color: "#FFFFFF" }).setOrigin(0.5);
    saveBtn.on("pointerdown", (p, x, y, e) => {
      if (e && e.stopPropagation) e.stopPropagation();
      Audio.click();
      // Persist
      this.level.name = chosenName;
      this.level.updated = Date.now();
      const all = loadCustomLevels();
      const idx = all.findIndex(l => l.id === this.level.id);
      if (idx >= 0) all[idx] = this.level;
      else all.push(this.level);
      const ok = saveCustomLevels(all);
      overlay.destroy(); card.destroy();
      if (ok) {
        this.showToast("Saved!");
        // Achievements
        if (all.length >= 1) unlockAchievement(this, "first_custom");
        if (all.length >= 5) unlockAchievement(this, "five_custom");
      }
      else this.showToast("Save failed (storage full?)");
    });

    const cancelBtn = this.add.text(0, 116, "Cancel", { fontFamily: "system-ui", fontSize: 15, color: "#A8D0FF" }).setOrigin(0.5).setInteractive({ useHandCursor: true });
    cancelBtn.on("pointerdown", () => { overlay.destroy(); card.destroy(); });

    card.add([cardBg, title, lbl, nameDisplay, saveBtn, saveTxt, cancelBtn]);
    card.setScale(0);
    this.tweens.add({ targets: card, scale: 1, duration: 280, ease: "Back.easeOut" });
  }

  tempPlay() {
    // Validate before testing
    if (this.level.items.length === 0) {
      this.showToast("Add items first!");
      return;
    }
    const hasExit = this.level.items.some(it => it.type === "exit");
    if (!hasExit) {
      this.showToast("Place an Exit portal first!");
      return;
    }
    const hasPickup = this.level.items.some(it => it.type === "pickup" || it.type === "alien");
    if (!hasPickup) {
      this.showToast("Add a Star or Alien!");
      return;
    }
    // Save to temp key for the player to read
    sessionStorage.setItem("oceanmission:tempPlay", JSON.stringify(this.level));
    this.scene.start("CustomLevelScene", { tempPlay: true });
  }

  showToast(message) {
    const W = this.W, H = this.H;
    const c = this.add.container(W / 2, H / 2 - 40).setDepth(970);
    const bg = this.add.rectangle(0, 0, 240, 38, 0x000000, 0.85).setStrokeStyle(1, 0xFFE9A8);
    const txt = this.add.text(0, 0, message, { fontFamily: "system-ui", fontSize: 17, fontStyle: "bold", color: "#FFE9A8" }).setOrigin(0.5);
    c.add([bg, txt]);
    c.setScale(0);
    this.tweens.add({ targets: c, scale: 1, duration: 200, ease: "Back.easeOut" });
    this.time.delayedCall(1400, () => {
      this.tweens.add({ targets: c, alpha: 0, duration: 300, onComplete: () => c.destroy() });
    });
  }
}

// ══════════════════════════════════════════════════════════════════
// CUSTOM LEVEL — plays a saved level
// ══════════════════════════════════════════════════════════════════
class CustomLevelScene extends Phaser.Scene {
  constructor() { super("CustomLevelScene"); }
  init(data) {
    this.tempPlay = data?.tempPlay || false;
    this.levelId = data?.levelId || null;
  }
  create() {
    const W = this.scale.width, H = this.scale.height;
    this.W = W; this.H = H;

    // Load level data
    if (this.tempPlay) {
      const raw = sessionStorage.getItem("oceanmission:tempPlay");
      this.level = raw ? JSON.parse(raw) : null;
    } else if (this.levelId) {
      const all = loadCustomLevels();
      this.level = all.find(l => l.id === this.levelId);
    }
    if (!this.level) {
      this.scene.start("MyLevelsScene");
      return;
    }

    // Background
    paintEditorBackground(this, this.level.theme);

    // Title bar
    this.add.rectangle(0, 0, W, 56, 0x000000, 0.6).setOrigin(0, 0).setDepth(800);
    this.add.text(W / 2, 22, this.level.name, {
      fontFamily: "system-ui", fontSize: 18, fontStyle: "bold", color: "#FFE9A8",
    }).setOrigin(0.5).setDepth(801);
    createBackButton(this, "← back", () => this.exit());

    // Score text
    this.targetCount = this.level.items.filter(it => it.type === "pickup" || it.type === "alien").length;
    this.collected = 0;
    this.scoreText = this.add.text(W - 12, 28, `⭐ 0/${this.targetCount}`, {
      fontFamily: "system-ui", fontSize: 18, fontStyle: "bold", color: "#FFE060",
    }).setOrigin(1, 0.5).setDepth(801);

    // Spawn items
    this.pickups = [];
    this.hazards = [];
    this.exit = null;
    this.level.items.forEach(item => {
      const obj = spawnEditorItem(this, item);
      if (!obj) return;
      obj.itemType = item.type;
      if (item.type === "pickup" || item.type === "alien") {
        obj.collected = false;
        this.pickups.push(obj);
      } else if (item.type === "exit") {
        this.exit = obj;
      } else {
        // Hazard
        this.hazards.push(obj);
      }
    });

    // Astronaut
    this.astronaut = createAstronaut(this, W * 0.5, H * 0.15, STATE.avatar);
    this.astronaut.setScale(1.5);
    this.astronaut.setDepth(50);
    this.astroVx = 0; this.astroVy = 0;

    // Joystick
    this.joystick = new VirtualJoystick(this);
    this.tweens.timeScale = isKidMode() ? 0.6 : 1;

    // Health
    this.health = isKidMode() ? 5 : 3;
    this.healthIcons = [];
    for (let i = 0; i < 3; i++) {
      const heart = this.add.text(16 + i * 22, 64, "❤️", { fontSize: 18 }).setDepth(801);
      this.healthIcons.push(heart);
    }

    this.gameEnded = false;
  }

  update() {
    if (this.gameEnded || !this.level) return;
    const W = this.W, H = this.H;

    const accel = 0.55;
    this.astroVx += this.joystick.dx * accel;
    this.astroVy += this.joystick.dy * accel;
    this.astroVx *= 0.88; this.astroVy *= 0.88;
    const sp = Math.hypot(this.astroVx, this.astroVy);
    if (sp > 4) { this.astroVx = (this.astroVx / sp) * 4; this.astroVy = (this.astroVy / sp) * 4; }
    this.astronaut.x += this.astroVx;
    this.astronaut.y += this.astroVy;
    this.astronaut.x = Phaser.Math.Clamp(this.astronaut.x, 24, W - 24);
    this.astronaut.y = Phaser.Math.Clamp(this.astronaut.y, 70, H - 24);

    // Pickup collisions
    for (const p of this.pickups) {
      if (p.collected) continue;
      const d = Phaser.Math.Distance.Between(this.astronaut.x, this.astronaut.y, p.x, p.y);
      if (d < 30) this.collectPickup(p);
    }

    // Hazard collisions
    for (const h of this.hazards) {
      if (h.itemType === "meteor") {
        h.x += h.vx; h.y += h.vy;
        if (h.x < 30 || h.x > W - 30) h.vx *= -1;
        if (h.y < 80 || h.y > H - 30) h.vy *= -1;
        const d = Phaser.Math.Distance.Between(h.x, h.y, this.astronaut.x, this.astronaut.y);
        if (d < (h.collisionRadius || 18) + 14) this.takeHit("Meteor!");
      } else if (h.itemType === "blackhole") {
        const dx = h.x - this.astronaut.x;
        const dy = h.y - this.astronaut.y;
        const dist = Math.hypot(dx, dy);
        if (dist < (h.gravityRadius || 60)) {
          const pull = (1 - dist / (h.gravityRadius || 60)) * 0.7;
          this.astroVx += (dx / dist) * pull;
          this.astroVy += (dy / dist) * pull;
          if (dist < (h.collisionRadius || 22)) {
            this.takeHit("Black hole!");
            this.astronaut.x -= (dx / dist) * 30;
            this.astronaut.y -= (dy / dist) * 30;
          }
        }
      } else if (h.itemType === "whitehole") {
        const d = Phaser.Math.Distance.Between(h.x, h.y, this.astronaut.x, this.astronaut.y);
        if (d < (h.collisionRadius || 16) + 16) {
          this.takeHit("White hole!");
          const ang = Math.atan2(this.astronaut.y - h.y, this.astronaut.x - h.x);
          this.astroVx = Math.cos(ang) * 8;
          this.astroVy = Math.sin(ang) * 8;
        }
      }
    }

    // Exit
    if (this.exit && this.exit.unlocked) {
      const d = Phaser.Math.Distance.Between(this.exit.x, this.exit.y, this.astronaut.x, this.astronaut.y);
      if (d < (this.exit.collisionRadius || 32)) this.complete();
    }
  }

  collectPickup(p) {
    p.collected = true;
    Audio.pickup();
    this.tweens.add({ targets: p, scale: 1.5, alpha: 0, duration: 400, onComplete: () => p.destroy() });
    this.collected++;
    this.scoreText.setText(`⭐ ${this.collected}/${this.targetCount}`);
    if (this.collected >= this.targetCount && this.exit && !this.exit.unlocked) {
      this.exit.unlock();
      Audio.unlock();
    }
  }

  takeHit(message) {
    if (this.invincible) return;
    this.invincible = true;
    this.health--;
    Audio.hit();
    this.healthIcons[this.health]?.setAlpha(0.2);
    showDangerPrompt(this, message);
    this.cameras.main.shake(150, 0.008);
    this.cameras.main.flash(150, 200, 80, 200);
    this.tweens.add({ targets: this.astronaut, alpha: { from: 0.3, to: 1 }, duration: 200, yoyo: true, repeat: 3 });
    this.time.delayedCall(isKidMode() ? 1500 : 900, () => this.invincible = false);
    if (this.health <= 0) this.gameOver();
  }

  complete() {
    this.gameEnded = true;
    this.joystick.destroy();
    Audio.victory();
    const W = this.W, H = this.H;
    this.add.rectangle(W / 2, H / 2, W, H, 0x000000, 0.8).setDepth(900);
    const card = this.add.container(W / 2, H / 2).setDepth(901);
    const cardBg = this.add.rectangle(0, 0, Math.min(W - 40, 320), 220, 0x101830).setStrokeStyle(3, 0x5DBE9A);
    const trophy = this.add.text(0, -65, "🏆", { fontSize: 50 }).setOrigin(0.5);
    const title = this.add.text(0, -10, "Level Complete!", {
      fontFamily: "system-ui", fontSize: 22, fontStyle: "bold", color: "#5DBE9A",
    }).setOrigin(0.5);
    const sub = this.add.text(0, 18, this.tempPlay ? "Test successful — save your level!" : "Great job!", {
      fontFamily: "system-ui", fontSize: 16, color: "#FFFFFF",
    }).setOrigin(0.5);
    const back = this.add.rectangle(0, 70, 220, 40, 0x5DBE9A).setStrokeStyle(2, 0x3E8E6C).setInteractive({ useHandCursor: true });
    const backTxt = this.add.text(0, 70, this.tempPlay ? "Back to Editor" : "← My Levels", { fontFamily: "system-ui", fontSize: 18, fontStyle: "bold", color: "#FFFFFF" }).setOrigin(0.5);
    card.add([cardBg, trophy, title, sub, back, backTxt]);
    card.setScale(0);
    this.tweens.add({ targets: card, scale: 1, duration: 400, ease: "Back.easeOut" });
    back.on("pointerdown", () => {
      if (this.tempPlay) this.scene.start("EditorScene", { levelId: this.level.id });
      else this.scene.start("MyLevelsScene");
    });
  }

  gameOver() {
    if (this.gameEnded) return;
    this.gameEnded = true;
    this.joystick.destroy();
    if (this.iceSpawnEvent) this.iceSpawnEvent.remove();
    if (this.avalancheTimer) this.avalancheTimer.remove();
    if (this.bossAttackEvent) this.bossAttackEvent.remove();
    if (this.flareEvent) this.flareEvent.remove();
    Audio.fail();
    const W = this.W, H = this.H;
    const overlay = this.add.rectangle(W / 2, H / 2, W, H, 0x000000, 0.85).setDepth(900);
    const card = this.add.container(W / 2, H / 2).setDepth(901);
    const cardH = this._continueUsed ? 240 : 320;
    const cardBg = this.add.rectangle(0, 0, Math.min(W - 40, 320), cardH, 0x101830).setStrokeStyle(3, SPACE.danger);
    const skull = this.add.text(0, -cardH / 2 + 36, "💔", { fontSize: 48 }).setOrigin(0.5);
    const title = this.add.text(0, -cardH / 2 + 86, "Try Again!", {
      fontFamily: "system-ui", fontSize: 22, fontStyle: "bold", color: "#FFFFFF", align: "center", wordWrap: { width: 280 },
    }).setOrigin(0.5);
    const sub = this.add.text(0, -cardH / 2 + 124, "Try again.", {
      fontFamily: "system-ui", fontSize: 16, color: "#ffffff", align: "center",
    }).setOrigin(0.5);
    card.add([cardBg, skull, title, sub]);

    addContinueButton(this, card, {
      y: -cardH / 2 + 168,
      onContinue: () => {
        overlay.destroy();
        card.destroy();
        restoreForContinue(this);
        this.joystick = new VirtualJoystick(this);
        this.tweens.timeScale = isKidMode() ? 0.6 : 1;
      },
    });

    const retryY = this._continueUsed ? cardH / 2 - 80 : cardH / 2 - 70;
    const retry = this.add.rectangle(0, retryY, 200, 40, SPACE.danger).setStrokeStyle(2, 0xA02040).setInteractive({ useHandCursor: true });
    const retryTxt = this.add.text(0, retryY, "🔄 Try Again", { fontFamily: "system-ui", fontSize: 19, fontStyle: "bold", color: "#ffffff" }).setOrigin(0.5);
    const back = this.add.text(0, cardH / 2 - 30, "↩ Back to levels", { fontFamily: "system-ui", fontSize: 16, color: "#A8D0FF" }).setOrigin(0.5).setInteractive({ useHandCursor: true });
    card.add([retry, retryTxt, back]);
    card.setScale(0);
    this.tweens.add({ targets: card, scale: 1, duration: 400, ease: "Back.easeOut" });
    retry.on("pointerdown", () => {
      this._continueAttempts = (this._continueAttempts || 0) + 1;
      this.scene.restart();
    });
    back.on("pointerdown", () => this.scene.start("LevelSelectScene"));
  }

  exit() {
    this.joystick?.destroy();
    if (this.tempPlay) this.scene.start("EditorScene", { levelId: this.level.id });
    else this.scene.start("MyLevelsScene");
  }
}

class ComingSoonScene extends Phaser.Scene {
  constructor() { super("ComingSoonScene"); }
  init(data) { this.planetId = data?.planetId || "glacius"; this.levelName = data?.levelName; }
  create() {
    const W = this.scale.width, H = this.scale.height;
    const mobile = isMobile();
    const def = PLANETS[this.planetId];

    // Realistic deep space
    makeDeepSpaceBackground(this, "blue");
    makeStarfield(this, mobile ? 50 : 80, 1);
    makeNebulaBackdrop(this);

    // Big planet preview (centerpiece)
    createPlanet(this, W / 2, H * 0.32, { ...def, size: mobile ? 60 : 80 });

    // Level name (if from level select)
    if (this.levelName) {
      this.add.text(W / 2, H * 0.55, this.levelName.toUpperCase(), {
        fontFamily: "system-ui", fontSize: responsiveFontSize(26, 30), fontStyle: "bold",
        color: "#FFE9A8", stroke: "#000000", strokeThickness: 3, letterSpacing: 2,
      }).setOrigin(0.5);
      this.add.text(W / 2, H * 0.605, `${def.name} World`, {
        fontFamily: "system-ui", fontSize: 16, color: "#A8D0FF",
      }).setOrigin(0.5);
    } else {
      this.add.text(W / 2, H * 0.55, def.name.toUpperCase(), {
        fontFamily: "system-ui", fontSize: 30, fontStyle: "bold", color: "#FFE9A8",
        stroke: "#000000", strokeThickness: 3,
      }).setOrigin(0.5);
    }

    this.add.text(W / 2, H * 0.66, def.desc, {
      fontFamily: "system-ui", fontSize: 17, color: "#FFFFFF", align: "center",
      wordWrap: { width: W - 40 },
    }).setOrigin(0.5).setAlpha(0.85);

    const lockBox = this.add.rectangle(W / 2, H * 0.78, 200, 38, 0x000000, 0.7).setStrokeStyle(1.5, 0xFFE9A8);
    this.add.text(W / 2, H * 0.78, "🔒 Coming in next update", {
      fontFamily: "system-ui", fontSize: 17, fontStyle: "bold", color: "#FFE9A8",
    }).setOrigin(0.5);

    const back = this.add.rectangle(W / 2, H * 0.88, 220, 44, 0x404870).setStrokeStyle(2, 0xFFFFFF, 0.6).setInteractive({ useHandCursor: true });
    this.add.text(W / 2, H * 0.88, "← Back to Levels", { fontFamily: "system-ui", fontSize: 18, color: "#FFFFFF", fontStyle: "bold" }).setOrigin(0.5);
    back.on("pointerdown", () => this.scene.start("LevelSelectScene"));
  }
}

// INIT
// ══════════════════════════════════════════════════════════════════
function initGame() {
  const config = {
    type: Phaser.AUTO,
    parent: "game-container",
    scale: {
      mode: Phaser.Scale.RESIZE,
      autoCenter: Phaser.Scale.CENTER_BOTH,
      width: window.innerWidth,
      height: window.innerHeight,
    },
    input: {
      activePointers: 3, // allow joystick + UI taps simultaneously
    },
    backgroundColor: "#0E3D5C",
    scene: [
      ProfilePickerScene,
      CareerPickerScene,
      // Ocean Adventures
      BootScene, AvatarScene, GameScene, Mission2Scene, LogbookScene,
      // Save Earth (astronaut)
      WormholeScene, TutorialScene, LevelSelectScene, GalaxyHubScene, SpaceTravelScene,
      AqualonScene, PyrosScene, GlaciusScene, VerdaniaScene, MekanosScene, BonusScene, ComingSoonScene,
      // Volcano Quest (uses PyrosScene with cfg flag)
      VolcanoQuestScene,
      // Level Editor
      MyLevelsScene, EditorScene, CustomLevelScene,
      // Achievements
      AchievementsScene,
      // HQ
      HQScene,
    ],
  };
  new Phaser.Game(config);
}

if (typeof Phaser === "undefined") {
  // Retry until Phaser loads
  const check = setInterval(() => {
    if (typeof Phaser !== "undefined") { clearInterval(check); initGame(); }
  }, 50);
} else {
  initGame();
}
