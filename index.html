<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Career Quest">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0E3D5C">
<meta name="description" content="Career Quest — kids explore oceans, volcanoes, and space.">
<meta name="format-detection" content="telephone=no">
<title>Career Quest</title>
<style>
  /* Reset + iOS-friendly defaults */
  html, body {
    margin: 0; padding: 0; overflow: hidden; height: 100%;
    background: #0E3D5C; touch-action: none; overscroll-behavior: none;
    -webkit-user-select: none; user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    /* Use safe areas for the full screen */
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
    box-sizing: border-box;
  }
  /* Game canvas fills viewport (minus safe areas) */
  #game-container {
    width: 100%;
    height: 100%;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  canvas { display: block; }
  /* Splash screen — visible until game boots */
  #splash {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: #FFE9A8;
    background: linear-gradient(135deg, #0E3D5C 0%, #051030 100%);
    z-index: 1000;
    transition: opacity 0.5s ease;
  }
  #splash.hidden { opacity: 0; pointer-events: none; }
  .splash-title {
    font-size: 32px; font-weight: 700; letter-spacing: 4px;
    margin-bottom: 8px; text-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }
  .splash-sub { font-size: 14px; color: #A8D0FF; margin-bottom: 32px; }
  .splash-loader {
    width: 48px; height: 48px;
    border: 3px solid rgba(255,233,168,0.2);
    border-top-color: #FFE9A8;
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  /* Prevent iOS rubber-band scroll */
  body { position: fixed; width: 100%; }
</style>
</head>
<body>
<div id="splash">
  <div class="splash-title">ADVENTURE QUEST</div>
  <div class="splash-sub">Explore oceans, volcanoes, and space.</div>
  <div class="splash-loader"></div>
</div>
<div id="game-container"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.80.1/phaser.min.js"></script>
<script>
// Hide splash once game boots (Phaser will set this when first scene renders)
window.hideSplash = () => {
  const s = document.getElementById("splash");
  if (s) { s.classList.add("hidden"); setTimeout(() => s.remove(), 600); }
};
// Prevent context menu (long press on iOS)
document.addEventListener("contextmenu", e => e.preventDefault());
// Prevent default touch behaviors that could interfere with the game
document.addEventListener("gesturestart", e => e.preventDefault());
document.addEventListener("gesturechange", e => e.preventDefault());

// ══════════════════════════════════════════════════════════════════
// GAME STATE (persisted)
// ══════════════════════════════════════════════════════════════════
const DEFAULT_STATE = {
  level: 1, xp: 0, totalTrashCollected: 0, totalAnimalsFound: 0,
  mission1Completed: false,
  mission2Completed: false,
  capturedAnimals: [], // ids of logged animals (Logbook collection)
  // Space mode
  career: null, // null | "marine" | "astronaut"
  wormholeSeen: false,
  tutorialDone: false,
  planetsVisited: [], // ids of planets ever landed on
  levelsCompleted: [], // numeric level IDs ever completed
  squidletRescued: 0, // total cumulative
  magmiteCrystalsCollected: 0,
  // EARTH RESCUE MISSION — the overall game goal
  habitability: 0, // 0-100 habitability score for new Earth
  daysRemaining: 365, // story timer
  alienCrew: [], // ids of alien species who've joined your crew (data gifted)
  endingSeen: false,
  avatar: { hair: "short", hairColor: 0x5A3A20, skinColor: 0xF4D6B0, suitColor: 0x3B7DB5 },
  // Achievements (Batch 1 feature)
  achievements: [], // ids of unlocked achievements
  totalPlayTime: 0, // ms
  sessionStarted: 0, // timestamp on this session
  // Batch 2 features
  favoriteLevels: [], // numeric level IDs the player has starred
  lastSeenDate: null, // ISO date string of last play
  dailyMission: null, // { date, type, target, progress, claimed }
  dailyStreak: 0, // (informational only — no punishment for missing days)
  surpriseXp: 0, // total bonus XP from surprise events
  hqProgress: 0, // 0..10 — how many levels completed determines HQ visuals
  // Decoration system (Batch 2 + HQ deepening)
  starCoins: 0, // currency earned from levels + daily missions
  ownedDecorations: [], // ids of decoration items player has bought
  placedDecorations: [], // [{ itemId, x, y }] — items currently placed in HQ
  // Volcano Quest progress
  volcanoCompleted: [], // ids of completed volcano levels (1, 2, 3)
};
const STORE_KEY = "oceanmission:v1";
const loadGame = () => { try { const raw = localStorage.getItem(STORE_KEY); return raw ? { ...DEFAULT_STATE, ...JSON.parse(raw) } : { ...DEFAULT_STATE }; } catch { return { ...DEFAULT_STATE }; } };
// saveGame writes to the active profile if one is set, AND to the legacy key for backward compat
const saveGame = (s) => {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(s)); } catch {}
  // Also write to active profile slot
  try {
    const activeId = parseInt(localStorage.getItem("oceanmission:activeProfile:v1"));
    if (activeId) {
      const raw = localStorage.getItem("oceanmission:profiles:v1");
      const profiles = raw ? JSON.parse(raw) : [];
      const idx = profiles.findIndex(p => p.id === activeId);
      if (idx >= 0) {
        profiles[idx].state = { ...s };
        profiles[idx].lastPlayed = Date.now();
        localStorage.setItem("oceanmission:profiles:v1", JSON.stringify(profiles));
      }
    }
  } catch {}
};
let STATE = loadGame();

// ─── PROFILE SYSTEM (up to 4 named players) ───
// Profiles wrap individual game state so siblings can share a device.
// Existing single-player STATE is migrated to Profile 1 on first load.
const PROFILES_KEY = "oceanmission:profiles:v1";
const ACTIVE_PROFILE_KEY = "oceanmission:activeProfile:v1";

function loadProfiles() {
  try {
    const raw = localStorage.getItem(PROFILES_KEY);
    if (raw) return JSON.parse(raw);
  } catch {}
  // First-time migration: existing STATE becomes Profile 1 if it has any progress
  const hasProgress = STATE && (STATE.career || STATE.levelsCompleted?.length > 0 || STATE.habitability > 0);
  if (hasProgress) {
    return [{ id: 1, name: "Player 1", emoji: "🚀", state: { ...STATE }, created: Date.now(), lastPlayed: Date.now() }];
  }
  return [];
}
function saveProfiles(profiles) {
  try { localStorage.setItem(PROFILES_KEY, JSON.stringify(profiles)); return true; }
  catch (e) { console.warn("Failed to save profiles:", e); return false; }
}
function getActiveProfileId() {
  try { return parseInt(localStorage.getItem(ACTIVE_PROFILE_KEY)) || null; }
  catch { return null; }
}
function setActiveProfileId(id) {
  try { localStorage.setItem(ACTIVE_PROFILE_KEY, String(id)); } catch {}
}

// Save STATE back into the active profile (call after every state change)
function saveActiveProfile() {
  const activeId = getActiveProfileId();
  if (!activeId) { saveGame(STATE); return; }
  const profiles = loadProfiles();
  const idx = profiles.findIndex(p => p.id === activeId);
  if (idx >= 0) {
    profiles[idx].state = { ...STATE };
    profiles[idx].lastPlayed = Date.now();
    saveProfiles(profiles);
  }
  // Also save to legacy key for backward compat
  saveGame(STATE);
}

// Switch active profile: saves current, loads target into STATE
function switchProfile(profileId) {
  // Save current STATE into current active profile
  saveActiveProfile();
  // Load new
  const profiles = loadProfiles();
  const target = profiles.find(p => p.id === profileId);
  if (!target) return false;
  STATE = { ...DEFAULT_STATE, ...target.state };
  // Re-add settings flags
  if (typeof STATE.soundOn === "undefined") STATE.soundOn = true;
  if (typeof STATE.musicOn === "undefined") STATE.musicOn = true;
  setActiveProfileId(profileId);
  return true;
}

// Create a new profile and switch to it
function createProfile(name, emoji = "🚀", kidMode = false) {
  const profiles = loadProfiles();
  if (profiles.length >= 4) return null;
  // Save current first
  saveActiveProfile();
  const newId = profiles.length > 0 ? Math.max(...profiles.map(p => p.id)) + 1 : 1;
  const newProfile = {
    id: newId,
    name: name || `Player ${newId}`,
    emoji: emoji || "🚀",
    kidMode: !!kidMode,
    state: { ...DEFAULT_STATE, soundOn: true, musicOn: true },
    created: Date.now(),
    lastPlayed: Date.now(),
  };
  profiles.push(newProfile);
  saveProfiles(profiles);
  // Switch to it
  STATE = { ...newProfile.state };
  setActiveProfileId(newId);
  return newProfile;
}

// Toggle Kid Mode on an existing profile
function toggleProfileKidMode(profileId) {
  const profiles = loadProfiles();
  const p = profiles.find(x => x.id === profileId);
  if (!p) return false;
  p.kidMode = !p.kidMode;
  saveProfiles(profiles);
  return p.kidMode;
}

// Get whether the active profile is in Kid Mode
function isKidMode() {
  const activeId = getActiveProfileId();
  if (!activeId) return false;
  const profiles = loadProfiles();
  const p = profiles.find(x => x.id === activeId);
  return !!(p && p.kidMode);
}

function deleteProfile(profileId) {
  const profiles = loadProfiles().filter(p => p.id !== profileId);
  saveProfiles(profiles);
  // If we deleted the active one, clear active
  if (getActiveProfileId() === profileId) {
    localStorage.removeItem(ACTIVE_PROFILE_KEY);
    STATE = { ...DEFAULT_STATE, soundOn: true, musicOn: true };
  }
}

// On startup, load active profile into STATE if there is one
(function initActiveProfile() {
  const activeId = getActiveProfileId();
  if (activeId) {
    const profiles = loadProfiles();
    const active = profiles.find(p => p.id === activeId);
    if (active) {
      STATE = { ...DEFAULT_STATE, ...active.state };
    }
  }
})();

// ─── Custom Level Editor Storage ───
const CUSTOM_LEVELS_KEY = "oceanmission:customLevels:v1";
const loadCustomLevels = () => {
  try { const raw = localStorage.getItem(CUSTOM_LEVELS_KEY); return raw ? JSON.parse(raw) : []; }
  catch { return []; }
};
const saveCustomLevels = (levels) => {
  try { localStorage.setItem(CUSTOM_LEVELS_KEY, JSON.stringify(levels)); return true; }
  catch (e) { console.warn("Failed to save custom levels:", e); return false; }
};
// Custom level shape: { id, name, theme, target, items: [{type, x, y}], created, updated }
// types: pickup, hazard_meteor, hazard_blackhole, hazard_whitehole, exit
// theme: 'ocean' | 'lava' | 'ice' | 'jungle' | 'space'

// ─── Custom Level Storage helpers (placeholder for future editor) ───
// Add settings to state if missing
if (typeof STATE.soundOn === "undefined") STATE.soundOn = true;
if (typeof STATE.musicOn === "undefined") STATE.musicOn = true;
if (!Array.isArray(STATE.achievements)) STATE.achievements = [];
if (typeof STATE.totalPlayTime !== "number") STATE.totalPlayTime = 0;
// Batch 2 migrations
if (!Array.isArray(STATE.favoriteLevels)) STATE.favoriteLevels = [];
if (typeof STATE.lastSeenDate === "undefined") STATE.lastSeenDate = null;
if (typeof STATE.dailyMission === "undefined") STATE.dailyMission = null;
if (typeof STATE.dailyStreak !== "number") STATE.dailyStreak = 0;
if (typeof STATE.surpriseXp !== "number") STATE.surpriseXp = 0;
if (typeof STATE.hqProgress !== "number") STATE.hqProgress = 0;
if (typeof STATE.starCoins !== "number") STATE.starCoins = 0;
if (!Array.isArray(STATE.ownedDecorations)) STATE.ownedDecorations = [];
if (!Array.isArray(STATE.placedDecorations)) STATE.placedDecorations = [];
if (!Array.isArray(STATE.volcanoCompleted)) STATE.volcanoCompleted = [];

// One-time migration: if player has completed levels but starCoins is 0, grant retroactive coins
if (STATE.starCoins === 0 && STATE.levelsCompleted && STATE.levelsCompleted.length > 0 && !STATE._coinsRetroGranted) {
  STATE.starCoins = STATE.levelsCompleted.length * 10;
  STATE._coinsRetroGranted = true;
  saveGame(STATE);
}

// ══════════════════════════════════════════════════════════════════
// ACHIEVEMENTS CATALOG
// ══════════════════════════════════════════════════════════════════
const ACHIEVEMENTS = [
  // Rescue achievements
  { id: "first_rescue",    name: "First Rescue",      icon: "🌟", desc: "Rescue your first alien",                category: "Rescue" },
  { id: "rescue_5",        name: "Helper",            icon: "🤝", desc: "Rescue 5 aliens",                        category: "Rescue" },
  { id: "rescue_20",       name: "Hero",              icon: "🦸", desc: "Rescue 20 aliens",                       category: "Rescue" },
  { id: "rescue_50",       name: "Galactic Hero",     icon: "🌌", desc: "Rescue 50 aliens",                       category: "Rescue" },
  { id: "all_species",     name: "Crew of Five",      icon: "👽", desc: "Recruit all 5 alien species",            category: "Rescue" },
  // Mastery achievements
  { id: "level_1",         name: "First Steps",       icon: "🚀", desc: "Complete the tutorial",                  category: "Mastery" },
  { id: "level_5",         name: "Halfway There",     icon: "⭐", desc: "Complete level 5",                       category: "Mastery" },
  { id: "level_10",        name: "Earth Saver",       icon: "🌍", desc: "Save Earth (complete level 10)",         category: "Mastery" },
  { id: "level_15",        name: "Cosmic Champion",   icon: "👑", desc: "Beat the Galactic Core (level 15)",      category: "Mastery" },
  { id: "no_damage",       name: "Untouchable",       icon: "💎", desc: "Beat any level without losing a heart",  category: "Mastery" },
  // Speed achievements
  { id: "speed_demon",     name: "Speed Demon",       icon: "⚡", desc: "Beat any level in under 30 seconds",     category: "Speed" },
  // Exploration achievements
  { id: "all_worlds",      name: "World Traveler",    icon: "🗺️", desc: "Visit every world",                      category: "Exploration" },
  { id: "all_bonus",       name: "Bonus Hunter",      icon: "🎁", desc: "Beat all 5 bonus levels",                category: "Exploration" },
  // Creator achievements
  { id: "first_custom",    name: "Architect",         icon: "🎨", desc: "Save your first custom level",           category: "Creator" },
  { id: "five_custom",     name: "Master Designer",   icon: "📐", desc: "Save 5 custom levels",                   category: "Creator" },
  // Persistence achievements
  { id: "play_30min",      name: "Dedicated",         icon: "⏰", desc: "Play for 30 minutes total",              category: "Persistence" },
  { id: "play_2hr",        name: "Devoted",           icon: "🔥", desc: "Play for 2 hours total",                 category: "Persistence" },
  { id: "comeback",        name: "Comeback Kid",      icon: "💪", desc: "Beat a level after 3+ tries",            category: "Persistence" },
];

function hasAchievement(id) { return STATE.achievements && STATE.achievements.includes(id); }
function unlockAchievement(scene, id) {
  if (hasAchievement(id)) return false;
  const def = ACHIEVEMENTS.find(a => a.id === id);
  if (!def) return false;
  STATE.achievements.push(id);
  saveGame(STATE);
  // Show unlock toast
  if (scene && scene.add) showAchievementToast(scene, def);
  return true;
}

function showAchievementToast(scene, def) {
  const W = scene.scale.width;
  const c = scene.add.container(W / 2, -60).setDepth(990);
  const bg = scene.add.rectangle(0, 0, 280, 56, 0x1A2543, 0.95).setStrokeStyle(2, 0xFFE9A8);
  const icon = scene.add.text(-110, 0, def.icon, { fontSize: 30 }).setOrigin(0.5);
  const headline = scene.add.text(-78, -10, "Achievement Unlocked!", {
    fontFamily: "system-ui", fontSize: 13, fontStyle: "bold", color: "#FFE9A8", letterSpacing: 1,
  }).setOrigin(0, 0.5);
  const name = scene.add.text(-78, 8, def.name, {
    fontFamily: "system-ui", fontSize: 17, fontStyle: "bold", color: "#FFFFFF",
  }).setOrigin(0, 0.5);
  c.add([bg, icon, headline, name]);
  // Slide in from top
  scene.tweens.add({ targets: c, y: 80, duration: 500, ease: "Back.easeOut" });
  if (typeof Audio !== "undefined" && Audio.unlock) Audio.unlock();
  scene.time.delayedCall(2800, () => {
    scene.tweens.add({ targets: c, y: -60, alpha: 0, duration: 400, onComplete: () => c.destroy() });
  });
}

// Helper to track play time
function startPlaySession() {
  STATE.sessionStarted = Date.now();
}
function endPlaySession() {
  if (STATE.sessionStarted) {
    STATE.totalPlayTime += Date.now() - STATE.sessionStarted;
    STATE.sessionStarted = 0;
    saveGame(STATE);
  }
}
// Auto-start session
startPlaySession();
// Save session time every 60s
setInterval(() => {
  if (STATE.sessionStarted) {
    const now = Date.now();
    STATE.totalPlayTime += now - STATE.sessionStarted;
    STATE.sessionStarted = now;
    saveGame(STATE);
    // Check time-based achievements
    const minutes = STATE.totalPlayTime / 60000;
    if (minutes >= 30) unlockAchievement(null, "play_30min");
    if (minutes >= 120) unlockAchievement(null, "play_2hr");
  }
}, 60000);

// ══════════════════════════════════════════════════════════════════
// DAILY MISSION SYSTEM
// ══════════════════════════════════════════════════════════════════
function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
}

const DAILY_MISSION_TYPES = [
  { id: "rescue_3",      icon: "👽", title: "Rescue 3 aliens today",          target: 3,  reward: 50, type: "rescue" },
  { id: "rescue_5",      icon: "🦸", title: "Rescue 5 aliens today",          target: 5,  reward: 80, type: "rescue" },
  { id: "complete_2",    icon: "⭐", title: "Beat any 2 levels today",         target: 2,  reward: 60, type: "complete" },
  { id: "complete_1_no_dmg", icon: "💎", title: "Beat any level without damage", target: 1, reward: 100, type: "complete_no_dmg" },
  { id: "play_15min",    icon: "⏰", title: "Play for 15 minutes today",       target: 15, reward: 40, type: "playtime" },
];

function generateDailyMission() {
  const today = todayKey();
  // Already have one for today? Don't regenerate.
  if (STATE.dailyMission && STATE.dailyMission.date === today) return STATE.dailyMission;
  // Pick a random mission type
  const tpl = DAILY_MISSION_TYPES[Math.floor(Math.random() * DAILY_MISSION_TYPES.length)];
  STATE.dailyMission = {
    date: today,
    id: tpl.id,
    icon: tpl.icon,
    title: tpl.title,
    type: tpl.type,
    target: tpl.target,
    reward: tpl.reward,
    progress: 0,
    claimed: false,
    completedAt: 0, // start time of "today" if playtime mission
  };
  saveGame(STATE);
  return STATE.dailyMission;
}

function trackDailyProgress(scene, eventType, amount = 1) {
  if (!STATE.dailyMission) return;
  if (STATE.dailyMission.date !== todayKey()) return;
  if (STATE.dailyMission.claimed) return;

  const mission = STATE.dailyMission;
  let advanced = false;
  if (mission.type === "rescue" && eventType === "rescue") {
    mission.progress = Math.min(mission.target, mission.progress + amount);
    advanced = true;
  } else if (mission.type === "complete" && eventType === "complete") {
    mission.progress = Math.min(mission.target, mission.progress + amount);
    advanced = true;
  } else if (mission.type === "complete_no_dmg" && eventType === "complete_no_dmg") {
    mission.progress = Math.min(mission.target, mission.progress + amount);
    advanced = true;
  }
  // playtime is checked separately below
  if (advanced) {
    saveGame(STATE);
    if (mission.progress >= mission.target && scene && scene.add) {
      showDailyComplete(scene, mission);
    }
  }
}

function checkPlaytimeMission() {
  if (!STATE.dailyMission) return;
  if (STATE.dailyMission.type !== "playtime") return;
  if (STATE.dailyMission.date !== todayKey()) return;
  // Track minutes played today since first sighting today
  const now = Date.now();
  if (!STATE.dailyMission.startedAt) {
    STATE.dailyMission.startedAt = now;
    saveGame(STATE);
    return;
  }
  const minutesToday = Math.floor((now - STATE.dailyMission.startedAt) / 60000);
  STATE.dailyMission.progress = Math.min(STATE.dailyMission.target, minutesToday);
  saveGame(STATE);
}
setInterval(checkPlaytimeMission, 30000);

function showDailyComplete(scene, mission) {
  if (!scene || !scene.add) return;
  const W = scene.scale.width;
  const c = scene.add.container(W / 2, -60).setDepth(990);
  const bg = scene.add.rectangle(0, 0, 280, 56, 0x1A2543, 0.95).setStrokeStyle(2, 0x80E5FF);
  const icon = scene.add.text(-110, 0, mission.icon, { fontSize: 30 }).setOrigin(0.5);
  const headline = scene.add.text(-78, -10, "Daily Mission Done!", {
    fontFamily: "system-ui", fontSize: 13, fontStyle: "bold", color: "#80E5FF", letterSpacing: 1,
  }).setOrigin(0, 0.5);
  const name = scene.add.text(-78, 8, `+${mission.reward} XP — claim on Level Select`, {
    fontFamily: "system-ui", fontSize: 15, color: "#FFFFFF",
  }).setOrigin(0, 0.5);
  c.add([bg, icon, headline, name]);
  scene.tweens.add({ targets: c, y: 80, duration: 500, ease: "Back.easeOut" });
  if (typeof Audio !== "undefined" && Audio.unlock) Audio.unlock();
  scene.time.delayedCall(2800, () => {
    scene.tweens.add({ targets: c, y: -60, alpha: 0, duration: 400, onComplete: () => c.destroy() });
  });
}

// Welcome-back: returns true if this is a returning session (not first session today)
function isReturningSession() {
  const today = todayKey();
  if (!STATE.lastSeenDate) return false;
  return STATE.lastSeenDate !== today;
}
function markSeenToday() {
  STATE.lastSeenDate = todayKey();
  saveGame(STATE);
}

// ══════════════════════════════════════════════════════════════════
// AUDIO SYSTEM — Web Audio API generated sounds (no external files)
// ══════════════════════════════════════════════════════════════════
const Audio = {
  ctx: null,
  musicNodes: null,
  initialized: false,
  init() {
    if (this.initialized) return;
    try {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      this.masterGain = this.ctx.createGain();
      this.masterGain.gain.value = 0.5;
      this.masterGain.connect(this.ctx.destination);
      this.initialized = true;
    } catch (e) { console.warn("Audio init failed:", e); }
  },
  // Resume audio context (required after user interaction on iOS)
  resume() {
    if (this.ctx && this.ctx.state === "suspended") this.ctx.resume();
  },
  _beep(freq, duration, type = "sine", vol = 0.3) {
    if (!STATE.soundOn || !this.ctx) return;
    this.resume();
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.value = vol;
    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
    osc.connect(gain).connect(this.masterGain);
    osc.start();
    osc.stop(this.ctx.currentTime + duration);
  },
  // Sound effects
  pickup() { // collected a pickup
    if (!STATE.soundOn || !this.ctx) return;
    this.resume();
    this._beep(660, 0.08, "triangle", 0.3);
    setTimeout(() => this._beep(880, 0.10, "triangle", 0.3), 60);
  },
  rescue() { // alien rescued
    if (!STATE.soundOn || !this.ctx) return;
    this.resume();
    this._beep(523, 0.10, "sine", 0.4);
    setTimeout(() => this._beep(659, 0.10, "sine", 0.4), 80);
    setTimeout(() => this._beep(784, 0.18, "sine", 0.4), 160);
  },
  hit() { // took damage
    if (!STATE.soundOn || !this.ctx) return;
    this.resume();
    this._beep(180, 0.18, "sawtooth", 0.4);
    setTimeout(() => this._beep(120, 0.18, "sawtooth", 0.3), 80);
  },
  unlock() { // gate / exit unlocked
    if (!STATE.soundOn || !this.ctx) return;
    this.resume();
    [392, 494, 587, 784].forEach((f, i) => setTimeout(() => this._beep(f, 0.14, "triangle", 0.35), i * 80));
  },
  victory() { // level complete
    if (!STATE.soundOn || !this.ctx) return;
    this.resume();
    [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => this._beep(f, 0.18, "sine", 0.4), i * 100));
  },
  fail() { // game over
    if (!STATE.soundOn || !this.ctx) return;
    this.resume();
    [392, 311, 247, 196].forEach((f, i) => setTimeout(() => this._beep(f, 0.20, "sawtooth", 0.4), i * 120));
  },
  click() { // button tap
    this._beep(800, 0.04, "square", 0.15);
  },
  // Ambient music — soft pad drone tied to a world's mood
  startMusic(world = "space") {
    if (!STATE.musicOn || !this.ctx) return;
    this.resume();
    this.stopMusic();
    const moods = {
      ocean:   { freqs: [220, 277, 330], type: "sine",     vol: 0.06 },
      lava:    { freqs: [165, 196, 247], type: "sawtooth", vol: 0.04 },
      ice:     { freqs: [294, 370, 440], type: "sine",     vol: 0.05 },
      jungle:  { freqs: [196, 247, 294], type: "triangle", vol: 0.05 },
      factory: { freqs: [110, 165, 220], type: "square",   vol: 0.03 },
      space:   { freqs: [165, 220, 277], type: "sine",     vol: 0.05 },
      bonus:   { freqs: [277, 330, 415], type: "triangle", vol: 0.05 },
    };
    const m = moods[world] || moods.space;
    const masterMusic = this.ctx.createGain();
    masterMusic.gain.value = 0;
    masterMusic.connect(this.masterGain);
    masterMusic.gain.linearRampToValueAtTime(m.vol, this.ctx.currentTime + 1.5);
    const oscs = m.freqs.map((f, i) => {
      const osc = this.ctx.createOscillator();
      const g = this.ctx.createGain();
      osc.type = m.type;
      osc.frequency.value = f;
      // Slight detune for a lush pad
      osc.detune.value = (i - 1) * 6;
      g.gain.value = 1 / m.freqs.length;
      // Slow LFO for breathing pad effect
      const lfo = this.ctx.createOscillator();
      const lfoGain = this.ctx.createGain();
      lfo.frequency.value = 0.15 + i * 0.05;
      lfoGain.gain.value = 0.3;
      lfo.connect(lfoGain).connect(g.gain);
      lfo.start();
      osc.connect(g).connect(masterMusic);
      osc.start();
      return { osc, lfo };
    });
    this.musicNodes = { oscs, master: masterMusic };
  },
  stopMusic() {
    if (!this.musicNodes) return;
    const { oscs, master } = this.musicNodes;
    try {
      master.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.5);
      setTimeout(() => {
        oscs.forEach(({ osc, lfo }) => { try { osc.stop(); lfo.stop(); } catch {} });
      }, 600);
    } catch {}
    this.musicNodes = null;
  },
  setSoundOn(on) {
    STATE.soundOn = on;
    saveGame(STATE);
  },
  setMusicOn(on) {
    STATE.musicOn = on;
    saveGame(STATE);
    if (!on) this.stopMusic();
  },
};
// Initialize audio on first user interaction (iOS requirement)
const initAudioOnInteraction = () => {
  Audio.init();
  Audio.resume();
  document.removeEventListener("touchstart", initAudioOnInteraction);
  document.removeEventListener("click", initAudioOnInteraction);
};
document.addEventListener("touchstart", initAudioOnInteraction, { once: true });
document.addEventListener("click", initAudioOnInteraction, { once: true });

// Handle app backgrounding — pause audio when hidden, resume when visible
document.addEventListener("visibilitychange", () => {
  if (!Audio.ctx) return;
  if (document.hidden) {
    if (Audio.ctx.state === "running") { try { Audio.ctx.suspend(); } catch {} }
  } else {
    if (Audio.ctx.state === "suspended") { try { Audio.ctx.resume(); } catch {} }
  }
});

// XP math — each level needs (level * 100) XP
const xpForLevel = (lvl) => lvl * 100;
const checkLevelUp = () => {
  while (STATE.xp >= xpForLevel(STATE.level)) {
    STATE.xp -= xpForLevel(STATE.level);
    STATE.level++;
    return true; // leveled up
  }
  return false;
};

// Biologist character as a Container
function createBiologist(scene, x, y, avatar) {
  const { skinColor, hairColor, suitColor } = avatar;
  const root = scene.add.container(x, y);  // position-only, moved by game loop
  const body = scene.add.container(0, 0);  // inner — bobs & renders

  // Fins (behind)
  const finL = scene.add.ellipse(-9, 32, 22, 10, C.coral).setDepth(-1);
  const finR = scene.add.ellipse(9, 32, 22, 10, C.coral).setDepth(-1);

  // Legs
  const legL = scene.add.rectangle(-5, 18, 7, 18, suitColor);
  const legR = scene.add.rectangle(5, 18, 7, 18, suitColor);

  // Body
  const bodyRect = scene.add.rectangle(0, 2, 28, 30, suitColor);
  bodyRect.setStrokeStyle(1.5, C.ink);

  // Chest highlight
  const chest = scene.add.rectangle(-8, -4, 8, 10, Phaser.Display.Color.IntegerToColor(suitColor).lighten(15).color);

  // Tank on back
  const tank = scene.add.rectangle(14, 0, 7, 22, 0x888888);
  tank.setStrokeStyle(1, 0x555555);

  // Head
  const head = scene.add.circle(0, -18, 14, skinColor);
  head.setStrokeStyle(1, C.ink);

  body.add([finL, finR, legL, legR, bodyRect, chest, tank, head]);

  // Hair
  if (avatar.hair === "short") {
    const hair = scene.add.arc(0, -22, 14, 180, 360, false, hairColor);
    body.add(hair);
  } else if (avatar.hair === "long") {
    const hairTop = scene.add.ellipse(0, -24, 30, 14, hairColor);
    const hairL = scene.add.ellipse(-10, -10, 8, 18, hairColor);
    const hairR = scene.add.ellipse(10, -10, 8, 18, hairColor);
    body.add([hairTop, hairL, hairR]);
  } else if (avatar.hair === "curly") {
    const hairBase = scene.add.ellipse(0, -22, 30, 12, hairColor);
    const b1 = scene.add.circle(-9, -28, 6, hairColor);
    const b2 = scene.add.circle(0, -30, 7, hairColor);
    const b3 = scene.add.circle(9, -28, 6, hairColor);
    body.add([hairBase, b1, b2, b3]);
  } else if (avatar.hair === "pigtails") {
    const hairTop = scene.add.ellipse(0, -24, 28, 12, hairColor);
    const pL = scene.add.ellipse(-16, -12, 10, 20, hairColor);
    const pR = scene.add.ellipse(16, -12, 10, 20, hairColor);
    const bL = scene.add.circle(-16, -20, 3, C.coral);
    const bR = scene.add.circle(16, -20, 3, C.coral);
    body.add([hairTop, pL, pR, bL, bR]);
  }

  // Mask
  const mask = scene.add.rectangle(-1, -17, 22, 10, 0x1F4663);
  mask.setStrokeStyle(1, C.ink);
  const lensL = scene.add.circle(-6, -17, 3.5, 0xA8E0F0);
  const lensR = scene.add.circle(6, -17, 3.5, 0xA8E0F0);
  const snorkel = scene.add.rectangle(12, -22, 2.5, 12, C.coral);
  const cheekL = scene.add.circle(-7, -12, 2.5, 0xF4A088, 0.5);
  const cheekR = scene.add.circle(7, -12, 2.5, 0xF4A088, 0.5);
  const smile = scene.add.graphics();
  smile.lineStyle(1.5, C.ink).beginPath();
  smile.arc(0, -8, 3, 0, Math.PI, false);
  smile.strokePath();

  body.add([mask, lensL, lensR, snorkel, cheekL, cheekR, smile]);

  root.add(body);

  // Bob on body (local offset) — doesn't touch root's y, so movement isn't fought
  scene.tweens.add({ targets: body, y: -3, duration: 1200, yoyo: true, repeat: -1, ease: "Sine.easeInOut" });

  return root;
}

// Trash item sprites — parameterized by type
function createTrash(scene, x, y, type) {
  const c = scene.add.container(x, y);
  const variants = {
    bottle: () => {
      const body = scene.add.rectangle(0, 0, 12, 22, 0xA8E0C8).setStrokeStyle(1.5, 0x3A7E5A);
      const neck = scene.add.rectangle(0, -14, 6, 5, 0xA8E0C8).setStrokeStyle(1.5, 0x3A7E5A);
      const cap = scene.add.rectangle(0, -17, 7, 3, 0x5DBE9A);
      const label = scene.add.rectangle(0, 2, 10, 6, 0xFFFFFF);
      return [body, neck, cap, label];
    },
    can: () => {
      const body = scene.add.rectangle(0, 0, 14, 20, 0xD55518).setStrokeStyle(1.5, 0x8A3510);
      const top = scene.add.rectangle(0, -8, 14, 3, 0x5A5C5E);
      const label = scene.add.rectangle(0, 2, 10, 8, 0xFFFFFF);
      return [body, top, label];
    },
    bag: () => {
      const bag = scene.add.ellipse(0, 2, 22, 24, 0xE8F0F4, 0.85).setStrokeStyle(1.2, 0x7A9AAB);
      const strapL = scene.add.rectangle(-6, -12, 2, 6, 0xE8F0F4).setStrokeStyle(1, 0x7A9AAB);
      const strapR = scene.add.rectangle(6, -12, 2, 6, 0xE8F0F4).setStrokeStyle(1, 0x7A9AAB);
      return [bag, strapL, strapR];
    },
    cup: () => {
      const body = scene.add.polygon(0, 2, [-7, -10, 7, -10, 5, 12, -5, 12], 0xF8F5EC).setStrokeStyle(1.5, 0x7A7560);
      const rim = scene.add.ellipse(0, -10, 14, 3, 0xA8A5A0);
      return [body, rim];
    },
    net: () => {
      const g = scene.add.graphics();
      g.lineStyle(1.5, 0x7A6A5A);
      g.strokeRect(-12, -8, 24, 16);
      for (let i = -8; i <= 8; i += 4) g.lineBetween(i, -8, i, 8);
      for (let j = -4; j <= 4; j += 4) g.lineBetween(-12, j, 12, j);
      return [g];
    },
    ring: () => {
      const g = scene.add.graphics();
      g.lineStyle(2, 0x3A4A5A);
      for (let row = 0; row < 2; row++) {
        for (let col = 0; col < 3; col++) {
          g.strokeCircle(-8 + col * 8, -4 + row * 8, 3.5);
        }
      }
      return [g];
    },
    shoe: () => {
      const sole = scene.add.rectangle(0, 4, 24, 4, 0x2A1A0A);
      const body = scene.add.polygon(0, -2, [-12, 4, -8, -6, 8, -6, 12, 4], 0x5A4A3A).setStrokeStyle(1.5, 0x2A1A0A);
      const top = scene.add.rectangle(-4, -7, 8, 4, 0x7A6A5A);
      return [sole, body, top];
    },
    box: () => {
      const body = scene.add.rectangle(0, 0, 24, 14, 0xD49860).setStrokeStyle(1.5, 0x7A5A35);
      const top = scene.add.rectangle(0, -6, 24, 3, 0xB47840);
      const label = scene.add.text(0, 2, "PIZZA", { fontSize: 12, color: "#7A5A35", fontStyle: "bold" }).setOrigin(0.5);
      return [body, top, label];
    },
  };
  const parts = variants[type]();
  c.add(parts);
  c.trashType = type;

  // Slight drift
  scene.tweens.add({ targets: c, y: y - 4 - Math.random() * 4, x: x + (Math.random() - 0.5) * 6, duration: 2500 + Math.random() * 1500, yoyo: true, repeat: -1, ease: "Sine.easeInOut" });
  c.tween1 = scene.tweens.add({ targets: c, angle: -6 + Math.random() * 12, duration: 2000 + Math.random() * 1000, yoyo: true, repeat: -1, ease: "Sine.easeInOut" });

  return c;
}

function createOctopus(scene, x, y) {
  const c = scene.add.container(x, y);
  const g = scene.add.graphics();
  g.lineStyle(6, 0x9B6BC4, 1);
  for (let i = 0; i < 6; i++) {
    const angle = -0.4 + (i / 5) * 0.8;
    const sx = Math.sin(angle) * 10;
    const ex = Math.sin(angle) * 26;
    const ey = 10 + Math.cos(angle) * 20;
    g.beginPath();
    g.moveTo(sx, 8);
    g.lineTo(sx + (ex - sx) * 0.6, 14);
    g.lineTo(ex, ey);
    g.strokePath();
  }
  const body = scene.add.ellipse(0, 0, 32, 28, 0xB47ED9).setStrokeStyle(1.5, 0x7950A0);
  const hl = scene.add.ellipse(-6, -6, 10, 6, 0xD4A5F0);
  const eyeL = scene.add.circle(-7, 2, 4, 0xffffff);
  const eyeR = scene.add.circle(7, 2, 4, 0xffffff);
  const pupL = scene.add.circle(-7, 2, 2.2, 0x102439);
  const pupR = scene.add.circle(7, 2, 2.2, 0x102439);
  const smile = scene.add.graphics();
  smile.lineStyle(1.2, 0x102439);
  smile.beginPath(); smile.arc(0, 8, 3, 0, Math.PI); smile.strokePath();
  c.add([g, body, hl, eyeL, eyeR, pupL, pupR, smile]);
  return c;
}

function createStarfish(scene, x, y) {
  const c = scene.add.container(x, y);
  const star = scene.add.graphics();
  star.fillStyle(0xF4A5C0);
  star.lineStyle(2, 0xC66B8E);
  const outer = 22, inner = 9;
  star.beginPath();
  for (let i = 0; i < 10; i++) {
    const r = i % 2 === 0 ? outer : inner;
    const a = (i / 10) * Math.PI * 2 - Math.PI / 2;
    const px = Math.cos(a) * r, py = Math.sin(a) * r;
    if (i === 0) star.moveTo(px, py); else star.lineTo(px, py);
  }
  star.closePath(); star.fillPath(); star.strokePath();
  const dots = [[-4, -2], [4, -2], [0, 5], [-8, 4], [8, 4]];
  dots.forEach(([dx, dy]) => c.add(scene.add.circle(dx, dy, 1.5, 0xC66B8E)));
  const eyeL = scene.add.circle(-3, -1, 1.4, 0x102439);
  const eyeR = scene.add.circle(3, -1, 1.4, 0x102439);
  c.add([star, eyeL, eyeR]);
  return c;
}

// Manta Ray — for Tag & Track mission
function createMantaRay(scene, x, y) {
  const c = scene.add.container(x, y);
  // Wide kite body / wings
  const wings = scene.add.graphics();
  wings.fillStyle(0x4A6080);
  wings.lineStyle(2, 0x2A3040);
  wings.beginPath();
  wings.moveTo(0, -8);
  wings.lineTo(-32, 2);
  wings.lineTo(-26, 10);
  wings.lineTo(0, 6);
  wings.lineTo(26, 10);
  wings.lineTo(32, 2);
  wings.closePath();
  wings.fillPath();
  wings.strokePath();
  // Belly markings
  const spotL = scene.add.circle(-12, 2, 3, 0xC0C8D0, 0.8);
  const spotR = scene.add.circle(12, 2, 3, 0xC0C8D0, 0.8);
  // Cephalic horns (front lobes)
  const hornL = scene.add.polygon(-4, -8, [0, 0, -4, -6, 0, -4], 0x4A6080);
  const hornR = scene.add.polygon(4, -8, [0, 0, 4, -6, 0, -4], 0x4A6080);
  // Long thin tail
  const tail = scene.add.rectangle(0, 18, 1.5, 22, 0x2A3040);
  // Tiny eyes on top
  const eyeL = scene.add.circle(-4, -3, 1, 0x102439);
  const eyeR = scene.add.circle(4, -3, 1, 0x102439);
  c.add([wings, spotL, spotR, hornL, hornR, tail, eyeL, eyeR]);
  return c;
}

// Animal AI — drives wandering movement around the scene
class AnimalAI {
  constructor(scene, sprite, options = {}) {
    this.scene = scene;
    this.sprite = sprite;
    this.speed = options.speed || 1.2;
    this.bounds = options.bounds || { x1: 50, y1: 100, x2: 400, y2: 600 };
    this.baseScale = sprite.scale;
    this.facing = 1;
    this.tagged = false;
    this.waiting = false;
    this.target = null;
    this.pickNewTarget();
  }
  pickNewTarget() {
    const b = this.bounds;
    this.target = {
      x: Phaser.Math.Between(b.x1, b.x2),
      y: Phaser.Math.Between(b.y1, b.y2),
    };
  }
  update() {
    if (!this.target || this.waiting) return;
    const dx = this.target.x - this.sprite.x;
    const dy = this.target.y - this.sprite.y;
    const dist = Math.hypot(dx, dy);
    if (dist < 8) {
      this.waiting = true;
      this.scene.time.delayedCall(700 + Math.random() * 1400, () => {
        if (this.scene.scene.isActive()) {
          this.pickNewTarget();
          this.waiting = false;
        }
      });
      return;
    }
    const speed = this.tagged ? this.speed * 0.55 : this.speed;
    this.sprite.x += (dx / dist) * speed;
    this.sprite.y += (dy / dist) * speed;
    const desired = dx < 0 ? -1 : 1;
    if (desired !== this.facing) {
      this.facing = desired;
      this.sprite.scaleX = this.facing * this.baseScale;
    }
  }
}

// Distractors
function createRock(scene, x, y) {
  const c = scene.add.container(x, y);
  const g = scene.add.graphics();
  g.fillStyle(0x6A6863);
  g.lineStyle(2, 0x3F3D38);
  g.beginPath();
  g.moveTo(-22, 8); g.lineTo(-18, -4); g.lineTo(-8, -10);
  g.lineTo(8, -10); g.lineTo(20, -2); g.lineTo(22, 8);
  g.closePath(); g.fillPath(); g.strokePath();
  const hl = scene.add.ellipse(-5, -5, 12, 4, 0x8A8883, 0.6);
  c.add([g, hl]);
  return c;
}

function createCoral(scene, x, y) {
  const c = scene.add.container(x, y);
  const g = scene.add.graphics();
  g.fillStyle(0xF47C9E);
  g.beginPath();
  g.moveTo(-12, 15); g.lineTo(-10, 0); g.lineTo(-14, -10);
  g.lineTo(-10, -13); g.lineTo(-7, 0); g.lineTo(-7, 15);
  g.closePath(); g.fillPath();
  g.fillStyle(0xF4A088);
  g.beginPath();
  g.moveTo(2, 15); g.lineTo(4, 0); g.lineTo(10, -8);
  g.lineTo(14, -6); g.lineTo(8, 4); g.lineTo(6, 15);
  g.closePath(); g.fillPath();
  g.fillStyle(0xF47C9E);
  g.beginPath();
  g.moveTo(-4, 15); g.lineTo(-2, 0); g.lineTo(0, -14);
  g.lineTo(3, -12); g.lineTo(2, 0); g.lineTo(2, 15);
  g.closePath(); g.fillPath();
  c.add(g);
  [[-12, -10], [12, -6], [2, -13]].forEach(([dx, dy]) => {
    c.add(scene.add.circle(dx, dy, 2, 0xFFB8C8));
  });
  return c;
}

function createTreasureChest(scene, x, y) {
  const c = scene.add.container(x, y);
  const body = scene.add.rectangle(0, 4, 30, 18, 0x8B5A2B).setStrokeStyle(1.5, 0x4A2F15);
  const lid = scene.add.ellipse(0, -4, 32, 12, 0xA47040).setStrokeStyle(1.5, 0x4A2F15);
  const band1 = scene.add.rectangle(0, -6, 32, 1.5, 0xE5B14A);
  const band2 = scene.add.rectangle(0, 10, 32, 1.5, 0xE5B14A);
  const lock = scene.add.rectangle(0, 2, 5, 5, 0xE5B14A).setStrokeStyle(0.8, 0x8A6A20);
  const g1 = scene.add.circle(-8, -10, 1.5, 0xFFD96A);
  const g2 = scene.add.circle(6, -12, 2, 0xFFD96A);
  c.add([body, lid, band1, band2, lock, g1, g2]);
  return c;
}

function createShell(scene, x, y) {
  const c = scene.add.container(x, y);
  const g = scene.add.graphics();
  g.fillStyle(0xFFD8B5);
  g.lineStyle(1.5, 0xC99060);
  g.beginPath();
  g.moveTo(0, 12); g.lineTo(-14, -8); g.lineTo(-10, -14);
  g.lineTo(10, -14); g.lineTo(14, -8);
  g.closePath(); g.fillPath(); g.strokePath();
  g.lineStyle(1, 0xC99060);
  g.beginPath();
  g.moveTo(0, 12); g.lineTo(-7, -12);
  g.moveTo(0, 12); g.lineTo(0, -14);
  g.moveTo(0, 12); g.lineTo(7, -12);
  g.strokePath();
  c.add(g);
  return c;
}

class BootScene extends Phaser.Scene {
  constructor() { super("BootScene"); }
  create() {
    window.hideSplash && window.hideSplash();
    const W = this.scale.width, H = this.scale.height;

    // Ocean gradient background
    const bg = this.add.graphics();
    for (let i = 0; i < H; i++) {
      const t = i / H;
      const r = Phaser.Display.Color.Interpolate.ColorWithColor(
        Phaser.Display.Color.IntegerToColor(C.oceanLight),
        Phaser.Display.Color.IntegerToColor(C.oceanDeep),
        100, Math.floor(t * 100)
      );
      bg.fillStyle((r.r << 16) + (r.g << 8) + r.b);
      bg.fillRect(0, i, W, 1);
    }

    // Title
    // Title — keep compact at top
    this.add.text(W / 2, 60, "MISSION OCEAN", {
      fontFamily: "system-ui", fontSize: Math.min(W * 0.07, 28), fontStyle: "bold",
      color: "#FFE9A8", stroke: "#0E3D5C", strokeThickness: 4, letterSpacing: 2,
    }).setOrigin(0.5);

    this.add.text(W / 2, 88, "Become a marine biologist", {
      fontFamily: "system-ui", fontSize: 14, color: "#ffffff",
    }).setOrigin(0.5).setAlpha(0.9);

    // Avatar preview — smaller and lower so it doesn't crash into title
    const preview = createBiologist(this, W / 2, 170, STATE.avatar);
    preview.setScale(Phaser.Math.Clamp(W / 240, 1.8, 2.6));

    // Level badge — directly under avatar
    const lvlBadge = this.add.container(W / 2, 250);
    const ring = this.add.circle(0, 0, 22, C.gold).setStrokeStyle(3, 0xA8862F);
    const lvlTxt = this.add.text(0, -2, `LVL ${STATE.level}`, {
      fontFamily: "system-ui", fontSize: 13, fontStyle: "bold", color: "#ffffff",
    }).setOrigin(0.5);
    lvlBadge.add([ring, lvlTxt]);

    // XP preview
    const xpCur = STATE.xp;
    const xpNeeded = xpForLevel(STATE.level);
    this.add.text(W / 2, 282, `${xpCur} / ${xpNeeded} XP`, {
      fontFamily: "system-ui", fontSize: 14, color: "#ffffff",
    }).setOrigin(0.5).setAlpha(0.85);

    // Play button(s) — route based on progress
    // Anchor relative to bottom of screen so layout is predictable
    const bottomZoneY = H - 180;
    if (!STATE.mission1Completed) {
      // Linear path: do Mission 1 first
      this.makePlayButton(W / 2, bottomZoneY, Math.min(W - 60, 280), 54, "START MISSION 1", C.coral, "GameScene");
    } else if (!STATE.mission2Completed) {
      // Linear path: do Mission 2 next
      this.makePlayButton(W / 2, bottomZoneY, Math.min(W - 60, 280), 54, "START MISSION 2 →", C.coral, "Mission2Scene");
    } else {
      // Both done — pick a mission to replay (stack with gap)
      const btnW = Math.min(W - 60, 280);
      this.makePlayButton(W / 2, bottomZoneY - 32, btnW, 50, "🐢 Tag Animals (M2)", C.coral, "Mission2Scene");
      this.makePlayButton(W / 2, bottomZoneY + 32, btnW, 50, "🗑️ Clean the Sea (M1)", C.seaGreen, "GameScene");
    }

    // Logbook link — pushed below the buttons with explicit spacing so it doesn't overlap
    if (STATE.capturedAnimals.length > 0) {
      const lbY = (STATE.mission1Completed && STATE.mission2Completed) ? bottomZoneY + 78 : bottomZoneY + 46;
      const lbBtn = this.add.text(W / 2, lbY, `📓 View Logbook (${STATE.capturedAnimals.length}/${Object.keys(ANIMALS).length})`, {
        fontFamily: "system-ui", fontSize: 13, fontStyle: "bold", color: "#FFE9A8",
      }).setOrigin(0.5).setInteractive({ useHandCursor: true });
      lbBtn.on("pointerdown", () => this.scene.start("LogbookScene"));
    }

    // Avatar picker button — anchored to bottom, after the logbook link
    const avatarLink = this.add.text(W / 2, H - 30, "Customize explorer →", {
      fontFamily: "system-ui", fontSize: 13, color: "#ffffff",
    }).setOrigin(0.5).setAlpha(0.75).setInteractive({ useHandCursor: true });
    avatarLink.on("pointerdown", () => this.scene.start("AvatarScene"));

    // Switch adventure
    const switchBtn = this.add.text(16, 20, "↩ adventures", {
      fontFamily: "system-ui", fontSize: 17, color: "#ffffff",
    }).setOrigin(0, 0).setAlpha(0.75).setInteractive({ useHandCursor: true });
    switchBtn.on("pointerdown", () => this.scene.start("CareerPickerScene"));

    // Bubbles
    this.createBubbles();
  }

  createBubbles() {
    const W = this.scale.width, H = this.scale.height;
    for (let i = 0; i < 20; i++) {
      const x = Math.random() * W;
      const size = 3 + Math.random() * 6;
      const bubble = this.add.circle(x, H + 20, size, 0xFFFFFF, 0.5);
      this.tweens.add({
        targets: bubble, y: -30, x: x + (Math.random() - 0.5) * 60,
        duration: 6000 + Math.random() * 4000, repeat: -1,
        delay: Math.random() * 4000, ease: "Linear",
      });
    }
  }

  makePlayButton(x, y, w, h, label, color, sceneKey) {
    const stroke = color === C.coral ? 0xD55518 : (color === C.seaGreen ? 0x3E8E6C : 0xA8862F);
    const btn = this.add.rectangle(x, y, w, h, color).setStrokeStyle(2, stroke);
    const txt = this.add.text(x, y, label, {
      fontFamily: "system-ui", fontSize: 22, fontStyle: "bold", color: "#ffffff",
    }).setOrigin(0.5);
    btn.setInteractive({ useHandCursor: true });
    btn.on("pointerdown", () => {
      this.tweens.add({ targets: [btn, txt], scale: 0.95, duration: 80, yoyo: true });
      this.time.delayedCall(150, () => this.scene.start(sceneKey));
    });
    return btn;
  }
}

        STATE.avatar[field] = opt.val !== undefined ? opt.val : opt.color;
        this.scene.restart();
      });
    });
  }
}

// ─── Main game scene ───
class GameScene extends Phaser.Scene {
  constructor() { super("GameScene"); }

  create() {
    const W = this.scale.width, H = this.scale.height;
    this.W = W; this.H = H;

    // Sprite scale — responsive to viewport (bigger on bigger screens)
    this.spriteScale = Phaser.Math.Clamp(W / 260, 1.3, 2.4);

    // Background gradient
    const bg = this.add.graphics();
    bg.fillGradientStyle(C.oceanLight, C.oceanLight, C.oceanDeep, C.oceanDeep);
    bg.fillRect(0, 0, W, H);

    // Light rays from surface
    for (let i = 0; i < 5; i++) {
      const ray = this.add.rectangle(50 + i * (W / 6), 0, 60, H * 0.6, 0xFFFFFF, 0.1);
      ray.setOrigin(0.5, 0);
      ray.setAngle(-8);
      this.tweens.add({ targets: ray, alpha: { from: 0.06, to: 0.18 }, duration: 2500 + i * 400, yoyo: true, repeat: -1 });
    }

    // Distant silhouette fish
    this.addSilhouetteFish(H * 0.2, 60, 0.2, 45);
    this.addSilhouetteFish(H * 0.45, 80, 0.15, 60);

    // Bubbles (continuous)
    this.bubbles = [];
    for (let i = 0; i < 16; i++) this.spawnBubble(true);
    this.time.addEvent({ delay: 400, loop: true, callback: () => this.spawnBubble(false) });

    // Seabed
    this.drawSeabed();

    // Seaweed (decorative, scaled)
    for (const sx of [30, W - 30, W * 0.35, W * 0.7]) {
      const sw = this.add.rectangle(sx, H - 60, 8, 60, 0x3A7A52);
      this.tweens.add({ targets: sw, angle: { from: -5, to: 5 }, duration: 2000 + Math.random() * 1000, yoyo: true, repeat: -1, ease: "Sine.easeInOut" });
    }

    // Trash can (scaled up, positioned in bottom-right)
    this.trashCanObj = createTrashCan(this, W - 55, H - 120);
    this.trashCanObj.setScale(this.spriteScale);

    // Spawn trash (positions in % of viewport)
    this.trashItems = [];
    this.totalTrash = 8;
    this.trashRemaining = this.totalTrash;
    const positions = [
      { x: W * 0.2,  y: H * 0.28, t: "bottle" },
      { x: W * 0.6,  y: H * 0.22, t: "bag" },
      { x: W * 0.35, y: H * 0.44, t: "can" },
      { x: W * 0.75, y: H * 0.5,  t: "net" },
      { x: W * 0.15, y: H * 0.55, t: "cup" },
      { x: W * 0.5,  y: H * 0.62, t: "ring" },
      { x: W * 0.28, y: H * 0.72, t: "shoe" },
      { x: W * 0.72, y: H * 0.78, t: "box" },
    ];
    positions.forEach(p => {
      const tr = createTrash(this, p.x, p.y, p.t);
      tr.setScale(this.spriteScale);
      this.trashItems.push(tr);
    });

    // Biologist
    this.biologist = createBiologist(this, W / 2, H * 0.18, STATE.avatar);
    this.biologist.setScale(this.spriteScale);
    this.biologistFacing = 1; // 1 = right, -1 = left
    this.biologistSpeed = 4.0;
    this.biologistTarget = null;

    // UI
    this.createUI();

    // Input
    this.input.on("pointerdown", (pointer) => {
      if (this.missionEnded) return;
      if (pointer.y < 70) return; // don't grab taps on UI bar
      this.biologistTarget = { x: pointer.x, y: pointer.y };
      this.showRipple(pointer.x, pointer.y);
      if (this.tutorialText) {
        this.tweens.add({ targets: [this.tutorialText, this.tutorialBg], alpha: 0, duration: 400, onComplete: () => {
          this.tutorialText?.destroy(); this.tutorialBg?.destroy(); this.tutorialText = null;
        }});
      }
    });

    // Tutorial hint
    if (!STATE.mission1Completed) {
      this.tutorialBg = this.add.rectangle(W / 2, H / 2, 260, 56, 0x000000, 0.65).setDepth(100);
      this.tutorialText = this.add.text(W / 2, H / 2, "Tap anywhere to swim", {
        fontFamily: "system-ui", fontSize: 22, color: "#ffffff",
      }).setOrigin(0.5).setDepth(101);
      this.tweens.add({ targets: [this.tutorialText, this.tutorialBg], alpha: { from: 0.5, to: 1 }, duration: 900, yoyo: true, repeat: -1 });
    }

    this.missionEnded = false;
  }

  drawSeabed() {
    const W = this.scale.width, H = this.scale.height;
    const g = this.add.graphics();
    g.fillStyle(C.sand);
    g.beginPath();
    g.moveTo(0, H);
    g.lineTo(0, H - 40);
    for (let x = 0; x <= W; x += 20) {
      const y = H - 40 - Math.sin(x * 0.08) * 10 - Math.random() * 4;
      g.lineTo(x, y);
    }
    g.lineTo(W, H);
    g.closePath();
    g.fillPath();
    g.fillStyle(C.sandShadow, 0.5);
    g.fillRect(0, H - 20, W, 20);
  }

  addSilhouetteFish(y, size, alpha, duration) {
    const W = this.scale.width;
    const fish = this.add.container(-40, y);
    const body = this.add.ellipse(0, 0, size, size * 0.4, C.oceanDeep, alpha);
    const tail = this.add.polygon(size * 0.4, 0, [0, 0, 14, -8, 14, 8], C.oceanDeep, alpha);
    fish.add([body, tail]);
    this.tweens.add({
      targets: fish, x: W + 40, duration: duration * 1000, repeat: -1,
      onRepeat: () => fish.x = -40,
    });
  }

  spawnBubble(initial) {
    const W = this.scale.width, H = this.scale.height;
    const x = Math.random() * W;
    const y = initial ? Math.random() * H : H + 10;
    const size = 2 + Math.random() * 5;
    const b = this.add.circle(x, y, size, 0xFFFFFF, 0.5);
    b.setStrokeStyle(0.5, 0xFFFFFF, 0.9);
    const dur = 6000 + Math.random() * 4000;
    this.tweens.add({
      targets: b, y: -20, x: x + (Math.random() - 0.5) * 50,
      alpha: { from: 0.6, to: 0 }, duration: dur, ease: "Linear",
      onComplete: () => b.destroy(),
    });
  }

  createUI() {
    const W = this.scale.width;
    const bar = this.add.container(0, 0).setDepth(200);
    const barBg = this.add.rectangle(0, 0, W, 56, 0x000000, 0.4).setOrigin(0, 0);
    bar.add(barBg);

    // Level badge
    this.lvlRing = this.add.circle(28, 28, 18, C.gold).setStrokeStyle(2, 0xA8862F);
    this.lvlText = this.add.text(28, 26, `L${STATE.level}`, {
      fontFamily: "system-ui", fontSize: 16, fontStyle: "bold", color: "#ffffff",
    }).setOrigin(0.5);
    bar.add([this.lvlRing, this.lvlText]);

    // XP bar
    const xpX = 56, xpW = W - 180;
    this.xpBarBg = this.add.rectangle(xpX, 22, xpW, 10, 0x000000, 0.5).setOrigin(0, 0.5);
    this.xpBarBg.setStrokeStyle(1, 0xFFFFFF, 0.3);
    this.xpBarFill = this.add.rectangle(xpX + 1, 22, (xpW - 2) * (STATE.xp / xpForLevel(STATE.level)), 8, C.gold).setOrigin(0, 0.5);
    this.xpLabel = this.add.text(xpX + xpW / 2, 38, `${STATE.xp} / ${xpForLevel(STATE.level)} XP`, {
      fontFamily: "system-ui", fontSize: 14, color: "#ffffff",
    }).setOrigin(0.5);
    bar.add([this.xpBarBg, this.xpBarFill, this.xpLabel]);

    // Trash counter (small, in top bar)
    this.trashText = this.add.text(W - 16, 28, `🗑️ 0/${this.totalTrash}`, {
      fontFamily: "system-ui", fontSize: 14, fontStyle: "bold", color: "#ffffff",
    }).setOrigin(1, 0.5).setAlpha(0.7);
    bar.add(this.trashText);
    // Persistent prominent goal banner
    setupGoalBanner(this, { icon: "🗑️", label: "Clean up trash", total: this.totalTrash, y: 80 });
  }

  updateUI() {
    const collected = this.totalTrash - this.trashRemaining;
    this.trashText.setText(`🗑️ ${collected}/${this.totalTrash}`);
    updateGoalBanner(this, collected);
    this.lvlText.setText(`L${STATE.level}`);
    const frac = STATE.xp / xpForLevel(STATE.level);
    const xpW = this.W - 180;
    this.tweens.add({ targets: this.xpBarFill, width: (xpW - 2) * frac, duration: 250 });
    this.xpLabel.setText(`${STATE.xp} / ${xpForLevel(STATE.level)} XP`);
  }

  showRipple(x, y) {
    const ring = this.add.circle(x, y, 4, 0xFFFFFF, 0).setStrokeStyle(2, 0xFFFFFF, 0.8);
    this.tweens.add({
      targets: ring, radius: 28, alpha: 0, duration: 500,
      onComplete: () => ring.destroy(),
    });
  }

  update() {
    if (this.missionEnded) return;

    // Move biologist toward target
    if (this.biologistTarget) {
      const dx = this.biologistTarget.x - this.biologist.x;
      const dy = this.biologistTarget.y - this.biologist.y;
      const dist = Math.hypot(dx, dy);
      if (dist > 4) {
        const nx = dx / dist, ny = dy / dist;
        this.biologist.x += nx * this.biologistSpeed;
        this.biologist.y += ny * this.biologistSpeed;
        // Face direction — preserve scale magnitude
        if (Math.abs(dx) > 2) {
          this.biologistFacing = dx < 0 ? -1 : 1;
          this.biologist.scaleX = this.biologistFacing * this.spriteScale;
          this.biologist.scaleY = this.spriteScale;
        }
      } else {
        this.biologistTarget = null;
      }
    }

    // Keep biologist on screen (account for its scaled size)
    const margin = 24 * this.spriteScale;
    this.biologist.x = Phaser.Math.Clamp(this.biologist.x, margin, this.W - margin);
    this.biologist.y = Phaser.Math.Clamp(this.biologist.y, 76, this.H - margin);

    // Check collision with trash (scaled collision radius)
    const collideR = 32 * this.spriteScale;
    this.trashItems.forEach((trash) => {
      if (trash.collected) return;
      const d = Phaser.Math.Distance.Between(this.biologist.x, this.biologist.y, trash.x, trash.y);
      if (d < collideR) {
        this.collectTrash(trash);
      }
    });
  }

  collectTrash(trash) {
    trash.collected = true;
    if (trash.tween1) trash.tween1.stop();
    const startX = trash.x, startY = trash.y;

    // Animate toward trash can
    const canX = this.trashCanObj.x, canY = this.trashCanObj.y - 10;
    this.tweens.add({
      targets: trash, x: canX, y: canY, scale: 0.2, alpha: 0.4, angle: 720,
      duration: 450, ease: "Cubic.easeIn",
      onComplete: () => {
        trash.destroy();
        // Trash can jiggle
        this.tweens.add({ targets: this.trashCanObj, scaleY: 1.12, duration: 100, yoyo: true });
      },
    });

    // Sparkle particles at pickup location
    for (let i = 0; i < 10; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 2 + Math.random() * 3;
      const spark = this.add.circle(startX, startY, 2 + Math.random() * 2, C.gold);
      this.tweens.add({
        targets: spark,
        x: startX + Math.cos(angle) * speed * 12,
        y: startY + Math.sin(angle) * speed * 12,
        alpha: 0, duration: 600,
        onComplete: () => spark.destroy(),
      });
    }

    // XP gain
    STATE.xp += 10;
    STATE.totalTrashCollected++;
    this.trashRemaining--;

    // "+10 XP" floating text
    const xpPop = this.add.text(startX, startY, "+10 XP", {
      fontFamily: "system-ui", fontSize: 18, fontStyle: "bold", color: "#FFE9A8",
      stroke: "#0E3D5C", strokeThickness: 3,
    }).setOrigin(0.5).setDepth(150);
    this.tweens.add({
      targets: xpPop, y: startY - 40, alpha: 0, duration: 900,
      onComplete: () => xpPop.destroy(),
    });

    // Level up?
    const leveledUp = checkLevelUp();
    this.updateUI();
    saveGame(STATE);

    if (leveledUp) this.showLevelUp();

    // Mission complete?
    if (this.trashRemaining === 0) {
      this.time.delayedCall(600, () => this.missionComplete());
    }
  }

  showLevelUp() {
    const W = this.scale.width, H = this.scale.height;
    const bg = this.add.rectangle(W / 2, H / 2, W, H, 0x000000, 0.6).setDepth(300);
    const card = this.add.container(W / 2, H / 2).setDepth(301);
    const cardBg = this.add.rectangle(0, 0, 260, 160, C.cream).setStrokeStyle(4, C.gold);
    const star = this.add.text(0, -40, "⭐", { fontSize: 40 }).setOrigin(0.5);
    const headline = this.add.text(0, 0, "LEVEL UP!", {
      fontFamily: "system-ui", fontSize: 30, fontStyle: "bold", color: "#A8862F",
    }).setOrigin(0.5);
    const sub = this.add.text(0, 30, `You're now Level ${STATE.level}`, {
      fontFamily: "system-ui", fontSize: 18, color: "#3A4761",
    }).setOrigin(0.5);
    const hint = this.add.text(0, 58, "Tap to continue", {
      fontFamily: "system-ui", fontSize: 16, color: "#7A7560",
    }).setOrigin(0.5);
    card.add([cardBg, star, headline, sub, hint]);
    card.setScale(0);
    this.tweens.add({ targets: card, scale: 1, duration: 400, ease: "Back.easeOut" });
    this.cameras.main.shake(250, 0.004);
    bg.setInteractive();
    bg.on("pointerdown", () => { bg.destroy(); card.destroy(); });
  }

  missionComplete() {
    this.missionEnded = true;
    STATE.mission1Completed = true;
    STATE.xp += 50; // completion bonus
    const leveledUp = checkLevelUp();
    saveGame(STATE);
    this.updateUI();

    const W = this.scale.width, H = this.scale.height;
    const bg = this.add.rectangle(W / 2, H / 2, W, H, 0x0E3D5C, 0.75).setDepth(250);
    const card = this.add.container(W / 2, H / 2).setDepth(251);
    const cardBg = this.add.rectangle(0, 0, 280, 240, C.cream).setStrokeStyle(4, C.seaGreen);
    const trophy = this.add.text(0, -80, "🏆", { fontSize: 50 }).setOrigin(0.5);
    const headline = this.add.text(0, -30, "Mission Complete!", {
      fontFamily: "system-ui", fontSize: 26, fontStyle: "bold", color: "#102439",
    }).setOrigin(0.5);
    const sub = this.add.text(0, 0, "The sea is clean.\n+50 XP bonus!", {
      fontFamily: "system-ui", fontSize: 18, color: "#3A4761", align: "center",
    }).setOrigin(0.5);
    const playAgain = this.add.rectangle(0, 60, 220, 40, C.coral).setInteractive({ useHandCursor: true });
    const nextLabel = STATE.mission2Completed ? "Play Again" : "Continue to Mission 2 →";
    const playText = this.add.text(0, 60, nextLabel, {
      fontFamily: "system-ui", fontSize: 19, fontStyle: "bold", color: "#ffffff",
    }).setOrigin(0.5);
    const menu = this.add.text(0, 100, "Back to menu", {
      fontFamily: "system-ui", fontSize: 17, color: "#7A7560",
    }).setOrigin(0.5).setInteractive({ useHandCursor: true });

    playAgain.on("pointerdown", () => {
      if (STATE.mission2Completed) this.scene.restart();
      else this.scene.start("Mission2Scene");
    });
    menu.on("pointerdown", () => this.scene.start("BootScene"));

    card.add([cardBg, trophy, headline, sub, playAgain, playText, menu]);
    card.setScale(0);
    this.tweens.add({ targets: card, scale: 1, duration: 500, ease: "Back.easeOut" });

    if (leveledUp) this.time.delayedCall(700, () => this.showLevelUp());
  }
}

// ─── Mission 2: Find & identify sea animals ───
class Mission2Scene extends Phaser.Scene {
  constructor() { super("Mission2Scene"); }

  create() {
    const W = this.scale.width, H = this.scale.height;
    this.W = W; this.H = H;
    this.spriteScale = Phaser.Math.Clamp(W / 260, 1.3, 2.4);

    // Background gradient
    const bg = this.add.graphics();
    bg.fillGradientStyle(C.oceanLight, C.oceanLight, C.oceanDeep, C.oceanDeep);
    bg.fillRect(0, 0, W, H);

    // Light rays
    for (let i = 0; i < 5; i++) {
      const ray = this.add.rectangle(50 + i * (W / 6), 0, 60, H * 0.6, 0xFFFFFF, 0.1);
      ray.setOrigin(0.5, 0); ray.setAngle(-8);
      this.tweens.add({ targets: ray, alpha: { from: 0.06, to: 0.18 }, duration: 2500 + i * 400, yoyo: true, repeat: -1 });
    }

    // Distant fish silhouettes
    this.addSilhouetteFish(H * 0.18, 60, 0.2, 45);
    this.addSilhouetteFish(H * 0.55, 80, 0.15, 60);

    // Bubbles
    for (let i = 0; i < 16; i++) this.spawnBubble(true);
    this.time.addEvent({ delay: 400, loop: true, callback: () => this.spawnBubble(false) });

    // Seabed
    this.drawSeabed();

    // Seaweed
    for (const sx of [30, W - 30, W * 0.42, W * 0.65]) {
      const sw = this.add.rectangle(sx, H - 60, 8, 60, 0x3A7A52);
      this.tweens.add({ targets: sw, angle: { from: -5, to: 5 }, duration: 2000 + Math.random() * 1000, yoyo: true, repeat: -1, ease: "Sine.easeInOut" });
    }

    // Decorative reef (rock + coral)
    const r1 = createRock(this, W * 0.18, H - 80); r1.setScale(this.spriteScale);
    const c1 = createCoral(this, W * 0.85, H - 75); c1.setScale(this.spriteScale * 1.1);

    // Animals — the 3 species real biologists tag in the field
    this.animalAIs = [];
    const playBounds = { x1: 50, y1: 110, x2: W - 50, y2: H - 100 };
    const animalSpawns = [
      { id: "turtle",    x: W * 0.25, y: H * 0.30, color: 0x5DBE9A, speed: 1.0 },
      { id: "reefShark", x: W * 0.7,  y: H * 0.5,  color: 0xC8B0A8, speed: 1.6 },
      { id: "mantaRay",  x: W * 0.4,  y: H * 0.7,  color: 0x8090B0, speed: 1.3 },
    ];
    animalSpawns.forEach(spawn => {
      const sprite = ANIMALS[spawn.id].draw(this, spawn.x, spawn.y);
      sprite.setScale(this.spriteScale);
      const ai = new AnimalAI(this, sprite, { speed: spawn.speed, bounds: playBounds });
      ai.id = spawn.id;
      ai.color = spawn.color;
      // Always start untagged on each mission run — STATE.capturedAnimals is for Logbook only
      ai.tagged = false;
      this.animalAIs.push(ai);
    });

    // Biologist
    this.biologist = createBiologist(this, W / 2, H * 0.18, STATE.avatar);
    this.biologist.setScale(this.spriteScale);
    this.biologistFacing = 1;
    this.biologistSpeed = 4.0;
    this.biologistTarget = null;

    // Targeting reticle (overlay)
    this.reticle = this.createReticle();
    this.reticle.setVisible(false);
    this.targetedAI = null;

    // Tag button (bottom of screen)
    this.tagButton = this.createTagButton();
    this.tagButton.setVisible(false);

    // Mini-map
    this.createMinimap();

    // Top UI bar
    this.createUI();

    // Input — tap to swim (but NOT on UI elements)
    this.input.on("pointerdown", (pointer, gameObjects) => {
      if (this.paused || this.missionEnded) return;
      // If tap hit any interactive UI object (tag button), skip swim
      if (gameObjects && gameObjects.length > 0) return;
      if (pointer.y < 70) return; // top bar
      this.biologistTarget = { x: pointer.x, y: pointer.y };
      this.showRipple(pointer.x, pointer.y);
      if (this.tutorialText) {
        this.tweens.add({ targets: [this.tutorialText, this.tutorialBg], alpha: 0, duration: 400, onComplete: () => {
          this.tutorialText?.destroy(); this.tutorialBg?.destroy(); this.tutorialText = null;
        }});
      }
    });

    // Tutorial
    if (!STATE.mission2Completed) {
      this.tutorialBg = this.add.rectangle(W / 2, H * 0.38, 320, 56, 0x000000, 0.65).setDepth(100);
      this.tutorialText = this.add.text(W / 2, H * 0.38, "Swim close → tap TAG IT!", {
        fontFamily: "system-ui", fontSize: 20, color: "#ffffff",
      }).setOrigin(0.5).setDepth(101);
      this.tweens.add({ targets: [this.tutorialText, this.tutorialBg], alpha: { from: 0.5, to: 1 }, duration: 900, yoyo: true, repeat: -1 });
    }

    this.taggedCount = this.animalAIs.filter(ai => ai.tagged).length;
    this.totalAnimals = this.animalAIs.length;
    this.paused = false;
    this.missionEnded = false;
  }

  createReticle() {
    const c = this.add.container(0, 0).setDepth(50);
    const ring = this.add.graphics();
    ring.lineStyle(3, 0xFFE9A8, 1);
    ring.strokeCircle(0, 0, 32);
    // Corner brackets
    [[1,1],[1,-1],[-1,1],[-1,-1]].forEach(([sx, sy]) => {
      ring.beginPath();
      ring.moveTo(sx * 22, sy * 38);
      ring.lineTo(sx * 22, sy * 22);
      ring.lineTo(sx * 38, sy * 22);
      ring.strokePath();
    });
    c.add(ring);
    this.tweens.add({ targets: c, scale: { from: 0.95, to: 1.1 }, duration: 600, yoyo: true, repeat: -1, ease: "Sine.easeInOut" });
    return c;
  }

  createTagButton() {
    const W = this.W, H = this.H;
    const c = this.add.container(W / 2, H - 60).setDepth(220);
    const bg = this.add.rectangle(0, 0, 220, 62, 0xFFD96A);
    bg.setStrokeStyle(3, 0xC09030);
    const icon = this.add.text(-72, 0, "🎯", { fontSize: 30 }).setOrigin(0.5);
    const text = this.add.text(15, 0, "TAG IT!", {
      fontFamily: "system-ui", fontSize: 26, fontStyle: "bold", color: "#1A2543",
    }).setOrigin(0.5);
    c.add([bg, icon, text]);
    bg.setInteractive({ useHandCursor: true });
    bg.on("pointerdown", () => this.fireTag());
    this.tweens.add({ targets: c, scaleX: { from: 0.96, to: 1.04 }, scaleY: { from: 0.96, to: 1.04 }, duration: 600, yoyo: true, repeat: -1, ease: "Sine.easeInOut" });
    return c;
  }

  createMinimap() {
    const W = this.W;
    const mapX = W - 50, mapY = 92, mapR = 36;
    const ring = this.add.circle(mapX, mapY, mapR, 0x0E3D5C, 0.75).setDepth(210);
    ring.setStrokeStyle(2, 0xFFFFFF, 0.55);
    this.add.text(mapX, mapY - mapR - 4, "TRACKER", {
      fontFamily: "system-ui", fontSize: 13, fontStyle: "bold", color: "#FFFFFF",
    }).setOrigin(0.5, 1).setDepth(211);
    this.miniBio = this.add.circle(mapX, mapY, 3.5, 0xFFE9A8).setDepth(211);
    this.miniBio.setStrokeStyle(1, 0x102439);
    this.miniDots = {};
    this.animalAIs.forEach(ai => {
      const dot = this.add.circle(mapX, mapY, 3, ai.color).setDepth(211);
      dot.setStrokeStyle(1, 0x102439);
      dot.setVisible(ai.tagged);
      this.miniDots[ai.id] = dot;
    });
    this.minimap = { x: mapX, y: mapY, r: mapR };
  }

  updateMinimap() {
    const m = this.minimap, W = this.W, H = this.H;
    this.miniBio.x = m.x + (this.biologist.x / W - 0.5) * m.r * 1.7;
    this.miniBio.y = m.y + (this.biologist.y / H - 0.5) * m.r * 1.7;
    this.animalAIs.forEach(ai => {
      const dot = this.miniDots[ai.id];
      if (ai.tagged) {
        dot.setVisible(true);
        dot.x = m.x + (ai.sprite.x / W - 0.5) * m.r * 1.7;
        dot.y = m.y + (ai.sprite.y / H - 0.5) * m.r * 1.7;
      }
    });
  }

  attachTracker(ai) {
    const tracker = this.add.circle(0, -28, 4, 0xFF3030);
    tracker.setStrokeStyle(1.5, 0xFFFFFF);
    ai.sprite.add(tracker);
    ai.tracker = tracker;
    this.tweens.add({ targets: tracker, scale: { from: 1, to: 1.5 }, alpha: { from: 1, to: 0.6 }, duration: 600, yoyo: true, repeat: -1 });
  }

  fireTag() {
    if (this.paused || this.missionEnded) return;
    if (!this.targetedAI || this.targetedAI.tagged) return;
    const ai = this.targetedAI;
    // Hide tag button + reticle for the moment of the shot
    this.tagButton.setVisible(false);
    this.reticle.setVisible(false);
    this.targetedAI = null;

    // Dart projectile
    const dart = this.add.rectangle(this.biologist.x, this.biologist.y, 14, 3.5, 0xFFE9A8);
    dart.setStrokeStyle(1, 0x102439);
    dart.setDepth(60);
    const angle = Math.atan2(ai.sprite.y - this.biologist.y, ai.sprite.x - this.biologist.x);
    dart.setRotation(angle);

    this.tweens.add({
      targets: dart, x: ai.sprite.x, y: ai.sprite.y - 18, duration: 280, ease: "Cubic.easeOut",
      onUpdate: () => {
        const newAngle = Math.atan2(ai.sprite.y - 18 - dart.y, ai.sprite.x - dart.x);
        dart.setRotation(newAngle);
      },
      onComplete: () => {
        dart.destroy();
        this.tagAnimal(ai);
      },
    });
  }

  tagAnimal(ai) {
    ai.tagged = true;
    this.taggedCount++;
    // Flash
    this.tweens.add({ targets: ai.sprite, alpha: { from: 0.3, to: 1 }, duration: 200, yoyo: true, repeat: 2 });
    // Tracker dot
    this.attachTracker(ai);
    // Reveal on minimap
    this.miniDots[ai.id].setVisible(true);
    // XP
    if (!STATE.capturedAnimals.includes(ai.id)) {
      STATE.capturedAnimals.push(ai.id);
      STATE.totalAnimalsFound++;
      STATE.xp += 25;
      checkLevelUp();
      saveGame(STATE);
    }
    // Data card after small delay
    this.time.delayedCall(450, () => this.showTagCard(ai.id));
  }

  showTagCard(animalId) {
    this.paused = true;
    const W = this.W, H = this.H;
    const def = ANIMALS[animalId];
    const backdrop = this.add.rectangle(W / 2, H / 2, W, H, 0x0E3D5C, 0.72).setDepth(300);
    const card = this.add.container(W / 2, H / 2).setDepth(301);
    const cardW = Math.min(W - 40, 320);
    const cardBg = this.add.rectangle(0, 0, cardW, 380, 0xFFF8EC).setStrokeStyle(4, C.gold);
    const tagged = this.add.text(0, -160, "✓ Tagged & Tracking", {
      fontFamily: "system-ui", fontSize: 18, fontStyle: "bold", color: "#3E8E6C",
    }).setOrigin(0.5);
    const illus = def.draw(this, 0, -90);
    illus.setScale(2.4);
    const name = this.add.text(0, -20, def.name, {
      fontFamily: "system-ui", fontSize: 30, fontStyle: "bold", color: "#102439",
    }).setOrigin(0.5);
    const fact = this.add.text(0, 40, def.fact, {
      fontFamily: "system-ui", fontSize: 17, color: "#3A4761",
      wordWrap: { width: cardW - 40 }, align: "center",
    }).setOrigin(0.5);
    const xpPill = this.add.rectangle(0, 110, 90, 24, C.gold);
    const xpText = this.add.text(0, 110, "+25 XP", {
      fontFamily: "system-ui", fontSize: 17, fontStyle: "bold", color: "#ffffff",
    }).setOrigin(0.5);
    const okBtn = this.add.rectangle(0, 155, 220, 44, C.seaGreen).setStrokeStyle(2, 0x3E8E6C).setInteractive({ useHandCursor: true });
    const okText = this.add.text(0, 155, "Continue", {
      fontFamily: "system-ui", fontSize: 20, fontStyle: "bold", color: "#ffffff",
    }).setOrigin(0.5);
    card.add([cardBg, tagged, illus, name, fact, xpPill, xpText, okBtn, okText]);
    card.setScale(0);
    this.tweens.add({ targets: card, scale: 1, duration: 400, ease: "Back.easeOut" });
    okBtn.on("pointerdown", () => {
      this.tweens.add({
        targets: [card, backdrop], scale: 0, alpha: 0, duration: 280,
        onComplete: () => {
          card.destroy(); backdrop.destroy();
          this.paused = false;
          this.updateUI();
          if (this.taggedCount >= this.totalAnimals) {
            this.time.delayedCall(500, () => this.missionComplete());
          }
        },
      });
    });
  }

  drawSeabed() {
    const W = this.scale.width, H = this.scale.height;
    const g = this.add.graphics();
    g.fillStyle(C.sand);
    g.beginPath();
    g.moveTo(0, H); g.lineTo(0, H - 40);
    for (let x = 0; x <= W; x += 20) {
      const y = H - 40 - Math.sin(x * 0.08) * 10 - Math.random() * 4;
      g.lineTo(x, y);
    }
    g.lineTo(W, H); g.closePath(); g.fillPath();
    g.fillStyle(C.sandShadow, 0.5);
    g.fillRect(0, H - 20, W, 20);
  }

  addSilhouetteFish(y, size, alpha, duration) {
    const W = this.scale.width;
    const fish = this.add.container(-40, y);
    const body = this.add.ellipse(0, 0, size, size * 0.4, C.oceanDeep, alpha);
    const tail = this.add.polygon(size * 0.4, 0, [0, 0, 14, -8, 14, 8], C.oceanDeep, alpha);
    fish.add([body, tail]);
    this.tweens.add({
      targets: fish, x: W + 40, duration: duration * 1000, repeat: -1,
      onRepeat: () => fish.x = -40,
    });
  }

  spawnBubble(initial) {
    const W = this.scale.width, H = this.scale.height;
    const x = Math.random() * W;
    const y = initial ? Math.random() * H : H + 10;
    const size = 2 + Math.random() * 5;
    const b = this.add.circle(x, y, size, 0xFFFFFF, 0.5);
    b.setStrokeStyle(0.5, 0xFFFFFF, 0.9);
    this.tweens.add({
      targets: b, y: -20, x: x + (Math.random() - 0.5) * 50,
      alpha: { from: 0.6, to: 0 }, duration: 6000 + Math.random() * 4000, ease: "Linear",
      onComplete: () => b.destroy(),
    });
  }

  createUI() {
    const W = this.scale.width;
    this.add.rectangle(0, 0, W, 56, 0x000000, 0.4).setOrigin(0, 0).setDepth(200);
    this.lvlRing = this.add.circle(28, 28, 18, C.gold).setStrokeStyle(2, 0xA8862F).setDepth(201);
    this.lvlText = this.add.text(28, 26, `L${STATE.level}`, {
      fontFamily: "system-ui", fontSize: 16, fontStyle: "bold", color: "#ffffff",
    }).setOrigin(0.5).setDepth(201);
    const xpX = 56, xpW = W - 220;
    this.xpBarBg = this.add.rectangle(xpX, 22, xpW, 10, 0x000000, 0.5).setOrigin(0, 0.5).setDepth(201);
    this.xpBarBg.setStrokeStyle(1, 0xFFFFFF, 0.3);
    this.xpBarFill = this.add.rectangle(xpX + 1, 22, (xpW - 2) * (STATE.xp / xpForLevel(STATE.level)), 8, C.gold).setOrigin(0, 0.5).setDepth(201);
    this.xpLabel = this.add.text(xpX + xpW / 2, 38, `${STATE.xp} / ${xpForLevel(STATE.level)} XP`, {
      fontFamily: "system-ui", fontSize: 14, color: "#ffffff",
    }).setOrigin(0.5).setDepth(201);
    this.counterText = this.add.text(xpX, 50, "TAGGED 0/3", {
      fontFamily: "system-ui", fontSize: 12, fontStyle: "bold", color: "#FFE9A8",
    }).setOrigin(0, 0.5).setDepth(201).setAlpha(0.7);
    // Goal banner — total comes from animal count (animalAIs is populated before createUI)
    setupGoalBanner(this, { icon: "🐢", label: "Tag sea animals", total: this.animalAIs.length, y: 80 });
  }

  updateUI() {
    this.counterText.setText(`TAGGED ${this.taggedCount}/${this.totalAnimals}`);
    updateGoalBanner(this, this.taggedCount);
    this.lvlText.setText(`L${STATE.level}`);
    const frac = STATE.xp / xpForLevel(STATE.level);
    const xpW = this.W - 220;
    this.tweens.add({ targets: this.xpBarFill, width: (xpW - 2) * frac, duration: 250 });
    this.xpLabel.setText(`${STATE.xp} / ${xpForLevel(STATE.level)} XP`);
  }

  showRipple(x, y) {
    const ring = this.add.circle(x, y, 4, 0xFFFFFF, 0).setStrokeStyle(2, 0xFFFFFF, 0.8);
    this.tweens.add({ targets: ring, radius: 28, alpha: 0, duration: 500, onComplete: () => ring.destroy() });
  }

  update() {
    if (this.paused || this.missionEnded) return;

    // Move biologist toward target
    if (this.biologistTarget) {
      const dx = this.biologistTarget.x - this.biologist.x;
      const dy = this.biologistTarget.y - this.biologist.y;
      const dist = Math.hypot(dx, dy);
      if (dist > 4) {
        const nx = dx / dist, ny = dy / dist;
        this.biologist.x += nx * this.biologistSpeed;
        this.biologist.y += ny * this.biologistSpeed;
        if (Math.abs(dx) > 2) {
          this.biologistFacing = dx < 0 ? -1 : 1;
          this.biologist.scaleX = this.biologistFacing * this.spriteScale;
          this.biologist.scaleY = this.spriteScale;
        }
      } else {
        this.biologistTarget = null;
      }
    }
    const margin = 24 * this.spriteScale;
    this.biologist.x = Phaser.Math.Clamp(this.biologist.x, margin, this.W - margin);
    this.biologist.y = Phaser.Math.Clamp(this.biologist.y, 76, this.H - margin);

    // Update animal AI movement
    this.animalAIs.forEach(ai => ai.update());

    // Find nearest untagged animal in range — auto-aim
    const tagRange = 110 * this.spriteScale;
    let nearest = null;
    let nearestDist = Infinity;
    for (const ai of this.animalAIs) {
      if (ai.tagged) continue;
      const d = Phaser.Math.Distance.Between(this.biologist.x, this.biologist.y, ai.sprite.x, ai.sprite.y);
      if (d < tagRange && d < nearestDist) { nearest = ai; nearestDist = d; }
    }
    this.targetedAI = nearest;

    // Show/hide reticle + tag button
    if (this.targetedAI) {
      this.reticle.setVisible(true);
      this.reticle.x = this.targetedAI.sprite.x;
      this.reticle.y = this.targetedAI.sprite.y;
      this.tagButton.setVisible(true);
    } else {
      this.reticle.setVisible(false);
      this.tagButton.setVisible(false);
    }

    // Update minimap
    this.updateMinimap();
  }

  missionComplete() {
    this.missionEnded = true;
    STATE.mission2Completed = true;
    STATE.xp += 100;
    checkLevelUp();
    saveGame(STATE);
    this.updateUI();

    const W = this.W, H = this.H;
    const backdrop = this.add.rectangle(W / 2, H / 2, W, H, 0x0E3D5C, 0.8).setDepth(350);
    const card = this.add.container(W / 2, H / 2).setDepth(351);
    const cardBg = this.add.rectangle(0, 0, Math.min(W - 40, 320), 340, 0xFFF8EC).setStrokeStyle(4, C.seaGreen);
    const trophy = this.add.text(0, -125, "🏆", { fontSize: 50 }).setOrigin(0.5);
    const title = this.add.text(0, -70, "All Animals Tagged!", {
      fontFamily: "system-ui", fontSize: 26, fontStyle: "bold", color: "#102439",
    }).setOrigin(0.5);
    const sub = this.add.text(0, -30, `${this.totalAnimals} species now in tracking.\n+100 XP bonus!`, {
      fontFamily: "system-ui", fontSize: 18, color: "#3A4761", align: "center",
    }).setOrigin(0.5);

    // PRIMARY: Play Again
    const playAgainBtn = this.add.rectangle(0, 30, 220, 44, C.coral).setStrokeStyle(2, 0xD55518).setInteractive({ useHandCursor: true });
    const playAgainText = this.add.text(0, 30, "🔄 Play Again", {
      fontFamily: "system-ui", fontSize: 20, fontStyle: "bold", color: "#ffffff",
    }).setOrigin(0.5);

    // SECONDARY: View Logbook
    const lbBtn = this.add.rectangle(0, 82, 220, 40, C.seaGreen).setStrokeStyle(2, 0x3E8E6C).setInteractive({ useHandCursor: true });
    const lbText = this.add.text(0, 82, "View Logbook →", {
      fontFamily: "system-ui", fontSize: 19, fontStyle: "bold", color: "#ffffff",
    }).setOrigin(0.5);

    // TERTIARY: menu
    const menu = this.add.text(0, 130, "Back to menu", {
      fontFamily: "system-ui", fontSize: 17, color: "#7A7560",
    }).setOrigin(0.5).setInteractive({ useHandCursor: true });

    card.add([cardBg, trophy, title, sub, playAgainBtn, playAgainText, lbBtn, lbText, menu]);
    card.setScale(0);
    this.tweens.add({ targets: card, scale: 1, duration: 500, ease: "Back.easeOut" });

    playAgainBtn.on("pointerdown", () => this.scene.restart());
    lbBtn.on("pointerdown", () => this.scene.start("LogbookScene"));
    menu.on("pointerdown", () => this.scene.start("BootScene"));
  }
}

// ─── Logbook: collection of all captured animals ───
class LogbookScene extends Phaser.Scene {
  constructor() { super("LogbookScene"); }

  create() {
    const W = this.scale.width, H = this.scale.height;

    const bg = this.add.graphics();
    bg.fillStyle(0xFFF8EC);
    bg.fillRect(0, 0, W, H);
    // Subtle paper texture with dots
    for (let i = 0; i < 40; i++) {
      this.add.circle(Math.random() * W, Math.random() * H, 1, 0xE5D8B5, 0.4);

    // Title
    this.add.text(W / 2, 54, "📓 Field Logbook", {
      fontFamily: "system-ui", fontSize: 30, fontStyle: "bold", color: "#102439",

      fontFamily: "system-ui", fontSize: 17, color: "#7A7560",
