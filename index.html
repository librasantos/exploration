    // Entries
    const animalIds = Object.keys(ANIMALS);
    const entryH = 96;
    const startY = 130;
    const cardW = Math.min(W - 28, 400);

    animalIds.forEach((id, i) => {
      const animal = ANIMALS[id];
      const discovered = STATE.capturedAnimals.includes(id);
      const entryY = startY + i * entryH;

      const card = this.add.rectangle(W / 2, entryY, cardW, entryH - 10, 0xffffff)
        .setStrokeStyle(discovered ? 2 : 1.5, discovered ? C.gold : 0xCCCCCC, discovered ? 1 : 0.6);

      // Illustration on left
      const illus = animal.draw(this, W / 2 - cardW / 2 + 50, entryY);

      // Name
      this.add.text(W / 2 - cardW / 2 + 100, entryY - 22, discovered ? animal.name : "???", {
        fontFamily: "system-ui", fontSize: 22, fontStyle: "bold",
        color: discovered ? "#102439" : "#AAAAAA",
      }).setOrigin(0, 0.5);

      // Fact or locked placeholder
      this.add.text(W / 2 - cardW / 2 + 100, entryY + 10,
        discovered ? animal.fact : "Not yet discovered",
        {
          fontFamily: "system-ui", fontSize: 14, fontStyle: discovered ? "normal" : "italic",
          color: discovered ? "#3A4761" : "#AAAAAA",
          wordWrap: { width: cardW - 140 },

      // Checkmark badge for discovered
      if (discovered) {
        const badge = this.add.circle(W / 2 + cardW / 2 - 24, entryY - 24, 12, C.seaGreen);
        this.add.text(W / 2 + cardW / 2 - 24, entryY - 24, "✓", {
          fontFamily: "system-ui", fontSize: 18, fontStyle: "bold", color: "#ffffff",
        }).setOrigin(0.5);
      }
    });

    // Back button
    const btnY = H - 50;
    const backBtn = this.add.rectangle(W / 2, btnY, Math.min(W - 60, 260), 44, C.coral)
      .setStrokeStyle(2, 0xD55518).setInteractive({ useHandCursor: true });
    this.add.text(W / 2, btnY, "Back to Menu", {
      fontFamily: "system-ui", fontSize: 20, fontStyle: "bold", color: "#ffffff",
    }).setOrigin(0.5);
    backBtn.on("pointerdown", () => this.scene.start("BootScene"));
  }
}

// Speech bubble helper — appears next to a rescued alien briefly
function showSpeechBubble(scene, x, y, text, color = 0xFFFFFF) {
  const c = scene.add.container(x, y - 30).setDepth(85);
  // Measure text approximate width
  const txt = scene.add.text(0, -2, text, {
    fontFamily: "system-ui", fontSize: 15, fontStyle: "bold", color: "#1A2543",
  }).setOrigin(0.5);
  const w = Math.max(txt.width + 14, 60);
  const bubble = scene.add.rectangle(0, 0, w, 22, color, 0.95).setStrokeStyle(1.5, 0x1A2543);
  // Tail (small triangle pointing down)
  const tail = scene.add.triangle(0, 12, -4, 0, 4, 0, 0, 6, color).setStrokeStyle(1, 0x1A2543);
  c.add([bubble, tail, txt]);
  c.setScale(0);
  scene.tweens.add({ targets: c, scale: 1, duration: 220, ease: "Back.easeOut" });
  scene.time.delayedCall(1400, () => {
    scene.tweens.add({ targets: c, alpha: 0, y: c.y - 20, duration: 400, onComplete: () => c.destroy() });
  });
  return c;
}
const isLevelUnlocked = (lvl) => {
  if (lvl.num === 1) return true;
  // Elite levels (16-25): unlock after their corresponding base level for that world
  if (lvl.num >= 16 && lvl.num <= 25) {
    // Map elite -> required base level for unlock
    const eliteRequirement = {
      16: 2,  17: 3,    // Aqualon elites unlock after Aqualon base levels
      18: 4,  19: 5,    // Pyros elites
      20: 6,  21: 7,    // Glacius elites
      22: 8,  23: 9,    // Verdania elites
      24: 10, 25: 10,   // Mekanos elites
    };
    const required = eliteRequirement[lvl.num];
    return STATE.levelsCompleted && STATE.levelsCompleted.includes(required);
  }
  // Bonus levels (11-15): unlock after Earth saved (all 10 base levels done)
  if (lvl.num >= 11 && lvl.num <= 15) {
    return STATE.habitability >= 100 || (STATE.levelsCompleted && STATE.levelsCompleted.includes(10));
  }
  // Base levels: sequential
  return STATE.levelsCompleted && STATE.levelsCompleted.includes(lvl.num - 1);
};

// Award habitability points and recruit alien for a level (idempotent — once per level)
const awardLevel = (levelNum, scene = null) => {
  const lvl = LEVELS.find(l => l.num === levelNum);
  if (!lvl) return { newPoints: 0, newAlien: null, alreadyDone: true };
  const alreadyDone = STATE.levelsCompleted.includes(levelNum);
  if (alreadyDone) return { newPoints: 0, newAlien: null, alreadyDone: true };
  STATE.levelsCompleted.push(levelNum);
  STATE.habitability = Math.min(100, STATE.habitability + lvl.points);
  // Update HQ progress (max from main 10 levels)
  if (levelNum <= 10) {
    STATE.hqProgress = Math.max(STATE.hqProgress, STATE.levelsCompleted.filter(n => n <= 10).length);
  }
  // Award Star Coins for decoration shop
  STATE.starCoins = (STATE.starCoins || 0) + 10;
  let newAlien = null;
  if (lvl.alien && !STATE.alienCrew.includes(lvl.alien)) {
    STATE.alienCrew.push(lvl.alien);
    newAlien = lvl.alien;
  }
  saveGame(STATE);
  Audio.victory();

  // Check achievements (deferred so victory modal shows first)
  if (scene) {
    scene.time.delayedCall(2200, () => {
      // Mastery
      if (levelNum === 1) unlockAchievement(scene, "level_1");
      if (levelNum >= 5) unlockAchievement(scene, "level_5");
      if (levelNum >= 10) unlockAchievement(scene, "level_10");
      if (levelNum >= 15) unlockAchievement(scene, "level_15");
      // Crew
      if (STATE.alienCrew.length === 1) unlockAchievement(scene, "first_rescue");
      if (STATE.alienCrew.length >= 5) unlockAchievement(scene, "all_species");
      // World traveler — visited every world (Aqualon, Pyros, Glacius, Verdania, Mekanos)
      const worlds = new Set();
      STATE.levelsCompleted.forEach(n => {
        const lv = LEVELS.find(x => x.num === n);
        if (lv) worlds.add(lv.world);
      });
      const requiredWorlds = ["Aqualon", "Pyros", "Glacius", "Verdania", "Mekanos"];
      if (requiredWorlds.every(w => worlds.has(w))) unlockAchievement(scene, "all_worlds");
      // All bonus
      const bonusComplete = [11, 12, 13, 14, 15].every(n => STATE.levelsCompleted.includes(n));
      if (bonusComplete) unlockAchievement(scene, "all_bonus");
      // Comeback — completed after 3+ retry attempts OR used Continue
      if ((scene._continueAttempts && scene._continueAttempts >= 3) || scene._continueUsed) {
        unlockAchievement(scene, "comeback");
      }
      // No-damage — beat level without taking ANY hits (this.health still at starting value)
      if (scene.health !== undefined && scene.healthIcons && scene.health === scene.healthIcons.length) {
        unlockAchievement(scene, "no_damage");
        trackDailyProgress(scene, "complete_no_dmg");
      }
      // Daily complete tracking
      trackDailyProgress(scene, "complete");
    });
  }
  return { newPoints: lvl.points, newAlien, alreadyDone: false };
};

// ─── Astronaut sprite ───

  const legL = scene.add.rectangle(-5, 16, 7, 10, avatar.suitColor).setStrokeStyle(1, 0x102439);

  const bootL = scene.add.ellipse(-5, 22, 9, 5, 0xFFFFFF).setStrokeStyle(1, 0x102439);
  const bootR = scene.add.ellipse(5, 22, 9, 5, 0xFFFFFF).setStrokeStyle(1, 0x102439);

  // Helmet (sphere)
  const helmet = scene.add.circle(0, -16, 14, 0xE0F0FF, 0.4).setStrokeStyle(2, 0xFFFFFF);

// ─── Realistic planet sprite ───
function createPlanet(scene, x, y, def) {
  const c = scene.add.container(x, y);
  const size = def.size;
  const colorObj = Phaser.Display.Color.IntegerToColor(def.color);

  // Atmospheric scattering — outer halo shifting to bluer
  const atmoFar = scene.add.circle(0, 0, size + 18, def.color, 0.06);
  const atmoMid = scene.add.circle(0, 0, size + 10, def.color, 0.14);
  const atmoNear = scene.add.circle(0, 0, size + 4, def.color, 0.28);

  // Body — base
  const planet = scene.add.circle(0, 0, size, def.color);
  planet.setStrokeStyle(1, 0x000000, 0.5);

  // Latitude band stripes (planet surface variation)
  const bands = scene.add.graphics();
  const bandColor = colorObj.clone().darken(15);
  bands.fillStyle((bandColor.r << 16) + (bandColor.g << 8) + bandColor.b, 0.5);
  // Three bands
  bands.fillEllipse(0, -size * 0.4, size * 1.6, size * 0.3);
  bands.fillEllipse(0, 0, size * 1.85, size * 0.25);
  bands.fillEllipse(0, size * 0.35, size * 1.7, size * 0.28);

  const bandsLight = scene.add.graphics();
  const lightBand = colorObj.clone().lighten(18);
  bandsLight.fillStyle((lightBand.r << 16) + (lightBand.g << 8) + lightBand.b, 0.45);
  bandsLight.fillEllipse(0, -size * 0.15, size * 1.8, size * 0.18);
  bandsLight.fillEllipse(0, size * 0.55, size * 1.5, size * 0.18);

  // Surface "continents" / detail spots
  const details = scene.add.graphics();
  const detailColor = colorObj.clone().darken(35);
  details.fillStyle((detailColor.r << 16) + (detailColor.g << 8) + detailColor.b, 0.55);
  for (let i = 0; i < 10; i++) {
    const a = Math.random() * Math.PI * 2;
    const r = Math.random() * size * 0.75;
    const sz = 2 + Math.random() * 6;
    details.fillCircle(Math.cos(a) * r, Math.sin(a) * r, sz);
  }

  // Polar caps (white at top and bottom)
  const polarN = scene.add.ellipse(0, -size * 0.85, size * 0.7, size * 0.15, 0xFFFFFF, 0.7);
  const polarS = scene.add.ellipse(0, size * 0.85, size * 0.7, size * 0.15, 0xFFFFFF, 0.55);

  // Cloud layer (subtle white wisps) — for planets with atmosphere
  const clouds = scene.add.graphics();
  clouds.fillStyle(0xFFFFFF, 0.18);
  for (let i = 0; i < 5; i++) {
    const a = Math.random() * Math.PI * 2;
    const r = size * (0.4 + Math.random() * 0.4);
    const sz = 4 + Math.random() * 8;
    clouds.fillEllipse(Math.cos(a) * r, Math.sin(a) * r * 0.5, sz, sz * 0.4);
  }

  // Sun-side hemisphere highlight (lit side)
  const litCol = colorObj.clone().lighten(35);
  const lit = scene.add.circle(-size * 0.28, -size * 0.32, size * 0.65, (litCol.r << 16) + (litCol.g << 8) + litCol.b, 0.45);

  // Specular highlight
  const spec = scene.add.circle(-size * 0.42, -size * 0.45, size * 0.16, 0xFFFFFF, 0.6);

  // Terminator shadow (dark side)
  const dark = scene.add.circle(size * 0.32, size * 0.38, size * 0.65, 0x000000, 0.4);

  // Outer atmospheric rim (atmospheric scattering bright crescent)
  const rim = scene.add.graphics();
  rim.lineStyle(2, def.color, 0.7);
  rim.strokeCircle(0, 0, size + 1);

  c.add([atmoFar, atmoMid, atmoNear, planet, bands, bandsLight, details, polarN, polarS, clouds, lit, spec, dark, rim]);

  // Ring system
  if (def.ring) {
    // Back of ring (behind planet)
    const ringBackOuter = scene.add.ellipse(0, 0, size * 3.2, size * 0.85, 0xCCCCFF, 0).setStrokeStyle(2, 0x9090C0, 0.4);
    const ringBackInner = scene.add.ellipse(0, 0, size * 2.8, size * 0.7, 0xCCCCFF, 0).setStrokeStyle(1.5, 0xB0B0D8, 0.55);
    ringBackOuter.setAngle(-18); ringBackInner.setAngle(-18);
    c.addAt(ringBackOuter, 1); c.addAt(ringBackInner, 2);
    // Front of ring (in front of planet)
    const ringFrontOuter = scene.add.ellipse(0, 0, size * 3.2, size * 0.85, 0xCCCCFF, 0).setStrokeStyle(2, 0xCCCCFF, 0.85);
    const ringFrontInner = scene.add.ellipse(0, 0, size * 2.8, size * 0.7, 0xCCCCFF, 0).setStrokeStyle(1.5, 0xE0E0FF, 0.95);
    ringFrontOuter.setAngle(-18); ringFrontInner.setAngle(-18);
    // Mask the front rings to only show the front half
    c.add(ringFrontOuter); c.add(ringFrontInner);
  }

  // Slow rotation for surface details
  scene.tweens.add({ targets: details, angle: 360, duration: 40000, repeat: -1 });
  scene.tweens.add({ targets: clouds, angle: -360, duration: 55000, repeat: -1 });
  scene.tweens.add({ targets: bands, angle: 360, duration: 50000, repeat: -1 });
  // Pulsing atmosphere
  scene.tweens.add({ targets: [atmoFar, atmoMid], alpha: { from: 0.06, to: 0.18 }, duration: 2400, yoyo: true, repeat: -1, ease: "Sine.easeInOut" });

  return c;
}

// ─── Black hole (gravity well) ───
function createBlackHole(scene, x, y, size = 30) {
  const c = scene.add.container(x, y);
  // Far gravity ripple
  const rippleFar = scene.add.circle(0, 0, size * 2.8, SPACE.blackHoleRing, 0).setStrokeStyle(1, 0xFF6020, 0.25);
  // Gravity ring (outer)
  const ring1 = scene.add.circle(0, 0, size * 2.2, SPACE.blackHoleRing, 0).setStrokeStyle(1.5, SPACE.blackHoleRing, 0.4);
  const ring2 = scene.add.circle(0, 0, size * 1.7, SPACE.blackHoleRing, 0).setStrokeStyle(2, SPACE.blackHoleRing, 0.6);
  // Accretion disk — layered for depth
  const diskOuter = scene.add.ellipse(0, 0, size * 2.6, size * 0.8, SPACE.blackHoleRing, 0.4);
  const diskMid = scene.add.ellipse(0, 0, size * 2.2, size * 0.6, 0xFFA060, 0.7);
  const diskInner = scene.add.ellipse(0, 0, size * 1.6, size * 0.4, 0xFFE060, 0.5);
  // Event horizon — pure black core
  const core = scene.add.circle(0, 0, size, 0x000000);
  core.setStrokeStyle(2, 0x331515);
  // Gravitational lensing ring around the core
  const lens = scene.add.circle(0, 0, size * 1.05, 0xFFFFFF, 0).setStrokeStyle(1.5, 0xFFA050, 0.85);
  c.add([rippleFar, ring1, ring2, diskOuter, diskMid, diskInner, core, lens]);
  // Swirling
  scene.tweens.add({ targets: [diskOuter, ring2], angle: 360, duration: 3000, repeat: -1 });
  scene.tweens.add({ targets: [diskMid, diskInner], angle: -360, duration: 2200, repeat: -1 });
  scene.tweens.add({ targets: ring1, angle: -360, duration: 4500, repeat: -1 });
  scene.tweens.add({ targets: rippleFar, scale: { from: 0.85, to: 1.2 }, alpha: { from: 0.15, to: 0.4 }, duration: 2400, yoyo: true, repeat: -1, ease: "Sine.easeInOut" });
  scene.tweens.add({ targets: lens, alpha: { from: 0.7, to: 1 }, duration: 800, yoyo: true, repeat: -1 });
  c.gravityRadius = size * 2.6;
  c.collisionRadius = size * 1.0;
  return c;
}

// ─── White hole (fast moving repeller) ───
function createWhiteHole(scene, x, y, size = 18) {
  const c = scene.add.container(x, y);
  // Outer warning halo
  const haloFar = scene.add.circle(0, 0, size * 3.2, SPACE.whiteHoleRing, 0.12);
  const halo = scene.add.circle(0, 0, size * 2.5, SPACE.whiteHoleRing, 0.25);
  const ring = scene.add.circle(0, 0, size * 1.6, 0xFFFFFF, 0).setStrokeStyle(2, 0xFFFFFF, 0.8);
  // Burst rays — long
  const longRays = scene.add.graphics();
  longRays.lineStyle(2, 0xFFFFFF, 0.7);
  for (let i = 0; i < 8; i++) {
    const a = (i / 8) * Math.PI * 2;
    longRays.beginPath();
    longRays.moveTo(Math.cos(a) * size * 1.2, Math.sin(a) * size * 1.2);
    longRays.lineTo(Math.cos(a) * size * 2.4, Math.sin(a) * size * 2.4);
    longRays.strokePath();
  }
  // Short rays (offset rotation)
  const shortRays = scene.add.graphics();
  shortRays.lineStyle(1.5, 0x80D0FF, 0.6);
  for (let i = 0; i < 12; i++) {
    const a = (i / 12) * Math.PI * 2;
    shortRays.beginPath();
    shortRays.moveTo(Math.cos(a) * size * 1.1, Math.sin(a) * size * 1.1);
    shortRays.lineTo(Math.cos(a) * size * 1.7, Math.sin(a) * size * 1.7);
    shortRays.strokePath();
  }
  // Bright core
  const core = scene.add.circle(0, 0, size, 0xFFFFFF);
  const coreInner = scene.add.circle(0, 0, size * 0.7, 0xFFFFEE);
  c.add([haloFar, halo, longRays, shortRays, ring, core, coreInner]);
  scene.tweens.add({ targets: longRays, angle: 360, duration: 1400, repeat: -1 });
  scene.tweens.add({ targets: shortRays, angle: -360, duration: 2200, repeat: -1 });
  scene.tweens.add({ targets: halo, scale: { from: 0.9, to: 1.2 }, duration: 800, yoyo: true, repeat: -1, ease: "Sine.easeInOut" });
  scene.tweens.add({ targets: haloFar, alpha: { from: 0.08, to: 0.2 }, duration: 1200, yoyo: true, repeat: -1 });
  scene.tweens.add({ targets: coreInner, alpha: { from: 0.7, to: 1 }, duration: 400, yoyo: true, repeat: -1 });
  c.collisionRadius = size * 1.3;
  return c;
}

function createIceShard(scene, x, y, size = 14) {

  scene.tweens.add({ targets: glow, scale: { from: 0.85, to: 1.15 }, duration: 1100, yoyo: true, repeat: -1 });

}

// ─── Conveyor belt (Mekanos) ───
function createConveyor(scene, x, y, w = 100, dir = 1) {

// ─── Saw blade (Mekanos hazard) ───
function createSawBlade(scene, x, y, size = 18) {
  const c = scene.add.container(x, y);
  // Outer toothed circle
  const outer = scene.add.circle(0, 0, size, 0xC0C8D0).setStrokeStyle(2, 0x404850);
  // Saw teeth
  const teeth = scene.add.graphics();
  teeth.fillStyle(0xC0C8D0);
  teeth.lineStyle(1.5, 0x404850);
  for (let i = 0; i < 12; i++) {
    const a = (i / 12) * Math.PI * 2;
    const x1 = Math.cos(a) * size;
    const y1 = Math.sin(a) * size;
    const x2 = Math.cos(a) * (size + 5);
    const y2 = Math.sin(a) * (size + 5);
    const aN = ((i + 0.5) / 12) * Math.PI * 2;
    const xN = Math.cos(aN) * size;
    const yN = Math.sin(aN) * size;
    teeth.fillTriangle(x1, y1, x2, y2, xN, yN);
  }
  // Inner ring
  const inner = scene.add.circle(0, 0, size * 0.4, 0x808890).setStrokeStyle(1, 0x202830);
  // Center dot
  const center = scene.add.circle(0, 0, 2, 0x202830);
  c.add([outer, teeth, inner, center]);
  // Spin fast
  scene.tweens.add({ targets: [outer, teeth], angle: 360, duration: 500, repeat: -1 });
  c.collisionRadius = size * 1.1;
  return c;
}

// ─── Electric arc (Mekanos hazard) ───
function createElectricArc(scene, x1, y1, x2, y2) {
  const c = scene.add.container(0, 0);
  // Endpoints (electrodes)
  const end1 = scene.add.circle(x1, y1, 6, 0xFFE060).setStrokeStyle(1.5, 0x804020);
  const end2 = scene.add.circle(x2, y2, 6, 0xFFE060).setStrokeStyle(1.5, 0x804020);
  // Lightning bolt
  const arc = scene.add.graphics();
  c.add([end1, end2, arc]);
  c.endpoints = [{ x: x1, y: y1 }, { x: x2, y: y2 }];
  c.arcLine = arc;
  c.active = true;
  c.redraw = function() {
    arc.clear();
    if (!this.active) return;
    arc.lineStyle(2.5, 0xC0FFFF, 1);
    arc.beginPath();
    arc.moveTo(x1, y1);
    // Jagged line between
    const segments = 6;
    for (let i = 1; i < segments; i++) {
      const t = i / segments;
      const mx = x1 + (x2 - x1) * t + (Math.random() - 0.5) * 14;
      const my = y1 + (y2 - y1) * t + (Math.random() - 0.5) * 14;
      arc.lineTo(mx, my);
    }
    arc.lineTo(x2, y2);
    arc.strokePath();
    // Glow line behind
    arc.lineStyle(5, 0x80FFFF, 0.3);
    arc.lineBetween(x1, y1, x2, y2);
  };
  scene.time.addEvent({ delay: 80, loop: true, callback: () => c.redraw() });
  c.collisionRadius = 8; // arc itself is "thick"
  return c;
}

// ─── Energy Gate (puzzle: blocks passage until unlocked) ───
function createEnergyGate(scene, x, y, w = 120, h = 14) {
  const c = scene.add.container(x, y);
  // Lock icon in middle (clearer "this is closed")
  const lockIcon = scene.add.text(0, 0, "🔒", { fontSize: 22 }).setOrigin(0.5);
  // Outer brackets — start RED to signal danger/locked
  const bracketL = scene.add.polygon(-w/2, 0, [0, -h, 8, -h, 8, -h+3, 3, -h+3, 3, h-3, 8, h-3, 8, h, 0, h], 0xFF4060);
  bracketL.setStrokeStyle(1.5, 0xA02040);
  const bracketR = scene.add.polygon(w/2, 0, [0, -h, -8, -h, -8, -h+3, -3, -h+3, -3, h-3, -8, h-3, -8, h, 0, h], 0xFF4060);
  bracketR.setStrokeStyle(1.5, 0xA02040);
  // Energy beam (the danger barrier itself)
  const beam = scene.add.rectangle(0, 0, w - 16, h * 1.5, 0xFF4060, 0.85);
  beam.setStrokeStyle(1, 0xFF8080, 0.9);
  const beamGlow = scene.add.rectangle(0, 0, w - 16, h * 2.4, 0xFF4060, 0.3);
  // Crackling sparks
  const sparks = [];
  for (let i = 0; i < 6; i++) {
    const sx = -w/2 + 12 + Math.random() * (w - 24);
    const s = scene.add.circle(sx, (Math.random() - 0.5) * h, 1.5, 0xFFFFFF, 0.9);
    sparks.push(s);
  }
  c.add([beamGlow, beam, ...sparks, bracketL, bracketR, lockIcon]);
  scene.tweens.add({ targets: [beam, beamGlow], alpha: { from: 0.6, to: 1 }, duration: 350, yoyo: true, repeat: -1 });
  scene.tweens.add({ targets: lockIcon, alpha: { from: 0.7, to: 1 }, duration: 700, yoyo: true, repeat: -1 });
  sparks.forEach(s => {
    scene.tweens.add({ targets: s, alpha: { from: 0.4, to: 1 }, duration: 200 + Math.random() * 300, yoyo: true, repeat: -1 });
    scene.tweens.add({ targets: s, x: -w/2 + 12 + Math.random() * (w - 24), duration: 800 + Math.random() * 800, yoyo: true, repeat: -1 });
  });
  c.beam = beam; c.beamGlow = beamGlow; c.brackets = [bracketL, bracketR]; c.sparks = sparks; c.lockIcon = lockIcon;
  c.unlocked = false;
  c.unlock = function() {
    if (this.unlocked) return;
    this.unlocked = true;
    // Destroy ALL danger visuals so the gate clearly looks open
    scene.tweens.add({ targets: [beam, beamGlow, lockIcon, ...sparks], alpha: 0, duration: 500, onComplete: () => {
      beam.destroy(); beamGlow.destroy(); lockIcon.destroy(); sparks.forEach(s => s.destroy());
    }});
    // Brackets turn green (clear "open" signal)
    bracketL.setFillStyle(0x5DBE9A); bracketR.setFillStyle(0x5DBE9A);
    bracketL.setStrokeStyle(1.5, 0x3E8E6C); bracketR.setStrokeStyle(1.5, 0x3E8E6C);
    // Add a green "OPEN" arrow showing through
    const openArrow = scene.add.text(0, 0, "⬇", { fontSize: 22, color: "#5DBE9A", fontStyle: "bold" }).setOrigin(0.5);
    c.add(openArrow);
    scene.tweens.add({ targets: openArrow, y: 6, alpha: { from: 0.6, to: 1 }, duration: 600, yoyo: true, repeat: -1 });
    // Burst particles
    for (let i = 0; i < 16; i++) {
      const angle = Math.random() * Math.PI * 2;
      const sp = scene.add.circle(0, 0, 2 + Math.random() * 2, 0xFFE060);
      c.add(sp);
      scene.tweens.add({ targets: sp, x: Math.cos(angle) * 60, y: Math.sin(angle) * 40, alpha: 0, duration: 700, onComplete: () => sp.destroy() });
    }
  };
  c.collisionWidth = w - 12;
  c.collisionHeight = h * 1.8;
  return c;
}

// ─── EXIT PORTAL — the level's ending door ───
// Shows up locked at first, unlocks when objectives are complete, swimming into it ends the level
function createExitPortal(scene, x, y) {
  const c = scene.add.container(x, y);
  // Outer ring (large, glowy)
  const outerRing = scene.add.circle(0, 0, 38, 0xFFE060, 0).setStrokeStyle(3, 0xFFE060, 0.5);
  // Mid ring
  const midRing = scene.add.circle(0, 0, 30, 0xFFE060, 0).setStrokeStyle(2.5, 0xFFA830, 0.7);
  // Inner portal (looks closed initially)
  const portal = scene.add.circle(0, 0, 24, 0x402030, 0.85);
  portal.setStrokeStyle(2, 0x802040);
  // Lock indicator (visible while locked)
  const lock = scene.add.text(0, 0, "🔒", { fontSize: 26 }).setOrigin(0.5);
  // EXIT label (above portal)
  const exitLabel = scene.add.text(0, -52, "EXIT", {
    fontFamily: "system-ui", fontSize: 16, fontStyle: "bold", color: "#FFE060",
    stroke: "#000000", strokeThickness: 3, letterSpacing: 2,
  }).setOrigin(0.5);
  // Sub-label (changes based on state)
  const subLabel = scene.add.text(0, -38, "rescue all aliens first", {
    fontFamily: "system-ui", fontSize: 13, color: "#FFA830",
    stroke: "#000000", strokeThickness: 2,
  }).setOrigin(0.5);

  c.add([outerRing, midRing, portal, lock, exitLabel, subLabel]);

  // Pulse rings outward (telegraphs "this is important")
  scene.tweens.add({ targets: outerRing, scale: { from: 0.85, to: 1.15 }, alpha: { from: 0.3, to: 0.6 }, duration: 1500, yoyo: true, repeat: -1, ease: "Sine.easeInOut" });
  scene.tweens.add({ targets: midRing, scale: { from: 0.95, to: 1.1 }, duration: 1200, yoyo: true, repeat: -1 });
  scene.tweens.add({ targets: lock, alpha: { from: 0.7, to: 1 }, duration: 700, yoyo: true, repeat: -1 });

  c.unlocked = false;
  c.collisionRadius = 32;
  c.outerRing = outerRing; c.midRing = midRing; c.portal = portal; c.lock = lock;
  c.exitLabel = exitLabel; c.subLabel = subLabel;

  c.unlock = function() {
    if (this.unlocked) return;
    this.unlocked = true;
    Audio.unlock();
    // Lock disappears
    scene.tweens.add({ targets: lock, alpha: 0, scale: 1.6, duration: 400, onComplete: () => lock.destroy() });
    // Portal flips to bright glowing green
    portal.setFillStyle(0x5DBE9A);
    portal.setStrokeStyle(3, 0xFFFFFF);
    scene.tweens.add({ targets: portal, alpha: { from: 0.5, to: 1 }, duration: 500, yoyo: true, repeat: -1 });
    // Rings turn bright cyan
    outerRing.setStrokeStyle(3, 0x80E5FF, 0.7);
    midRing.setStrokeStyle(2.5, 0x80E5FF, 0.85);
    // Sub-label updates
    subLabel.setText("⬇ swim here to finish");
    subLabel.setColor("#5DBE9A");
    // Exit label now glowing white
    exitLabel.setColor("#FFFFFF");
    scene.tweens.add({ targets: exitLabel, scale: { from: 1, to: 1.15 }, duration: 600, yoyo: true, repeat: -1 });
    // Burst of particles
    for (let i = 0; i < 24; i++) {
      const angle = Math.random() * Math.PI * 2;
      const sp = scene.add.circle(0, 0, 2 + Math.random() * 2, 0xFFE060);
      c.add(sp);
      scene.tweens.add({ targets: sp, x: Math.cos(angle) * 80, y: Math.sin(angle) * 80, alpha: 0, duration: 800, onComplete: () => sp.destroy() });
    }
  };

  return c;
}

// ─── Pressure Switch ───
function createSwitch(scene, x, y) {
  const c = scene.add.container(x, y);
  const base = scene.add.ellipse(0, 4, 38, 12, 0x303840).setStrokeStyle(1, 0x101820);
  const pad = scene.add.circle(0, 0, 14, 0xFF4060).setStrokeStyle(2, 0x801030);
  const padHl = scene.add.circle(-3, -3, 5, 0xFF8090, 0.6);
  const arrow = scene.add.text(0, -22, "▼", { fontSize: 16, color: "#FFE060" }).setOrigin(0.5);
  c.add([base, pad, padHl, arrow]);
  c.pad = pad; c.arrow = arrow;
  c.activated = false;
  scene.tweens.add({ targets: arrow, y: -26, alpha: { from: 0.5, to: 1 }, duration: 600, yoyo: true, repeat: -1 });
  c.activate = function() {
    if (this.activated) return;
    this.activated = true;
    pad.setFillStyle(0x5DBE9A);
    pad.setStrokeStyle(2, 0x3E8E6C);
    padHl.setFillStyle(0xA8E0C0);
    arrow.destroy();
    scene.tweens.add({ targets: pad, scaleY: 0.5, y: 4, duration: 200 });
    scene.tweens.add({ targets: padHl, alpha: 0.3, duration: 200 });
  };
  c.collisionRadius = 18;
  return c;
}

// ─── Current arrow (visual hint of drift direction) ───
function createCurrentArrow(scene, x, y, dir = 1, len = 60) {
  const c = scene.add.container(x, y);
  const shaft = scene.add.rectangle(0, 0, len, 2, 0x80E0FF, 0.3);
  const head = scene.add.polygon(dir * len / 2, 0, [0, 0, -dir * 6, -4, -dir * 6, 4], 0x80E0FF, 0.3);
  c.add([shaft, head]);
  scene.tweens.add({ targets: c, x: x + dir * 30, alpha: { from: 0.2, to: 0.5 }, duration: 1500, yoyo: true, repeat: -1, ease: "Sine.easeInOut" });

// ─── Darkness overlay (cuts a soft hole around the player) ───
function createDarknessOverlay(scene, target, holeRadius = 110) {
  const W = scene.scale.width, H = scene.scale.height;
  const rt = scene.add.renderTexture(0, 0, W, H).setOrigin(0, 0).setDepth(99);
  const tmpG = scene.make.graphics({ add: false });
  rt.update = function() {
    rt.clear();
    rt.fill(0x000814, 0.82);
    tmpG.clear();
    tmpG.fillStyle(0xffffff, 1);
    tmpG.fillCircle(target.x, target.y, holeRadius);
    rt.erase(tmpG, 0, 0);
  };
  scene.events.on("update", rt.update);
  scene.events.once("shutdown", () => {
    scene.events.off("update", rt.update);
    tmpG.destroy();
  });
  return rt;
}

// ─── Objective banner (smaller persistent "what to do") ───
// ─── Goal Banner — a PROMINENT, ALWAYS-VISIBLE goal tracker for missions ───
// Shows what the kid needs to collect/rescue, with a big counter that updates live.
// Call setupGoalBanner(scene, { icon, label, total }) once, then updateGoalBanner(scene, current)
// every time a thing is collected/rescued.
function setupGoalBanner(scene, opts = {}) {
  const W = scene.scale.width;
  const icon = opts.icon || "⭐";
  const label = opts.label || "Collect all";
  const total = opts.total || 1;
  const yPos = opts.y || 60;

  // Container — pin to camera (won't scroll with world)
  const c = scene.add.container(W / 2, yPos).setDepth(810).setScrollFactor(0);
  const bgW = Math.min(W - 24, 280);
  const bg = scene.add.rectangle(0, 0, bgW, 44, 0x101830, 0.92).setStrokeStyle(2, 0xFFE060, 0.9);
  const iconText = scene.add.text(-bgW / 2 + 22, 0, icon, { fontSize: 24 }).setOrigin(0.5);
  const labelText = scene.add.text(-bgW / 2 + 44, -8, label.toUpperCase(), {
    fontFamily: "system-ui", fontSize: 11, fontStyle: "bold", color: "#A8D0FF", letterSpacing: 1,
  }).setOrigin(0, 0.5);
  const counterText = scene.add.text(-bgW / 2 + 44, 9, `0 / ${total}`, {
    fontFamily: "system-ui", fontSize: 18, fontStyle: "bold", color: "#FFE060",
  }).setOrigin(0, 0.5);
  // Tiny progress bar on right
  const barBg = scene.add.rectangle(bgW / 2 - 50, 0, 80, 6, 0x000000, 0.6).setOrigin(0.5).setStrokeStyle(1, 0xFFE060, 0.4);
  const barFill = scene.add.rectangle(bgW / 2 - 50 - 40, 0, 0, 5, 0xFFE060).setOrigin(0, 0.5);
  c.add([bg, iconText, labelText, counterText, barBg, barFill]);

  // Pulsing glow to draw attention
  scene.tweens.add({ targets: bg, alpha: { from: 0.85, to: 1 }, duration: 1100, yoyo: true, repeat: -1 });

  // Save references for updates
  scene._goalBanner = c;
  scene._goalBg = bg;
  scene._goalIcon = iconText;
  scene._goalLabel = labelText;
  scene._goalCounter = counterText;
  scene._goalBarFill = barFill;
  scene._goalTotal = total;
  scene._goalCurrent = 0;
  scene._goalBarMaxW = 80;
  return c;
}

function updateGoalBanner(scene, current) {
  if (!scene._goalBanner) return;
  scene._goalCurrent = current;
  const total = scene._goalTotal;
  const ratio = Math.min(1, current / total);
  scene._goalCounter.setText(`${current} / ${total}`);
  scene.tweens.add({ targets: scene._goalBarFill, displayWidth: ratio * scene._goalBarMaxW, duration: 250 });

  // Pop animation on the counter — feels rewarding
  scene.tweens.add({
    targets: scene._goalCounter, scale: { from: 1.4, to: 1 }, duration: 220, ease: "Back.easeOut",
  });
  // Brief flash on the banner background
  scene._goalBg.setStrokeStyle(2, 0x80FF80, 1);
  scene.time.delayedCall(220, () => { if (scene._goalBg) scene._goalBg.setStrokeStyle(2, 0xFFE060, 0.9); });

  // GOAL COMPLETE — celebrate!
  if (current >= total && !scene._goalCompleted) {
    scene._goalCompleted = true;
    // Banner turns green
    scene._goalBg.setFillStyle(0x205040, 0.95);
    scene._goalBg.setStrokeStyle(3, 0x80FF80, 1);
    scene._goalCounter.setColor("#80FF80");
    scene._goalCounter.setText(`✓ ${current} / ${total}`);
    scene._goalLabel.setText("GOAL COMPLETE!");
    scene._goalLabel.setColor("#80FF80");
    // Big scale punch
    scene.tweens.add({ targets: scene._goalBanner, scale: { from: 1, to: 1.15 }, duration: 250, yoyo: true });
    // Stop pulsing
    scene.tweens.killTweensOf(scene._goalBg);
    scene._goalBg.setAlpha(1);
  }
}

// ─── Mission Complete / Failed — unified end-of-mission screen ───
// Shows a clear pass/fail screen with appropriate buttons.
// On PASS: "Play Again", "Next Mission", "Back to Menu" (only previous + next unlocked)
// On FAIL: "Try Again", "Back to Menu" (no other progression)
function showMissionResult(scene, opts = {}) {
  const W = scene.scale.width, H = scene.scale.height;
  const passed = opts.passed === true;
  const levelNum = opts.levelNum || 1;
  const lvl = LEVELS.find(l => l.num === levelNum) || { name: "Mission", num: levelNum };
  const title = passed ? "MISSION COMPLETE!" : "MISSION FAILED";
  const titleColor = passed ? "#5DBE9A" : "#FF6080";
  const icon = passed ? "🏆" : "💀";
  const subtitle = passed
    ? (opts.passSubtitle || "You did it!")
    : (opts.failSubtitle || "Try again to keep exploring.");

  // Full-screen overlay
  const overlay = scene.add.rectangle(W / 2, H / 2, W, H, 0x000000, 0.88).setDepth(960).setScrollFactor(0).setInteractive();
  overlay.on("pointerdown", (p, x, y, e) => { if (e && e.stopPropagation) e.stopPropagation(); });

  const card = scene.add.container(W / 2, H / 2).setDepth(961).setScrollFactor(0);
  const cardW = Math.min(W - 32, 360);
  const cardH = passed ? 380 : 300;
  const accent = passed ? 0x5DBE9A : 0xFF6080;
  const cardBg = scene.add.rectangle(0, 0, cardW, cardH, 0x101830).setStrokeStyle(4, accent);
  // Big icon
  const iconText = scene.add.text(0, -cardH / 2 + 50, icon, { fontSize: 64 }).setOrigin(0.5);
  // Title — large and unmistakable
  const titleText = scene.add.text(0, -cardH / 2 + 110, title, {
    fontFamily: "system-ui", fontSize: 24, fontStyle: "bold", color: titleColor,
    stroke: "#000000", strokeThickness: 4, letterSpacing: 2,
  }).setOrigin(0.5);
  // Mission name
  const nameText = scene.add.text(0, -cardH / 2 + 142, `Level ${lvl.num}: ${lvl.name}`, {
    fontFamily: "system-ui", fontSize: 14, color: "#A8D0FF",
  }).setOrigin(0.5);
  // Subtitle
  const subText = scene.add.text(0, -cardH / 2 + 168, subtitle, {
    fontFamily: "system-ui", fontSize: 13, color: "#FFFFFF", align: "center",
    wordWrap: { width: cardW - 40 },
  }).setOrigin(0.5);

  card.add([cardBg, iconText, titleText, nameText, subText]);

  // Reward summary (only on pass)
  if (passed && opts.rewards) {
    const r = opts.rewards;
    let line = [];
    if (r.xp) line.push(`+${r.xp} XP`);
    if (r.habitability) line.push(`🌍 +${r.habitability}`);
    if (r.starCoins) line.push(`⭐ +${r.starCoins}`);
    if (line.length > 0) {
      const rewardText = scene.add.text(0, -cardH / 2 + 198, line.join("  ·  "), {
        fontFamily: "system-ui", fontSize: 14, fontStyle: "bold", color: "#FFE060",
      }).setOrigin(0.5);
      card.add(rewardText);
    }
  }

  // Buttons: anchor to bottom of card with vertical stack
  const btnW = cardW - 60;
  const btnH = 44;
  const btnGap = 10;
  // Bottom anchor — work upward
  let btnY = cardH / 2 - 30;

  if (passed) {
    // PASS: Play Again, Next Mission (if exists), Back to Menu — bottom-up

    // Find next unlocked level
    const nextLevel = LEVELS.find(l => l.num === levelNum + 1);
    const hasNext = !!nextLevel;

    // Bottom: Back to Menu
    const menuBtn = scene.add.rectangle(0, btnY, btnW, btnH, 0x404870).setStrokeStyle(2, 0xFFFFFF, 0.5).setInteractive({ useHandCursor: true });
    const menuTxt = scene.add.text(0, btnY, "🏠 Main Menu", {
      fontFamily: "system-ui", fontSize: 15, fontStyle: "bold", color: "#FFFFFF",
    }).setOrigin(0.5);
    menuBtn.on("pointerdown", () => { Audio.click(); overlay.destroy(); card.destroy(); scene.scene.start("LevelSelectScene"); });
    card.add([menuBtn, menuTxt]);
    btnY -= (btnH + btnGap);

    // Middle: Play Again
    const replayBtn = scene.add.rectangle(0, btnY, btnW, btnH, 0x4080A0).setStrokeStyle(2, 0x80E5FF, 0.7).setInteractive({ useHandCursor: true });
    const replayTxt = scene.add.text(0, btnY, "🔄 Play Again", {
      fontFamily: "system-ui", fontSize: 15, fontStyle: "bold", color: "#FFFFFF",
    }).setOrigin(0.5);
    replayBtn.on("pointerdown", () => { Audio.click(); overlay.destroy(); card.destroy(); scene.scene.restart(); });
    card.add([replayBtn, replayTxt]);
    btnY -= (btnH + btnGap);

    // Top: Next Mission (only if a next level exists AND it's unlocked after this win)
    if (hasNext) {
      const nextBtn = scene.add.rectangle(0, btnY, btnW, btnH, 0x5DBE9A).setStrokeStyle(2, 0x3E8E6C).setInteractive({ useHandCursor: true });
      const nextTxt = scene.add.text(0, btnY, `▶ Next Mission (${nextLevel.name})`, {
        fontFamily: "system-ui", fontSize: 14, fontStyle: "bold", color: "#FFFFFF",
        wordWrap: { width: btnW - 16 }, align: "center",
      }).setOrigin(0.5);
      nextBtn.on("pointerdown", () => {
        Audio.click(); overlay.destroy(); card.destroy();
        // Launch next mission directly
        const sceneExists = ["TutorialScene", "AqualonScene", "PyrosScene", "GlaciusScene", "VerdaniaScene", "MekanosScene", "BonusScene"].includes(nextLevel.scene);
        if (sceneExists) {
          scene.scene.start(nextLevel.scene, { startZone: nextLevel.subZone || 1, levelNum: nextLevel.num, cfg: nextLevel.cfg || null });
        } else {
          scene.scene.start("LevelSelectScene");
        }
      });
      card.add([nextBtn, nextTxt]);
    }
  } else {
    // FAIL: Only Try Again + Back to Menu (no progression)
    // Bottom: Back to Menu
    const menuBtn = scene.add.rectangle(0, btnY, btnW, btnH, 0x404870).setStrokeStyle(2, 0xFFFFFF, 0.5).setInteractive({ useHandCursor: true });
    const menuTxt = scene.add.text(0, btnY, "🏠 Main Menu", {
      fontFamily: "system-ui", fontSize: 15, fontStyle: "bold", color: "#FFFFFF",
    }).setOrigin(0.5);
    menuBtn.on("pointerdown", () => { Audio.click(); overlay.destroy(); card.destroy(); scene.scene.start("LevelSelectScene"); });
    card.add([menuBtn, menuTxt]);
    btnY -= (btnH + btnGap);

    // Top: Try Again
    const tryBtn = scene.add.rectangle(0, btnY, btnW, btnH, 0xFF8030).setStrokeStyle(2, 0xFFE060, 0.7).setInteractive({ useHandCursor: true });
    const tryTxt = scene.add.text(0, btnY, "🔄 Try Again", {
      fontFamily: "system-ui", fontSize: 15, fontStyle: "bold", color: "#FFFFFF",
    }).setOrigin(0.5);
    tryBtn.on("pointerdown", () => { Audio.click(); overlay.destroy(); card.destroy(); scene.scene.restart(); });
    card.add([tryBtn, tryTxt]);
  }

  // Animate in
  card.setScale(0);
  scene.tweens.add({ targets: card, scale: 1, duration: 350, ease: "Back.easeOut" });

  // Audio cue
  if (passed) Audio.victory(); else Audio.fail();
}

    2: "Aqualon's surface is calm. Rescue the Squidlets — they have water purification data.",
    3: "The Trench. Ancient Squidlet leaders live here. Watch the dark.",
    4: "Pyros runs hot. The Magmites guard energy crystals we need.",
    5: "The Boss Magmite holds the council records. Survive.",
    6: "Glacius — Frosties hide in ice. They preserve life like nothing else.",
    7: "An avalanche is coming. Save the elder Frosties before it buries them.",
    8: "Verdania's jungle hides Sproutlings. They grow food anywhere.",
    9: "A predator hunts here. Move carefully.",
    10:"Final mission. Mekanos can build the rescue ship.",
    11:"Bonus world: Gemstone — explore the crystal palace.",
    12:"Bonus world: Voidspace — survive the cosmic anomaly.",
    13:"Bonus world: Mirror Realm — your reflection fights back.",
    14:"Bonus world: Solar Storm — race the dying sun.",
    15:"Bonus world: Galactic Core — the final frontier.",
  };
  const briefing = briefingTexts[levelNum] || lvl.desc;

  // Overlay — interactive to absorb all taps and prevent pass-through to level grid below
  const overlay = scene.add.rectangle(W / 2, H / 2, W, H, 0x000000, 0.85).setDepth(950).setInteractive();
  // Tapping overlay outside the card does nothing (just absorb the tap)
  overlay.on("pointerdown", (pointer, x, y, event) => {
    if (event && event.stopPropagation) event.stopPropagation();
  });
  const card = scene.add.container(W / 2, H / 2).setDepth(951);
  const cardW = Math.min(W - 32, 340);
  const cardH = 240;
  // Card background — also interactive to absorb taps on the card (so they don't pass to overlay or below)
  const cardBg = scene.add.rectangle(0, 0, cardW, cardH, 0x101830).setStrokeStyle(2, lvl.color).setInteractive();
  cardBg.on("pointerdown", (pointer, x, y, event) => {
    if (event && event.stopPropagation) event.stopPropagation();
  });
  // Header strip with level number + world
  const header = scene.add.text(0, -cardH / 2 + 18, `LEVEL ${levelNum}  •  ${lvl.world.toUpperCase()}`, {
    fontFamily: "system-ui", fontSize: 14, fontStyle: "bold", color: "#888899", letterSpacing: 2,
  }).setOrigin(0.5);
  // Name (big)
  const name = scene.add.text(0, -cardH / 2 + 46, lvl.name, {
    fontFamily: "system-ui", fontSize: 26, fontStyle: "bold", color: "#FFFFFF",
  }).setOrigin(0.5);
  // Brief (short)
  const brief = scene.add.text(0, -10, briefing, {
    fontFamily: "system-ui", fontSize: 16, color: "#A8D0FF", align: "center",
    wordWrap: { width: cardW - 40 },
  }).setOrigin(0.5);
  // Reward line — combined reward + earth status (compact)
  const rewardLine = lvl.points > 0
    ? `🌍 +${lvl.points}  ·  Earth: ${STATE.habitability}/100`
    : `Earth: ${STATE.habitability}/100`;
  const reward = scene.add.text(0, 50, rewardLine, {
    fontFamily: "system-ui", fontSize: 15, fontStyle: "bold", color: "#80E5FF",
  }).setOrigin(0.5);
  // Launch button
  const launch = scene.add.rectangle(0, cardH / 2 - 32, 200, 40, lvl.color).setStrokeStyle(2, 0x000000, 0.4).setInteractive({ useHandCursor: true });
  const launchTxt = scene.add.text(0, cardH / 2 - 32, "🚀 LAUNCH", {
    fontFamily: "system-ui", fontSize: 18, fontStyle: "bold", color: "#1A2543", letterSpacing: 1,
  }).setOrigin(0.5);

  // Close (X) button in top-right corner of card — lets user cancel
  const closeBg = scene.add.circle(cardW / 2 - 18, -cardH / 2 + 18, 14, 0x000000, 0.5).setStrokeStyle(1, 0xFFFFFF, 0.5).setInteractive({ useHandCursor: true });
  const closeTxt = scene.add.text(cardW / 2 - 18, -cardH / 2 + 18, "✕", {
    fontFamily: "system-ui", fontSize: 18, fontStyle: "bold", color: "#FFFFFF",
  }).setOrigin(0.5);

  card.add([cardBg, header, name, brief, reward, launch, launchTxt, closeBg, closeTxt]);
  card.setScale(0);
  scene.tweens.add({ targets: card, scale: 1, duration: 350, ease: "Back.easeOut" });

  const closeModal = () => {
    scene.tweens.add({
      targets: [card, overlay], scale: 0, alpha: 0, duration: 220,
      onComplete: () => { card.destroy(); overlay.destroy(); },
    });
  };

  launch.on("pointerdown", (pointer, x, y, event) => {
    if (event && event.stopPropagation) event.stopPropagation();
    scene.tweens.add({
      targets: [card, overlay], scale: 0, alpha: 0, duration: 220,
      onComplete: () => { card.destroy(); overlay.destroy(); onContinue(); },
    });
  });
  closeBg.on("pointerdown", (pointer, x, y, event) => {
    if (event && event.stopPropagation) event.stopPropagation();
    closeModal();
  });
}

// ─── Tappable back button helper — large hit area, reliable on mobile ───
function createBackButton(scene, label, onClick) {
  // Don't use a container — place objects directly in the scene with explicit depths
  // This avoids container hit-area transform bugs in Phaser
  const x = 8, y = 8, w = 96, h = 40;

  // Bright visible background (clearly tappable)
  const bg = scene.add.rectangle(x, y, w, h, 0x000000, 0.55).setOrigin(0, 0).setDepth(820);
  bg.setStrokeStyle(2, 0xFFE9A8, 0.9);

  // Label centered in the rectangle
  const txt = scene.add.text(x + w / 2, y + h / 2, label, {
    fontFamily: "system-ui", fontSize: 17, fontStyle: "bold", color: "#FFE9A8",
  }).setOrigin(0.5).setDepth(821);

  // Make the visible bg the interactive one — direct hit, no container weirdness
  bg.setInteractive({ useHandCursor: true });

  bg.on("pointerdown", (pointer, lx, ly, event) => {
    if (event && event.stopPropagation) event.stopPropagation();
    Audio.click();
    bg.setFillStyle(0xFFE9A8, 0.4);
    scene.time.delayedCall(120, () => onClick());
  });
  bg.on("pointerover", () => bg.setFillStyle(0xFFE9A8, 0.25));
  bg.on("pointerout", () => bg.setFillStyle(0x000000, 0.55));

  return { bg, txt };
}

// ─── Continue option helper — adds a "Continue with 1 ❤️" button to a Game Over card ───
// scene: the Phaser scene; card: the Phaser container holding the modal
// onContinue: callback that should restore 1 heart and close modal
// Returns the button objects for further customization, or null if Continue is not available
function addContinueButton(scene, card, opts) {
  // Only allow continue once per level attempt + only on hearts-based deaths
  // EXCEPTION: in Kid Mode, allow unlimited continues
  if (scene._continueUsed && !isKidMode()) return null;
  if (opts && opts.allowContinue === false) return null;

  const yPos = opts?.y || 10;

  const continueBtn = scene.add.rectangle(0, yPos, 220, 44, 0x5DBE9A).setStrokeStyle(2, 0x3E8E6C).setInteractive({ useHandCursor: true });
  const continueTxt = scene.add.text(0, yPos, "❤️ Continue (free)", {
    fontFamily: "system-ui", fontSize: 18, fontStyle: "bold", color: "#FFFFFF",
  }).setOrigin(0.5);
  const continueLbl = scene.add.text(0, yPos + 22, "Restart with 1 heart, keep your progress", {
    fontFamily: "system-ui", fontSize: 13, color: "#A8D0FF",
  }).setOrigin(0.5);

  continueBtn.on("pointerdown", (p, x, y, e) => {
    if (e && e.stopPropagation) e.stopPropagation();
    Audio.click();
    scene._continueUsed = true;

    // Track attempt count for "comeback" achievement
    scene._continueAttempts = (scene._continueAttempts || 0) + 1;

    // Run the user's restore callback
    if (opts && opts.onContinue) opts.onContinue();
  });

  card.add([continueBtn, continueTxt, continueLbl]);
  return { btn: continueBtn, txt: continueTxt, lbl: continueLbl };
}

// Helper: restore minimum game state for Continue (1 heart, end-game flag off)
function restoreForContinue(scene) {
  scene.gameEnded = false;
  scene.health = 1;
  scene.invincible = true; // brief grace period
  if (scene.healthIcons) {
    scene.healthIcons.forEach(h => h?.setAlpha(0.2));
    if (scene.healthIcons[0]) scene.healthIcons[0].setAlpha(1);
  }
  scene.time.delayedCall(2000, () => scene.invincible = false);
}

// ─── Pause Menu — opens overlay with resume / settings / back to levels ───
function showPauseMenu(scene, opts = {}) {
  const W = scene.scale.width, H = scene.scale.height;
  // Pause the scene's gameplay (tweens + timers + physics)
  scene.scene.pause();
  // Use a new scene-on-top approach? Actually with pause(), update() stops but UI is still there.
  // We add the menu overlay to a separate sibling pattern via a UI scene OR add it directly.
  // Simpler: add directly but keep references and listen for scene events.

  // We can't add to the paused scene (paused scenes don't render new objects properly in some Phaser builds).
  // Instead, use a UI scene approach — but to keep it simple in a single scene, we resume() before adding,
  // then re-pause via our own mechanism.

  // Actually the cleanest: pause via a flag, hide all gameplay objects in the scene.
  // Simpler still: just freeze tween updates manually using scene.tweens.pauseAll() and scene.time.paused = true.
  scene.scene.resume(); // undo the pause we just did — we'll use a manual freeze
  scene.tweens.pauseAll();
  scene.time.paused = true;
  // Mark a flag so the scene's update loop can early-return
  scene._paused = true;

  const overlay = scene.add.rectangle(W / 2, H / 2, W, H, 0x000000, 0.78).setDepth(960).setInteractive();
  overlay.on("pointerdown", (p, x, y, e) => { if (e && e.stopPropagation) e.stopPropagation(); });

  const card = scene.add.container(W / 2, H / 2).setDepth(961);
  const cardW = Math.min(W - 32, 320);
  const cardH = 320;
  const cardBg = scene.add.rectangle(0, 0, cardW, cardH, 0x101830).setStrokeStyle(2, 0xFFE9A8).setInteractive();
  cardBg.on("pointerdown", (p, x, y, e) => { if (e && e.stopPropagation) e.stopPropagation(); });

  const title = scene.add.text(0, -cardH / 2 + 30, "PAUSED", {
    fontFamily: "system-ui", fontSize: 26, fontStyle: "bold", color: "#FFE9A8", letterSpacing: 4,
  }).setOrigin(0.5);

  // Sound toggle
  const soundLabel = scene.add.text(-cardW / 2 + 24, -50, "🔊  Sound Effects", {
    fontFamily: "system-ui", fontSize: 18, color: "#FFFFFF",
  }).setOrigin(0, 0.5);
  const soundToggle = scene.add.rectangle(cardW / 2 - 24, -50, 50, 24, STATE.soundOn ? 0x5DBE9A : 0x444455).setStrokeStyle(1, 0xFFFFFF, 0.5).setOrigin(1, 0.5).setInteractive({ useHandCursor: true });
  const soundKnob = scene.add.circle(cardW / 2 - 24 - (STATE.soundOn ? 8 : 38), -50, 9, 0xFFFFFF);
  soundToggle.on("pointerdown", (p, x, y, e) => {
    if (e && e.stopPropagation) e.stopPropagation();
    Audio.click();
    Audio.setSoundOn(!STATE.soundOn);
    soundToggle.setFillStyle(STATE.soundOn ? 0x5DBE9A : 0x444455);
    scene.tweens.add({ targets: soundKnob, x: cardW / 2 - 24 - (STATE.soundOn ? 8 : 38), duration: 150 });
  });

  // Music toggle
  const musicLabel = scene.add.text(-cardW / 2 + 24, -10, "🎵  Background Music", {
    fontFamily: "system-ui", fontSize: 18, color: "#FFFFFF",
  }).setOrigin(0, 0.5);
  const musicToggle = scene.add.rectangle(cardW / 2 - 24, -10, 50, 24, STATE.musicOn ? 0x5DBE9A : 0x444455).setStrokeStyle(1, 0xFFFFFF, 0.5).setOrigin(1, 0.5).setInteractive({ useHandCursor: true });
  const musicKnob = scene.add.circle(cardW / 2 - 24 - (STATE.musicOn ? 8 : 38), -10, 9, 0xFFFFFF);
  musicToggle.on("pointerdown", (p, x, y, e) => {
    if (e && e.stopPropagation) e.stopPropagation();
    Audio.click();
    Audio.setMusicOn(!STATE.musicOn);
    musicToggle.setFillStyle(STATE.musicOn ? 0x5DBE9A : 0x444455);
    scene.tweens.add({ targets: musicKnob, x: cardW / 2 - 24 - (STATE.musicOn ? 8 : 38), duration: 150 });
    if (STATE.musicOn && opts.world) Audio.startMusic(opts.world);
  });

  const closeMenu = () => {
    scene.tweens.pauseAll(); // ensure paused
    scene.tweens.resumeAll();
    scene.time.paused = false;
    scene._paused = false;
    [overlay, card].forEach(o => {
      scene.tweens.add({ targets: o, alpha: 0, duration: 200, onComplete: () => o.destroy() });
    });
  };

  // Resume button
  const resume = scene.add.rectangle(0, 50, 220, 44, 0x5DBE9A).setStrokeStyle(2, 0x3E8E6C).setInteractive({ useHandCursor: true });
  const resumeTxt = scene.add.text(0, 50, "▶  RESUME", {
    fontFamily: "system-ui", fontSize: 19, fontStyle: "bold", color: "#FFFFFF",
  }).setOrigin(0.5);
  resume.on("pointerdown", (p, x, y, e) => {
    if (e && e.stopPropagation) e.stopPropagation();
    Audio.click();
    closeMenu();
  });

  // Back to levels
  const back = scene.add.rectangle(0, 100, 220, 38, 0x404870).setStrokeStyle(1.5, 0xFFFFFF, 0.5).setInteractive({ useHandCursor: true });
  const backTxt = scene.add.text(0, 100, "↩  Back to Levels", {
    fontFamily: "system-ui", fontSize: 17, color: "#FFFFFF",
  }).setOrigin(0.5);
  back.on("pointerdown", (p, x, y, e) => {
    if (e && e.stopPropagation) e.stopPropagation();
    Audio.click();
    scene.tweens.resumeAll();
    scene.time.paused = false;
    scene._paused = false;
    Audio.stopMusic();
    if (opts.onExit) opts.onExit();
    else scene.scene.start("LevelSelectScene");
  });

  card.add([cardBg, title, soundLabel, soundToggle, soundKnob, musicLabel, musicToggle, musicKnob, resume, resumeTxt, back, backTxt]);
  card.setScale(0);
  scene.tweens.add({ targets: card, scale: 1, duration: 280, ease: "Back.easeOut" });
}

// ─── Elite mode helpers — add fog overlay, push currents, extra hazards based on cfg.mode ───
function applyEliteFog(scene, density = 0.55) {
  const W = scene.scale.width, H = scene.scale.height;
  // Three layers of drifting fog clouds for "low visibility"
  const fogContainer = scene.add.container(0, 0).setDepth(60);
  for (let i = 0; i < 6; i++) {
    const x = Math.random() * W, y = 80 + Math.random() * (H - 160);
    const cloud = scene.add.ellipse(x, y, 200 + Math.random() * 120, 80 + Math.random() * 40, 0xC0C8D0, density);
    fogContainer.add(cloud);
    scene.tweens.add({ targets: cloud, x: cloud.x + (Math.random() - 0.5) * 100, duration: 6000 + Math.random() * 3000, yoyo: true, repeat: -1, ease: "Sine.easeInOut" });
    scene.tweens.add({ targets: cloud, alpha: { from: density * 0.7, to: density }, duration: 2000, yoyo: true, repeat: -1 });
  }
  // Vignette - dark edges to enhance "can't see" feel
  const vignette = scene.add.graphics().setDepth(61);
  vignette.fillStyle(0x000000, 0.6);
  vignette.fillRect(0, 0, W, 50);
  vignette.fillRect(0, H - 50, W, 50);
  vignette.fillRect(0, 0, 40, H);
  vignette.fillRect(W - 40, 0, 40, H);
  return fogContainer;
}

function applyElitePushCurrents(scene) {
  // Random current pushes — applied in update via scene._eliteCurrentForce
  scene._eliteCurrentForce = { x: 0, y: 0 };
  scene.time.addEvent({
    delay: 2200, loop: true,
    callback: () => {
      if (scene.gameEnded) return;
      const angle = Math.random() * Math.PI * 2;
      scene._eliteCurrentForce.x = Math.cos(angle) * 0.9;
      scene._eliteCurrentForce.y = Math.sin(angle) * 0.9;
      // Visual indicator — arrow flashes briefly
      const W = scene.scale.width, H = scene.scale.height;
      const arrow = scene.add.text(W / 2, 110, "→", {
        fontFamily: "system-ui", fontSize: 32, color: "#80E5FF",
      }).setOrigin(0.5).setDepth(820).setRotation(angle).setAlpha(0);
      scene.tweens.add({ targets: arrow, alpha: { from: 0, to: 0.9 }, duration: 200, yoyo: true, hold: 800, onComplete: () => arrow.destroy() });
      // Decay current after 1.5s
      scene.time.delayedCall(1500, () => { if (scene._eliteCurrentForce) { scene._eliteCurrentForce.x = 0; scene._eliteCurrentForce.y = 0; } });
    }
  });
}

// ─── Danger prompt — shows briefly when hazard hits ───
function showDangerPrompt(scene, message, color = 0xFF4060) {
  Audio.hit();
  const W = scene.scale.width, H = scene.scale.height;
  // Avoid stacking — clear previous prompt
  if (scene._dangerPrompt && !scene._dangerPrompt.destroyed) {
    scene._dangerPrompt.destroy();
  }
  const c = scene.add.container(W / 2, H * 0.32).setDepth(950);
  const bg = scene.add.rectangle(0, 0, 280, 50, 0x000000, 0.85).setStrokeStyle(2.5, color);
  const icon = scene.add.text(-110, 0, "⚠️", { fontSize: 26 }).setOrigin(0.5);
  const text = scene.add.text(15, 0, message, {
    fontFamily: "system-ui", fontSize: 18, fontStyle: "bold",
    color: "#FFFFFF", align: "center", wordWrap: { width: 200 },
  }).setOrigin(0.5);
  c.add([bg, icon, text]);
  c.setScale(0);
  scene._dangerPrompt = c;
  scene.tweens.add({ targets: c, scale: 1, duration: 200, ease: "Back.easeOut" });
  scene.time.delayedCall(1400, () => {
    if (c.destroyed) return;
    scene.tweens.add({
      targets: c, alpha: 0, y: c.y - 20, duration: 400,
      onComplete: () => { c.destroyed = true; c.destroy(); },
    });
  });
}

// ─── Virtual Joystick ───
class VirtualJoystick {
  constructor(scene) {
    this.scene = scene;
    const W = scene.scale.width, H = scene.scale.height;
    this.homeX = 80; this.homeY = H - 80;
    this.baseX = this.homeX; this.baseY = this.homeY;
    this.radius = 50;
    this.activeZoneRight = W * 0.5;  // joystick zone = left half
    this.activeZoneTop = 70;         // below the top UI bar

    // Base ring — semi-transparent at home position
    this.base = scene.add.circle(this.baseX, this.baseY, this.radius, 0xFFFFFF, 0.12).setDepth(900);
    this.base.setStrokeStyle(2, 0xFFFFFF, 0.4);
    // Knob
    this.knob = scene.add.circle(this.baseX, this.baseY, 22, 0xFFFFFF, 0.55).setDepth(901);
    this.knob.setStrokeStyle(2, 0xFFFFFF, 0.9);
    // Hint text
    this.hint = scene.add.text(this.homeX, this.homeY - this.radius - 14, "drag to move", {
      fontFamily: "system-ui", fontSize: 15, color: "#ffffff",
    }).setOrigin(0.5).setDepth(902).setAlpha(0.7);

    // State
    this.activePointerId = null;
    this.dx = 0; this.dy = 0;

    // Bind handlers (so we can remove them on destroy)
    this._onDown = this.onDown.bind(this);
    this._onMove = this.onMove.bind(this);
    this._onUp = this.onUp.bind(this);

    scene.input.on("pointerdown", this._onDown);
    scene.input.on("pointermove", this._onMove);
    scene.input.on("pointerup", this._onUp);
    scene.input.on("pointerupoutside", this._onUp);
    // Handle scene transitions / interruptions
    scene.events.once("shutdown", () => this.destroy());
    scene.events.once("destroy", () => this.destroy());
  }

  inJoystickZone(pointer) {
    return pointer.x < this.activeZoneRight && pointer.y > this.activeZoneTop;
  }

  onDown(pointer) {
    // If a different pointer is already controlling joystick, ignore
    if (this.activePointerId !== null) return;
    // Only activate if started in joystick zone
    if (!this.inJoystickZone(pointer)) return;
    this.activePointerId = pointer.id;
    this.baseX = pointer.x; this.baseY = pointer.y;
    this.base.setPosition(this.baseX, this.baseY);
    this.knob.setPosition(this.baseX, this.baseY);
    this.hint?.setVisible(false);
  }

  onMove(pointer) {
    // Only track moves from the pointer that owns the joystick
    if (this.activePointerId === null || pointer.id !== this.activePointerId) return;
    let dx = pointer.x - this.baseX;
    let dy = pointer.y - this.baseY;
    const dist = Math.hypot(dx, dy);
    if (dist > this.radius) {
      dx = (dx / dist) * this.radius;
      dy = (dy / dist) * this.radius;
    }
    this.knob.setPosition(this.baseX + dx, this.baseY + dy);
    this.dx = dx / this.radius;
    this.dy = dy / this.radius;
  }

  onUp(pointer) {
    // Only release if the joystick-owning pointer is the one releasing
    if (this.activePointerId === null) return;
    if (pointer && pointer.id !== this.activePointerId) return;
    this.release();
  }

  release() {
    this.activePointerId = null;
    this.dx = 0; this.dy = 0;
    this.baseX = this.homeX; this.baseY = this.homeY;
    this.base.setPosition(this.homeX, this.homeY);
    this.knob.setPosition(this.homeX, this.homeY);
  }

  destroy() {
    if (this.destroyed) return;
    this.destroyed = true;
    this.scene.input.off("pointerdown", this._onDown);
    this.scene.input.off("pointermove", this._onMove);
    this.scene.input.off("pointerup", this._onUp);
    this.scene.input.off("pointerupoutside", this._onUp);
    this.base?.destroy(); this.knob?.destroy(); this.hint?.destroy();
  }
}

// ─── Starfield helper ───
// ─── Responsive helpers ───
const isMobile = () => window.innerWidth < 720 || window.innerHeight < 720;
const responsiveFontSize = (mobile, desktop) => isMobile() ? mobile : desktop;
const responsiveScale = (scene, base = 1) => {
  const W = scene.scale.width;
  // Reference width 420 (mobile portrait). Scale up for laptops.
  return Phaser.Math.Clamp(W / 420, 1, 2.0) * base;
};

// ─── Deep space realistic background ───
function makeDeepSpaceBackground(scene, mood = "purple") {
  const W = scene.scale.width, H = scene.scale.height;
  const bg = scene.add.graphics();
  // Three different mood gradients
  const moods = {
    purple: [0x080A20, 0x080A20, 0x1A0A30, 0x05071A],
    blue:   [0x05071A, 0x05071A, 0x102050, 0x020410],
    deep:   [0x000000, 0x000000, 0x080A18, 0x000000],
    nebula: [0x101030, 0x301050, 0x102050, 0x050720],
  };
  const m = moods[mood] || moods.purple;
  bg.fillGradientStyle(m[0], m[1], m[2], m[3]);
  bg.fillRect(0, 0, W, H);

  // Subtle vignette (darker edges)
  const vignette = scene.add.graphics();
  vignette.fillStyle(0x000000, 0.4);
  vignette.fillRect(0, 0, W, H);
  // Center clear (using a giant transparent circle won't work — use radial darken via concentric rings)
  vignette.alpha = 0; // we'll let nebula do the depth
  return bg;
}

// ─── Realistic starfield with varied star types ───
// Star colors by stellar class (real astronomy color temperature mapping)
const STAR_COLORS = [
  { c: 0x9BB0FF, weight: 0.05, name: "blue" },      // O/B class - hot blue giants
  { c: 0xCAD8FF, weight: 0.10, name: "blue-white" },// A class
  { c: 0xFFFFFF, weight: 0.40, name: "white" },     // F/G class - sun-like (most common visually)
  { c: 0xFFEFD0, weight: 0.20, name: "yellow" },    // G/K class
  { c: 0xFFD2A1, weight: 0.15, name: "orange" },    // K class
  { c: 0xFFA060, weight: 0.08, name: "red" },       // M class - red dwarfs
  { c: 0xFFE9A8, weight: 0.02, name: "supergiant" },// rare bright supergiants
];
function pickStarColor() {
  const r = Math.random();
  let acc = 0;
  for (const s of STAR_COLORS) { acc += s.weight; if (r < acc) return s.c; }
  return 0xFFFFFF;
}

function makeStarfield(scene, count = 80, parallax = 1) {
  const W = scene.scale.width, H = scene.scale.height;
  const stars = [];

  // Distant pinpoint stars (most numerous, smallest)
  for (let i = 0; i < count; i++) {
    const x = Math.random() * W, y = Math.random() * H;
    const isBigStar = Math.random() < 0.06;
    const isMediumStar = !isBigStar && Math.random() < 0.18;
    const size = isBigStar ? 2.2 : (isMediumStar ? 1.4 : 0.8);
    const color = pickStarColor();
    const baseAlpha = 0.4 + Math.random() * 0.5;

    if (isBigStar) {
      // Bright stars get a cross-flare and halo
      const halo = scene.add.circle(x, y, size * 4, color, 0.18);
      const star = scene.add.circle(x, y, size, color, Math.min(1, baseAlpha + 0.3));
      // Cross flare lines (subtle, suggests lens flare)
      const flareH = scene.add.rectangle(x, y, size * 8, 0.7, color, 0.6);
      const flareV = scene.add.rectangle(x, y, 0.7, size * 8, color, 0.6);
      star.parallax = parallax;
      stars.push(star);
      // Twinkle
      scene.tweens.add({ targets: [halo, flareH, flareV], alpha: { from: 0.3, to: 0.8 }, duration: 1500 + Math.random() * 2000, yoyo: true, repeat: -1 });
      scene.tweens.add({ targets: star, alpha: { from: baseAlpha, to: 1 }, duration: 1200 + Math.random() * 1500, yoyo: true, repeat: -1 });
    } else {
      const star = scene.add.circle(x, y, size, color, baseAlpha);
      star.parallax = parallax;
      stars.push(star);
      // Most small stars twinkle subtly
      if (Math.random() < 0.4) {
        scene.tweens.add({ targets: star, alpha: { from: baseAlpha * 0.4, to: baseAlpha }, duration: 1000 + Math.random() * 2500, yoyo: true, repeat: -1 });
      }
    }
  }
  return stars;
}

// ─── Distant galaxy / nebula band — large diffuse glowing strip ───
function makeNebulaBackdrop(scene) {
  const W = scene.scale.width, H = scene.scale.height;
  // Milky Way-style diagonal band of soft glow
  const bandAngle = -0.3; // radians, slight diagonal
  const bandY = H * (0.4 + Math.random() * 0.2);
  // Multiple soft circles forming the band
  const palette = [0x4830A0, 0x6040C0, 0x3050A0, 0x804060, 0x402060];
  for (let i = 0; i < 14; i++) {
    const t = i / 13;
    const x = t * W;
    const y = bandY + Math.sin(t * Math.PI) * 30 + (Math.random() - 0.5) * 40 + (x - W / 2) * bandAngle * 0.3;
    const size = 60 + Math.random() * 80;
    const color = palette[Math.floor(Math.random() * palette.length)];
    const cloud = scene.add.circle(x, y, size, color, 0.06 + Math.random() * 0.05);
    scene.tweens.add({ targets: cloud, alpha: { from: cloud.alpha * 0.6, to: cloud.alpha * 1.3 }, duration: 4000 + Math.random() * 3000, yoyo: true, repeat: -1 });
  }
  // Tiny sparkle stars concentrated in the band
  for (let i = 0; i < 60; i++) {
    const t = Math.random();
    const x = t * W + (Math.random() - 0.5) * 80;
    const y = bandY + Math.sin(t * Math.PI) * 30 + (Math.random() - 0.5) * 70 + (x - W / 2) * bandAngle * 0.3;
    const size = Math.random() < 0.8 ? 0.8 : 1.4;
    const star = scene.add.circle(x, y, size, pickStarColor(), 0.5 + Math.random() * 0.4);
    if (Math.random() < 0.5) {
      scene.tweens.add({ targets: star, alpha: { from: 0.3, to: 0.95 }, duration: 800 + Math.random() * 1500, yoyo: true, repeat: -1 });
    }
  }
}

// ─── Distant galaxy disk (visible from space scenes) ───
function makeDistantGalaxy(scene, x, y, size = 80) {
  const c = scene.add.container(x, y);
  // Halo
  const halo = scene.add.circle(0, 0, size * 1.8, 0x6040A0, 0.06);
  // Outer disk (elliptical, tilted)
  const disk = scene.add.ellipse(0, 0, size * 2, size * 0.5, 0x8050C0, 0.18);
  disk.setAngle(20);
  // Spiral arms (suggested with curved ellipses)
  const arm1 = scene.add.ellipse(-size * 0.3, 0, size * 1.4, size * 0.3, 0xA060C0, 0.22);
  const arm2 = scene.add.ellipse(size * 0.3, 0, size * 1.4, size * 0.3, 0xA060C0, 0.22);
  arm1.setAngle(35); arm2.setAngle(5);
  // Bright core
  const core = scene.add.ellipse(0, 0, size * 0.5, size * 0.18, 0xFFE9A8, 0.55);
  core.setAngle(20);
  const coreBright = scene.add.circle(0, 0, size * 0.08, 0xFFFFFF, 0.9);
  c.add([halo, disk, arm1, arm2, core, coreBright]);
  scene.tweens.add({ targets: c, angle: 360, duration: 60000, repeat: -1 }); // very slow rotation
  scene.tweens.add({ targets: halo, alpha: { from: 0.04, to: 0.10 }, duration: 5000, yoyo: true, repeat: -1 });
  return c;
}

// ══════════════════════════════════════════════════════════════════
// ACHIEVEMENTS SCENE — view unlocked + locked badges
// ══════════════════════════════════════════════════════════════════
class AchievementsScene extends Phaser.Scene {
  constructor() { super("AchievementsScene"); }
  create() {
    const W = this.scale.width, H = this.scale.height;
    this.W = W; this.H = H;

    // Background
    makeDeepSpaceBackground(this, "purple");
    makeStarfield(this, isMobile() ? 50 : 80, 1);

    // Title bar
    this.add.rectangle(0, 0, W, 56, 0x000000, 0.7).setOrigin(0, 0).setDepth(200);
    this.add.text(W / 2, 22, "ACHIEVEMENTS", {
      fontFamily: "system-ui", fontSize: 20, fontStyle: "bold", color: "#FFE9A8", letterSpacing: 3,
    }).setOrigin(0.5).setDepth(201);
    const unlockedCount = STATE.achievements.length;
    this.add.text(W / 2, 42, `${unlockedCount} of ${ACHIEVEMENTS.length} unlocked`, {
      fontFamily: "system-ui", fontSize: 15, color: "#A8D0FF",
    }).setOrigin(0.5).setDepth(201);
    createBackButton(this, "← back", () => this.scene.start("LevelSelectScene"));

    this.drawGrid();
  }

  drawGrid() {
    const W = this.W, H = this.H;
    // 2-column grid on mobile, 3 on bigger screens
    const cols = W < 500 ? 2 : 3;
    const padX = 12;
    const cellW = (W - padX * (cols + 1)) / cols;
    const cellH = 120;
    const gap = 10;
    const startY = 80;

    // Container with scroll-feel (basic — no actual scroll yet but lays them out)
    ACHIEVEMENTS.forEach((def, i) => {
      const col = i % cols;
      const row = Math.floor(i / cols);
      const x = padX + col * (cellW + padX) + cellW / 2;
      const y = startY + row * (cellH + gap) + cellH / 2;
      const unlocked = hasAchievement(def.id);

      const card = this.add.container(x, y).setDepth(50);
      const bg = this.add.rectangle(0, 0, cellW, cellH, unlocked ? 0x1A2543 : 0x0A0F20, 0.95).setStrokeStyle(2, unlocked ? 0xFFE9A8 : 0x404870);
      const icon = this.add.text(0, -22, unlocked ? def.icon : "🔒", {
        fontSize: 30,
      }).setOrigin(0.5).setAlpha(unlocked ? 1 : 0.4);
      const name = this.add.text(0, 8, def.name, {
        fontFamily: "system-ui", fontSize: 15, fontStyle: "bold",
        color: unlocked ? "#FFFFFF" : "#888899",
      }).setOrigin(0.5);
      const desc = this.add.text(0, 26, def.desc, {
        fontFamily: "system-ui", fontSize: 13,
        color: unlocked ? "#A8D0FF" : "#555566",
        wordWrap: { width: cellW - 12 },
        align: "center",
      }).setOrigin(0.5);
      card.add([bg, icon, name, desc]);
    });

    // Total play time stat at bottom
    const totalMin = Math.floor(STATE.totalPlayTime / 60000);
    const hr = Math.floor(totalMin / 60);
    const min = totalMin % 60;
    const playTimeStr = hr > 0 ? `${hr}h ${min}m` : `${min}m`;
    const rows = Math.ceil(ACHIEVEMENTS.length / cols);
    const statsY = Math.min(H - 24, startY + rows * (cellH + gap) + 16);
    this.add.text(W / 2, statsY, `⏱ Total playtime: ${playTimeStr}`, {
      fontFamily: "system-ui", fontSize: 15, color: "#A8D0FF",
    }).setOrigin(0.5);
  }
}

// PROFILE PICKER — first screen on launch (player slot selection)
// ══════════════════════════════════════════════════════════════════
class ProfilePickerScene extends Phaser.Scene {
  constructor() { super("ProfilePickerScene"); }
  create() {
    window.hideSplash && window.hideSplash();
    const W = this.scale.width, H = this.scale.height;
    this.W = W; this.H = H;

    // Background — deep space
    makeDeepSpaceBackground(this, "purple");
    makeStarfield(this, isMobile() ? 60 : 90, 1);
    makeNebulaBackdrop(this);

    // Title
    this.add.text(W / 2, H * 0.10, "ADVENTURE QUEST", {
      fontFamily: "system-ui", fontSize: responsiveFontSize(30, 36), fontStyle: "bold", color: "#FFE9A8", letterSpacing: 4,
    }).setOrigin(0.5);
    this.add.text(W / 2, H * 0.16, "Who's playing?", {
      fontFamily: "system-ui", fontSize: responsiveFontSize(17, 20), color: "#A8D0FF",
    }).setOrigin(0.5);

    this.drawProfileList();
  }

  drawProfileList() {
    const W = this.W, H = this.H;
    const profiles = loadProfiles();

    // 2-column grid of profile slots (max 4)
    const slotW = Math.min(W * 0.42, 180);
    const slotH = 110;
    const gap = 16;
    const startY = H * 0.30;

    for (let i = 0; i < 4; i++) {
      const col = i % 2;
      const row = Math.floor(i / 2);
      const x = W / 2 + (col === 0 ? -(slotW / 2 + gap / 2) : (slotW / 2 + gap / 2));
      const y = startY + row * (slotH + gap);
      const profile = profiles[i];

      if (profile) {
        this.drawExistingProfile(x, y, slotW, slotH, profile);
      } else {
        this.drawEmptySlot(x, y, slotW, slotH, i);
      }
    }
  }

  drawExistingProfile(x, y, w, h, profile) {
    const c = this.add.container(x, y);
    const bg = this.add.rectangle(0, 0, w, h, 0x1A2543, 0.95).setStrokeStyle(2, profile.kidMode ? 0xFFE060 : 0xFFE9A8).setInteractive({ useHandCursor: true });
    const emoji = this.add.text(0, -28, profile.emoji || "🚀", { fontSize: 32 }).setOrigin(0.5);
    const name = this.add.text(0, 6, profile.name, {
      fontFamily: "system-ui", fontSize: 19, fontStyle: "bold", color: "#FFFFFF",
    }).setOrigin(0.5);
    // Stats line
    const completed = (profile.state?.levelsCompleted || []).length;
    const habit = profile.state?.habitability || 0;
    const stats = this.add.text(0, 28, `Lv ${completed}/15 · 🌍 ${habit}/100`, {
      fontFamily: "system-ui", fontSize: 14, color: "#A8D0FF",
    }).setOrigin(0.5);
    // Delete button (small ✕)
    const delBtn = this.add.circle(w / 2 - 12, -h / 2 + 12, 9, 0xFF4060, 0.9).setStrokeStyle(1, 0xFFFFFF, 0.7).setInteractive({ useHandCursor: true });
    const delTxt = this.add.text(w / 2 - 12, -h / 2 + 12, "✕", { fontSize: 13, fontStyle: "bold", color: "#FFFFFF" }).setOrigin(0.5);

    // KID MODE badge (top-left) — tap to toggle
    const kidBadge = this.add.rectangle(-w / 2 + 22, -h / 2 + 12, 36, 16, profile.kidMode ? 0xFFE060 : 0x404870, 0.9).setStrokeStyle(1, profile.kidMode ? 0x804020 : 0xFFFFFF, 0.6).setInteractive({ useHandCursor: true });
    const kidTxt = this.add.text(-w / 2 + 22, -h / 2 + 12, profile.kidMode ? "KID ✓" : "KID", {
      fontFamily: "system-ui", fontSize: 13, fontStyle: "bold", color: profile.kidMode ? "#1A2543" : "#A8D0FF", letterSpacing: 1,
    }).setOrigin(0.5);

    c.add([bg, emoji, name, stats, delBtn, delTxt, kidBadge, kidTxt]);

    bg.on("pointerdown", (p, lx, ly, e) => {
      if (e && e.stopPropagation) e.stopPropagation();
      Audio.click();
      switchProfile(profile.id);
      this.routeToNextScene();
    });

    delBtn.on("pointerdown", (p, lx, ly, e) => {
      if (e && e.stopPropagation) e.stopPropagation();
      Audio.click();
      this.confirmDelete(profile);
    });

    kidBadge.on("pointerdown", (p, lx, ly, e) => {
      if (e && e.stopPropagation) e.stopPropagation();
      Audio.click();
      const newState = toggleProfileKidMode(profile.id);
      // Tiny floater
      const float = this.add.text(x, y - h / 2 + 12, newState ? "Kid Mode ON" : "Kid Mode OFF", {
        fontFamily: "system-ui", fontSize: 15, fontStyle: "bold", color: newState ? "#FFE060" : "#A8D0FF",
      }).setOrigin(0.5).setDepth(990);
      this.tweens.add({ targets: float, y: float.y - 30, alpha: 0, duration: 1000, onComplete: () => float.destroy() });
      // Refresh
      this.scene.restart();
    });
  }

  drawEmptySlot(x, y, w, h, slotIdx) {
    const c = this.add.container(x, y);
    const bg = this.add.rectangle(0, 0, w, h, 0x000000, 0.4).setStrokeStyle(2, 0xFFFFFF, 0.3).setInteractive({ useHandCursor: true });
    const plus = this.add.text(0, -10, "+", { fontFamily: "system-ui", fontSize: 36, fontStyle: "bold", color: "#FFFFFF" }).setOrigin(0.5).setAlpha(0.5);
    const lbl = this.add.text(0, 24, "New Player", { fontFamily: "system-ui", fontSize: 16, color: "#A8D0FF" }).setOrigin(0.5);
    c.add([bg, plus, lbl]);

      if (e && e.stopPropagation) e.stopPropagation();
      Audio.click();
      this.openCreateDialog();

  openCreateDialog() {
