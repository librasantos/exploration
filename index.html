      const m = createCrystalMeteor(this, mx, my, 14 + Math.random() * 4);
      m.vx = (Math.random() - 0.5) * z3Speed;
      m.vy = (Math.random() - 0.5) * z3Speed;
      m.zoneMinY = this.zone2Y + 10;
      m.zoneMaxY = H - 50;
      this.meteors.push(m);
    }

    // Energy gates between zones — unlocked by completing all squidlets in prior zone
    this.gate12 = createEnergyGate(this, W / 2, this.zone1Y, W * 0.7, 8);
    this.gate23 = createEnergyGate(this, W / 2, this.zone2Y, W * 0.7, 8);
    this.gate12.setDepth(40);
    this.gate23.setDepth(40);

    // EXIT PORTAL — placed at deep trench bottom, locked until all squidlets rescued
    this.exitPortal = createExitPortal(this, W * 0.5, H * 0.95);
    this.exitPortal.setDepth(45);

    // Astronaut player
    this.astronaut = createAstronaut(this, W * 0.5, H * 0.10, STATE.avatar);
    this.astronaut.setScale(1.5);
    this.astronaut.setDepth(50);
    this.astroVx = 0; this.astroVy = 0;

    // Joystick
    this.joystick = new VirtualJoystick(this);
    this.tweens.timeScale = isKidMode() ? 0.6 : 1;

    // Health (3 hearts) — moved DOWN to avoid title bar overlap
    this.health = isKidMode() ? 5 : 3;
    this.healthIcons = [];
    for (let i = 0; i < 3; i++) {
      const heart = this.add.text(16 + i * 22, 64, "❤️", { fontSize: 18 }).setDepth(801);
      this.healthIcons.push(heart);
    }

    // Darkness overlay only for zone 3 — created on demand
    this.darkness = null;

    // Zone tracking
    this.currentZone = 1;
    this.rescued = 0;
    this.zone1Count = 0; this.zone2Count = 0; this.zone3Count = 0;

    // Banner + objective
    showZoneBanner(this, 1, "Surface Waters", 0x80E5FF);
    showObjective(this, "Rescue 2 squidlets in the surface waters");

    this.gameEnded = false;

    // ELITE MODE hooks
    if (this.cfg && this.cfg.mode === 'stormSurface') {
      applyElitePushCurrents(this);
      showEliteBanner(this, 'STORM SURFACE');
      // Add 3 extra ice meteors as hazards
      this.eliteMeteors = [];
      for (let i = 0; i < 4; i++) {
        const m = createRockyMeteor(this, 80 + Math.random() * (this.W - 160), 120 + Math.random() * (this.H - 240), 12);
        m.vx = (Math.random() - 0.5) * 2.4;
        m.vy = (Math.random() - 0.5) * 2.4;
        m.setDepth(35);
        this.eliteMeteors.push(m);
      }
    } else if (this.cfg && this.cfg.mode === 'abyssalDepths') {
      applyEliteFog(this, 0.55);
      showEliteBanner(this, 'ABYSSAL DEPTHS');
      // Add 2 extra black holes
      this.eliteBlackHoles = [];
      const W = this.W, H = this.H;
      for (let i = 0; i < 2; i++) {
        const bh = createBlackHole(this, 120 + Math.random() * (W - 240), 200 + Math.random() * (H - 360), 18);
        bh.setDepth(38);
        this.eliteBlackHoles.push(bh);
      }
    }
  }

  update() {
    if (this.gameEnded) return;
    if (this._paused) return;

    // Elite update — push currents + extra meteors
    if (this._eliteCurrentForce) {
      this.astroVx += this._eliteCurrentForce.x;
      this.astroVy += this._eliteCurrentForce.y;
    }
    if (this.eliteMeteors) {
      const Wm = this.scale.width, Hm = this.scale.height;
      for (const m of this.eliteMeteors) {
        m.x += m.vx; m.y += m.vy;
        if (m.x < 30 || m.x > Wm - 30) m.vx *= -1;
        if (m.y < 80 || m.y > Hm - 30) m.vy *= -1;
        const d = Phaser.Math.Distance.Between(m.x, m.y, this.astronaut.x, this.astronaut.y);
        if (d < 22) this.takeHit('Storm meteor!');
      }
    }
    if (this.eliteBlackHoles) {
      for (const bh of this.eliteBlackHoles) {
        const dx = bh.x - this.astronaut.x;
        const dy = bh.y - this.astronaut.y;
        const dist = Math.hypot(dx, dy);
        if (dist < bh.gravityRadius) {
          const pull = (1 - dist / bh.gravityRadius) * 0.7;
          this.astroVx += (dx / dist) * pull;
          this.astroVy += (dy / dist) * pull;
          if (dist < bh.collisionRadius) this.takeHit('Black hole!');
        }
      }
    }
    const W = this.W, H = this.H;
    // Joystick
    const accel = 0.5;
    this.astroVx += this.joystick.dx * accel;
    this.astroVy += this.joystick.dy * accel;

    // Zone 1 has a small rightward current
    if (this.astronaut.y < this.zone1Y) {
      this.astroVx += this.zone1CurrentX * 0.05;
    }

    this.astroVx *= 0.9; this.astroVy *= 0.9;
    const sp = Math.hypot(this.astroVx, this.astroVy);
    if (sp > 3.5) { this.astroVx = (this.astroVx / sp) * 3.5; this.astroVy = (this.astroVy / sp) * 3.5; }
    this.astronaut.x += this.astroVx;
    this.astronaut.y += this.astroVy;
    this.astronaut.x = Phaser.Math.Clamp(this.astronaut.x, 24, W - 24);
    this.astronaut.y = Phaser.Math.Clamp(this.astronaut.y, 70, H - 24);

    // Determine current zone (track for objectives)
    let newZone = this.astronaut.y < this.zone1Y ? 1 : (this.astronaut.y < this.zone2Y ? 2 : 3);
    if (newZone !== this.currentZone) {
      // Only transition if gate allows it
      if (newZone === 2 && !this.gate12.unlocked) {
        // Push back to zone 1
        this.astronaut.y = this.zone1Y - 8;
        this.astroVy = -2;
        showDangerPrompt(this, "Gate locked! Rescue all squidlets first.");
      } else if (newZone === 3 && !this.gate23.unlocked) {
        this.astronaut.y = this.zone2Y - 8;
        this.astroVy = -2;
        showDangerPrompt(this, "Gate locked! Rescue all squidlets first.");
      } else {
        this.currentZone = newZone;
        if (newZone === 2 && !this._zone2Banner) {
          this._zone2Banner = true;
          showZoneBanner(this, 2, "Mid-Depth", 0x4080C0);
          showObjective(this, "Orbit around the gravity well — rescue 2 more");
        }
        if (newZone === 3 && !this._zone3Banner) {
          this._zone3Banner = true;
          showZoneBanner(this, 3, "The Trench", 0x103060);
          showObjective(this, "Thread between the black holes — find 2 in the dark");
          // Activate darkness
          this.darkness = createDarknessOverlay(this, this.astronaut, 110);
        }
      }
    }

    // Squidlet rescue (only in current zone)
    for (const t of this.targets) {
      if (t.rescued) continue;
      const d = Phaser.Math.Distance.Between(this.astronaut.x, this.astronaut.y, t.x, t.y);
      if (d < 40) this.rescue(t);
    }

    // Crystal meteor drift + collision
    for (const m of this.meteors) {
      m.x += m.vx;
      m.y += m.vy;
      if (m.x < 30 || m.x > W - 30) m.vx *= -1;
      if (m.y < m.zoneMinY || m.y > m.zoneMaxY) m.vy *= -1;
      const d = Phaser.Math.Distance.Between(m.x, m.y, this.astronaut.x, this.astronaut.y);
      if (d < m.collisionRadius + 14) this.takeHit("Crystal shard hit!");
    }

    // Black hole gravity (zone 2 + zone 3)
    for (const bh of this.blackHoles) {
      const dx = bh.x - this.astronaut.x;
      const dy = bh.y - this.astronaut.y;
      const dist = Math.hypot(dx, dy);
      if (dist < bh.gravityRadius) {
        const pull = (1 - dist / bh.gravityRadius) * 0.7;
        this.astroVx += (dx / dist) * pull;
        this.astroVy += (dy / dist) * pull;
        if (dist < bh.collisionRadius) {
          this.takeHit("Black hole crushed you!");
          this.astronaut.x -= (dx / dist) * 30;
          this.astronaut.y -= (dy / dist) * 30;
        }
      }
    }

    // Exit portal — touch when unlocked to complete level
    if (this.exitPortal && this.exitPortal.unlocked) {
      const dEx = Phaser.Math.Distance.Between(this.exitPortal.x, this.exitPortal.y, this.astronaut.x, this.astronaut.y);
      if (dEx < this.exitPortal.collisionRadius) {
        this.complete();
      }
    }
  }

  takeHit(message) {
    if (this.invincible) return;
    this.invincible = true;
    this.health--;
    this.healthIcons[this.health]?.setAlpha(0.2);
    showDangerPrompt(this, message);
    this.cameras.main.shake(150, 0.008);
    this.cameras.main.flash(150, 200, 80, 200);
    this.tweens.add({ targets: this.astronaut, alpha: { from: 0.3, to: 1 }, duration: 200, yoyo: true, repeat: 3 });
    this.time.delayedCall(isKidMode() ? 1500 : 900, () => this.invincible = false);
    if (this.health <= 0) this.gameOver();
  }

  rescue(t) {
    t.rescued = true;
    this.rescued++;
    if (t.zone === 1) this.zone1Count++;
    if (t.zone === 2) this.zone2Count++;
    if (t.zone === 3) this.zone3Count++;
    // Show personality bubble
    showSpeechBubble(this, t.x, t.y, getAlienGreeting("squidlet"), 0xC080E0);
    Audio.rescue();
    trackDailyProgress(this, "rescue");
    this.tweens.add({ targets: t.squid, x: this.astronaut.x - 30 + (this.rescued * 4), y: this.astronaut.y + 14 + (this.rescued * 2), scale: 0.6, duration: 400 });
    this.tweens.add({ targets: t.pod, alpha: 0.3, duration: 400 });
    for (let i = 0; i < 8; i++) {
      const angle = Math.random() * Math.PI * 2;
      const sp = this.add.circle(t.x, t.y, 2, 0x80FFE0);
      this.tweens.add({ targets: sp, x: t.x + Math.cos(angle) * 30, y: t.y + Math.sin(angle) * 30, alpha: 0, duration: 500, onComplete: () => sp.destroy() });
    }
    STATE.xp += 25;
    STATE.squidletRescued++;
    checkLevelUp();
    saveGame(STATE);
    this.scoreText.setText(`🐙 ${this.rescued}/6`);
    updateGoalBanner(this, this.rescued);

    // Zone gates
    if (this.zone1Count >= 2 && !this.gate12.unlocked) {
      this.gate12.unlock();
      showObjective(this, "Gate open! Dive deeper ↓");
    }
    if (this.zone2Count >= 2 && !this.gate23.unlocked) {
      this.gate23.unlock();
      showObjective(this, "Mid-zone clear! Descend into the trench ↓");
    }
    // Unlock the EXIT PORTAL when all 6 are rescued
    if (this.rescued >= 6 && !this.exitPortal.unlocked) {
      this.exitPortal.unlock();
      showObjective(this, "🌟 All saved! Swim to the EXIT portal at the bottom!");
      // Big reveal — flash + arrow drawing player attention
      this.cameras.main.flash(300, 255, 255, 100);
    }
  }

  gameOver() {
    if (this.gameEnded) return;
    this.gameEnded = true;
    this.joystick.destroy();
    showMissionResult(this, {
      passed: false,
      levelNum: this.levelNum || 2,
      failSubtitle: `${this.rescued}/6 squidlets rescued. The trench is dangerous!`,
    });
  }

  complete() {
    this.gameEnded = true;
    this.joystick.destroy();
    if (!STATE.planetsVisited.includes("aqualon")) {
      STATE.planetsVisited.push("aqualon");
      STATE.xp += 100;
      checkLevelUp();
      saveGame(STATE);
    }
    const reward = awardLevel(this.levelNum || 2, this);
    saveGame(STATE);

    showMissionResult(this, {
      passed: true,
      levelNum: this.levelNum || 2,
      passSubtitle: reward.newAlien ? `✨ ${ALIENS[reward.newAlien].name} joined your crew!` : "All squidlets rescued!",
      rewards: { xp: 100, habitability: reward.newPoints },
    });
  }

  exit() { this.joystick?.destroy(); this.scene.start("LevelSelectScene"); }
}

// ══════════════════════════════════════════════════════════════════
// PYROS — collect crystals from Magmites, dodge fireballs
// ══════════════════════════════════════════════════════════════════
class PyrosScene extends Phaser.Scene {
  constructor() { super("PyrosScene"); }
  init(data) { this.levelNum = data?.levelNum || 4; this.startZone = data?.startZone || 1; this.cfg = data?.cfg || null; }
  create() {
    const W = this.scale.width, H = this.scale.height;
    this.W = W; this.H = H;

    // Lava sky gradient — three depth zones, top is calmest, bottom is boss
    const bg = this.add.graphics();
    bg.fillGradientStyle(0xC03018, 0xA02018, 0x501008, 0x180404);
    bg.fillRect(0, 0, W, H);

    // Distant volcanic peaks (silhouette layer)
    const peaks = this.add.graphics();
    peaks.fillStyle(0x401008, 0.8);
    let px = 0;
    while (px < W + 40) {
      const peakH = 30 + Math.random() * 50;
      peaks.fillTriangle(px, H * 0.55, px + 30 + Math.random() * 20, H * 0.55 - peakH, px + 60, H * 0.55);
      px += 50 + Math.random() * 20;
    }

    // Heat haze shimmer (semi-transparent waves)
    for (let i = 0; i < 4; i++) {
      const haze = this.add.rectangle(W / 2, H * (0.4 + i * 0.15), W, 20, 0xFF6030, 0.04);
      this.tweens.add({ targets: haze, x: W / 2 + 14, duration: 1200 + Math.random() * 600, yoyo: true, repeat: -1 });
      this.tweens.add({ targets: haze, alpha: { from: 0.02, to: 0.07 }, duration: 800, yoyo: true, repeat: -1 });
    }

    // Smoke columns rising from bottom
    for (let i = 0; i < 6; i++) {
      const sx = (i / 5) * W + (Math.random() - 0.5) * 40;
      this.time.addEvent({
        delay: 1000 + Math.random() * 800, loop: true,
        callback: () => {
          if (this.gameEnded) return;
          const smoke = this.add.circle(sx, H - 40, 8 + Math.random() * 6, 0x808080, 0.4);
          this.tweens.add({ targets: smoke, y: -30, alpha: 0, scale: 1.8, duration: 6000, onComplete: () => smoke.destroy() });
        }
      });
    }

    // Embers floating up — varied colors (yellow, orange, red)
    const emberColors = [0xFFE060, 0xFF8030, 0xFF6020, 0xFFA040];
    for (let i = 0; i < 35; i++) {
      const c = emberColors[Math.floor(Math.random() * emberColors.length)];
      const ember = this.add.circle(Math.random() * W, H + 20, 1 + Math.random() * 3, c, 0.85);
      this.tweens.add({ targets: ember, y: -20, alpha: 0, duration: 6000 + Math.random() * 4000, repeat: -1, delay: Math.random() * 4000 });
      this.tweens.add({ targets: ember, x: ember.x + (Math.random() - 0.5) * 50, duration: 4000, yoyo: true, repeat: -1 });
    }

    // Lava floor with glow
    const floor = this.add.rectangle(0, H - 30, W, 60, 0xFF4020).setOrigin(0, 0);
    const floorGlow = this.add.rectangle(0, H - 35, W, 5, 0xFFE060, 0.7).setOrigin(0, 0);
    this.tweens.add({ targets: floor, alpha: { from: 0.85, to: 1 }, duration: 800, yoyo: true, repeat: -1 });
    this.tweens.add({ targets: floorGlow, alpha: { from: 0.4, to: 0.9 }, duration: 600, yoyo: true, repeat: -1 });

    // Lava bubbles popping in floor
    for (let i = 0; i < 4; i++) {
      const bx = Math.random() * W;
      this.time.addEvent({
        delay: 1400 + Math.random() * 1000, loop: true,
        callback: () => {
          if (this.gameEnded) return;
          const bubble = this.add.circle(bx, H - 12, 1, 0xFFE060, 0.9);
          this.tweens.add({ targets: bubble, scale: 6, alpha: 0, duration: 600, onComplete: () => bubble.destroy() });
        }
      });
    }

    // Three zone bands
    this.zone1Y = H * 0.36;
    this.zone2Y = H * 0.66;

    // Title bar
    this.add.rectangle(0, 0, W, 56, 0x000000, 0.6).setOrigin(0, 0).setDepth(800);
    createBackButton(this, "← levels", () => this.exit());
    createPauseButton(this, () => showPauseMenu(this, { world: "lava" }));
    Audio.startMusic("lava");

    this.events.once("shutdown", () => { Audio.stopMusic(); this.geyserEvent?.remove(); this.iceTitanEvent?.remove(); });
    this.add.text(W / 2, 22, "PYROS", {
      fontFamily: "system-ui", fontSize: 20, fontStyle: "bold", color: "#FF8030", letterSpacing: 2,
    }).setOrigin(0.5).setDepth(801);
    // Persistent prominent goal banner — large, easy to see, tracks "X / 8 crystals"
    setupGoalBanner(this, { icon: "💎", label: "Collect crystals", total: 8, y: 60 });
    // Keep small score text too for backwards compat
    this.scoreText = this.add.text(W - 12, 28, "💎 0/8", {
      fontFamily: "system-ui", fontSize: 14, fontStyle: "bold", color: "#FFE060",
    }).setOrigin(1, 0.5).setDepth(801).setAlpha(0.7);

    // ZONE 1 (top, caves): 3 crystals + 1 switch — switch unlocks zone 2 gate
    // ZONE 2 (middle, bridge): moving platform crossing, 2 crystals as you ride across
    // ZONE 3 (bottom, boss arena): 3 final crystals, boss Magmite shoots aimed fireballs
    this.crystals = [];
    const zone1Crystals = [
      { x: W * 0.2,  y: H * 0.18 },
      { x: W * 0.5,  y: H * 0.13 },
      { x: W * 0.82, y: H * 0.20 },
    ];
    const zone2Crystals = [
      { x: W * 0.25, y: H * 0.50 },
      { x: W * 0.75, y: H * 0.50 },
    ];
    const zone3Crystals = [
      { x: W * 0.20, y: H * 0.80 },
      { x: W * 0.50, y: H * 0.84 },
      { x: W * 0.80, y: H * 0.80 },
    ];
    // Higher levels (5+) get bonus crystals scattered in the zones for more challenge
    const lvlNum = this.levelNum || 4;
    if (lvlNum >= 5) {
      // Add 1-2 extra crystals per zone for harder levels
      const extras = Math.min(6, lvlNum - 4); // up to 6 extra at level 10+
      for (let i = 0; i < extras; i++) {
        const zone = i % 3;
        const arr = [zone1Crystals, zone2Crystals, zone3Crystals][zone];
        const baseY = [0.16, 0.46, 0.78][zone] + (Math.random() - 0.5) * 0.08;
        arr.push({ x: W * (0.10 + Math.random() * 0.80), y: H * baseY });
      }
    }
    [...zone1Crystals, ...zone2Crystals, ...zone3Crystals].forEach(s => {
      const mag = createMagmite(this, s.x, s.y + 16);
      const cr = createCrystal(this, s.x, s.y - 12);
      cr.collected = false;
      this.crystals.push(cr);
    });
    this.zone1Total = zone1Crystals.length;
    this.zone2Total = zone2Crystals.length;
    this.zone3Total = zone3Crystals.length;
    this.zone1Got = 0; this.zone2Got = 0; this.zone3Got = 0;
    // Total crystals across all zones — used for goal banner
    this.totalCrystals = zone1Crystals.length + zone2Crystals.length + zone3Crystals.length;
    // Update goal banner total to match actual count
    if (this._goalBanner) this._goalTotal = this.totalCrystals;

    // ZONE 1 → 2 gate (horizontal energy barrier across zone1Y line)
    this.gate12 = createEnergyGate(this, W / 2, this.zone1Y, W * 0.7, 8);
    this.gate12.setDepth(40);
    // ZONE 2 → 3 gate
    this.gate23 = createEnergyGate(this, W / 2, this.zone2Y, W * 0.7, 8);
    this.gate23.setDepth(40);

    // EXIT PORTAL — placed at bottom-right beside the boss arena
    this.exitPortal = createExitPortal(this, W * 0.85, H * 0.78);
    this.exitPortal.setDepth(45);

    // ZONE 2: Moving platform that drifts horizontally (visual element + safe zone)
    this.platform = createMovingPlatform(this, W * 0.2, H * 0.55, 90);
    this.platform.setDepth(35);
    this.tweens.add({
      targets: this.platform, x: W * 0.8, duration: 4000, yoyo: true, repeat: -1, ease: "Sine.easeInOut",
    });

    // ZONE 3: Boss Magmite at bottom-center, shoots aimed fireballs
    this.boss = createBossMagmite(this, W / 2, H * 0.95);
    this.boss.setDepth(45);
    this.bossFireballs = [];

    // Falling fireballs (zones 1-2) and rocky meteors (zone 3)
    this.fireballs = [];
    this.meteors = [];
    // Difficulty scales with level number — higher levels = faster hazards & more crystals
    const pyrosLvl = this.levelNum || 4;
    const difficultyTier = Math.max(0, pyrosLvl - 4); // 0 for lvl4, 14 for lvl18
    // Hazard intervals get faster with level
    const fireballDelay = isKidMode() ? Math.max(1100, 1600 - difficultyTier * 60) : Math.max(700, 1300 - difficultyTier * 70);
    const meteorDelay = isKidMode() ? Math.max(1700, 2800 - difficultyTier * 100) : Math.max(1200, 2400 - difficultyTier * 120);
    this.fireballEvent = this.time.addEvent({ delay: fireballDelay, loop: true, callback: () => this.spawnFireball() });
    this.meteorEvent = this.time.addEvent({ delay: meteorDelay, loop: true, callback: () => this.spawnMeteor() });

    // Boss attacks only after player enters zone 3
    this.bossActive = false;

    // Astronaut starts at top
    this.astronaut = createAstronaut(this, W * 0.5, H * 0.08, STATE.avatar);
    this.astronaut.setScale(1.5);
    this.astronaut.setDepth(50);
    this.astroVx = 0; this.astroVy = 0;

    // Joystick
    this.joystick = new VirtualJoystick(this);
    this.tweens.timeScale = isKidMode() ? 0.6 : 1;

    // Health — moved DOWN to avoid title bar overlap
    this.health = isKidMode() ? 6 : 4;
    this.healthIcons = [];
    for (let i = 0; i < 4; i++) {
      const heart = this.add.text(16 + i * 22, 64, "❤️", { fontSize: 18 }).setDepth(801);
      this.healthIcons.push(heart);
    }

    this.collected = 0;
    this.currentZone = 1;
    this.gameEnded = false;

    if (this.cfg && this.cfg.mode === 'volcanoRun') {
      showEliteBanner(this, 'VOLCANO RUN');
      // Lava geysers — burst from floor periodically
      this.eliteGeysers = [];
      this.geyserEvent = this.time.addEvent({
        delay: 1700, loop: true,
        callback: () => {
          if (this.gameEnded) return;
          const W = this.W, H = this.H;
          const gx = 60 + Math.random() * (W - 120);
          const warning = this.add.circle(gx, H - 30, 8, 0xFFE060, 0.7);
          this.tweens.add({ targets: warning, scale: 2, alpha: 0, duration: 600, onComplete: () => warning.destroy() });
          this.time.delayedCall(700, () => {
            if (this.gameEnded) return;
            const burst = this.add.rectangle(gx, H - 30, 30, 200, 0xFF6020, 0.85).setOrigin(0.5, 1);
            burst.setStrokeStyle(2, 0xFFE060);
            burst.collisionRadius = 18;
            burst.collisionTop = H - 30 - 200;
            this.eliteGeysers.push(burst);
            this.tweens.add({ targets: burst, alpha: 0, duration: 1500, onComplete: () => {
              burst.destroy();
              this.eliteGeysers = this.eliteGeysers.filter(b => b !== burst);
            }});
          });
        }
      });
    } else if (this.cfg && this.cfg.mode === 'twinBoss') {
      showEliteBanner(this, 'TWIN BOSS');
      // Spawn a SECOND boss magmite at offset position. The base scene already has one.
      this.time.delayedCall(1500, () => {
        if (this.gameEnded) return;
        const W = this.W, H = this.H;
        const boss2 = createBossMagmite(this, W * 0.7, H * 0.7);
        boss2.setDepth(40);
        boss2.collisionRadius = 26;
        boss2.hp = 4;
        this.eliteBoss2 = boss2;
        // Patrol motion
        this.tweens.add({ targets: boss2, x: W * 0.3, duration: 4000, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });
      });
    }

    // Banner + objective
    showZoneBanner(this, 1, "Upper Caves", 0xFFE060);
    showObjective(this, "Collect 3 crystals — dodge fireballs!");
  }

  spawnFireball() {
    if (this.gameEnded) return;
    const W = this.W, H = this.H;
    const x = Math.random() * W;
    const fb = this.add.container(x, -20);
    const core = this.add.circle(0, 0, 8, 0xFFE060);
    const flame = this.add.circle(0, -2, 5, 0xFF4020);
    fb.add([core, flame]);
    fb.collisionRadius = 12;
    this.fireballs.push(fb);
    this.tweens.add({ targets: core, scale: { from: 0.85, to: 1.15 }, duration: 200, yoyo: true, repeat: -1 });
    fb.fallTween = this.tweens.add({
      targets: fb, y: H + 40, duration: 2400 + Math.random() * 800,
      onComplete: () => { fb.destroy(); this.fireballs = this.fireballs.filter(f => f !== fb); },
    });
  }

  spawnMeteor() {
    if (this.gameEnded) return;
    const W = this.W, H = this.H;
    const x = 40 + Math.random() * (W - 80);
    const m = createRockyMeteor(this, x, -30, 18 + Math.random() * 6);
    this.meteors.push(m);
    m.fallTween = this.tweens.add({
      targets: m, y: H + 50, duration: 3200 + Math.random() * 800, ease: "Quad.easeIn",
      onComplete: () => { m.destroy(); this.meteors = this.meteors.filter(f => f !== m); },
    });
  }

  spawnBossFireball() {
    if (this.gameEnded || !this.bossActive) return;
    const W = this.W, H = this.H;
    // Aimed at the player
    const dx = this.astronaut.x - this.boss.x;
    const dy = this.astronaut.y - this.boss.y;
    const dist = Math.hypot(dx, dy);
    const speed = 4;
    const fb = this.add.container(this.boss.x, this.boss.y - 24);
    const core = this.add.circle(0, 0, 9, 0xFFE060);
    const flame = this.add.circle(0, -2, 6, 0xFF2010);
    const trail = this.add.ellipse(0, 8, 8, 14, 0xFF6020, 0.5);
    fb.add([trail, flame, core]);
    fb.setDepth(48);
    fb.vx = (dx / dist) * speed;
    fb.vy = (dy / dist) * speed;
    fb.collisionRadius = 13;
    this.bossFireballs.push(fb);
    this.tweens.add({ targets: core, scale: { from: 0.9, to: 1.2 }, duration: 200, yoyo: true, repeat: -1 });
    // Auto-destroy after 4 seconds
    this.time.delayedCall(4000, () => {
      if (fb.active) { fb.destroy(); this.bossFireballs = this.bossFireballs.filter(f => f !== fb); }
    });
  }

  update() {
    if (this.gameEnded) return;
    if (this._paused) return;

    if (this.eliteGeysers) {
      for (const g of this.eliteGeysers) {
        if (Math.abs(this.astronaut.x - g.x) < g.collisionRadius && this.astronaut.y > g.collisionTop) {
          this.takeHit('Lava geyser!');
        }
      }
    }
    if (this.eliteBoss2) {
      // Second boss attacks like the first
      const d = Phaser.Math.Distance.Between(this.eliteBoss2.x, this.eliteBoss2.y, this.astronaut.x, this.astronaut.y);
      if (d < this.eliteBoss2.collisionRadius + 16) this.takeHit('Twin Boss attack!');
    }
    const W = this.W, H = this.H;

    // Joystick movement
    const accel = 0.6;
    this.astroVx += this.joystick.dx * accel;
    this.astroVy += this.joystick.dy * accel;
    this.astroVx *= 0.88; this.astroVy *= 0.88;
    const sp = Math.hypot(this.astroVx, this.astroVy);
    if (sp > 4) { this.astroVx = (this.astroVx / sp) * 4; this.astroVy = (this.astroVy / sp) * 4; }
    this.astronaut.x += this.astroVx;
    this.astronaut.y += this.astroVy;
    this.astronaut.x = Phaser.Math.Clamp(this.astronaut.x, 24, W - 24);
    this.astronaut.y = Phaser.Math.Clamp(this.astronaut.y, 70, H - 50);

    // Gate logic — block movement between zones
    let newZone = this.astronaut.y < this.zone1Y ? 1 : (this.astronaut.y < this.zone2Y ? 2 : 3);
    if (newZone !== this.currentZone) {
      if (newZone === 2 && !this.gate12.unlocked) {
        this.astronaut.y = this.zone1Y - 8;
        this.astroVy = -2;
        showDangerPrompt(this, "Gate locked! Collect all crystals.");
      } else if (newZone === 3 && !this.gate23.unlocked) {
        this.astronaut.y = this.zone2Y - 8;
        this.astroVy = -2;
        showDangerPrompt(this, "Gate locked! Cross the bridge first.");
      } else {
        this.currentZone = newZone;
        if (newZone === 2 && !this._z2Banner) {
          this._z2Banner = true;
          showZoneBanner(this, 2, "The Lava Bridge", 0xFF8030);
          showObjective(this, "Cross the bridge — grab 2 crystals on the way");
        }
        if (newZone === 3 && !this._z3Banner) {
          this._z3Banner = true;
          showZoneBanner(this, 3, "Boss Arena", 0xFF2010);
          showObjective(this, "BOSS! Collect 3 crystals while it shoots at you");
          this.bossActive = true;
          this.bossFireballEvent = this.time.addEvent({ delay: 1400, loop: true, callback: () => this.spawnBossFireball() });
        }
      }
    }

    // Crystal pickup
    for (const cr of this.crystals) {
      if (cr.collected) continue;
      const d = Phaser.Math.Distance.Between(this.astronaut.x, this.astronaut.y, cr.x, cr.y);
      if (d < 30) this.collectCrystal(cr);
    }

    // Falling fireball collisions
    for (const fb of this.fireballs) {
      const d = Phaser.Math.Distance.Between(this.astronaut.x, this.astronaut.y, fb.x, fb.y);
      if (d < 24) this.takeHit(fb, "Fireball burned you!");
    }

    // Falling meteor collisions
    for (const m of this.meteors) {
      const d = Phaser.Math.Distance.Between(this.astronaut.x, this.astronaut.y, m.x, m.y);
      if (d < m.collisionRadius + 14) this.takeHit(m, "Meteor strike!");
    }

    // Boss fireballs — moving aimed projectiles
    for (const fb of this.bossFireballs) {
      fb.x += fb.vx;
      fb.y += fb.vy;
      const d = Phaser.Math.Distance.Between(this.astronaut.x, this.astronaut.y, fb.x, fb.y);
      if (d < fb.collisionRadius + 12) this.takeHit(fb, "Boss fireball hit!");
      // Out of bounds cleanup
      if (fb.x < -30 || fb.x > W + 30 || fb.y < -30 || fb.y > H + 30) {
        fb.destroy();
        this.bossFireballs = this.bossFireballs.filter(f => f !== fb);
      }
    }

    // Exit portal — touch when unlocked to complete level
    if (this.exitPortal && this.exitPortal.unlocked) {
      const dEx = Phaser.Math.Distance.Between(this.exitPortal.x, this.exitPortal.y, this.astronaut.x, this.astronaut.y);
      if (dEx < this.exitPortal.collisionRadius) {
        this.complete();
      }
    }
  }

  collectCrystal(cr) {
    cr.collected = true;
    // Random Magmite encouragement (occasional — 1 in 3)
    if (Math.random() < 0.4) {
      showSpeechBubble(this, cr.x, cr.y, getAlienGreeting("magmite"), 0xFFA830);
    }
    Audio.pickup();
    this.tweens.add({ targets: cr, y: cr.y - 30, alpha: 0, scale: 1.5, duration: 400, onComplete: () => cr.destroy() });
    this.collected++;
    if (cr.y < this.zone1Y) this.zone1Got++;
    else if (cr.y < this.zone2Y) this.zone2Got++;
    else this.zone3Got++;
    STATE.xp += 20;
    STATE.magmiteCrystalsCollected++;
    checkLevelUp();
    saveGame(STATE);
    this.scoreText.setText(`💎 ${this.collected}/${this.totalCrystals || 8}`);
    updateGoalBanner(this, this.collected);

    // Gate unlocks
    if (this.zone1Got >= this.zone1Total && !this.gate12.unlocked) {
      this.gate12.unlock();
      showObjective(this, "Caves cleared! Drop down to the bridge ↓");
    }
    if (this.zone2Got >= this.zone2Total && !this.gate23.unlocked) {
      this.gate23.unlock();
      showObjective(this, "Bridge done! Descend to the boss ↓");
    }
    if (this.collected >= (this.totalCrystals || 8) && !this.exitPortal.unlocked) {
      this.exitPortal.unlock();
      showObjective(this, "🌟 Boss defeated! Fly to the EXIT portal!");
      this.cameras.main.flash(300, 255, 255, 100);
    }
  }

  takeHit(hazard, message) {
    if (this.invincible) return;
    if (hazard) {
      hazard.fallTween?.stop();
      hazard.destroy();
      this.fireballs = this.fireballs.filter(f => f !== hazard);
      this.meteors = this.meteors.filter(f => f !== hazard);
      this.bossFireballs = this.bossFireballs.filter(f => f !== hazard);
    }
    this.health--;
    this.healthIcons[this.health]?.setAlpha(0.2);
    showDangerPrompt(this, message);
    this.cameras.main.shake(180, 0.01);
    this.cameras.main.flash(150, 255, 80, 40);
    this.invincible = true;
    this.tweens.add({ targets: this.astronaut, alpha: { from: 0.3, to: 1 }, duration: 200, yoyo: true, repeat: 3 });
    this.time.delayedCall(isKidMode() ? 1500 : 900, () => this.invincible = false);
    if (this.health <= 0) this.gameOver();
  }

  complete() {
    this.gameEnded = true;
    this.joystick.destroy();
    this.bossFireballEvent?.remove();

    // VOLCANO QUEST mode — separate completion flow that doesn't touch main "Save Earth" progress
    if (this.cfg && this.cfg.volcanoQuestId) {
      const qid = this.cfg.volcanoQuestId;
      if (!Array.isArray(STATE.volcanoCompleted)) STATE.volcanoCompleted = [];
      const isNew = !STATE.volcanoCompleted.includes(qid);
      if (isNew) {
        STATE.volcanoCompleted.push(qid);
        // Volcano Quest pays Star Coins for decoration shop, no Earth habitability
        STATE.starCoins = (STATE.starCoins || 0) + 8;
        Audio.victory();
        saveGame(STATE);
      }
      const W = this.W, H = this.H;
      this.add.rectangle(W / 2, H / 2, W, H, 0x000000, 0.8).setDepth(900);
      const card = this.add.container(W / 2, H / 2).setDepth(901);
      const cardBg = this.add.rectangle(0, 0, Math.min(W - 40, 320), 240, 0x402010).setStrokeStyle(3, 0xFF8030);
      const icon = this.add.text(0, -80, "🌋", { fontSize: 44 }).setOrigin(0.5);
      const titles = { 1: "Hot Tunnels Cleared!", 2: "Lava Bridge Conquered!", 3: "Magmite Village Saved!" };
      const subs = {
        1: "The first cave is clear of danger!",
        2: "You crossed the lava bridge!",
        3: "The volcano has calmed. The Magmites cheer!",
      };
      const title = this.add.text(0, -34, titles[qid] || "Volcano Quest Done!", {
        fontFamily: "system-ui", fontSize: 22, fontStyle: "bold", color: "#FFE060", align: "center", wordWrap: { width: 280 },
      }).setOrigin(0.5);
      const sub = this.add.text(0, -2, subs[qid] || "Well done!", {
        fontFamily: "system-ui", fontSize: 15, color: "#FFFFFF", align: "center", wordWrap: { width: 280 },
      }).setOrigin(0.5);
      if (isNew) {
        const coinReward = this.add.text(0, 24, "⭐ +8 Star Coins", {
          fontFamily: "system-ui", fontSize: 17, fontStyle: "bold", color: "#FFE060",
        }).setOrigin(0.5);
        card.add(coinReward);
      }
      const back = this.add.rectangle(0, 76, 200, 38, 0x5DBE9A).setStrokeStyle(2, 0x3E8E6C).setInteractive({ useHandCursor: true });
      const backTxt = this.add.text(0, 76, "🌋 Back to Volcano Quest", {
        fontFamily: "system-ui", fontSize: 16, fontStyle: "bold", color: "#FFFFFF",
      }).setOrigin(0.5);
      back.on("pointerdown", () => { Audio.click(); this.scene.start("VolcanoQuestScene"); });
      card.add([cardBg, icon, title, sub, back, backTxt]);
      card.setScale(0);
      this.tweens.add({ targets: card, scale: 1, duration: 400, ease: "Back.easeOut" });
      return; // Stop — do not run normal Save Earth completion
    }

    if (!STATE.planetsVisited.includes("pyros")) {
      STATE.planetsVisited.push("pyros");
      STATE.xp += 100;
      checkLevelUp();
      saveGame(STATE);
    }
    const reward4 = awardLevel(this.levelNum || 4, this);
    const totalPoints = reward4.newPoints;
    const newAlien = reward4.newAlien;
    saveGame(STATE);

    // Use the unified mission result screen
    showMissionResult(this, {
      passed: true,
      levelNum: this.levelNum || 4,
      passSubtitle: newAlien ? `✨ ${ALIENS[newAlien].name} joined your crew!` : "Pyros conquered!",
      rewards: {
        xp: 100,
        habitability: totalPoints,
      },
    });
  }

  gameOver() {
    if (this.gameEnded) return;
    this.gameEnded = true;
    this.joystick.destroy();
    if (this.iceSpawnEvent) this.iceSpawnEvent.remove();
    if (this.avalancheTimer) this.avalancheTimer.remove();
    if (this.bossAttackEvent) this.bossAttackEvent.remove();
    if (this.flareEvent) this.flareEvent.remove();
    showMissionResult(this, {
      passed: false,
      levelNum: this.levelNum || 4,
      failSubtitle: `${this.collected}/${this.totalCrystals || 8} crystals collected. Pyros doesn't go easy!`,
    });
  }

  exit() { this.joystick?.destroy(); this.bossFireballEvent?.remove(); this.scene.start("LevelSelectScene"); }
}

// ══════════════════════════════════════════════════════════════════
// GLACIUS — Levels 6 & 7: Frozen Caves + Avalanche Run
// ══════════════════════════════════════════════════════════════════
class GlaciusScene extends Phaser.Scene {
  constructor() { super("GlaciusScene"); }
  init(data) { this.levelNum = data?.levelNum || 6; this.startZone = data?.startZone || 1; this.cfg = data?.cfg || null; }
  create() {
    const W = this.scale.width, H = this.scale.height;
    this.W = W; this.H = H;
    this.mobile = isMobile();

    // Frozen aurora gradient — pale blue/white to deep teal
    const bg = this.add.graphics();
    if (this.levelNum === 7) {
      // Avalanche - more intense, danger feel
      bg.fillGradientStyle(0x4060A0, 0x4060A0, 0x80B0E0, 0xE0F0FF);
    } else {
      // Frozen Caves - dreamy, deep
      bg.fillGradientStyle(0x90D0F0, 0xA0D0F0, 0x3070A0, 0x103060);
    }
    bg.fillRect(0, 0, W, H);

    // Far back: distant mountain range silhouette
    const farMountains = this.add.graphics();
    farMountains.fillStyle(0x6090C0, 0.5);
    let mx = -20;
    while (mx < W + 40) {
      const mh = 40 + Math.random() * 30;
      farMountains.fillTriangle(mx, H * 0.45, mx + 25, H * 0.45 - mh, mx + 50, H * 0.45);
      mx += 35;
    }

    // Mid layer: closer ice peaks
    const midMountains = this.add.graphics();
    midMountains.fillStyle(0xC0E0FF, 0.55);
    let mmx = 0;
    while (mmx < W + 60) {
      const mmh = 60 + Math.random() * 30;
      midMountains.fillTriangle(mmx, H * 0.55, mmx + 30, H * 0.55 - mmh, mmx + 60, H * 0.55);
      mmx += 50;
    }

    // Aurora ribbons — multi-color (cyan, magenta, green) shifting bands
    const auroraColors = [0x80FFE0, 0xE0A0FF, 0x80FFA0, 0x80E0FF];
    for (let i = 0; i < 6; i++) {
      const x = Math.random() * W;
      const y = 60 + Math.random() * (H * 0.35);
      const c = auroraColors[i % auroraColors.length];
      const aurora = this.add.ellipse(x, y, 120 + Math.random() * 80, 16 + Math.random() * 12, c, 0.18);
      aurora.setRotation((Math.random() - 0.5) * 0.6);
      this.tweens.add({ targets: aurora, alpha: { from: 0.08, to: 0.32 }, duration: 3000 + Math.random() * 2000, yoyo: true, repeat: -1 });
      this.tweens.add({ targets: aurora, x: x + 40, duration: 6000, yoyo: true, repeat: -1, ease: "Sine.easeInOut" });
      this.tweens.add({ targets: aurora, scaleY: { from: 0.7, to: 1.3 }, duration: 4000, yoyo: true, repeat: -1 });
    }

    // Falling snowflakes (background, decorative)
    for (let i = 0; i < 35; i++) {
      const f = createSnowflake(this, Math.random() * W, Math.random() * H);
      f.setDepth(2);
      this.tweens.add({ targets: f, y: H + 20, duration: 8000 + Math.random() * 6000, repeat: -1, delay: Math.random() * 5000 });
      this.tweens.add({ targets: f, x: f.x + (Math.random() - 0.5) * 40, duration: 4000, yoyo: true, repeat: -1, ease: "Sine.easeInOut" });
    }

    // Tiny twinkling frost crystals scattered everywhere
    for (let i = 0; i < 25; i++) {
      const x = Math.random() * W, y = Math.random() * H;
      const sparkle = this.add.text(x, y, "✦", { fontSize: 12 + Math.random() * 4, color: "#FFFFFF" }).setOrigin(0.5).setAlpha(0.4);
      this.tweens.add({ targets: sparkle, alpha: { from: 0.2, to: 0.9 }, duration: 800 + Math.random() * 1500, yoyo: true, repeat: -1 });
    }

    // Front: ice mountains silhouettes (closer, bigger)
    for (let i = 0; i < 5; i++) {
      const x = (i / 4) * W;
      this.add.polygon(x, H - 20, [-30, 0, -10, -50, 5, -30, 20, -60, 35, -28, 25, 0], 0xFFFFFF, 0.85);
    }
    // Embedded ice crystals on the floor
    for (let i = 0; i < 8; i++) {
      const x = Math.random() * W;
      const cr = this.add.polygon(x, H - 10, [0, -8, 4, -3, 3, 4, -3, 4, -4, -3], 0xC0F0FF, 0.7).setStrokeStyle(0.5, 0x6090B0);
    }

    // Title bar
    this.add.rectangle(0, 0, W, 56, 0x000000, 0.6).setOrigin(0, 0).setDepth(800);
    createBackButton(this, "← levels", () => this.exit());
    createPauseButton(this, () => showPauseMenu(this, { world: "ice" }));
    Audio.startMusic("ice");

    this.events.once("shutdown", () => { Audio.stopMusic(); this.geyserEvent?.remove(); this.iceTitanEvent?.remove(); });
    this.add.text(W / 2, 22, "GLACIUS", {
      fontFamily: "system-ui", fontSize: 20, fontStyle: "bold", color: "#A0E0FF", letterSpacing: 2,
    }).setOrigin(0.5).setDepth(801);

    if (this.levelNum === 7) {
      this.setupAvalancheRun();
    } else {
      this.setupFrozenCaves();
    }

    // Astronaut + joystick
    this.astronaut = createAstronaut(this, W * 0.5, H * 0.18, STATE.avatar);
    this.astronaut.setScale(1.5);
    this.astronaut.setDepth(50);
    this.astroVx = 0; this.astroVy = 0;
    this.joystick = new VirtualJoystick(this);
    this.tweens.timeScale = isKidMode() ? 0.6 : 1;

    this.gameEnded = false;

    if (this.cfg && this.cfg.mode === 'blizzardCaves') {
      applyEliteFog(this, 0.45);
      showEliteBanner(this, 'BLIZZARD CAVES');
    } else if (this.cfg && this.cfg.mode === 'iceBoss') {
      showEliteBanner(this, 'ICE TITAN');
      // A giant ice boss appears in the center
      this.time.delayedCall(1200, () => {
        if (this.gameEnded) return;
        const W = this.W, H = this.H;
        const titanContainer = this.add.container(W * 0.5, H * 0.45).setDepth(40);
        const titanBody = this.add.circle(0, 0, 36, 0xC0F0FF).setStrokeStyle(2.5, 0x4080A0);
        const titanInner = this.add.circle(0, 0, 22, 0xFFFFFF, 0.8);
        const eyeL = this.add.circle(-10, -4, 4, 0x102030);
        const eyeR = this.add.circle(10, -4, 4, 0x102030);
        const mouth = this.add.line(0, 0, -8, 12, 8, 12, 0x102030).setLineWidth(2);
        titanContainer.add([titanBody, titanInner, eyeL, eyeR, mouth]);
        titanContainer.collisionRadius = 38;
        titanContainer.hp = 4;
        this.eliteIceTitan = titanContainer;
        this.tweens.add({ targets: titanContainer, x: W * 0.7, duration: 3500, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });
        // Shockwave attack every 2.5s
        this.iceTitanEvent = this.time.addEvent({
          delay: 2500, loop: true,
          callback: () => {
            if (this.gameEnded || !titanContainer.scene) return;
            const wave = this.add.circle(titanContainer.x, titanContainer.y, 10, 0x80E0FF, 0.5).setStrokeStyle(3, 0xFFFFFF, 0.9).setDepth(39);
            this.tweens.add({ targets: wave, scale: 12, alpha: 0, duration: 1100, onComplete: () => wave.destroy() });
            wave.expandRadius = 0;
            wave.expandStart = this.time.now;
            wave.shockwave = true;
            if (!this.shockwaves) this.shockwaves = [];
            this.shockwaves.push(wave);
            this.time.delayedCall(1100, () => {
              this.shockwaves = (this.shockwaves || []).filter(w => w !== wave);
            });
          }
        });
      });
    }
  }

  // ── LEVEL 6: FROZEN CAVES ── slippery ice physics + ice shard hazards
  setupFrozenCaves() {
    const W = this.W, H = this.H;
    this.scoreText = this.add.text(W - 12, 28, "❄️ 0/5", {
      fontFamily: "system-ui", fontSize: 14, fontStyle: "bold", color: "#A0E0FF",
    }).setOrigin(1, 0.5).setDepth(801).setAlpha(0.7);
    setupGoalBanner(this, { icon: "❄️", label: "Free frosties from ice", total: 5, y: 60 });

    // 5 frosties trapped in ice — at varied positions
    this.frosties = [];
    const spots = [
      { x: W * 0.18, y: H * 0.30 },
      { x: W * 0.78, y: H * 0.32 },
      { x: W * 0.30, y: H * 0.55 },
      { x: W * 0.70, y: H * 0.58 },
      { x: W * 0.50, y: H * 0.78 },
    ];
    spots.forEach(s => {
      // Ice block prison
      const ice = this.add.rectangle(s.x, s.y, 36, 36, 0xC0E0FF, 0.7).setStrokeStyle(1.5, 0x6090B0);
      const f = createFrostie(this, s.x, s.y);
      this.frosties.push({ frostie: f, ice, x: s.x, y: s.y, rescued: false });
    });

    // Ice shard meteors drifting
    this.iceShards = [];
    for (let i = 0; i < 5; i++) {
      const sx = 60 + Math.random() * (W - 120);
      const sy = 110 + Math.random() * (H - 200);
      const sh = createIceShard(this, sx, sy, 14 + Math.random() * 5);
      sh.vx = (Math.random() - 0.5) * 1.6;
      sh.vy = (Math.random() - 0.5) * 1.6;
      this.iceShards.push(sh);
    }

    // EXIT portal at bottom
    this.exitPortal = createExitPortal(this, W * 0.5, H * 0.95);
    this.exitPortal.setDepth(45);

    // Health
    this.health = isKidMode() ? 5 : 3;
    this.healthIcons = [];
    for (let i = 0; i < 3; i++) {
      const heart = this.add.text(16 + i * 22, 64, "❤️", { fontSize: 18 }).setDepth(801);
      this.healthIcons.push(heart);
    }

    this.rescued = 0;
    this.iceMode = true; // slippery physics flag

    showZoneBanner(this, 6, "Frozen Caves", 0xA0E0FF);
    showObjective(this, "Free 5 Frosties from ice — careful, the ground is slippery!");
  }

  // ── LEVEL 7: AVALANCHE RUN ── vertical scroll, falling ice, time pressure
  setupAvalancheRun() {
    const W = this.W, H = this.H;
    this.scoreText = this.add.text(W - 12, 28, "❄️ 0/4", {
      fontFamily: "system-ui", fontSize: 14, fontStyle: "bold", color: "#A0E0FF",
    }).setOrigin(1, 0.5).setDepth(801).setAlpha(0.7);
    setupGoalBanner(this, { icon: "❄️", label: "Free frosties (avalanche)", total: 4, y: 60 });

    // Avalanche timer (visible bar)
    this.avalancheTime = 60; // seconds
    this.avalancheTimer = this.time.addEvent({
      delay: 1000, loop: true,
      callback: () => {
        if (!this.gameEnded) {
          this.avalancheTime--;
          this.timerText?.setText(`⏱ ${this.avalancheTime}s`);
          if (this.avalancheTime <= 0) {
            this.gameOver("Avalanche caught you!");
          }
        }
      }
    });
    this.timerText = this.add.text(W / 2, 40, `⏱ ${this.avalancheTime}s`, {
      fontFamily: "system-ui", fontSize: 17, fontStyle: "bold", color: "#FFE060",
    }).setOrigin(0.5).setDepth(801);

    // 4 frosties placed along upward path (the player must reach them all)
    this.frosties = [];
    const spots = [
      { x: W * 0.30, y: H * 0.78 },
      { x: W * 0.70, y: H * 0.55 },
      { x: W * 0.25, y: H * 0.35 },
      { x: W * 0.75, y: H * 0.18 },
    ];
    spots.forEach(s => {
      const ice = this.add.rectangle(s.x, s.y, 32, 32, 0xC0E0FF, 0.5).setStrokeStyle(1.5, 0x6090B0);
      const f = createFrostie(this, s.x, s.y);
      this.frosties.push({ frostie: f, ice, x: s.x, y: s.y, rescued: false });
    });

    // Avalanche front (red line moving downward — visual threat)
    this.avalancheFront = this.add.graphics();
    this.avalancheFrontY = H + 80; // starts off-screen, moves UP toward player
    this.tweens.add({
      targets: this, avalancheFrontY: H * 0.05,
      duration: this.avalancheTime * 1000, ease: "Linear",
    });

    // Falling ice from top (continuous) — speeds up + spawns more frequently for higher levels
    this.fallingIce = [];
    const glaciusLvl = this.levelNum || 7;
    const glaciusTier = Math.max(0, glaciusLvl - 7); // 0 for L7, 14 for L21
    const iceDelay = isKidMode() ? Math.max(550, 900 - glaciusTier * 30) : Math.max(380, 750 - glaciusTier * 35);
    const iceSpeedBase = 1.8 + glaciusTier * 0.12;
    this.iceSpawnEvent = this.time.addEvent({
      delay: iceDelay, loop: true,
      callback: () => {
        if (this.gameEnded) return;
        const x = 30 + Math.random() * (W - 60);
        const sh = createIceShard(this, x, -20, 12 + Math.random() * 6);
        sh.vy = iceSpeedBase + Math.random() * 1.2;
        this.fallingIce.push(sh);
      }
    });

    // EXIT portal at TOP (player must climb up to escape)
    this.exitPortal = createExitPortal(this, W * 0.5, 90);
    this.exitPortal.setDepth(45);

    // Health (4 in this harder level)
    this.health = isKidMode() ? 6 : 4;
    this.healthIcons = [];
    for (let i = 0; i < 4; i++) {
      const heart = this.add.text(16 + i * 22, 64, "❤️", { fontSize: 18 }).setDepth(801);
      this.healthIcons.push(heart);
    }

    this.rescued = 0;

    showZoneBanner(this, 7, "Avalanche Run", 0xFF8030);
    showObjective(this, "Climb UP — rescue 4 Frosties before the avalanche reaches you!");
  }

  update() {
    if (this.gameEnded) return;
    if (this._paused) return;

    if (this.eliteIceTitan) {
      const d = Phaser.Math.Distance.Between(this.eliteIceTitan.x, this.eliteIceTitan.y, this.astronaut.x, this.astronaut.y);
      if (d < this.eliteIceTitan.collisionRadius + 14) this.takeHit('Ice Titan!');
    }
    if (this.shockwaves) {
      for (const wave of this.shockwaves) {
        const elapsed = this.time.now - wave.expandStart;
        const radius = (elapsed / 1100) * 12 * 10;
        const d = Phaser.Math.Distance.Between(wave.x, wave.y, this.astronaut.x, this.astronaut.y);
        if (Math.abs(d - radius) < 16 && elapsed < 1000) {
          this.takeHit('Shockwave!');
        }
      }
    }
    const W = this.W, H = this.H;

    // Slippery ice physics on level 6 — much less damping (slides longer)
    const accel = this.iceMode ? 0.32 : 0.6;
    const damping = this.iceMode ? 0.97 : 0.88;
    const maxSpeed = this.iceMode ? 4.2 : 4;

    this.astroVx += this.joystick.dx * accel;
    this.astroVy += this.joystick.dy * accel;
    this.astroVx *= damping; this.astroVy *= damping;
    const sp = Math.hypot(this.astroVx, this.astroVy);
    if (sp > maxSpeed) { this.astroVx = (this.astroVx / sp) * maxSpeed; this.astroVy = (this.astroVy / sp) * maxSpeed; }
    this.astronaut.x += this.astroVx;
    this.astronaut.y += this.astroVy;
    this.astronaut.x = Phaser.Math.Clamp(this.astronaut.x, 24, W - 24);
    this.astronaut.y = Phaser.Math.Clamp(this.astronaut.y, 70, H - 24);

    // Frostie rescue
    for (const f of this.frosties) {
      if (f.rescued) continue;
      const d = Phaser.Math.Distance.Between(this.astronaut.x, this.astronaut.y, f.x, f.y);
      if (d < 36) this.rescueFrostie(f);
    }

    // Ice shard hazards
    if (this.iceShards) {
      for (const s of this.iceShards) {
        s.x += s.vx;
        s.y += s.vy;
        if (s.x < 30 || s.x > W - 30) s.vx *= -1;
        if (s.y < 80 || s.y > H - 30) s.vy *= -1;
        const d = Phaser.Math.Distance.Between(s.x, s.y, this.astronaut.x, this.astronaut.y);
        if (d < s.collisionRadius + 14) this.takeHit("Ice shard hit!");
      }
    }

    // Falling ice on avalanche level
    if (this.fallingIce) {
      for (const ice of this.fallingIce) {
        ice.y += ice.vy;
        const d = Phaser.Math.Distance.Between(ice.x, ice.y, this.astronaut.x, this.astronaut.y);
        if (d < ice.collisionRadius + 14) {
          this.takeHit("Ice falling!");
          ice.destroy();
          this.fallingIce = this.fallingIce.filter(i => i !== ice);
          continue;
        }
        if (ice.y > H + 30) {
          ice.destroy();
          this.fallingIce = this.fallingIce.filter(i => i !== ice);
        }
      }
    }

    // Avalanche front rendering (level 7)
    if (this.levelNum === 7 && this.avalancheFront) {
      this.avalancheFront.clear();
      const fy = this.avalancheFrontY;
      // Big white wall coming from below with chunks
      this.avalancheFront.fillStyle(0xFFFFFF, 0.85);
      this.avalancheFront.fillRect(0, fy, W, H - fy);
      this.avalancheFront.lineStyle(3, 0xC0E0FF, 1);
      this.avalancheFront.lineBetween(0, fy, W, fy);
      // Chunks on the front
      for (let i = 0; i < 8; i++) {
        const cx = (i / 7) * W;
        this.avalancheFront.fillCircle(cx, fy, 8 + Math.random() * 6);
      }
      // Game over if avalanche catches astronaut
      if (this.astronaut.y > fy - 20) {
        this.gameOver("Avalanche caught you!");
      }
    }

    // Exit portal collision
    if (this.exitPortal && this.exitPortal.unlocked) {
      const d = Phaser.Math.Distance.Between(this.exitPortal.x, this.exitPortal.y, this.astronaut.x, this.astronaut.y);
      if (d < this.exitPortal.collisionRadius) this.complete();
    }
  }

  rescueFrostie(f) {
    f.rescued = true;
    f.ice.destroy();
    showSpeechBubble(this, f.x, f.y, getAlienGreeting("frostie"), 0xA0E0FF);
    Audio.rescue();
    trackDailyProgress(this, "rescue");
    this.tweens.add({ targets: f.frostie, scale: 0.5, alpha: 0.7, duration: 400 });
    this.tweens.add({ targets: f.frostie, x: this.astronaut.x - 30 + Math.random() * 60, y: this.astronaut.y + 20, duration: 500 });
    for (let i = 0; i < 8; i++) {
      const angle = Math.random() * Math.PI * 2;
      const sp = this.add.circle(f.x, f.y, 2, 0xFFFFFF);
      this.tweens.add({ targets: sp, x: f.x + Math.cos(angle) * 30, y: f.y + Math.sin(angle) * 30, alpha: 0, duration: 500, onComplete: () => sp.destroy() });
    }
    this.rescued++;
    STATE.xp += 25;
    saveGame(STATE);
    const target = this.levelNum === 7 ? 4 : 5;
    this.scoreText.setText(`❄️ ${this.rescued}/${target}`);
    updateGoalBanner(this, this.rescued);

    if (this.rescued >= target && !this.exitPortal.unlocked) {
      this.exitPortal.unlock();
      const dir = this.levelNum === 7 ? "UP" : "DOWN";
      showObjective(this, `🌟 All Frosties saved! Reach the EXIT ${dir === "UP" ? "↑" : "↓"}!`);
      this.cameras.main.flash(300, 200, 240, 255);
    }
  }

  takeHit(message) {
    if (this.invincible) return;
    this.invincible = true;
    this.health--;
    this.healthIcons[this.health]?.setAlpha(0.2);
    showDangerPrompt(this, message);
    this.cameras.main.shake(150, 0.008);
    this.cameras.main.flash(150, 200, 240, 255);
    this.tweens.add({ targets: this.astronaut, alpha: { from: 0.3, to: 1 }, duration: 200, yoyo: true, repeat: 3 });
    this.time.delayedCall(isKidMode() ? 1500 : 900, () => this.invincible = false);
    if (this.health <= 0) this.gameOver();
  }

  complete() {
    this.gameEnded = true;
    this.joystick.destroy();
    this.iceSpawnEvent?.remove();
    this.avalancheTimer?.remove();

    const reward = awardLevel(this.levelNum, this);
    saveGame(STATE);

    showMissionResult(this, {
      passed: true,
      levelNum: this.levelNum,
      passSubtitle: reward.newAlien ? `✨ ${ALIENS[reward.newAlien].name} joined your crew!` : "Glacius cleared!",
      rewards: { xp: 50, habitability: reward.newPoints },
    });
  }

  gameOver(msg) {
    if (this.gameEnded) return;
    this.gameEnded = true;
    this.joystick.destroy();
    if (this.iceSpawnEvent) this.iceSpawnEvent.remove();
    if (this.avalancheTimer) this.avalancheTimer.remove();
    if (this.bossAttackEvent) this.bossAttackEvent.remove();
    if (this.flareEvent) this.flareEvent.remove();
    showMissionResult(this, {
      passed: false,
      levelNum: this.levelNum,
      failSubtitle: `${this.rescued || 0} Frosties saved. ${msg || "The cold is unforgiving!"}`,
    });
  }

  exit() {
    this.joystick?.destroy();
    this.iceSpawnEvent?.remove();
    this.avalancheTimer?.remove();
    this.scene.start("LevelSelectScene");
  }
}

// ══════════════════════════════════════════════════════════════════
// VERDANIA — Levels 8 & 9: Jungle Maze + Predator Hunt
// ══════════════════════════════════════════════════════════════════
class VerdaniaScene extends Phaser.Scene {
  constructor() { super("VerdaniaScene"); }
  init(data) { this.levelNum = data?.levelNum || 8; this.startZone = data?.startZone || 1; this.cfg = data?.cfg || null; }
  create() {
    const W = this.scale.width, H = this.scale.height;
    this.W = W; this.H = H;
    this.mobile = isMobile();

    // Lush jungle gradient
    const bg = this.add.graphics();
    if (this.levelNum === 9) {
      // Predator Hunt - darker, ominous (deep emerald to near-black)
      bg.fillGradientStyle(0x0E2818, 0x0E2818, 0x051810, 0x000604);
    } else {
      // Jungle Maze - vibrant emerald to forest green
      bg.fillGradientStyle(0x387048, 0x305030, 0x153A1A, 0x051808);
    }
    bg.fillRect(0, 0, W, H);

    // Top canopy layer — overhanging leaves silhouette across the top
    const canopy = this.add.graphics();
    canopy.fillStyle(0x102818, 0.65);
    canopy.fillRect(0, 0, W, 60);
    // Hanging leaf clusters
    for (let i = 0; i < 12; i++) {
      const lx = (i / 11) * W;
      const ly = 50 + Math.random() * 30;
      canopy.fillEllipse(lx, ly, 22, 14);
    }

    // Hanging vines (vertical lines from top with leaves)
    for (let i = 0; i < 6; i++) {
      const x = (i / 5) * W + (Math.random() - 0.5) * 30;
      const len = 80 + Math.random() * 100;
      const vine = this.add.line(0, 0, x, 50, x + (Math.random() - 0.5) * 8, 50 + len, 0x3A6A30, 0.5).setLineWidth(1.5);
      vine.setDepth(3);
      // Tiny leaves along vine
      for (let j = 0; j < 4; j++) {
        const ly = 60 + (j / 3) * len;
        const leaf = this.add.ellipse(x + (Math.random() - 0.5) * 6, ly, 6, 3, 0x80C880, 0.7);
        leaf.setRotation(Math.random() * Math.PI);
        leaf.setDepth(3);
      }
      this.tweens.add({ targets: vine, x: 4, duration: 3000 + Math.random() * 1500, yoyo: true, repeat: -1, ease: "Sine.easeInOut" });
    }

    // Background palm fronds (decoration)
    for (let i = 0; i < 10; i++) {
      const x = Math.random() * W, y = 70 + Math.random() * H * 0.5;
      const frond = this.add.ellipse(x, y, 60, 12, 0x3A6A30, 0.5);
      frond.setRotation(Math.random() * Math.PI);
      this.tweens.add({ targets: frond, angle: frond.angle + 8, duration: 2500 + Math.random() * 1500, yoyo: true, repeat: -1, ease: "Sine.easeInOut" });
    }

    // Glowing fireflies (especially atmospheric on level 9 dark version)
    const fireflyCount = this.levelNum === 9 ? 18 : 10;
    for (let i = 0; i < fireflyCount; i++) {
      const f = this.add.circle(Math.random() * W, Math.random() * H, 2, 0xFFFF80, 0.9);
      const glow = this.add.circle(f.x, f.y, 5, 0xFFFF80, 0.3);
      this.tweens.add({ targets: [f, glow], alpha: { from: 0.2, to: 0.95 }, duration: 800 + Math.random() * 1500, yoyo: true, repeat: -1 });
      const moveX = f.x + (Math.random() - 0.5) * 80;
      const moveY = f.y + (Math.random() - 0.5) * 60;
      this.tweens.add({ targets: f, x: moveX, y: moveY, duration: 5000 + Math.random() * 3000, yoyo: true, repeat: -1, ease: "Sine.easeInOut" });
      this.tweens.add({ targets: glow, x: moveX, y: moveY, duration: 5000 + Math.random() * 3000, yoyo: true, repeat: -1, ease: "Sine.easeInOut" });
    }

    // Pollen particles drifting up
    for (let i = 0; i < 30; i++) {
      const p = this.add.circle(Math.random() * W, Math.random() * H, 1 + Math.random() * 1.5, 0xC0FF80, 0.6);
      this.tweens.add({ targets: p, y: p.y - 30 - Math.random() * 60, duration: 8000 + Math.random() * 4000, repeat: -1, yoyo: true });
      this.tweens.add({ targets: p, alpha: { from: 0.3, to: 0.8 }, duration: 1500 + Math.random() * 1000, yoyo: true, repeat: -1 });
    }

    // Mossy ground at bottom
    const moss = this.add.graphics();
    moss.fillStyle(0x4A7035, 0.6);
    moss.fillRect(0, H - 30, W, 30);
    // Mushroom clusters
    for (let i = 0; i < 6; i++) {
      const mx = (i / 5) * W + (Math.random() - 0.5) * 30;
      const cap = this.add.ellipse(mx, H - 22, 8, 5, 0xFF6080).setStrokeStyle(0.5, 0x402030);
      const stem = this.add.rectangle(mx, H - 17, 2, 6, 0xFFFFFF);
      const dot = this.add.circle(mx + 2, H - 23, 1, 0xFFFFFF);
    }

    // Title bar
    this.add.rectangle(0, 0, W, 56, 0x000000, 0.6).setOrigin(0, 0).setDepth(800);
    createBackButton(this, "← levels", () => this.exit());
    createPauseButton(this, () => showPauseMenu(this, { world: "jungle" }));
    Audio.startMusic("jungle");

    this.events.once("shutdown", () => { Audio.stopMusic(); this.geyserEvent?.remove(); this.iceTitanEvent?.remove(); });
    this.add.text(W / 2, 22, "VERDANIA", {
      fontFamily: "system-ui", fontSize: 20, fontStyle: "bold", color: "#5DBE9A", letterSpacing: 2,
    }).setOrigin(0.5).setDepth(801);

    if (this.levelNum === 9) {
      this.setupPredatorHunt();
    } else {
      this.setupJungleMaze();
    }

    // Astronaut + joystick
    this.astronaut = createAstronaut(this, W * 0.5, H * 0.18, STATE.avatar);
    this.astronaut.setScale(1.5);
    this.astronaut.setDepth(50);
    this.astroVx = 0; this.astroVy = 0;
    this.joystick = new VirtualJoystick(this);
    this.tweens.timeScale = isKidMode() ? 0.6 : 1;

    this.gameEnded = false;

    if (this.cfg && this.cfg.mode === 'carnivoreGarden') {
      showEliteBanner(this, 'CARNIVORE GARDEN');
      // Add 3 more carnivore plants and speed up the predator if present
      this.time.delayedCall(800, () => {
        if (this.gameEnded) return;
        const W = this.W, H = this.H;
        if (!this.plants) this.plants = [];
        for (let i = 0; i < 3; i++) {
          const x = 80 + Math.random() * (W - 160);
          const y = 130 + Math.random() * (H - 260);
          const p = createCarnivorePlant(this, x, y);
          p.setDepth(20);
          this.plants.push(p);
        }
        if (this.predatorSpeed) this.predatorSpeed = 1.9;
      });
    } else if (this.cfg && this.cfg.mode === 'twinPredators') {
      showEliteBanner(this, 'TWIN PREDATORS');
      // Spawn a second predator (the base scene only has one in level 9)
      this.time.delayedCall(1500, () => {
        if (this.gameEnded) return;
        const W = this.W, H = this.H;
        const pred2 = createPredator(this, W * 0.2, H * 0.7);
        pred2.setDepth(40);
        this.elitePredator2 = pred2;
        this.elitePred2Vx = 0; this.elitePred2Vy = 0;
        if (this.predatorSpeed) this.predatorSpeed = 1.6;
      });
    }
  }

  // ── LEVEL 8: JUNGLE MAZE ── vine walls block paths, hidden carnivore plants
  setupJungleMaze() {
    const W = this.W, H = this.H;
    this.scoreText = this.add.text(W - 12, 28, "🌱 0/5", {
      fontFamily: "system-ui", fontSize: 14, fontStyle: "bold", color: "#5DBE9A",
    }).setOrigin(1, 0.5).setDepth(801).setAlpha(0.7);
    setupGoalBanner(this, { icon: "🌱", label: "Rescue forest aliens", total: 5, y: 60 });

    // Vine walls forming a maze (rectangles that block player)
    this.vineWalls = [];
    // Horizontal walls at varied heights and offsets
    const walls = [
      { x: W * 0.30, y: H * 0.30, w: W * 0.45, h: 12 },
      { x: W * 0.78, y: H * 0.45, w: W * 0.35, h: 12 },
      { x: W * 0.20, y: H * 0.55, w: W * 0.30, h: 12 },
      { x: W * 0.65, y: H * 0.68, w: W * 0.40, h: 12 },
      { x: W * 0.30, y: H * 0.82, w: W * 0.35, h: 12 },
    ];
    walls.forEach(w => {
      const wall = createVineWall(this, w.x, w.y, w.w, w.h);
      wall.setDepth(30);
      this.vineWalls.push({ obj: wall, x: w.x, y: w.y, w: w.w, h: w.h });
    });

    // 5 sproutlings tucked between maze walls
    this.sproutlings = [];
    const spots = [
      { x: W * 0.10, y: H * 0.42 },
      { x: W * 0.55, y: H * 0.40 },
      { x: W * 0.88, y: H * 0.62 },
      { x: W * 0.15, y: H * 0.75 },
      { x: W * 0.85, y: H * 0.85 },
    ];
    spots.forEach(s => {
      const sp = createSproutling(this, s.x, s.y);
      this.sproutlings.push({ sproutling: sp, x: s.x, y: s.y, rescued: false });
    });

    // Carnivore plant hazards
    this.plants = [];
    const plantSpots = [
      { x: W * 0.40, y: H * 0.50 },
      { x: W * 0.65, y: H * 0.55 },
      { x: W * 0.45, y: H * 0.78 },
    ];
    plantSpots.forEach(s => {
      const p = createCarnivorePlant(this, s.x, s.y);
      p.setDepth(20);
      this.plants.push(p);
    });

    // Spore clouds (hazards)
    this.spores = [];
    for (let i = 0; i < 3; i++) {
      const sx = 80 + Math.random() * (W - 160);
      const sy = 120 + Math.random() * (H - 240);
      const sp = createSporeCloud(this, sx, sy);
      sp.vx = (Math.random() - 0.5) * 0.8;
      sp.vy = (Math.random() - 0.5) * 0.8;
      sp.setDepth(25);
      this.spores.push(sp);
    }

    // EXIT portal at bottom-right (must navigate maze)
    this.exitPortal = createExitPortal(this, W * 0.5, H * 0.95);
    this.exitPortal.setDepth(45);

    this.health = isKidMode() ? 5 : 3;
    this.healthIcons = [];
    for (let i = 0; i < 3; i++) {
      const heart = this.add.text(16 + i * 22, 64, "❤️", { fontSize: 18 }).setDepth(801);
      this.healthIcons.push(heart);
    }
    this.rescued = 0;

    showZoneBanner(this, 8, "Jungle Maze", 0x5DBE9A);
    showObjective(this, "Find 5 Sproutlings hidden in the vine maze!");
  }

  // ── LEVEL 9: PREDATOR HUNT ── predator chases you with AI
  setupPredatorHunt() {
    const W = this.W, H = this.H;
    this.scoreText = this.add.text(W - 12, 28, "🌱 0/4", {
      fontFamily: "system-ui", fontSize: 14, fontStyle: "bold", color: "#5DBE9A",
    }).setOrigin(1, 0.5).setDepth(801).setAlpha(0.7);
    setupGoalBanner(this, { icon: "🌱", label: "Outrun the predator", total: 4, y: 60 });

    // Few vine walls — partial cover
    this.vineWalls = [];
    const walls = [
      { x: W * 0.25, y: H * 0.40, w: W * 0.30, h: 12 },
      { x: W * 0.75, y: H * 0.55, w: W * 0.30, h: 12 },
      { x: W * 0.50, y: H * 0.75, w: W * 0.40, h: 12 },
    ];
    walls.forEach(w => {
      const wall = createVineWall(this, w.x, w.y, w.w, w.h);
      wall.setDepth(30);
      this.vineWalls.push({ obj: wall, x: w.x, y: w.y, w: w.w, h: w.h });
    });

    // 4 sproutlings (hostages)
    this.sproutlings = [];
    const spots = [
      { x: W * 0.15, y: H * 0.30 },
      { x: W * 0.85, y: H * 0.30 },
      { x: W * 0.20, y: H * 0.85 },
      { x: W * 0.80, y: H * 0.85 },
    ];
    spots.forEach(s => {
      const sp = createSproutling(this, s.x, s.y);
      this.sproutlings.push({ sproutling: sp, x: s.x, y: s.y, rescued: false });
    });

    // THE PREDATOR — chases the player
    this.predator = createPredator(this, W * 0.5, H * 0.5);
    this.predator.setDepth(40);
    this.predatorSpeed = 1.4;
    this.predatorVx = 0; this.predatorVy = 0;

    // Spore clouds
    this.spores = [];
    for (let i = 0; i < 2; i++) {
      const sx = 80 + Math.random() * (W - 160);
      const sy = 120 + Math.random() * (H - 240);
      const sp = createSporeCloud(this, sx, sy);
      sp.vx = (Math.random() - 0.5) * 0.8;
      sp.vy = (Math.random() - 0.5) * 0.8;
      sp.setDepth(25);
      this.spores.push(sp);
    }

    this.exitPortal = createExitPortal(this, W * 0.5, H * 0.93);
    this.exitPortal.setDepth(45);

    this.health = isKidMode() ? 6 : 4;
    this.healthIcons = [];
    for (let i = 0; i < 4; i++) {
      const heart = this.add.text(16 + i * 22, 64, "❤️", { fontSize: 18 }).setDepth(801);
      this.healthIcons.push(heart);
    }
    this.rescued = 0;

    showZoneBanner(this, 9, "Predator Hunt", 0xA04030);
    showObjective(this, "Rescue 4 Sproutlings — but the predator is hunting YOU!");
  }

  update() {
    if (this.gameEnded) return;
    if (this._paused) return;

    if (this.elitePredator2) {
      const dx = this.astronaut.x - this.elitePredator2.x;
      const dy = this.astronaut.y - this.elitePredator2.y;
      const dist = Math.hypot(dx, dy);
      if (dist > 1) {
        this.elitePred2Vx += (dx / dist) * 0.05;
        this.elitePred2Vy += (dy / dist) * 0.05;
      }
      this.elitePred2Vx *= 0.94; this.elitePred2Vy *= 0.94;
      const ps = Math.hypot(this.elitePred2Vx, this.elitePred2Vy);
      if (ps > 1.3) {
        this.elitePred2Vx = (this.elitePred2Vx / ps) * 1.3;
        this.elitePred2Vy = (this.elitePred2Vy / ps) * 1.3;
      }
      this.elitePredator2.x += this.elitePred2Vx;
      this.elitePredator2.y += this.elitePred2Vy;
      this.elitePredator2.setScale(dx >= 0 ? 1 : -1, 1);
      if (dist < this.elitePredator2.collisionRadius + 16) {
        this.takeHit('Twin Predator!');
        const ang = Math.atan2(this.astronaut.y - this.elitePredator2.y, this.astronaut.x - this.elitePredator2.x);
        this.astroVx = Math.cos(ang) * 9;
        this.astroVy = Math.sin(ang) * 9;
      }
    }
    const W = this.W, H = this.H;

    const accel = 0.55;
    this.astroVx += this.joystick.dx * accel;
    this.astroVy += this.joystick.dy * accel;
    this.astroVx *= 0.88; this.astroVy *= 0.88;
    const sp = Math.hypot(this.astroVx, this.astroVy);
    if (sp > 4) { this.astroVx = (this.astroVx / sp) * 4; this.astroVy = (this.astroVy / sp) * 4; }
    this.astronaut.x += this.astroVx;
    this.astronaut.y += this.astroVy;
    this.astronaut.x = Phaser.Math.Clamp(this.astronaut.x, 24, W - 24);
    this.astronaut.y = Phaser.Math.Clamp(this.astronaut.y, 70, H - 24);

    // Vine wall collisions — block player movement
    if (this.vineWalls) {
      for (const w of this.vineWalls) {
        const dx = this.astronaut.x - w.x;
        const dy = this.astronaut.y - w.y;
        if (Math.abs(dx) < w.w / 2 + 16 && Math.abs(dy) < w.h / 2 + 16) {
          // Push player out (resolve along smaller overlap)
          const overlapX = w.w / 2 + 16 - Math.abs(dx);
          const overlapY = w.h / 2 + 16 - Math.abs(dy);
          if (overlapX < overlapY) {
            this.astronaut.x += Math.sign(dx) * overlapX;
            this.astroVx = 0;
          } else {
            this.astronaut.y += Math.sign(dy) * overlapY;
            this.astroVy = 0;
          }
        }
      }
    }

    // Sproutling rescue
    for (const s of this.sproutlings) {
      if (s.rescued) continue;
      const d = Phaser.Math.Distance.Between(this.astronaut.x, this.astronaut.y, s.x, s.y);
      if (d < 32) this.rescueSproutling(s);
    }

    // Carnivore plants (snap when close)
    if (this.plants) {
      for (const p of this.plants) {
        const d = Phaser.Math.Distance.Between(p.x, p.y, this.astronaut.x, this.astronaut.y);
        if (d < p.collisionRadius + 12) this.takeHit("Plant snapped at you!");
      }
    }

    // Spores
    if (this.spores) {
      for (const s of this.spores) {
        s.x += s.vx; s.y += s.vy;
        if (s.x < 30 || s.x > W - 30) s.vx *= -1;
        if (s.y < 80 || s.y > H - 30) s.vy *= -1;
        const d = Phaser.Math.Distance.Between(s.x, s.y, this.astronaut.x, this.astronaut.y);
        if (d < s.collisionRadius + 12) this.takeHit("Toxic spore cloud!");
      }
    }

    // Predator AI (level 9) — chases player
    if (this.predator) {
      const dx = this.astronaut.x - this.predator.x;
      const dy = this.astronaut.y - this.predator.y;
      const dist = Math.hypot(dx, dy);
      if (dist > 1) {
        this.predatorVx += (dx / dist) * 0.06;
        this.predatorVy += (dy / dist) * 0.06;
      }
      this.predatorVx *= 0.94; this.predatorVy *= 0.94;
      const ps = Math.hypot(this.predatorVx, this.predatorVy);
      if (ps > this.predatorSpeed) {
        this.predatorVx = (this.predatorVx / ps) * this.predatorSpeed;
        this.predatorVy = (this.predatorVy / ps) * this.predatorSpeed;
      }
      this.predator.x += this.predatorVx;
      this.predator.y += this.predatorVy;

      // Predator also collides with vine walls (prevents corner-trap)
      if (this.vineWalls) {
        for (const w of this.vineWalls) {
          const wdx = this.predator.x - w.x;
          const wdy = this.predator.y - w.y;
          if (Math.abs(wdx) < w.w / 2 + 22 && Math.abs(wdy) < w.h / 2 + 22) {
            const overlapX = w.w / 2 + 22 - Math.abs(wdx);
            const overlapY = w.h / 2 + 22 - Math.abs(wdy);
            if (overlapX < overlapY) {
              this.predator.x += Math.sign(wdx) * overlapX;
              this.predatorVx = -this.predatorVx * 0.5;
            } else {
              this.predator.y += Math.sign(wdy) * overlapY;
              this.predatorVy = -this.predatorVy * 0.5;
            }
          }
        }
      }

      // Face player horizontally
      this.predator.setScale(dx >= 0 ? 1 : -1, 1);
      // Collision (with longer cooldown to prevent rapid repeat hits in corners)
      if (dist < this.predator.collisionRadius + 16 && !this.predatorCooldown) {
        this.takeHit("Predator caught you!");
        this.predatorCooldown = true;
        this.time.delayedCall(1500, () => this.predatorCooldown = false);
        // Stronger knockback so player isn't pinned
        const ang = Math.atan2(this.astronaut.y - this.predator.y, this.astronaut.x - this.predator.x);
        this.astroVx = Math.cos(ang) * 12;
        this.astroVy = Math.sin(ang) * 12;
        // Push predator back too
        this.predatorVx = -Math.cos(ang) * 4;
        this.predatorVy = -Math.sin(ang) * 4;
      }
    }

    // Exit portal
    if (this.exitPortal && this.exitPortal.unlocked) {
      const d = Phaser.Math.Distance.Between(this.exitPortal.x, this.exitPortal.y, this.astronaut.x, this.astronaut.y);
      if (d < this.exitPortal.collisionRadius) this.complete();
    }
  }

  rescueSproutling(s) {
    s.rescued = true;
    showSpeechBubble(this, s.x, s.y, getAlienGreeting("sproutling"), 0x5DBE9A);
    Audio.rescue();
    trackDailyProgress(this, "rescue");
    this.tweens.add({ targets: s.sproutling, scale: 0.7, alpha: 0.7, duration: 400 });
    this.tweens.add({ targets: s.sproutling, x: this.astronaut.x - 30 + Math.random() * 60, y: this.astronaut.y + 24, duration: 500 });
    for (let i = 0; i < 8; i++) {
      const angle = Math.random() * Math.PI * 2;
      const sp = this.add.circle(s.x, s.y, 2, 0x80FF80);
      this.tweens.add({ targets: sp, x: s.x + Math.cos(angle) * 30, y: s.y + Math.sin(angle) * 30, alpha: 0, duration: 500, onComplete: () => sp.destroy() });
    }
    this.rescued++;
    STATE.xp += 25;
    saveGame(STATE);
    const target = this.levelNum === 9 ? 4 : 5;
    this.scoreText.setText(`🌱 ${this.rescued}/${target}`);
    updateGoalBanner(this, this.rescued);

    if (this.rescued >= target && !this.exitPortal.unlocked) {
      this.exitPortal.unlock();
      showObjective(this, "🌟 All Sproutlings saved! Run to the EXIT ↓!");
      this.cameras.main.flash(300, 150, 255, 150);
    }
  }

  takeHit(message) {
    if (this.invincible) return;
    this.invincible = true;
    this.health--;
    this.healthIcons[this.health]?.setAlpha(0.2);
    showDangerPrompt(this, message);
    this.cameras.main.shake(150, 0.008);
    this.cameras.main.flash(150, 150, 255, 150);
    this.tweens.add({ targets: this.astronaut, alpha: { from: 0.3, to: 1 }, duration: 200, yoyo: true, repeat: 3 });
    this.time.delayedCall(isKidMode() ? 1500 : 900, () => this.invincible = false);
    if (this.health <= 0) this.gameOver();
  }

  complete() {
    this.gameEnded = true;
    this.joystick.destroy();
    const reward = awardLevel(this.levelNum, this);
    saveGame(STATE);
    showMissionResult(this, {
      passed: true,
      levelNum: this.levelNum,
      passSubtitle: reward.newAlien ? `✨ ${ALIENS[reward.newAlien].name} joined your crew!` : "Verdania cleared!",
      rewards: { xp: 50, habitability: reward.newPoints },
    });
  }

  gameOver() {
    if (this.gameEnded) return;
    this.gameEnded = true;
    this.joystick.destroy();
    if (this.iceSpawnEvent) this.iceSpawnEvent.remove();
    if (this.avalancheTimer) this.avalancheTimer.remove();
    if (this.bossAttackEvent) this.bossAttackEvent.remove();
    if (this.flareEvent) this.flareEvent.remove();
    showMissionResult(this, {
      passed: false,
      levelNum: this.levelNum,
      failSubtitle: `${this.rescued || 0} Sproutlings saved. The jungle bites back!`,
    });
  }

  exit() { this.joystick?.destroy(); this.scene.start("LevelSelectScene"); }
}

// ══════════════════════════════════════════════════════════════════
// MEKANOS — Level 10: Robot Factory (FINAL BOSS)
// ══════════════════════════════════════════════════════════════════
class MekanosScene extends Phaser.Scene {
  constructor() { super("MekanosScene"); }
  init(data) { this.levelNum = data?.levelNum || 10; this.cfg = data?.cfg || null; }
  create() {
    const W = this.scale.width, H = this.scale.height;
    this.W = W; this.H = H;
    this.mobile = isMobile();

    // Industrial gradient — yellow/orange warning + dark gray
    const bg = this.add.graphics();
    bg.fillGradientStyle(0x605040, 0x504030, 0x201810, 0x080404);
    bg.fillRect(0, 0, W, H);

    // Background pipe network — horizontal and vertical pipes
    const pipes = this.add.graphics();
    pipes.lineStyle(6, 0x404850, 0.5);
    // Horizontal pipes
    pipes.lineBetween(0, H * 0.18, W, H * 0.18);
    pipes.lineBetween(0, H * 0.85, W, H * 0.85);
    // Vertical pipes
    pipes.lineBetween(W * 0.05, 0, W * 0.05, H);
    pipes.lineBetween(W * 0.95, 0, W * 0.95, H);
    // Joints (circles where pipes cross)
    pipes.fillStyle(0x808890, 0.6);
    pipes.fillCircle(W * 0.05, H * 0.18, 6);
    pipes.fillCircle(W * 0.95, H * 0.18, 6);
    pipes.fillCircle(W * 0.05, H * 0.85, 6);
    pipes.fillCircle(W * 0.95, H * 0.85, 6);

    // Pulsing red warning lights along pipes
    for (let i = 0; i < 6; i++) {
      const x = (i / 5) * W;
      const light = this.add.circle(x, H * 0.18, 2.5, 0xFF4060, 0.9);
      this.tweens.add({ targets: light, alpha: { from: 0.3, to: 1 }, duration: 600 + Math.random() * 400, yoyo: true, repeat: -1 });
    }

    // Gear cogs spinning in background corners
    const drawGear = (x, y, r, color, dir = 1) => {
      const g = this.add.graphics();
      g.fillStyle(color, 0.4);
      const teeth = 12;
      for (let i = 0; i < teeth; i++) {
        const a = (i / teeth) * Math.PI * 2;
        const ax = x + Math.cos(a) * (r + 4);
        const ay = y + Math.sin(a) * (r + 4);
        g.fillCircle(ax, ay, 3);
      }
      g.fillCircle(x, y, r);
      g.fillStyle(0x000000, 0.5);
      g.fillCircle(x, y, r * 0.4);
      // Cannot easily rotate graphics from arbitrary center, so we use container
      return g;
    };
    drawGear(W * 0.08, H * 0.4, 16, 0x808890, 1);
    drawGear(W * 0.92, H * 0.5, 14, 0x808890, -1);
    drawGear(W * 0.10, H * 0.72, 12, 0x808890, 1);

    // Yellow + black caution stripes at top
    const stripeT = this.add.graphics();
    stripeT.fillStyle(0xC8A040);
    for (let i = 0; i < W + 40; i += 24) {
      stripeT.fillTriangle(i, 56, i + 12, 56, i + 6, 64);
    }
    stripeT.setDepth(799);

    // Steam/smoke particles rising
    for (let i = 0; i < 12; i++) {
      const x = Math.random() * W, y = H - 30;
      const p = this.add.circle(x, y, 6 + Math.random() * 6, 0x909098, 0.35);
      this.tweens.add({ targets: p, y: -30, alpha: 0, duration: 6000 + Math.random() * 3000, repeat: -1, delay: Math.random() * 4000 });
      this.tweens.add({ targets: p, x: p.x + (Math.random() - 0.5) * 60, duration: 4000, yoyo: true, repeat: -1 });
    }

    // Random electric sparks across the screen
    this.time.addEvent({
      delay: 800, loop: true,
      callback: () => {
        if (this.gameEnded) return;
        const sx = 60 + Math.random() * (W - 120);
        const sy = 100 + Math.random() * (H - 200);
        const spark = this.add.circle(sx, sy, 1, 0xFFFFFF, 1);
        this.tweens.add({ targets: spark, scale: 4, alpha: 0, duration: 300, onComplete: () => spark.destroy() });
        // Sparks emanate
        for (let s = 0; s < 4; s++) {
          const ang = Math.random() * Math.PI * 2;
          const splash = this.add.circle(sx, sy, 1, 0xFFE060, 1);
          this.tweens.add({
            targets: splash, x: sx + Math.cos(ang) * 12, y: sy + Math.sin(ang) * 12, alpha: 0, duration: 250,
            onComplete: () => splash.destroy(),
          });
        }
      }
    });

    // Title bar
    this.add.rectangle(0, 0, W, 56, 0x000000, 0.7).setOrigin(0, 0).setDepth(800);
    createBackButton(this, "← levels", () => this.exit());
    createPauseButton(this, () => showPauseMenu(this, { world: "factory" }));
    Audio.startMusic("factory");

    this.events.once("shutdown", () => { Audio.stopMusic(); this.geyserEvent?.remove(); this.iceTitanEvent?.remove(); });
    this.add.text(W / 2, 22, "MEKANOS — FINAL", {
      fontFamily: "system-ui", fontSize: 18, fontStyle: "bold", color: "#FFE060", letterSpacing: 2,
    }).setOrigin(0.5).setDepth(801);
    this.scoreText = this.add.text(W - 12, 28, "🔧 0/3", {
      fontFamily: "system-ui", fontSize: 14, fontStyle: "bold", color: "#FFE060",
    }).setOrigin(1, 0.5).setDepth(801).setAlpha(0.7);
    // Goal banner pushed lower to clear the boss HP bar
    setupGoalBanner(this, { icon: "🔧", label: "Rescue Spirelings", total: 3, y: 88 });

    // Boss HP bar (top, prominent)
    this.bossMaxHP = 5;
    this.bossHP = 5;
    this.bossHpLabel = this.add.text(W / 2, 42, "BOSS", {
      fontFamily: "system-ui", fontSize: 13, fontStyle: "bold", color: "#FF4060", letterSpacing: 2,
    }).setOrigin(0.5).setDepth(801);
    this.bossHpBg = this.add.rectangle(W / 2, 50, 180, 6, 0x000000, 0.7).setStrokeStyle(1, 0xFF4060).setDepth(801);
    this.bossHpFill = this.add.rectangle(W / 2 - 89, 50, 178, 4, 0xFF4060).setOrigin(0, 0.5).setDepth(802);

    // Two conveyor belts (visual + behavioral — push player when on them)
    this.conveyors = [];
    const c1 = createConveyor(this, W * 0.3, H * 0.40, W * 0.5, 1);
    c1.setDepth(20);
    this.conveyors.push(c1);
    const c2 = createConveyor(this, W * 0.7, H * 0.65, W * 0.5, -1);
    c2.setDepth(20);
    this.conveyors.push(c2);

    // 3 Bolts trapped on conveyors / corners (bolt = pickup)
    this.bolts = [];
    const boltSpots = [
      { x: W * 0.10, y: H * 0.40 },
      { x: W * 0.90, y: H * 0.65 },
      { x: W * 0.50, y: H * 0.85 },
    ];
    boltSpots.forEach(s => {
      const b = createBolt(this, s.x, s.y);
      this.bolts.push({ obj: b, x: s.x, y: s.y, rescued: false });
    });

    // Saw blades (3 spinning hazards in fixed positions)
    this.saws = [];
    const sawSpots = [
      { x: W * 0.5, y: H * 0.30 },
      { x: W * 0.20, y: H * 0.55 },
      { x: W * 0.80, y: H * 0.50 },
    ];
    sawSpots.forEach(s => {
      const saw = createSawBlade(this, s.x, s.y, 16);
      saw.setDepth(35);
