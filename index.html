    let chosenKidMode = false;
    const kidRowY = -cardH / 2 + 268;
    const kidLbl = this.add.text(-cardW / 2 + 14, kidRowY, "Kid Mode (easier for younger kids):", {
      fontFamily: "system-ui", fontSize: 14, color: "#A8D0FF",
    }).setOrigin(0, 0.5);
    const kidToggle = this.add.rectangle(cardW / 2 - 38, kidRowY, 56, 26, 0x404870, 0.85).setStrokeStyle(1.5, 0xFFE060, 0.7).setInteractive({ useHandCursor: true });
    const kidToggleTxt = this.add.text(cardW / 2 - 38, kidRowY, "OFF", {
      fontFamily: "system-ui", fontSize: 14, fontStyle: "bold", color: "#A8D0FF",
    }).setOrigin(0.5);
    kidToggle.on("pointerdown", (p, x, y, e) => {
      if (e && e.stopPropagation) e.stopPropagation();
      Audio.click();
      chosenKidMode = !chosenKidMode;
      kidToggle.setFillStyle(chosenKidMode ? 0xFFE060 : 0x404870, chosenKidMode ? 0.95 : 0.85);
      kidToggleTxt.setText(chosenKidMode ? "ON" : "OFF");
      kidToggleTxt.setColor(chosenKidMode ? "#1A2543" : "#A8D0FF");
    });
    const kidHint = this.add.text(0, kidRowY + 22, "5 hearts · slower hazards · unlimited continues", {
      fontFamily: "system-ui", fontSize: 13, color: "#888899", fontStyle: "italic",
    }).setOrigin(0.5);
    card.add([kidLbl, kidToggle, kidToggleTxt, kidHint]);

    // Create button
    const createBtn = this.add.rectangle(0, cardH / 2 - 48, 220, 40, 0x5DBE9A).setStrokeStyle(2, 0x3E8E6C).setInteractive({ useHandCursor: true });
    const createTxt = this.add.text(0, cardH / 2 - 48, "Let's go!", {
      fontFamily: "system-ui", fontSize: 18, fontStyle: "bold", color: "#FFFFFF",
    }).setOrigin(0.5);
    createBtn.on("pointerdown", (p, x, y, e) => {
      if (e && e.stopPropagation) e.stopPropagation();
      Audio.click();
      const newProfile = createProfile(chosenName, chosenEmoji, chosenKidMode);
      if (newProfile) {
        overlay.destroy(); card.destroy();
        this.routeToNextScene();
      }
    });
    const cancel = this.add.text(0, cardH / 2 - 18, "Cancel", { fontFamily: "system-ui", fontSize: 15, color: "#A8D0FF" }).setOrigin(0.5).setInteractive({ useHandCursor: true });
    cancel.on("pointerdown", () => { overlay.destroy(); card.destroy(); });
    card.add([createBtn, createTxt, cancel]);
    card.setScale(0);
    this.tweens.add({ targets: card, scale: 1, duration: 280, ease: "Back.easeOut" });
  }

  confirmDelete(profile) {
    const W = this.W, H = this.H;
    const overlay = this.add.rectangle(W / 2, H / 2, W, H, 0x000000, 0.85).setDepth(960).setInteractive();
    const card = this.add.container(W / 2, H / 2).setDepth(961);
    const cardBg = this.add.rectangle(0, 0, Math.min(W - 40, 300), 180, 0x101830).setStrokeStyle(2, 0xFF6080);
    const title = this.add.text(0, -50, `Delete ${profile.name}'s game?`, {
      fontFamily: "system-ui", fontSize: 18, fontStyle: "bold", color: "#FFFFFF",
    }).setOrigin(0.5);
    const sub = this.add.text(0, -22, "All progress will be lost.", {
      fontFamily: "system-ui", fontSize: 15, color: "#A8D0FF",
    }).setOrigin(0.5);
    const yes = this.add.rectangle(-65, 30, 110, 38, 0xFF4060).setStrokeStyle(1.5, 0xA02040).setInteractive({ useHandCursor: true });
    const yesTxt = this.add.text(-65, 30, "🗑 Delete", { fontFamily: "system-ui", fontSize: 17, fontStyle: "bold", color: "#FFFFFF" }).setOrigin(0.5);
    const no = this.add.rectangle(65, 30, 110, 38, 0x404870).setStrokeStyle(1.5, 0xFFFFFF, 0.5).setInteractive({ useHandCursor: true });
    const noTxt = this.add.text(65, 30, "Cancel", { fontFamily: "system-ui", fontSize: 17, color: "#FFFFFF" }).setOrigin(0.5);
    card.add([cardBg, title, sub, yes, yesTxt, no, noTxt]);
    yes.on("pointerdown", (p, x, y, e) => {
      if (e && e.stopPropagation) e.stopPropagation();
      deleteProfile(profile.id);
      overlay.destroy(); card.destroy();
      this.scene.restart();
    });
    no.on("pointerdown", (p, x, y, e) => {
      if (e && e.stopPropagation) e.stopPropagation();
      overlay.destroy(); card.destroy();
    });
  }

  routeToNextScene() {
    // After picking profile, route based on STATE
    if (!STATE.career) { this.scene.start("CareerPickerScene"); return; }
    if (STATE.career === "marine" || STATE.career === "ocean") { this.scene.start("BootScene"); return; }
    if (STATE.career === "volcano") { this.scene.start("VolcanoQuestScene"); return; }
    if (!STATE.wormholeSeen) { this.scene.start("WormholeScene"); return; }
    if (!STATE.tutorialDone) { this.scene.start("TutorialScene"); return; }
    // Returning player and astronaut path: show welcome-back card if not first session today
    if (isReturningSession()) {
      this.showWelcomeBack();
      return;
    }
    markSeenToday();
    this.scene.start("LevelSelectScene");
  }

  showWelcomeBack() {
    const W = this.W, H = this.H;
    // Generate today's daily mission so it's ready
    generateDailyMission();
    // Get profile name
    const activeId = getActiveProfileId();
    const profiles = loadProfiles();
    const me = profiles.find(p => p.id === activeId);
    const name = me ? me.name : "Astronaut";
    const emoji = me ? me.emoji : "🚀";

    const overlay = this.add.rectangle(W / 2, H / 2, W, H, 0x000000, 0.92).setDepth(960).setInteractive();
    overlay.on("pointerdown", (p, x, y, e) => { if (e && e.stopPropagation) e.stopPropagation(); });
    const card = this.add.container(W / 2, H / 2).setDepth(961);
    const cardW = Math.min(W - 32, 340);
    const cardH = 380;
    const cardBg = this.add.rectangle(0, 0, cardW, cardH, 0x101830).setStrokeStyle(3, 0xFFE9A8).setInteractive();
    cardBg.on("pointerdown", (p, x, y, e) => { if (e && e.stopPropagation) e.stopPropagation(); });
    card.add(cardBg);

    // Big emoji
    const bigEmoji = this.add.text(0, -cardH / 2 + 40, emoji, { fontSize: 44 }).setOrigin(0.5);
    const welcome = this.add.text(0, -cardH / 2 + 80, `Welcome back, ${name}!`, {
      fontFamily: "system-ui", fontSize: 22, fontStyle: "bold", color: "#FFE9A8",
    }).setOrigin(0.5);
    card.add([bigEmoji, welcome]);

    // Stats summary
    const completed = (STATE.levelsCompleted || []).length;
    const habit = STATE.habitability || 0;
    const crew = (STATE.alienCrew || []).length;

    const stat1 = this.add.text(0, -cardH / 2 + 120, `🌍 Earth: ${habit}/100  ·  Levels: ${completed}/15`, {
      fontFamily: "system-ui", fontSize: 16, color: "#A8D0FF",
    }).setOrigin(0.5);
    const stat2 = this.add.text(0, -cardH / 2 + 138, `Alien Crew: ${crew} ${"👽".repeat(crew)}`, {
      fontFamily: "system-ui", fontSize: 16, color: "#A8D0FF",
    }).setOrigin(0.5);
    card.add([stat1, stat2]);

    // Daily mission card
    const mission = STATE.dailyMission;
    if (mission && !mission.claimed) {
      const dmTitle = this.add.text(0, -cardH / 2 + 168, "TODAY'S MISSION", {
        fontFamily: "system-ui", fontSize: 13, fontStyle: "bold", color: "#80E5FF", letterSpacing: 2,
      }).setOrigin(0.5);
      const dmBg = this.add.rectangle(0, -cardH / 2 + 210, cardW - 30, 60, 0x1A2B45, 0.95).setStrokeStyle(1.5, 0x80E5FF, 0.7);
      const dmIcon = this.add.text(-cardW / 2 + 36, -cardH / 2 + 210, mission.icon, { fontSize: 26 }).setOrigin(0.5);
      const dmTxt = this.add.text(-cardW / 2 + 64, -cardH / 2 + 200, mission.title, {
        fontFamily: "system-ui", fontSize: 15, fontStyle: "bold", color: "#FFFFFF", wordWrap: { width: cardW - 110 },
      }).setOrigin(0, 0.5);
      const dmReward = this.add.text(-cardW / 2 + 64, -cardH / 2 + 222, `Reward: +${mission.reward} XP`, {
        fontFamily: "system-ui", fontSize: 14, color: "#FFE060",
      }).setOrigin(0, 0.5);
      card.add([dmTitle, dmBg, dmIcon, dmTxt, dmReward]);
    }

    // Continue button
    const cont = this.add.rectangle(0, cardH / 2 - 48, 220, 44, 0x5DBE9A).setStrokeStyle(2, 0x3E8E6C).setInteractive({ useHandCursor: true });
    const contTxt = this.add.text(0, cardH / 2 - 48, "▶  Continue", {
      fontFamily: "system-ui", fontSize: 19, fontStyle: "bold", color: "#FFFFFF",
    }).setOrigin(0.5);
    cont.on("pointerdown", (p, x, y, e) => {
      if (e && e.stopPropagation) e.stopPropagation();
      Audio.click();
      markSeenToday();
      overlay.destroy();
      card.destroy();
      this.scene.start("LevelSelectScene");
    });
    card.add([cont, contTxt]);

    card.setScale(0);
    this.tweens.add({ targets: card, scale: 1, duration: 350, ease: "Back.easeOut" });
  }
}

// ══════════════════════════════════════════════════════════════════
// CAREER PICKER — first screen on launch
// ══════════════════════════════════════════════════════════════════
class CareerPickerScene extends Phaser.Scene {
  constructor() { super("CareerPickerScene"); }
  create() {
    window.hideSplash && window.hideSplash();
    const W = this.scale.width, H = this.scale.height;

    // Triple-themed background — ocean (top), volcano (middle), space (bottom)
    const bg = this.add.graphics();
    // Ocean strip
    bg.fillGradientStyle(0x60B0E0, 0x60B0E0, 0x205080, 0x205080);
    bg.fillRect(0, 0, W, H * 0.34);
    // Volcano strip
    bg.fillGradientStyle(0xC03018, 0xC03018, 0x501008, 0x501008);
    bg.fillRect(0, H * 0.34, W, H * 0.32);
    // Space strip
    bg.fillGradientStyle(0x101030, 0x101030, 0x000010, 0x000010);
    bg.fillRect(0, H * 0.66, W, H * 0.34);

    // Stars on space strip
    for (let i = 0; i < 30; i++) {
      const sx = Math.random() * W;
      const sy = H * 0.66 + Math.random() * H * 0.34;
      const star = this.add.circle(sx, sy, Math.random() < 0.85 ? 1 : 2, 0xFFFFFF, 0.3 + Math.random() * 0.6);
      this.tweens.add({ targets: star, alpha: { from: star.alpha, to: 0.15 }, duration: 1200 + Math.random() * 1500, yoyo: true, repeat: -1 });
    }
    // Bubbles on ocean strip
    for (let i = 0; i < 8; i++) {
      const bx = Math.random() * W;
      const b = this.add.circle(bx, H * 0.34 - Math.random() * H * 0.3, 1 + Math.random() * 2, 0xCCEEFF, 0.6);
      this.tweens.add({ targets: b, y: -10, alpha: 0, duration: 5000 + Math.random() * 3000, repeat: -1, delay: Math.random() * 4000 });
    }
    // Embers on volcano strip
    for (let i = 0; i < 10; i++) {
      const ex = Math.random() * W;
      const e = this.add.circle(ex, H * 0.66, 1 + Math.random() * 2, 0xFFA040, 0.7);
      this.tweens.add({ targets: e, y: H * 0.34, alpha: 0, duration: 4000 + Math.random() * 3000, repeat: -1, delay: Math.random() * 3000 });
    }

    // Title
    this.add.text(W / 2, 26, "CHOOSE YOUR ADVENTURE", {
      fontFamily: "system-ui", fontSize: Math.min(W * 0.05, 18), fontStyle: "bold",
      color: "#FFE9A8", letterSpacing: 3, stroke: "#0E3D5C", strokeThickness: 2,
    }).setOrigin(0.5);

    // Layout: small "Create" card on top + three themed adventure cards below
    const cardW = Math.min(W - 32, 360);
    const totalH = H - 60; // available height below title (title is at y=26)
    const editorH = 60;    // smaller — it's a tool, not a world
    const adventureH = Math.min((totalH - editorH - 24) / 3 - 6, 92);

    let yPos = 60; // start below title

    // 🎨 CREATE card (top, smaller)
    this.drawAdventureCard({
      x: W / 2, y: yPos + editorH / 2, w: cardW, h: editorH,
      icon: "🎨", title: "Create Your Own", subtitle: "Design and play your own levels",
      bg: 0x6040A0, stroke: 0xC080FF, textColor: "#FFFFFF",
      adventureId: "editor",
      compact: true,
    });
    yPos += editorH + 12;

    // 🌊 OCEAN card
    this.drawAdventureCard({
      x: W / 2, y: yPos + adventureH / 2, w: cardW, h: adventureH,
      icon: "🌊", title: "Ocean Adventures", subtitle: "Tag sea life · Clean the reef",
      bg: 0x4080A0, stroke: 0x80E5FF, textColor: "#FFFFFF",
      adventureId: "ocean",
    });
    yPos += adventureH + 8;

    // 🌋 VOLCANO card
    this.drawAdventureCard({
      x: W / 2, y: yPos + adventureH / 2, w: cardW, h: adventureH,
      icon: "🌋", title: "Volcano Quest", subtitle: "Save the Magmite village",
      bg: 0x803020, stroke: 0xFFA040, textColor: "#FFFFFF",
      adventureId: "volcano",
    });
    yPos += adventureH + 8;

    // 🚀 SAVE EARTH card (the headlining adventure — featured)
    this.drawAdventureCard({
      x: W / 2, y: yPos + adventureH / 2, w: cardW, h: adventureH,
      icon: "🚀", title: "Save Earth", subtitle: "15 levels · 5 worlds · Big mission",
      bg: 0x303060, stroke: 0xC080FF, textColor: "#FFFFFF",
      adventureId: "astronaut",
      featured: true,
    });

    // Progress / level badge
    if (STATE.level > 1 || STATE.xp > 0) {
      const lvlBadge = this.add.container(W - 40, 30);
      const ring = this.add.circle(0, 0, 18, C.gold).setStrokeStyle(2, 0xA8862F);
      const lvlTxt = this.add.text(0, -1, `L${STATE.level}`, {
        fontFamily: "system-ui", fontSize: 15, fontStyle: "bold", color: "#ffffff",
      }).setOrigin(0.5);
      lvlBadge.add([ring, lvlTxt]);
    }
  }

  drawAdventureCard({ x, y, w, h, icon, title, subtitle, bg, stroke, textColor, adventureId, featured, compact }) {
    const card = this.add.container(x, y);
    const cardBg = this.add.rectangle(0, 0, w, h, bg, 0.95).setStrokeStyle(3, stroke);
    if (featured) {
      // Glow ring for the "Save Earth" headlining adventure
      const glow = this.add.rectangle(0, 0, w + 8, h + 8, stroke, 0.18);
      this.tweens.add({ targets: glow, alpha: { from: 0.1, to: 0.3 }, duration: 1500, yoyo: true, repeat: -1 });
      card.add(glow);
    }
    // Compact cards (the editor) use smaller text/icon
    const iconSize = compact ? 26 : 36;
    const titleSize = compact ? 14 : 17;
    const subtitleSize = compact ? 10 : 11;
    const titleY = compact ? -10 : -16;
    const subY = compact ? 8 : 8;

    const iconText = this.add.text(-w / 2 + 36, 0, icon, { fontSize: iconSize }).setOrigin(0.5);
    const titleText = this.add.text(-w / 2 + 72, titleY, title, {
      fontFamily: "system-ui", fontSize: titleSize, fontStyle: "bold", color: textColor,
    }).setOrigin(0, 0.5);
    const subText = this.add.text(-w / 2 + 72, subY, subtitle, {
      fontFamily: "system-ui", fontSize: subtitleSize, color: textColor,
    }).setOrigin(0, 0.5).setAlpha(0.85);
    // "Featured" badge on space card
    if (featured) {
      const badge = this.add.rectangle(w / 2 - 32, -h / 2 + 12, 56, 18, 0xFFE060).setStrokeStyle(1, 0x804020);
      const badgeTxt = this.add.text(w / 2 - 32, -h / 2 + 12, "MAIN", {
        fontFamily: "system-ui", fontSize: 13, fontStyle: "bold", color: "#1A2543", letterSpacing: 1,
      }).setOrigin(0.5);
      card.add([badge, badgeTxt]);
    }
    card.add([cardBg, iconText, titleText, subText]);

    // Show progress on this adventure if any (skip for editor)
    let progressLabel = null;
    if (adventureId === "astronaut") {
      const completed = (STATE.levelsCompleted || []).filter(n => n >= 1 && n <= 15).length;
      if (completed > 0) {
        progressLabel = this.add.text(w / 2 - 16, h / 2 - 14, `${completed}/15 ✓`, {
          fontFamily: "system-ui", fontSize: 14, fontStyle: "bold", color: "#5DBE9A",
        }).setOrigin(1, 0.5);
        card.add(progressLabel);
      }
    } else if (adventureId === "ocean") {
      const m1 = STATE.mission1Completed ? 1 : 0;
      const m2 = STATE.mission2Completed ? 1 : 0;
      const total = m1 + m2;
      if (total > 0) {
        progressLabel = this.add.text(w / 2 - 16, h / 2 - 14, `${total}/2 ✓`, {
          fontFamily: "system-ui", fontSize: 14, fontStyle: "bold", color: "#5DBE9A",
        }).setOrigin(1, 0.5);
        card.add(progressLabel);
      }
    } else if (adventureId === "volcano") {
      const completed = (STATE.volcanoCompleted || []).length;
      if (completed > 0) {
        progressLabel = this.add.text(w / 2 - 16, h / 2 - 14, `${completed}/3 ✓`, {
          fontFamily: "system-ui", fontSize: 14, fontStyle: "bold", color: "#5DBE9A",
        }).setOrigin(1, 0.5);
        card.add(progressLabel);
      }
    } else if (adventureId === "editor") {
      // Show how many custom levels the player has built
      const customLevels = loadCustomLevels();
      const count = customLevels.length;
      const progressTxt = count > 0 ? `${count} saved` : "tap to start";
      progressLabel = this.add.text(w / 2 - 12, 0, progressTxt, {
        fontFamily: "system-ui", fontSize: 14, fontStyle: "bold", color: count > 0 ? "#FFE060" : "#FFFFFF",
      }).setOrigin(1, 0.5).setAlpha(count > 0 ? 1 : 0.7);
      card.add(progressLabel);
    }

    cardBg.setInteractive({ useHandCursor: true });
    cardBg.on("pointerover", () => this.tweens.add({ targets: card, scaleX: 1.03, scaleY: 1.03, duration: 150 }));
    cardBg.on("pointerout", () => this.tweens.add({ targets: card, scaleX: 1, scaleY: 1, duration: 150 }));
    cardBg.on("pointerdown", () => {
      Audio.click();
      // Don't overwrite STATE.career when picking the editor — it's a tool, not an adventure
      if (adventureId !== "editor") {
        STATE.career = adventureId;
        saveGame(STATE);
      }
      this.tweens.add({
        targets: card, scaleX: 0.96, scaleY: 0.96, duration: 100, yoyo: true,
        onComplete: () => this.routeToAdventure(adventureId),
      });
    });
  }

  routeToAdventure(id) {
    if (id === "ocean") {
      // Ocean Adventures path → existing marine missions
      this.scene.start("BootScene");
    } else if (id === "volcano") {
      // Volcano Quest → new dedicated scene
      this.scene.start("VolcanoQuestScene");
    } else if (id === "editor") {
      // Level editor — go straight to the My Levels list
      this.scene.start("MyLevelsScene");
    } else {
      // Save Earth (astronaut path) — same existing routing
      if (!STATE.wormholeSeen) this.scene.start("WormholeScene");
      else if (!STATE.tutorialDone) this.scene.start("TutorialScene");
      else this.scene.start("LevelSelectScene");
    }
  }
}

// ══════════════════════════════════════════════════════════════════
// WORMHOLE INTRO — narrative
// ══════════════════════════════════════════════════════════════════
class WormholeScene extends Phaser.Scene {
  constructor() { super("WormholeScene"); }
  create() {
    const W = this.scale.width, H = this.scale.height;
    this.cameras.main.setBackgroundColor("#000000");

    // Black background with stars
    makeStarfield(this, 100, 1);

    // Wormhole concentric rings
    const wormhole = this.add.container(W / 2, H / 2);
    const colors = [0x6030A0, 0x8050C0, 0xA070E0, 0xC090FF, 0xE0B0FF, 0xFFE9A8];
    colors.forEach((color, i) => {
      const r = (colors.length - i) * 30 + 20;
      const ring = this.add.circle(0, 0, r, color, 0).setStrokeStyle(3, color, 0.7);
      wormhole.add(ring);
      this.tweens.add({ targets: ring, scale: { from: 0.6 + i * 0.05, to: 1.4 - i * 0.05 }, alpha: { from: 0.9, to: 0 }, duration: 2500, repeat: -1, delay: i * 300 });
    });

    // Astronaut floating ahead
    const astro = createAstronaut(this, W / 2, H * 0.78, STATE.avatar);
    astro.setScale(1.6);
    this.tweens.add({ targets: astro, y: H * 0.5, duration: 3500, ease: "Cubic.easeIn" });
    this.tweens.add({ targets: astro, scale: 0.4, duration: 3500, ease: "Cubic.easeIn" });

    // Caption stages
    const caption = this.add.text(W / 2, H * 0.15, "", {
      fontFamily: "system-ui", fontSize: 22, color: "#FFE9A8",
      stroke: "#000000", strokeThickness: 3, align: "center",
      wordWrap: { width: W - 60 },
    }).setOrigin(0.5);

    const stages = [
      { delay: 200,  text: "Earth's sun is dying." },
      { delay: 1800, text: "Humanity has 1 year to find a new home." },
      { delay: 3500, text: "Save Earth. The galaxy is waiting." },
    ];
    stages.forEach(s => {
      this.time.delayedCall(s.delay, () => {
        caption.setText(s.text);
        this.tweens.add({ targets: caption, alpha: { from: 0, to: 1 }, scale: { from: 0.85, to: 1 }, duration: 500 });
      });
    });

    // Skip / continue button
    const skipBtn = this.add.text(W - 16, H - 16, "skip ⏭", {
      fontFamily: "system-ui", fontSize: 17, color: "#ffffff",
    }).setOrigin(1, 1).setAlpha(0.7).setInteractive({ useHandCursor: true });
    skipBtn.on("pointerdown", () => this.go());

    this.time.delayedCall(5500, () => this.go());
  }
  go() {
    if (this.went) return;
    this.went = true;
    STATE.wormholeSeen = true;
    saveGame(STATE);
    this.cameras.main.fadeOut(500, 255, 255, 255);
    this.cameras.main.once("camerafadeoutcomplete", () => {
      if (!STATE.tutorialDone) this.scene.start("TutorialScene");
      else this.scene.start("LevelSelectScene");
    });
  }
}

// ══════════════════════════════════════════════════════════════════
// TUTORIAL — walkthrough panels + practice level
// ══════════════════════════════════════════════════════════════════
class TutorialScene extends Phaser.Scene {
  constructor() { super("TutorialScene"); }
  create() {
    const W = this.scale.width, H = this.scale.height;
    this.W = W; this.H = H;
    this.mobile = isMobile();

    // Realistic deep space background
    makeDeepSpaceBackground(this, "purple");
    makeStarfield(this, this.mobile ? 70 : 110, 1);
    makeNebulaBackdrop(this);

    // Tutorial state
    this.panelIndex = 0;
    this.showPanel(0);
  }

  showPanel(idx) {
    if (this.panelGroup) this.panelGroup.destroy();
    this.panelGroup = this.add.container(0, 0).setDepth(500);
    const W = this.W, H = this.H;

    const panels = [
      {
        title: "Welcome, Astronaut",
        body: "Earth's sun is dying. Your mission: scout 5 alien planets, befriend their species, and find a new home for humanity. Habitability score: 0/100 — get it to 100 to save Earth.",
        demo: () => {
          // Show astronaut floating
          const a = createAstronaut(this, W / 2, H * 0.45, STATE.avatar);
          a.setScale(this.mobile ? 2.2 : 2.8);
          this.tweens.add({ targets: a, y: H * 0.45 - 6, duration: 1500, yoyo: true, repeat: -1 });
          this.panelGroup.add(a);
        },
      },
      {
        title: "Use the Joystick",
        body: "Drag your finger (or click & hold) in the lower-left corner to fly. The joystick appears wherever you tap.",
        demo: () => {
          // Simulated joystick demo
          const cx = W * 0.25, cy = H * 0.55;
          const base = this.add.circle(cx, cy, 40, 0xFFFFFF, 0.15).setStrokeStyle(2, 0xFFFFFF, 0.4);
          const knob = this.add.circle(cx, cy, 18, 0xFFFFFF, 0.55).setStrokeStyle(2, 0xFFFFFF, 0.9);
          this.tweens.add({
            targets: knob,
            x: { from: cx + 25, to: cx - 25 },
            y: { from: cy + 15, to: cy - 15 },
            duration: 1200, yoyo: true, repeat: -1, ease: "Sine.easeInOut",
          });
          // Astronaut following
          const a = createAstronaut(this, W * 0.7, H * 0.55, STATE.avatar);
          a.setScale(1.6);
          this.tweens.add({ targets: a, x: { from: W * 0.7 - 20, to: W * 0.7 + 20 }, duration: 1200, yoyo: true, repeat: -1, ease: "Sine.easeInOut" });
          // Arrow showing connection
          const arrow = this.add.text(W * 0.5, H * 0.55, "→", { fontSize: 30, color: "#FFE9A8" }).setOrigin(0.5);
          this.tweens.add({ targets: arrow, alpha: { from: 0.4, to: 1 }, duration: 700, yoyo: true, repeat: -1 });
          this.panelGroup.add([base, knob, a, arrow]);
        },
      },
      {
        title: "Avoid Black Holes",
        body: "Black holes pull you in with gravity. Get too close and you lose oxygen — keep your distance!",
        demo: () => {
          const bh = createBlackHole(this, W / 2, H * 0.5, this.mobile ? 26 : 34);
          this.panelGroup.add(bh);
        },
      },
      {
        title: "Avoid White Holes & Meteors",
        body: "White holes burst with energy and push you away. Meteors fall and crash. Stay alert!",
        demo: () => {
          const wh = createWhiteHole(this, W * 0.32, H * 0.5, this.mobile ? 16 : 22);
          const meteor = createRockyMeteor(this, W * 0.7, H * 0.5, this.mobile ? 18 : 24);
          this.panelGroup.add([wh, meteor]);
        },
      },
      {
        title: "Save the Aliens",
        body: "Each planet has aliens needing your help. Squidlets, Frosties, Sproutlings — rescue them all!",
        demo: () => {
          const sq = createSquidlet(this, W * 0.3, H * 0.5);
          sq.setScale(1.8);
          const mg = createMagmite(this, W * 0.55, H * 0.52);
          mg.setScale(1.8);
          const cr = createCrystal(this, W * 0.78, H * 0.5);
          cr.setScale(1.5);
          this.panelGroup.add([sq, mg, cr]);
        },
      },
      {
        title: "Ready to Try?",
        body: "Time for a quick practice. Use the joystick, dodge a meteor, and grab the crystal!",
        demo: () => {
          const a = createAstronaut(this, W * 0.3, H * 0.5, STATE.avatar);
          a.setScale(1.8);
          const cr = createCrystal(this, W * 0.7, H * 0.5);
          cr.setScale(1.8);
          this.tweens.add({ targets: cr, y: H * 0.5 - 5, duration: 800, yoyo: true, repeat: -1 });
          this.panelGroup.add([a, cr]);
        },
      },
    ];

    const p = panels[idx];

    // Title
    const titleSize = responsiveFontSize(26, 30);
    const title = this.add.text(W / 2, H * 0.12, p.title, {
      fontFamily: "system-ui", fontSize: titleSize, fontStyle: "bold",
      color: "#FFE9A8", stroke: "#000000", strokeThickness: 4,
    }).setOrigin(0.5);
    this.panelGroup.add(title);

    // Demo
    p.demo();

    // Body
    const bodySize = responsiveFontSize(17, 20);
    const bodyW = Math.min(W - 40, 380);
    const body = this.add.text(W / 2, H * 0.78, p.body, {
      fontFamily: "system-ui", fontSize: bodySize, color: "#FFFFFF",
      align: "center", wordWrap: { width: bodyW },
      stroke: "#000000", strokeThickness: 2,
    }).setOrigin(0.5);
    this.panelGroup.add(body);

    // Progress dots
    const dotsY = H * 0.92;
    panels.forEach((_, i) => {
      const dot = this.add.circle(W / 2 + (i - panels.length / 2 + 0.5) * 14, dotsY, 4, i === idx ? 0xFFE9A8 : 0x666688);
      this.panelGroup.add(dot);
    });

    // Skip button (top right)
    const skipBtn = this.add.text(W - 12, 18, "skip ⏭", {
      fontFamily: "system-ui", fontSize: responsiveFontSize(15, 17), color: "#FFFFFF",
    }).setOrigin(1, 0).setAlpha(0.7).setInteractive({ useHandCursor: true });
    skipBtn.on("pointerdown", () => this.finish());
    this.panelGroup.add(skipBtn);

    // Next / Back buttons
    const btnY = H * 0.85;
    const btnW = Math.min(120, W * 0.28);
    if (idx > 0) {
      const back = this.add.rectangle(W * 0.5 - btnW * 0.7, btnY, btnW, 36, 0x404870).setStrokeStyle(1.5, 0xFFFFFF, 0.5).setInteractive({ useHandCursor: true });
      const backTxt = this.add.text(W * 0.5 - btnW * 0.7, btnY, "← Back", { fontFamily: "system-ui", fontSize: 17, color: "#FFFFFF" }).setOrigin(0.5);
      back.on("pointerdown", () => this.showPanel(idx - 1));
      this.panelGroup.add([back, backTxt]);
    }
    const isLast = idx === panels.length - 1;
    const next = this.add.rectangle(W * 0.5 + btnW * 0.7, btnY, btnW, 36, isLast ? 0x5DBE9A : 0xFFE060).setStrokeStyle(1.5, isLast ? 0x3E8E6C : 0xA08020).setInteractive({ useHandCursor: true });
    const nextTxt = this.add.text(W * 0.5 + btnW * 0.7, btnY, isLast ? "Practice ▶" : "Next →", { fontFamily: "system-ui", fontSize: 17, fontStyle: "bold", color: isLast ? "#FFFFFF" : "#1A2543" }).setOrigin(0.5);
    next.on("pointerdown", () => {
      if (idx < panels.length - 1) this.showPanel(idx + 1);
      else this.startPractice();
    });
    this.panelGroup.add([next, nextTxt]);
  }

  startPractice() {
    if (this.panelGroup) this.panelGroup.destroy();
    const W = this.W, H = this.H;

    // Title bar
    this.add.rectangle(0, 0, W, 56, 0x000000, 0.6).setOrigin(0, 0).setDepth(800);
    this.add.text(W / 2, 22, "PRACTICE", {
      fontFamily: "system-ui", fontSize: 18, fontStyle: "bold", color: "#FFE9A8", letterSpacing: 2,
    }).setOrigin(0.5).setDepth(801);
    this.objectiveText = this.add.text(W / 2, 40, "Use the joystick to grab the crystal", {
      fontFamily: "system-ui", fontSize: 15, color: "#FFFFFF",
    }).setOrigin(0.5).setDepth(801).setAlpha(0.85);

    // Demo meteor (one) and demo black hole (one)
    this.demoMeteor = createRockyMeteor(this, W * 0.5, H * 0.4, 18);
    this.demoMeteor.vx = 0; this.demoMeteor.vy = 0.8;
    this.demoBlackHole = createBlackHole(this, W * 0.78, H * 0.6, 22);
    // Crystal target
    this.crystal = createCrystal(this, W * 0.85, H * 0.3);
    this.crystal.collected = false;

    // Astronaut
    this.astronaut = createAstronaut(this, W * 0.15, H * 0.6, STATE.avatar);
    this.astronaut.setScale(1.6);
    this.astronaut.setDepth(50);
    this.astroVx = 0; this.astroVy = 0;

    // Joystick
    this.joystick = new VirtualJoystick(this);
    this.tweens.timeScale = isKidMode() ? 0.6 : 1;

    // Health (3 hearts, simple)
    this.health = isKidMode() ? 5 : 3;
    this.healthIcons = [];
    for (let i = 0; i < 3; i++) {
      const heart = this.add.text(20 + i * 22, 50, "❤️", { fontSize: 20 }).setDepth(801);
      this.healthIcons.push(heart);
    }

    this.practiceMode = true;
    this.gameEnded = false;
  }

  update() {
    if (!this.practiceMode || this.gameEnded) return;
    const W = this.W, H = this.H;

    // Joystick
    const accel = 0.5;
    this.astroVx += this.joystick.dx * accel;
    this.astroVy += this.joystick.dy * accel;
    this.astroVx *= 0.9; this.astroVy *= 0.9;
    const sp = Math.hypot(this.astroVx, this.astroVy);
    if (sp > 3.5) { this.astroVx = (this.astroVx / sp) * 3.5; this.astroVy = (this.astroVy / sp) * 3.5; }
    this.astronaut.x += this.astroVx;
    this.astronaut.y += this.astroVy;
    this.astronaut.x = Phaser.Math.Clamp(this.astronaut.x, 24, W - 24);
    this.astronaut.y = Phaser.Math.Clamp(this.astronaut.y, 70, H - 24);

    // Demo meteor falls and respawns
    this.demoMeteor.y += this.demoMeteor.vy;
    if (this.demoMeteor.y > H - 30) this.demoMeteor.y = -20;
    const dM = Phaser.Math.Distance.Between(this.demoMeteor.x, this.demoMeteor.y, this.astronaut.x, this.astronaut.y);
    if (dM < 28) this.takeHit("Meteor strike!");

    // Black hole gravity (gentle in tutorial)
    const dx = this.demoBlackHole.x - this.astronaut.x;
    const dy = this.demoBlackHole.y - this.astronaut.y;
    const dist = Math.hypot(dx, dy);
    if (dist < this.demoBlackHole.gravityRadius) {
      const pull = (1 - dist / this.demoBlackHole.gravityRadius) * 0.5;
      this.astroVx += (dx / dist) * pull;
      this.astroVy += (dy / dist) * pull;
      if (dist < this.demoBlackHole.collisionRadius) {
        this.takeHit("Black hole pulled you!");
        this.astronaut.x -= (dx / dist) * 30;
        this.astronaut.y -= (dy / dist) * 30;
      }
    }

    // Crystal pickup
    if (!this.crystal.collected) {
      const dC = Phaser.Math.Distance.Between(this.crystal.x, this.crystal.y, this.astronaut.x, this.astronaut.y);
      if (dC < 30) this.collectCrystal();
    }
  }

  collectCrystal() {
    this.crystal.collected = true;
    this.tweens.add({ targets: this.crystal, y: this.crystal.y - 30, alpha: 0, scale: 1.5, duration: 400, onComplete: () => this.crystal.destroy() });
    this.gameEnded = true;
    STATE.xp += 25;
    const reward = awardLevel(1, this);
    this.lastReward = reward;
    STATE.tutorialDone = true;
    checkLevelUp();
    saveGame(STATE);
    this.time.delayedCall(600, () => this.showSuccess());
  }

  takeHit(message) {
    if (this.invincible) return;
    this.invincible = true;
    this.health--;
    this.healthIcons[this.health]?.setAlpha(0.2);
    showDangerPrompt(this, message);
    this.cameras.main.shake(150, 0.008);
    this.cameras.main.flash(150, 200, 80, 200);
    this.tweens.add({ targets: this.astronaut, alpha: { from: 0.3, to: 1 }, duration: 200, yoyo: true, repeat: 3 });
    this.time.delayedCall(isKidMode() ? 1500 : 900, () => this.invincible = false);
    if (this.health <= 0) {
      this.gameEnded = true;
      this.time.delayedCall(500, () => this.showRetry());
    }
  }

  showSuccess() {
    const W = this.W, H = this.H;
    this.add.rectangle(W / 2, H / 2, W, H, 0x000000, 0.75).setDepth(900);
    const card = this.add.container(W / 2, H / 2).setDepth(901);
    const cardBg = this.add.rectangle(0, 0, Math.min(W - 40, 320), 240, 0x202850).setStrokeStyle(3, 0x80E5FF);
    const trophy = this.add.text(0, -75, "✅", { fontSize: 50 }).setOrigin(0.5);
    const title = this.add.text(0, -25, "Tutorial Complete!", {
      fontFamily: "system-ui", fontSize: 26, fontStyle: "bold", color: "#80E5FF",
    }).setOrigin(0.5);
    const sub = this.add.text(0, 5, `+${this.lastReward?.newPoints || 5} Earth Habitability\n${STATE.habitability}/100`, {
      fontFamily: "system-ui", fontSize: 17, color: "#80E5FF", align: "center",
    }).setOrigin(0.5);
    const btn = this.add.rectangle(0, 60, 220, 44, 0x5DBE9A).setStrokeStyle(2, 0x3E8E6C).setInteractive({ useHandCursor: true });
    const btnTxt = this.add.text(0, 60, "View Levels →", { fontFamily: "system-ui", fontSize: 20, fontStyle: "bold", color: "#FFFFFF" }).setOrigin(0.5);
    card.add([cardBg, trophy, title, sub, btn, btnTxt]);
    card.setScale(0);
    this.tweens.add({ targets: card, scale: 1, duration: 400, ease: "Back.easeOut" });
    btn.on("pointerdown", () => this.finish());
  }

  showRetry() {
    const W = this.W, H = this.H;
    this.add.rectangle(W / 2, H / 2, W, H, 0x000000, 0.85).setDepth(900);
    const card = this.add.container(W / 2, H / 2).setDepth(901);
    const cardBg = this.add.rectangle(0, 0, Math.min(W - 40, 320), 220, 0x202850).setStrokeStyle(3, SPACE.danger);
    const skull = this.add.text(0, -65, "💔", { fontSize: 40 }).setOrigin(0.5);
    const title = this.add.text(0, -20, "Practice Again?", {
      fontFamily: "system-ui", fontSize: 22, fontStyle: "bold", color: "#FFFFFF",
    }).setOrigin(0.5);
    const sub = this.add.text(0, 10, "It's just practice — try once more.", {
      fontFamily: "system-ui", fontSize: 16, color: "#FFFFFF",
    }).setOrigin(0.5);
    const retry = this.add.rectangle(0, 55, 200, 40, SPACE.danger).setStrokeStyle(2, 0xA02040).setInteractive({ useHandCursor: true });
    const retryTxt = this.add.text(0, 55, "🔄 Try Again", { fontFamily: "system-ui", fontSize: 18, fontStyle: "bold", color: "#FFFFFF" }).setOrigin(0.5);
    const skip = this.add.text(0, 90, "Skip to galaxy →", { fontFamily: "system-ui", fontSize: 15, color: "#A8D0FF" }).setOrigin(0.5).setInteractive({ useHandCursor: true });
    card.add([cardBg, skull, title, sub, retry, retryTxt, skip]);
    card.setScale(0);
    this.tweens.add({ targets: card, scale: 1, duration: 400, ease: "Back.easeOut" });
    retry.on("pointerdown", () => this.scene.restart());
    skip.on("pointerdown", () => this.finish());
  }

  finish() {
    STATE.tutorialDone = true;
    if (!STATE.levelsCompleted.includes(1)) STATE.levelsCompleted.push(1);
    saveGame(STATE);
    this.joystick?.destroy();
    this.cameras.main.fadeOut(500, 0, 0, 0);
    this.cameras.main.once("camerafadeoutcomplete", () => this.scene.start("LevelSelectScene"));
  }
}

// LEVEL SELECT — 10 levels with progression lock
// ══════════════════════════════════════════════════════════════════
class LevelSelectScene extends Phaser.Scene {
  constructor() { super("LevelSelectScene"); }
  create() {
    const W = this.scale.width, H = this.scale.height;
    this.W = W; this.H = H;
    this.mobile = isMobile();

    // Realistic background
    makeDeepSpaceBackground(this, "purple");
    makeStarfield(this, this.mobile ? 60 : 90, 1);
    makeNebulaBackdrop(this);

    // Title bar (taller now to fit larger title)
    this.add.rectangle(0, 0, W, 64, 0x000000, 0.7).setOrigin(0, 0).setDepth(200);
    this.add.text(W / 2, 32, "10 LEVELS", {
      fontFamily: "system-ui", fontSize: responsiveFontSize(20, 26), fontStyle: "bold", color: "#FFE9A8", letterSpacing: 3,
    }).setOrigin(0.5).setDepth(201);
    createBackButton(this, "👤 switch", () => this.scene.start("ProfilePickerScene"));

    // Top-right action buttons: ❓ Help | 🏆 Awards | 🎨 Editor — second row below title bar
    const btnY = 88;
    const btnH = 40;
    const helpBtn = this.add.rectangle(W - 188, btnY, 44, btnH, 0x4080A0, 0.9).setStrokeStyle(2, 0xFFFFFF, 0.7).setDepth(202).setInteractive({ useHandCursor: true });
    this.add.text(W - 188, btnY, "❓", { fontSize: 22 }).setOrigin(0.5).setDepth(203);
    helpBtn.on("pointerdown", (p, x, y, e) => {
      if (e && e.stopPropagation) e.stopPropagation();
      Audio.click();
      // Replay tutorial — clear flag, go to TutorialScene
      STATE.tutorialDone = false;
      saveGame(STATE);
      this.scene.start("TutorialScene");
    });

    const awardBtn = this.add.rectangle(W - 140, btnY, 44, btnH, 0xFFA830, 0.9).setStrokeStyle(2, 0xFFFFFF, 0.7).setDepth(202).setInteractive({ useHandCursor: true });
    this.add.text(W - 140, btnY, "🏆", { fontSize: 22 }).setOrigin(0.5).setDepth(203);
    awardBtn.on("pointerdown", (p, x, y, e) => {
      if (e && e.stopPropagation) e.stopPropagation();
      Audio.click();
      this.scene.start("AchievementsScene");
    });

    // 🎨 Level Editor button
    const editorBtn = this.add.rectangle(W - 72, btnY, 96, btnH, 0xC080FF, 0.9).setStrokeStyle(2, 0xFFFFFF, 0.8).setDepth(202).setInteractive({ useHandCursor: true });
    this.add.text(W - 72, btnY, "🎨 Editor", {
      fontFamily: "system-ui", fontSize: 15, fontStyle: "bold", color: "#FFFFFF",
    }).setOrigin(0.5).setDepth(203);
    editorBtn.on("pointerdown", (p, x, y, e) => {
      if (e && e.stopPropagation) e.stopPropagation();
      Audio.click();
      this.scene.start("MyLevelsScene");
    });

    // ═══ EARTH MISSION STATUS BANNER ═══
    this.drawMissionBanner();

    // Kid Mode indicator (top-left, below the switch button)
    if (isKidMode()) {
      const kidBadgeBg = this.add.rectangle(72, 88, 124, 30, 0xFFE060, 0.92).setStrokeStyle(2, 0x804020).setDepth(180);
      const kidBadgeTxt = this.add.text(72, 88, "🧒 KID MODE", {
        fontFamily: "system-ui", fontSize: 14, fontStyle: "bold", color: "#1A2543", letterSpacing: 1,
      }).setOrigin(0.5).setDepth(181);
    }

    // Daily Mission panel
    this.drawDailyMissionPanel();

    // Level grid
    this.drawLevelGrid();

    // 🏠 HQ button — bottom of screen, only if player has progressed
    this.drawHQButton();

    // Surprise events — schedule occasional shooting stars while on this scene
    this.scheduleSurpriseEvents();

    // Show the ending if just hit 100
    if (STATE.habitability >= 100 && !STATE.endingSeen) {
      this.time.delayedCall(800, () => showEarthSaved(this));
    }
  }

  drawDailyMissionPanel() {
    const W = this.W, H = this.H;
    // Generate today's mission if missing
    generateDailyMission();
    const mission = STATE.dailyMission;
    if (!mission) return;

    // Position right under the mission banner
    const bannerY = this.bannerBottomY || 96;
    const panelY = bannerY + 28;
    const panelW = Math.min(W - 24, 400);

    const panelBg = this.add.rectangle(W / 2, panelY, panelW, 64, mission.claimed ? 0x202840 : 0x1A2B45, 0.95).setStrokeStyle(2, mission.claimed ? 0x444455 : 0x80E5FF, mission.claimed ? 0.5 : 0.9).setDepth(180);
    const icon = this.add.text(-panelW / 2 + 28, 0, mission.icon, { fontSize: 26 }).setOrigin(0.5).setDepth(181);
    icon.x = W / 2 - panelW / 2 + 28;
    icon.y = panelY;
    if (mission.claimed) icon.setAlpha(0.4);

    const label = this.add.text(W / 2 - panelW / 2 + 56, panelY - 10, mission.claimed ? "Done!" : "TODAY'S MISSION", {
      fontFamily: "system-ui", fontSize: 13, fontStyle: "bold", color: mission.claimed ? "#5DBE9A" : "#80E5FF", letterSpacing: 1.5,
    }).setOrigin(0, 0.5).setDepth(181);

    const title = this.add.text(W / 2 - panelW / 2 + 56, panelY + 8, mission.title, {
      fontFamily: "system-ui", fontSize: 15, fontStyle: "bold", color: mission.claimed ? "#888899" : "#FFFFFF",
    }).setOrigin(0, 0.5).setDepth(181);

    // Right-side state: progress or claim button
    const isComplete = mission.progress >= mission.target;
    if (mission.claimed) {
      const done = this.add.text(W / 2 + panelW / 2 - 16, panelY, "✓", {
        fontFamily: "system-ui", fontSize: 26, fontStyle: "bold", color: "#5DBE9A",
      }).setOrigin(1, 0.5).setDepth(181);
    } else if (isComplete) {
      const claimBtn = this.add.rectangle(W / 2 + panelW / 2 - 50, panelY, 84, 32, 0xFFE060, 0.95).setStrokeStyle(2, 0x80E5FF).setDepth(181).setInteractive({ useHandCursor: true });
      const claimTxt = this.add.text(W / 2 + panelW / 2 - 50, panelY, `Claim +${mission.reward}`, {
        fontFamily: "system-ui", fontSize: 14, fontStyle: "bold", color: "#1A2543",
      }).setOrigin(0.5).setDepth(182);
      claimBtn.on("pointerdown", (p, x, y, e) => {
        if (e && e.stopPropagation) e.stopPropagation();
        Audio.click();
        Audio.victory();
        STATE.xp += mission.reward;
        // Also award Star Coins for decoration shop (half the XP value, rounded)
        STATE.starCoins = (STATE.starCoins || 0) + Math.ceil(mission.reward / 2);
        mission.claimed = true;
        STATE.dailyStreak = (STATE.dailyStreak || 0) + 1;
        saveGame(STATE);
        // Visual celebration
        this.cameras.main.flash(300, 255, 240, 100);
        // Tween a "+50 XP" floater
        const float = this.add.text(W / 2 + panelW / 2 - 50, panelY, `+${mission.reward} XP!`, {
          fontFamily: "system-ui", fontSize: 20, fontStyle: "bold", color: "#FFE060",
        }).setOrigin(0.5).setDepth(990);
        this.tweens.add({ targets: float, y: float.y - 60, alpha: 0, duration: 1200, onComplete: () => float.destroy() });
        // Redraw the panel
        this.scene.restart();
      });
    } else {
      // Show progress
      const progTxt = this.add.text(W / 2 + panelW / 2 - 16, panelY, `${mission.progress}/${mission.target}`, {
        fontFamily: "system-ui", fontSize: 17, fontStyle: "bold", color: "#A8D0FF",
      }).setOrigin(1, 0.5).setDepth(181);
    }
  }

  drawHQButton() {
    const W = this.W, H = this.H;
    // Only show if player has at least started (1+ level done)
    const completed = (STATE.levelsCompleted || []).length;
    if (completed < 1) return;

    // Small icon button in the top-right action row, alongside Help/Awards/Editor
    // (Position is to the LEFT of the Help button at W-188)
    const btnY = 88;
    const btnH = 40;
    const hq = this.add.rectangle(W - 232, btnY, 40, btnH, 0x5060A0, 0.92).setStrokeStyle(2, 0xFFE9A8, 0.7).setDepth(202).setInteractive({ useHandCursor: true });
    this.add.text(W - 232, btnY, "🏠", { fontSize: 20 }).setOrigin(0.5).setDepth(203);
    hq.on("pointerdown", (p, x, y, e) => {
      if (e && e.stopPropagation) e.stopPropagation();
      Audio.click();
      this.scene.start("HQScene");
    });
  }

  scheduleSurpriseEvents() {
    // Random shooting star: chance per scene visit
    if (Math.random() < 0.35) {
      this.time.delayedCall(800 + Math.random() * 2500, () => this.spawnShootingStar());
    }
    // Repeat every ~12 seconds while on this scene
    this.surpriseTimer = this.time.addEvent({
      delay: 12000, loop: true,
      callback: () => {
        if (Math.random() < 0.45) this.spawnShootingStar();
      }
    });
  }

  spawnShootingStar() {
    const W = this.W, H = this.H;
    const startX = -30;
    const startY = 80 + Math.random() * (H * 0.4);
    const endX = W + 30;
    const endY = startY + 80 + Math.random() * 80;
    const star = this.add.container(startX, startY).setDepth(190);
    const head = this.add.circle(0, 0, 4, 0xFFFFFF);
    const trail = this.add.rectangle(-12, 0, 22, 2, 0xFFE9A8, 0.7);
    star.add([trail, head]);
    star.setInteractive(new Phaser.Geom.Circle(0, 0, 18), Phaser.Geom.Circle.Contains);
    star.collected = false;
    star.on("pointerdown", () => {
      if (star.collected) return;
      star.collected = true;
      Audio.unlock();
      // Award bonus XP
      const bonus = 25;
      STATE.xp += bonus;
      STATE.surpriseXp = (STATE.surpriseXp || 0) + bonus;
      saveGame(STATE);
      // Show floater
      const float = this.add.text(star.x, star.y, `+${bonus} XP!`, {
        fontFamily: "system-ui", fontSize: 20, fontStyle: "bold", color: "#FFE060",
      }).setOrigin(0.5).setDepth(195);
      this.tweens.add({ targets: float, y: float.y - 60, alpha: 0, duration: 1000, onComplete: () => float.destroy() });
      // Burst
      for (let i = 0; i < 8; i++) {
        const angle = (i / 8) * Math.PI * 2;
        const sp = this.add.circle(star.x, star.y, 2, 0xFFE9A8).setDepth(194);
        this.tweens.add({ targets: sp, x: sp.x + Math.cos(angle) * 30, y: sp.y + Math.sin(angle) * 30, alpha: 0, duration: 400, onComplete: () => sp.destroy() });
      }
      star.destroy();
    });
    this.tweens.add({
      targets: star, x: endX, y: endY, duration: 2200, ease: "Linear",
      onComplete: () => { if (star.scene) star.destroy(); }
    });
  }

  drawMissionBanner() {
    const W = this.W, H = this.H;
    const bannerY = 134; // pushed down to make room for the second row of action buttons
    const bannerH = this.mobile ? 116 : 108; // taller to fit larger fonts
    const bannerW = Math.min(W - 24, 460);
    this.bannerBottomY = bannerY + bannerH;

    // Container
    const c = this.add.container(W / 2, bannerY + bannerH / 2).setDepth(150);
    // Background — gradient with earth-blue tint
    const bg = this.add.rectangle(0, 0, bannerW, bannerH, 0x051030, 0.92);
    bg.setStrokeStyle(2, 0x80E5FF);
    // Earth icon
    const earthGroup = this.add.container(-bannerW / 2 + 28, 0);
    const halo = this.add.circle(0, 0, 22, 0x80E5FF, 0.25);
    const earthBody = this.add.circle(0, 0, 16, 0x3B7DB5);
    const earthLand = this.add.graphics();
    earthLand.fillStyle(0x5DBE9A, 0.8);
    earthLand.fillEllipse(-5, -3, 10, 7);
    earthLand.fillEllipse(7, 4, 8, 5);
    const earthCloud = this.add.ellipse(-3, -5, 10, 3, 0xFFFFFF, 0.5);
    earthGroup.add([halo, earthBody, earthLand, earthCloud]);
    this.tweens.add({ targets: earthGroup, angle: 360, duration: 60000, repeat: -1 });
    this.tweens.add({ targets: halo, scale: { from: 0.95, to: 1.15 }, duration: 2000, yoyo: true, repeat: -1 });

    // Headline
    const headline = this.add.text(-bannerW / 2 + 56, -bannerH / 2 + 14, "MISSION: SAVE EARTH", {
      fontFamily: "system-ui", fontSize: responsiveFontSize(15, 17), fontStyle: "bold",
      color: "#FFE9A8", letterSpacing: 2,
    }).setOrigin(0, 0);
    // Sub-headline
    const subline = this.add.text(-bannerW / 2 + 56, -bannerH / 2 + 38, "Find a planet where humanity can live", {
      fontFamily: "system-ui", fontSize: 14, color: "#A8D0FF",
    }).setOrigin(0, 0);

    // Habitability bar — moved further down with more spacing
    const barX = -bannerW / 2 + 56;
    const barY = bannerH / 2 - 18;
    const barW = bannerW - 80;
    const barLabel = this.add.text(barX, barY - 18, "EARTH HABITABILITY", {
      fontFamily: "system-ui", fontSize: 13, fontStyle: "bold", color: "#80E5FF", letterSpacing: 1,
    }).setOrigin(0, 0.5);
    const barValue = this.add.text(barX + barW, barY - 18, `${STATE.habitability} / 100`, {
      fontFamily: "system-ui", fontSize: 14, fontStyle: "bold", color: "#FFE9A8",
    }).setOrigin(1, 0.5);
    const bgBar = this.add.rectangle(barX, barY, barW, 8, 0x000000, 0.8).setOrigin(0, 0.5).setStrokeStyle(1, 0x80E5FF, 0.5);
    const fillBar = this.add.rectangle(barX + 1, barY, (barW - 2) * (STATE.habitability / 100), 6, 0x80E5FF).setOrigin(0, 0.5);
    // Glow on fill
    this.tweens.add({ targets: fillBar, alpha: { from: 0.85, to: 1 }, duration: 1200, yoyo: true, repeat: -1 });

    c.add([bg, earthGroup, headline, subline, barLabel, barValue, bgBar, fillBar]);

    // Crew preview (small icons at right) — pushed below the headline so they don't overlap
    if (STATE.alienCrew.length > 0) {
      const crewLabel = this.add.text(bannerW / 2 - 6, -bannerH / 2 + 14, `CREW (${STATE.alienCrew.length})`, {
        fontFamily: "system-ui", fontSize: 13, fontStyle: "bold", color: "#FFE9A8",
      }).setOrigin(1, 0);
      c.add(crewLabel);
      STATE.alienCrew.slice(0, 5).forEach((alienId, i) => {
        const a = ALIENS[alienId];
        if (!a) return;
        const dot = this.add.circle(bannerW / 2 - 12 - i * 12, -bannerH / 2 + 38, 5, a.color);
        dot.setStrokeStyle(1, 0xFFFFFF, 0.8);
        c.add(dot);
      });
    }
  }

  drawLevelGrid() {
    const W = this.W, H = this.H;
    const cols = this.mobile ? 2 : 3;
    // Sort: favorites first, then by level number
    const favs = STATE.favoriteLevels || [];
    const sortedLevels = [...LEVELS].sort((a, b) => {
      const aFav = favs.includes(a.num) ? 0 : 1;
      const bFav = favs.includes(b.num) ? 0 : 1;
      if (aFav !== bFav) return aFav - bFav;
      return a.num - b.num;
    });
    const rows = Math.ceil(sortedLevels.length / cols);
    const cardW = Math.min((W - 60) / cols - 8, this.mobile ? 150 : 180);
    const cardH = this.mobile ? 130 : 150;
    const startX = (W - (cols * (cardW + 8) - 8)) / 2 + cardW / 2;
    const startY = this.mobile ? 280 : 290;
    const gapY = cardH + 10;
    const gapX = cardW + 8;

    // Container that holds all level cards — scrollable
    this.gridContainer = this.add.container(0, 0).setDepth(50);
    // Track cumulative bottom of grid
    this.gridContentH = startY + rows * gapY;
    // Available view height for the grid
    this.gridViewBottomY = H - 30;
    // Save startY for clamping
    this.gridStartY = startY;
    // Initial scroll offset
    this.gridScrollY = 0;

    // Scroll input handlers
    this._gridDragging = false;
    this._gridDragStartY = 0;
    this._gridDragOriginY = 0;
    this.input.on("pointerdown", (pointer) => {
      // Only start drag if pointer is in the grid zone (below mission banner, above HQ icons area)
      if (pointer.y < startY - 10 || pointer.y > this.gridViewBottomY) return;
      // Don't start drag if pointer is on a hit-tested level card — Phaser will fire pointerdown on the card too
      this._gridDragging = true;
      this._gridDragStartY = pointer.y;
      this._gridDragOriginY = this.gridScrollY;
      this._gridDragMoved = false;
    });
    this.input.on("pointermove", (pointer) => {
      if (!this._gridDragging) return;
      const dy = pointer.y - this._gridDragStartY;
      if (Math.abs(dy) > 5) this._gridDragMoved = true;
      let newScrollY = this._gridDragOriginY + dy;
      // Clamp
      const maxScroll = 0;
      const minScroll = Math.min(0, (this.gridViewBottomY - this.gridContentH) - 20);
      if (newScrollY > maxScroll) newScrollY = maxScroll;
      if (newScrollY < minScroll) newScrollY = minScroll;
      this.gridScrollY = newScrollY;
      this.gridContainer.y = newScrollY;
    });
    this.input.on("pointerup", () => { this._gridDragging = false; });
    this.input.on("pointercancel", () => { this._gridDragging = false; });

    sortedLevels.forEach((lvl, i) => {
      const col = i % cols;
      const row = Math.floor(i / cols);
      const x = startX + col * gapX;
      const y = startY + row * gapY + cardH / 2;

      const unlocked = isLevelUnlocked(lvl);
      const completed = STATE.levelsCompleted.includes(lvl.num);
      const card = this.add.container(x, y).setDepth(100);

      // Background card
      const bg = this.add.rectangle(0, 0, cardW, cardH, unlocked ? 0x101830 : 0x080808, 0.92);
      bg.setStrokeStyle(2, completed ? 0x5DBE9A : (unlocked ? lvl.color : 0x444444));

      // Top row: badge (left) + world tag (right) — absolute pixel positioning
      const topY = -cardH / 2 + 18;
      const badge = this.add.circle(-cardW / 2 + 18, topY, 14, completed ? 0x5DBE9A : (unlocked ? lvl.color : 0x444444));
      badge.setStrokeStyle(1, 0x000000, 0.4);
      const numTxt = this.add.text(-cardW / 2 + 18, topY, `${lvl.num}`, {
        fontFamily: "system-ui", fontSize: 16, fontStyle: "bold", color: unlocked ? "#FFFFFF" : "#888888",
      }).setOrigin(0.5);
      const world = this.add.text(cardW / 2 - 8, topY, lvl.world.toUpperCase(), {
        fontFamily: "system-ui", fontSize: 13, fontStyle: "bold", color: unlocked ? "#FFE9A8" : "#666666", letterSpacing: 1,
      }).setOrigin(1, 0.5);

      // Name — centered, 1 row below the top row, room for 2-line wrap
      const name = this.add.text(0, -cardH / 2 + 56, lvl.name, {
        fontFamily: "system-ui", fontSize: 18, fontStyle: "bold", color: unlocked ? "#FFFFFF" : "#888888",
        align: "center", wordWrap: { width: cardW - 24 },
      }).setOrigin(0.5);

      // Difficulty stars — below name with breathing room
      const diffStr = "★".repeat(lvl.difficulty) + "☆".repeat(10 - lvl.difficulty);
      const diff = this.add.text(0, cardH / 2 - 38, diffStr, {
        fontFamily: "system-ui", fontSize: 13, color: unlocked ? "#FFA850" : "#444444",
      }).setOrigin(0.5);

      // Description — anchored above the bottom corner badges (star/check)
      const desc = this.add.text(0, cardH / 2 - 26, lvl.desc, {
        fontFamily: "system-ui", fontSize: 12, color: unlocked ? "#A8B0CC" : "#555555",
        align: "center", wordWrap: { width: cardW - 60 },
      }).setOrigin(0.5);

      // Lock icon if locked
      if (!unlocked) {
        const lock = this.add.text(0, 0, "🔒", { fontSize: 32 }).setOrigin(0.5).setAlpha(0.6);
        card.add(lock);
      }
      // Checkmark if completed
      if (completed) {
        const check = this.add.text(cardW / 2 - 12, cardH / 2 - 14, "✓", {
          fontFamily: "system-ui", fontSize: 18, fontStyle: "bold", color: "#5DBE9A",
        }).setOrigin(0.5);
        card.add(check);
      }

      card.add([bg, badge, numTxt, world, name, diff, desc]);

      // Favorite star — only show on unlocked levels (bottom-left corner to avoid world tag overlap)
      if (unlocked) {
        const isFav = (STATE.favoriteLevels || []).includes(lvl.num);
        const starBg = this.add.circle(-cardW / 2 + 14, cardH / 2 - 14, 12, 0x000000, 0.5).setStrokeStyle(1, 0xFFE060, 0.6);
        const starTxt = this.add.text(-cardW / 2 + 14, cardH / 2 - 14, isFav ? "★" : "☆", {
          fontFamily: "system-ui", fontSize: 18, fontStyle: "bold", color: isFav ? "#FFE060" : "#888899",
        }).setOrigin(0.5);
        starBg.setInteractive({ useHandCursor: true });
        starBg.on("pointerdown", (p, lx, ly, e) => {
          if (e && e.stopPropagation) e.stopPropagation();
          Audio.click();
          if (!STATE.favoriteLevels) STATE.favoriteLevels = [];
          if (STATE.favoriteLevels.includes(lvl.num)) {
            STATE.favoriteLevels = STATE.favoriteLevels.filter(n => n !== lvl.num);
          } else {
            STATE.favoriteLevels.push(lvl.num);
          }
          saveGame(STATE);
          this.scene.restart();
        });
        card.add([starBg, starTxt]);
      }

      if (unlocked) {
        bg.setInteractive({ useHandCursor: true });
        bg.on("pointerover", () => this.tweens.add({ targets: card, scale: 1.04, duration: 150 }));
        bg.on("pointerout", () => this.tweens.add({ targets: card, scale: 1, duration: 150 }));
        bg.on("pointerdown", () => {
          // If the user is currently scrolling/dragging, don't trigger launch
          if (this._gridDragMoved) return;
          this.launchLevel(lvl);
        });
      }
      // Add card to scrollable container instead of leaving it free-standing
      this.gridContainer.add(card);
    });
  }

  launchLevel(lvl) {
    // Show mission briefing first; then transition to level
    showMissionBriefing(this, lvl.num, () => {
      this.cameras.main.fadeOut(400, 0, 0, 0);
      this.cameras.main.once("camerafadeoutcomplete", () => {
        const sceneExists = ["TutorialScene", "AqualonScene", "PyrosScene", "GlaciusScene", "VerdaniaScene", "MekanosScene", "BonusScene"].includes(lvl.scene);
        if (sceneExists) {
          this.scene.start(lvl.scene, { startZone: lvl.subZone || 1, levelNum: lvl.num, cfg: lvl.cfg || null });
        } else {
          const planetMap = { GlaciusScene: "glacius", VerdaniaScene: "verdania", MekanosScene: "mekanos" };
          this.scene.start("ComingSoonScene", { planetId: planetMap[lvl.scene] || "glacius", levelName: lvl.name });
        }
      });
    });
  }
}
class GalaxyHubScene extends Phaser.Scene {

          fontFamily: "system-ui", fontSize: 15, fontStyle: "bold", color: "#ffffff",

        fontFamily: "system-ui", fontSize: 15, fontStyle: "bold", color: "#ffffff",

      hit.on("pointerover", () => {
        this.tweens.add({ targets: planet, scale: 1.1, duration: 200 });

      });
      hit.on("pointerout", () => {
        this.tweens.add({ targets: planet, scale: 1, duration: 200 });

    const navBtn = this.add.rectangle(W / 2, H - 36, 180, 32, 0x202850, 0.7).setStrokeStyle(1, 0xFFFFFF, 0.4).setDepth(201);
    const navText = this.add.text(W / 2, H - 36, "🌌 Other Galaxies", {
      fontFamily: "system-ui", fontSize: 15, color: "#A8D0FF",
    }).setOrigin(0.5).setDepth(202);
    navBtn.setInteractive({ useHandCursor: true });
    navBtn.on("pointerdown", () => this.flashMessage("More galaxies — coming soon!"));
  }

  showPlanetInfo(def) {
    if (this.infoBox) this.hidePlanetInfo();
    const W = this.W, H = this.H;
    this.infoBox = this.add.container(W / 2, H - 90).setDepth(300);
    const bg = this.add.rectangle(0, 0, Math.min(W - 30, 300), 56, 0x000000, 0.75).setStrokeStyle(1.5, def.color);
    const name = this.add.text(0, -12, def.name, {
      fontFamily: "system-ui", fontSize: 18, fontStyle: "bold", color: "#FFE9A8",
    }).setOrigin(0.5);
    const desc = this.add.text(0, 8, def.desc, {
      fontFamily: "system-ui", fontSize: 15, color: "#ffffff",
    }).setOrigin(0.5);
    this.infoBox.add([bg, name, desc]);
    this.infoBox.setAlpha(0);
    this.tweens.add({ targets: this.infoBox, alpha: 1, duration: 200 });
  }
  hidePlanetInfo() { if (this.infoBox) { this.infoBox.destroy(); this.infoBox = null; } }
  flashMessage(text) {
    const W = this.W, H = this.H;
    const msg = this.add.text(W / 2, H / 2, text, {
      fontFamily: "system-ui", fontSize: 20, fontStyle: "bold", color: "#FFE9A8",
      stroke: "#000000", strokeThickness: 3, backgroundColor: "#00000088", padding: { x: 14, y: 8 },
    }).setOrigin(0.5).setDepth(400);
    this.tweens.add({ targets: msg, alpha: 0, y: H / 2 - 30, duration: 1400, ease: "Cubic.easeOut", onComplete: () => msg.destroy() });
  }
}

// SPACE TRAVEL — navigate to planet, avoid black/white holes
// ══════════════════════════════════════════════════════════════════
class SpaceTravelScene extends Phaser.Scene {
  constructor() { super("SpaceTravelScene"); }
  init(data) { this.destination = data.destination || "aqualon"; }
  create() {
    const W = this.scale.width, H = this.scale.height;
    this.W = W; this.H = H;

    // Realistic deep space background with nebula
    makeDeepSpaceBackground(this, "nebula");
    makeNebulaBackdrop(this);
    // Two parallax star layers — realistic
    makeStarfield(this, 50, 0.3);
    makeStarfield(this, 80, 1);

    // Three vertical zones, divided by faint dashed lines
    this.zoneDividers = [];
    [W * 0.36, W * 0.66].forEach(x => {
      const div = this.add.graphics();
      div.lineStyle(1, 0xFFE9A8, 0.18);
      for (let y = 80; y < H - 30; y += 16) {
        div.lineBetween(x, y, x, y + 8);
      }
      this.zoneDividers.push(div);
    });

    // Hazards arrays
    this.blackHoles = [];
    this.whiteHoles = [];
    this.asteroids = [];
    this.movingWhiteHoles = [];

    // ZONE 1 (left): Gravity slalom — 2 black holes vertically offset, force player to weave
    const bh1 = createBlackHole(this, W * 0.18, H * 0.32, 26);
    const bh2 = createBlackHole(this, W * 0.18, H * 0.72, 28);
    this.blackHoles.push(bh1, bh2);

    // ZONE 2 (middle): Moving asteroid field — vertical drifting rocks
    const zone2X1 = W * 0.36, zone2X2 = W * 0.66;
    for (let i = 0; i < 5; i++) {
      const ax = zone2X1 + (zone2X2 - zone2X1) * (0.15 + Math.random() * 0.7);
      const ay = 110 + Math.random() * (H - 220);
      const ast = createAsteroid(this, ax, ay, 18 + Math.random() * 8);
      ast.vx = (Math.random() - 0.5) * 0.6; // small drift
      ast.vy = 0.8 + Math.random() * 1.2; // mostly downward
      ast.zoneX1 = zone2X1; ast.zoneX2 = zone2X2;
      this.asteroids.push(ast);
    }

    // ZONE 3 (right): White hole barriers — 2 stationary blocking direct path, plus 1 moving
    this.whiteHoles.push(createWhiteHole(this, W * 0.78, H * 0.35, 18));
    this.whiteHoles.push(createWhiteHole(this, W * 0.78, H * 0.72, 18));
    // Moving one — patrols vertically near the right edge
    const movingWh = createWhiteHole(this, W * 0.92, H * 0.5, 14);
    movingWh.vx = 0; movingWh.vy = 1.6;
    movingWh.patrolMinY = 120; movingWh.patrolMaxY = H - 60;
    this.movingWhiteHoles.push(movingWh);

    // ZONE 3: Pressure switch the player must touch to unlock the dock gate
    this.dockSwitch = createSwitch(this, W * 0.86, H * 0.85);
    // Dock gate (vertical, blocks the planet)
    this.dockGate = createEnergyGate(this, W * 0.92, H * 0.18, 14, 60); // narrow + tall
    this.dockGate.setRotation(Math.PI / 2);
    // We treat it as horizontal-blocking — vertical beam blocking the right corner

    // Destination planet — top-right, behind the gate
    const destDef = PLANETS[this.destination];
    this.destPlanet = createPlanet(this, W * 0.92, H * 0.10, { ...destDef, size: 22 });
    const arrow = this.add.text(W * 0.92, H * 0.10 + 36, "↑ destination", {
      fontFamily: "system-ui", fontSize: 14, color: "#FFE9A8", fontStyle: "bold",
    }).setOrigin(0.5);
    this.tweens.add({ targets: arrow, alpha: { from: 0.5, to: 1 }, duration: 700, yoyo: true, repeat: -1 });

    // Astronaut starts far left
    this.astronaut = createAstronaut(this, W * 0.08, H * 0.5, STATE.avatar);
    this.astronaut.setScale(1.6);
    this.astronaut.setDepth(50);
    this.astroVx = 0; this.astroVy = 0;
    this.astroSpeed = 3.2;

    // Joystick
    this.joystick = new VirtualJoystick(this);
    this.tweens.timeScale = isKidMode() ? 0.6 : 1;

    // Oxygen
    this.oxygen = 100;
    this.maxOxygen = 100;
    this.createUI();

    // Tutorial / objective
    showZoneBanner(this, 1, "Gravity Slalom", 0xFF8030);
    showObjective(this, "1. Slalom past the black holes  →  2. Cross the asteroid stream  →  3. Hit the switch & dock");

    // Trigger zone transitions for additional banners
    this.zoneShown = { 1: true, 2: false, 3: false };

    this.gameEnded = false;
  }

  createUI() {
    const W = this.W;
    this.add.rectangle(0, 0, W, 56, 0x000000, 0.6).setOrigin(0, 0).setDepth(800);
    createBackButton(this, "← levels", () => { this.joystick?.destroy(); this.scene.start("LevelSelectScene"); });
    createPauseButton(this, () => showPauseMenu(this, { world: "space" }));
    Audio.startMusic("space");

    this.events.once("shutdown", () => { Audio.stopMusic(); this.geyserEvent?.remove(); this.iceTitanEvent?.remove(); });

    this.add.text(W / 2 - 60, 22, "OXYGEN", {
      fontFamily: "system-ui", fontSize: 14, fontStyle: "bold", color: "#80E5FF",
    }).setOrigin(0, 0.5).setDepth(801);
    this.oxBg = this.add.rectangle(W / 2, 38, 220, 12, 0x000000, 0.65).setStrokeStyle(1, SPACE.oxygen, 0.6).setDepth(801);
    this.oxFill = this.add.rectangle(W / 2 - 109, 38, 218, 10, SPACE.oxygen).setOrigin(0, 0.5).setDepth(802);

    const dest = PLANETS[this.destination];
    this.add.text(W - 12, 28, `→ ${dest.name}`, {
      fontFamily: "system-ui", fontSize: 17, fontStyle: "bold", color: "#FFE9A8",
    }).setOrigin(1, 0.5).setDepth(801);
  }

  update() {
    if (this.gameEnded) return;
    if (this._paused) return;
    const W = this.W, H = this.H;

    // Joystick movement
    const accel = 0.4;
    this.astroVx += this.joystick.dx * accel;
    this.astroVy += this.joystick.dy * accel;
    this.astroVx *= 0.92; this.astroVy *= 0.92;
    const speed = Math.hypot(this.astroVx, this.astroVy);
    if (speed > this.astroSpeed) {
      this.astroVx = (this.astroVx / speed) * this.astroSpeed;
      this.astroVy = (this.astroVy / speed) * this.astroSpeed;
    }
    this.astronaut.x += this.astroVx;
    this.astronaut.y += this.astroVy;
    this.astronaut.x = Phaser.Math.Clamp(this.astronaut.x, 24, W - 24);
    this.astronaut.y = Phaser.Math.Clamp(this.astronaut.y, 70, H - 24);

    // Zone transition banners
    if (!this.zoneShown[2] && this.astronaut.x > W * 0.36) {
      this.zoneShown[2] = true;
      showZoneBanner(this, 2, "Asteroid Stream", 0x6A5A48);
    }
    if (!this.zoneShown[3] && this.astronaut.x > W * 0.66) {
      this.zoneShown[3] = true;
      showZoneBanner(this, 3, "Final Approach", 0x80D0FF);
      showObjective(this, "Hit the switch (bottom-right) to unlock the dock!");
    }

    // Black hole gravity pull
    for (const bh of this.blackHoles) {
      const dx = bh.x - this.astronaut.x;
      const dy = bh.y - this.astronaut.y;
      const dist = Math.hypot(dx, dy);
      if (dist < bh.gravityRadius) {
        const pull = (1 - dist / bh.gravityRadius) * 0.9;
        this.astroVx += (dx / dist) * pull;
        this.astroVy += (dy / dist) * pull;
        if (dist < bh.collisionRadius) {
          this.takeDamage(30, "Black hole pulled you in!");
          this.astronaut.x -= (dx / dist) * 36;
          this.astronaut.y -= (dy / dist) * 36;
        }
      }
    }

    // Stationary white holes
    for (const wh of this.whiteHoles) {
      const d = Phaser.Math.Distance.Between(wh.x, wh.y, this.astronaut.x, this.astronaut.y);
      if (d < wh.collisionRadius + 16) {
        this.takeDamage(20, "White hole burst!");
        const ang = Math.atan2(this.astronaut.y - wh.y, this.astronaut.x - wh.x);
        this.astroVx = Math.cos(ang) * 8;
        this.astroVy = Math.sin(ang) * 8;
      }
    }

    // Moving white holes (zone 3 patrol)
    for (const wh of this.movingWhiteHoles) {
      wh.y += wh.vy;
      if (wh.y > wh.patrolMaxY || wh.y < wh.patrolMinY) wh.vy *= -1;
      const d = Phaser.Math.Distance.Between(wh.x, wh.y, this.astronaut.x, this.astronaut.y);
      if (d < wh.collisionRadius + 16) {
        this.takeDamage(25, "Patrol burst!");
        const ang = Math.atan2(this.astronaut.y - wh.y, this.astronaut.x - wh.x);
        this.astroVx = Math.cos(ang) * 9;
        this.astroVy = Math.sin(ang) * 9;
      }
    }

    // Drifting asteroids — within zone 2 bounds
    for (const ast of this.asteroids) {
      ast.x += ast.vx;
      ast.y += ast.vy;
      // Wrap at zone bounds
      if (ast.y > H - 30) ast.y = 90;
      if (ast.x < ast.zoneX1) ast.vx = Math.abs(ast.vx);
      if (ast.x > ast.zoneX2) ast.vx = -Math.abs(ast.vx);
      const d = Phaser.Math.Distance.Between(ast.x, ast.y, this.astronaut.x, this.astronaut.y);
      if (d < ast.collisionRadius + 14) {
        this.takeDamage(15, "Asteroid hit!");
        const ang = Math.atan2(this.astronaut.y - ast.y, this.astronaut.x - ast.x);
        this.astroVx = Math.cos(ang) * 6;
        this.astroVy = Math.sin(ang) * 6;
      }
    }

    // Switch activation
    if (!this.dockSwitch.activated) {
      const d = Phaser.Math.Distance.Between(this.dockSwitch.x, this.dockSwitch.y, this.astronaut.x, this.astronaut.y);
      if (d < this.dockSwitch.collisionRadius + 14) {
        this.dockSwitch.activate();
        this.dockGate.unlock();
        showObjective(this, "Dock unlocked! Fly up to the planet.");
        // Quick celebration flash on planet
        this.tweens.add({ targets: this.destPlanet, scale: 1.2, duration: 300, yoyo: true });
      }
    }

    // Gate blocking — if not unlocked, push astronaut back from gate area
    if (!this.dockGate.unlocked) {
      const gateX = this.dockGate.x;
      const gateY = this.dockGate.y;
      // Vertical beam: blocks if astronaut is near it horizontally and within vertical span
      if (Math.abs(this.astronaut.x - gateX) < 20 && Math.abs(this.astronaut.y - gateY) < 40) {
        this.takeDamage(8, "Gate is locked! Find the switch.");
        this.astroVx = -Math.abs(this.astroVx) - 3;
      }
    }

    // Reach destination (only if gate unlocked)
    if (this.dockGate.unlocked) {
      const distToDest = Phaser.Math.Distance.Between(this.astronaut.x, this.astronaut.y, this.destPlanet.x, this.destPlanet.y);
      if (distToDest < 36) this.arrive();
    }
  }

  takeDamage(amount, message) {
    if (this.invincible) return;
    this.oxygen -= amount;
    this.invincible = true;
    this.time.delayedCall(isKidMode() ? 1500 : 900, () => this.invincible = false);
    if (message) showDangerPrompt(this, message);
    this.cameras.main.shake(150, 0.008);
    this.cameras.main.flash(150, 255, 60, 60);
    const w = Math.max(0, (this.oxygen / this.maxOxygen) * 218);
    this.tweens.add({ targets: this.oxFill, width: w, duration: 200 });
    if (this.oxygen <= 0) this.gameOver();
  }

  arrive() {
    if (this.gameEnded) return;
    this.gameEnded = true;
    this.joystick.destroy();
    this.cameras.main.fadeOut(500, 0, 0, 0);
    this.cameras.main.once("camerafadeoutcomplete", () => {
      const dest = PLANETS[this.destination];
      this.scene.start(dest.scene, { planetId: this.destination });
    });
  }

  gameOver() {
    if (this.gameEnded) return;
    this.gameEnded = true;
    this.joystick.destroy();
    if (this.iceSpawnEvent) this.iceSpawnEvent.remove();
    if (this.avalancheTimer) this.avalancheTimer.remove();
    if (this.bossAttackEvent) this.bossAttackEvent.remove();
    if (this.flareEvent) this.flareEvent.remove();
    Audio.fail();
    const W = this.W, H = this.H;
    const overlay = this.add.rectangle(W / 2, H / 2, W, H, 0x000000, 0.85).setDepth(900);
    const card = this.add.container(W / 2, H / 2).setDepth(901);
    const cardH = this._continueUsed ? 240 : 320;
    const cardBg = this.add.rectangle(0, 0, Math.min(W - 40, 320), cardH, 0x202850).setStrokeStyle(3, SPACE.danger);
    const skull = this.add.text(0, -cardH / 2 + 36, "💀", { fontSize: 48 }).setOrigin(0.5);
    const title = this.add.text(0, -cardH / 2 + 86, "Out of Oxygen!", {
      fontFamily: "system-ui", fontSize: 22, fontStyle: "bold", color: "#FF6080", align: "center", wordWrap: { width: 280 },
    }).setOrigin(0.5);
    const sub = this.add.text(0, -cardH / 2 + 124, "The hazards got you.\nTry again, astronaut.", {
      fontFamily: "system-ui", fontSize: 16, color: "#ffffff", align: "center",
    }).setOrigin(0.5);
    card.add([cardBg, skull, title, sub]);

    addContinueButton(this, card, {
      y: -cardH / 2 + 168,
      onContinue: () => {
        overlay.destroy();
        card.destroy();
        restoreForContinue(this);
        this.joystick = new VirtualJoystick(this);
        this.tweens.timeScale = isKidMode() ? 0.6 : 1;
      },
    });

    const retryY = this._continueUsed ? cardH / 2 - 80 : cardH / 2 - 70;
    const retry = this.add.rectangle(0, retryY, 200, 40, SPACE.danger).setStrokeStyle(2, 0xA02040).setInteractive({ useHandCursor: true });
    const retryTxt = this.add.text(0, retryY, "🔄 Try Again", { fontFamily: "system-ui", fontSize: 19, fontStyle: "bold", color: "#ffffff" }).setOrigin(0.5);
    const back = this.add.text(0, cardH / 2 - 30, "↩ Back to levels", { fontFamily: "system-ui", fontSize: 16, color: "#A8D0FF" }).setOrigin(0.5).setInteractive({ useHandCursor: true });
    card.add([retry, retryTxt, back]);
    card.setScale(0);
    this.tweens.add({ targets: card, scale: 1, duration: 400, ease: "Back.easeOut" });
    retry.on("pointerdown", () => {
      this._continueAttempts = (this._continueAttempts || 0) + 1;
      this.scene.restart();
    });
    back.on("pointerdown", () => this.scene.start("LevelSelectScene"));
  }
}

// ══════════════════════════════════════════════════════════════════
// AQUALON — rescue Squidlets
// ══════════════════════════════════════════════════════════════════
class AqualonScene extends Phaser.Scene {
  constructor() { super("AqualonScene"); }
  init(data) { this.levelNum = data?.levelNum || 2; this.startZone = data?.startZone || 1; this.cfg = data?.cfg || null; }
  create() {
    const W = this.scale.width, H = this.scale.height;
    this.W = W; this.H = H;

    // Layered ocean — three depth zones, each darker than the last
    const bg = this.add.graphics();
    bg.fillGradientStyle(0x60B0E0, 0x60B0E0, 0x102060, 0x030820);
    bg.fillRect(0, 0, W, H);

    this.zone1Y = H * 0.36;
    this.zone2Y = H * 0.66;

    // Caustic light rays from above (sun shining through water surface)
    for (let i = 0; i < 6; i++) {
      const x = (i / 5) * W + (Math.random() - 0.5) * 40;
      const ray = this.add.polygon(x, 0, [-10, 0, 10, 0, 30, this.zone1Y, -30, this.zone1Y], 0xFFFFE0, 0.07);
      this.tweens.add({ targets: ray, alpha: { from: 0.04, to: 0.12 }, duration: 2500 + Math.random() * 1500, yoyo: true, repeat: -1 });
      this.tweens.add({ targets: ray, x: ray.x + 30, duration: 5000, yoyo: true, repeat: -1, ease: "Sine.easeInOut" });
    }

    // Subtle dashed zone dividers
    const divFx = this.add.graphics();
    divFx.lineStyle(1, 0x80E0FF, 0.15);
    for (let x = 0; x < W; x += 28) divFx.lineBetween(x, this.zone1Y, x + 14, this.zone1Y);
    divFx.lineStyle(1, 0x80E0FF, 0.10);
    for (let x = 0; x < W; x += 28) divFx.lineBetween(x, this.zone2Y, x + 14, this.zone2Y);

    // Drifting jellyfish silhouettes (background atmosphere)
    for (let i = 0; i < 4; i++) {
      const x = Math.random() * W, y = this.zone1Y + 30 + Math.random() * (this.zone2Y - this.zone1Y - 60);
      const jelly = this.add.container(x, y);
      const body = this.add.ellipse(0, 0, 24, 16, 0xC080E0, 0.20);
      const t1 = this.add.line(0, 0, -6, 8, -8, 22, 0xC080E0, 0.18).setLineWidth(1.5);
      const t2 = this.add.line(0, 0, 0, 8, 0, 24, 0xC080E0, 0.18).setLineWidth(1.5);
      const t3 = this.add.line(0, 0, 6, 8, 8, 22, 0xC080E0, 0.18).setLineWidth(1.5);
      jelly.add([body, t1, t2, t3]);
      this.tweens.add({ targets: jelly, y: y - 20, duration: 4000 + Math.random() * 2000, yoyo: true, repeat: -1, ease: "Sine.easeInOut" });
      this.tweens.add({ targets: body, scaleY: 0.7, duration: 1500, yoyo: true, repeat: -1, ease: "Sine.easeInOut" });
    }

    // Bubble streams rising from bottom (varied)
    for (let i = 0; i < 5; i++) {
      const bx = Math.random() * W;
      this.time.addEvent({
        delay: 600 + Math.random() * 800, loop: true,
        callback: () => {
          if (this.gameEnded) return;
          const b = this.add.circle(bx + (Math.random() - 0.5) * 14, H, 1.5 + Math.random() * 2, 0xCCEEFF, 0.6);
          this.tweens.add({ targets: b, y: -10, alpha: 0, duration: 5000 + Math.random() * 3000, onComplete: () => b.destroy() });
        }
      });
    }

    // Bioluminescent particles — denser near surface, sparser deeper
    for (let i = 0; i < 50; i++) {
      const py = Math.random() * H;
      const density = py < this.zone1Y ? 0.9 : (py < this.zone2Y ? 0.5 : 0.25);
      if (Math.random() > density) continue;
      const colors = [0x80FFE0, 0x80FFFF, 0xFFFFFF, 0xC0FFFF];
      const c = colors[Math.floor(Math.random() * colors.length)];
      const p = this.add.circle(Math.random() * W, py, 1 + Math.random() * 2, c, 0.7);
      this.tweens.add({ targets: p, alpha: { from: 0.3, to: 0.9 }, duration: 1500 + Math.random() * 1000, yoyo: true, repeat: -1 });
      this.tweens.add({ targets: p, y: p.y - 30 - Math.random() * 60, duration: 8000 + Math.random() * 4000, repeat: -1, yoyo: true });
    }

    // Coral silhouettes (deep) — varied colors, swaying
    const coralPalette = [0x8030A0, 0x6030A0, 0xA04080, 0x402080];
    for (let i = 0; i < 5; i++) {
      const x = (i / 4) * W + (Math.random() - 0.5) * 60;
      const col = coralPalette[i % coralPalette.length];
      const coral = this.add.polygon(x, H - 30,
        [-22, 0, -14, -30, 4, -28, 16, -45, 28, -22, 22, 0],
        col, 0.8);
      this.tweens.add({ targets: coral, angle: { from: -2, to: 2 }, duration: 2000 + Math.random() * 1000, yoyo: true, repeat: -1, ease: "Sine.easeInOut" });
    }
    // A few sea-fan shapes (different visual) at far-back
    for (let i = 0; i < 3; i++) {
      const x = Math.random() * W;
      const fan = this.add.graphics();
      fan.lineStyle(2, 0xFF80A0, 0.6);
      fan.beginPath();
      for (let j = -3; j <= 3; j++) {
        fan.moveTo(x, H - 30);
        fan.lineTo(x + j * 4, H - 30 - 30 - Math.abs(j) * 3);
      }
      fan.strokePath();
    }

    // Title bar
    this.add.rectangle(0, 0, W, 56, 0x000000, 0.6).setOrigin(0, 0).setDepth(800);
    createBackButton(this, "← levels", () => this.exit());
    createPauseButton(this, () => showPauseMenu(this, { world: "ocean" }));
    Audio.startMusic("ocean");

    this.events.once("shutdown", () => { Audio.stopMusic(); this.geyserEvent?.remove(); this.iceTitanEvent?.remove(); });
    this.add.text(W / 2, 22, "AQUALON", {
      fontFamily: "system-ui", fontSize: 20, fontStyle: "bold", color: "#80E5FF", letterSpacing: 2,
    }).setOrigin(0.5).setDepth(801);
    this.scoreText = this.add.text(W - 12, 28, "🐙 0/6", {
      fontFamily: "system-ui", fontSize: 14, fontStyle: "bold", color: "#FFE9A8",
    }).setOrigin(1, 0.5).setDepth(801).setAlpha(0.7);
    // Persistent prominent goal banner
    setupGoalBanner(this, { icon: "🐙", label: "Rescue squidlets", total: 6, y: 60 });

    // ZONE 1 (surface): 2 squidlets, one current arrow drift hint
    this.targets = [];
    const zone1Spawns = [
      { x: W * 0.22, y: H * 0.18, zone: 1 },
      { x: W * 0.78, y: H * 0.22, zone: 1 },
    ];
    // ZONE 2 (mid): 2 squidlets, gravity well in center
    const zone2Spawns = [
      { x: W * 0.18, y: H * 0.50, zone: 2 },
      { x: W * 0.82, y: H * 0.55, zone: 2 },
    ];
    // ZONE 3 (deep): 2 squidlets, dark, narrow path between two black holes
    const zone3Spawns = [
      { x: W * 0.30, y: H * 0.84, zone: 3 },
      { x: W * 0.72, y: H * 0.84, zone: 3 },
    ];
    [...zone1Spawns, ...zone2Spawns, ...zone3Spawns].forEach(s => {
      const pod = createRescuePod(this, s.x + 30, s.y);
      const squid = createSquidlet(this, s.x, s.y);
      this.targets.push({ pod, squid, rescued: false, x: s.x, y: s.y, zone: s.zone });
    });

    // Zone 1: gentle horizontal current arrows (visual + actual drift)
    createCurrentArrow(this, W * 0.5, H * 0.12, 1, 80);
    createCurrentArrow(this, W * 0.3, H * 0.30, 1, 60);
    this.zone1CurrentX = 0.35; // small rightward drift in zone 1

    // Zone 2: ONE black hole as gravity well, centered — must orbit around
    this.blackHoles = [];
    const bh2 = createBlackHole(this, W * 0.5, H * 0.52, 22);
    this.blackHoles.push(bh2);

    // Zone 3: TWO black holes flanking a narrow vertical channel
    const bh3a = createBlackHole(this, W * 0.32, H * 0.72, 20);
    const bh3b = createBlackHole(this, W * 0.68, H * 0.72, 20);
    this.blackHoles.push(bh3a, bh3b);

    // Crystal meteor hazards — only in zones 2 & 3, faster as it goes deeper
    // Higher levels get more meteors and faster speeds
    const aqualonLvl = this.levelNum || 2;
    const aqualonTier = Math.max(0, aqualonLvl - 2);
    const meteorCountZ2 = 3 + Math.min(3, Math.floor(aqualonTier / 2));
    const meteorCountZ3 = 3 + Math.min(4, Math.floor(aqualonTier / 2));
    const z2Speed = 1.4 + aqualonTier * 0.15;
    const z3Speed = 2.4 + aqualonTier * 0.2;
    this.meteors = [];
    for (let i = 0; i < meteorCountZ2; i++) {
      const mx = 80 + Math.random() * (W - 160);
      const my = this.zone1Y + 20 + Math.random() * (this.zone2Y - this.zone1Y - 40);
      const m = createCrystalMeteor(this, mx, my, 14 + Math.random() * 4);
      m.vx = (Math.random() - 0.5) * z2Speed;
      m.vy = (Math.random() - 0.5) * z2Speed;
      m.zoneMinY = this.zone1Y + 10;
      m.zoneMaxY = this.zone2Y - 10;
      this.meteors.push(m);
    }
    for (let i = 0; i < meteorCountZ3; i++) {
      const mx = 80 + Math.random() * (W - 160);
      const my = this.zone2Y + 20 + Math.random() * (H - this.zone2Y - 60);
