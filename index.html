      this.saws.push(saw);
      // Some saws drift back and forth
      this.tweens.add({ targets: saw, x: s.x + 50, duration: 2000, yoyo: true, repeat: -1, ease: "Sine.easeInOut" });
    });

    // Electric arcs — pairs of electrodes with lightning between
    this.arcs = [];
    const a1 = createElectricArc(this, W * 0.10, H * 0.55, W * 0.10, H * 0.78);
    const a2 = createElectricArc(this, W * 0.90, H * 0.30, W * 0.90, H * 0.55);
    a1.setDepth(30); a2.setDepth(30);
    this.arcs.push(a1, a2);
    // Arcs toggle on/off in a pattern
    this.time.addEvent({
      delay: 2200, loop: true,
      callback: () => {
        this.arcs.forEach(a => {
          a.active = !a.active;
          a.endpoints.forEach((_, i) => {
            // Endpoint visibility changes
          });
        });
      }
    });

    // MEGA BOLT BOSS at center-bottom
    this.boss = createMegaBoltBoss(this, W * 0.5, H * 0.20);
    this.boss.setDepth(40);
    // Boss patrols horizontally
    this.tweens.add({
      targets: this.boss, x: W * 0.7, duration: 3500, yoyo: true, repeat: -1, ease: "Sine.easeInOut",
    });

    // Boss attacks: fire projectiles aimed at player every 2s — faster on higher levels
    this.bossProjectiles = [];
    const mekanosLvl = this.levelNum || 10;
    const mekanosTier = Math.max(0, mekanosLvl - 10);
    const bossDelay = isKidMode() ? Math.max(1500, 2200 - mekanosTier * 80) : Math.max(1100, 1800 - mekanosTier * 90);
    this.bossAttackEvent = this.time.addEvent({
      delay: bossDelay, loop: true,
      callback: () => this.bossAttack()
    });

    // EXIT portal at far bottom-right
    this.exitPortal = createExitPortal(this, W * 0.5, H * 0.95);
    this.exitPortal.setDepth(45);

    // Astronaut + joystick
    this.astronaut = createAstronaut(this, W * 0.5, H * 0.10, STATE.avatar);
    this.astronaut.setScale(1.5);
    this.astronaut.setDepth(50);
    this.astroVx = 0; this.astroVy = 0;
    this.joystick = new VirtualJoystick(this);
    this.tweens.timeScale = isKidMode() ? 0.6 : 1;

    // Health (5 in final level)
    this.health = isKidMode() ? 7 : 5;
    this.healthIcons = [];
    for (let i = 0; i < 5; i++) {
      const heart = this.add.text(16 + i * 18, 64, "❤️", { fontSize: 16 }).setDepth(801);
      this.healthIcons.push(heart);
    }

    this.rescued = 0;
    this.gameEnded = false;

    if (this.cfg && this.cfg.mode === 'conveyorHell') {
      showEliteBanner(this, 'CONVEYOR HELL');
      // Add 2 more conveyors and 3 more saws
      const W = this.W, H = this.H;
      const c3 = createConveyor(this, W * 0.5, H * 0.50, W * 0.6, 1);
      c3.setDepth(20);
      if (this.conveyors) this.conveyors.push(c3);
      const c4 = createConveyor(this, W * 0.5, H * 0.78, W * 0.7, -1);
      c4.setDepth(20);
      if (this.conveyors) this.conveyors.push(c4);
      // Extra saws drifting
      for (let i = 0; i < 3; i++) {
        const sx = 80 + Math.random() * (W - 160);
        const sy = 200 + Math.random() * (H - 320);
        const saw = createSawBlade(this, sx, sy, 18);
        saw.setDepth(35);
        this.tweens.add({ targets: saw, x: sx + 70, duration: 1700, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });
        if (this.saws) this.saws.push(saw);
      }
    } else if (this.cfg && this.cfg.mode === 'bossRush') {
      showEliteBanner(this, 'BOSS RUSH');
      // Add 2 mini-bosses (smaller bolts) that orbit the main boss
      this.time.delayedCall(1200, () => {
        if (this.gameEnded) return;
        const W = this.W, H = this.H;
        const mini1 = createMegaBoltBoss(this, W * 0.20, H * 0.55);
        mini1.setScale(0.55);
        mini1.setDepth(39);
        mini1.miniHp = 2;
        const mini2 = createMegaBoltBoss(this, W * 0.80, H * 0.55);
        mini2.setScale(0.55);
        mini2.setDepth(39);
        mini2.miniHp = 2;
        this.eliteMiniBosses = [mini1, mini2];
        this.tweens.add({ targets: mini1, x: W * 0.35, duration: 2800, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });
        this.tweens.add({ targets: mini2, x: W * 0.65, duration: 2800, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });
      });
    }

    showZoneBanner(this, 10, "Robot Factory", 0xFFE060);
    showObjective(this, "Repair 3 Bolts AND defeat the Mega Boss to save Earth!");
  }

  bossAttack() {
    if (this.gameEnded) return;
    const W = this.W, H = this.H;
    // Aimed projectile from boss core
    const dx = this.astronaut.x - this.boss.x;
    const dy = this.astronaut.y - this.boss.y;
    const dist = Math.hypot(dx, dy);
    const speed = 4;
    const proj = this.add.container(this.boss.x, this.boss.y);
    proj.setDepth(48);
    const core = this.add.circle(0, 0, 8, 0xFF4060);
    const glow = this.add.circle(0, 0, 14, 0xFF6080, 0.4);
    const trail = this.add.ellipse(0, 6, 6, 12, 0xFFE060, 0.6);
    proj.add([trail, glow, core]);
    proj.vx = (dx / dist) * speed;
    proj.vy = (dy / dist) * speed;
    proj.collisionRadius = 12;
    this.tweens.add({ targets: glow, scale: { from: 0.85, to: 1.2 }, duration: 200, yoyo: true, repeat: -1 });
    this.bossProjectiles.push(proj);
    this.time.delayedCall(4000, () => {
      if (proj.active) {
        proj.destroy();
        this.bossProjectiles = this.bossProjectiles.filter(p => p !== proj);
      }
    });
  }

  update() {
    if (this.gameEnded) return;
    if (this._paused) return;

    if (this.eliteMiniBosses) {
      for (const mini of this.eliteMiniBosses) {
        if (!mini.scene || mini.miniHp <= 0) continue;
        const d = Phaser.Math.Distance.Between(this.astronaut.x, this.astronaut.y, mini.x, mini.y);
        if (d < 30) this.takeHit('Mini-boss!');
      }
    }
    const W = this.W, H = this.H;

    const accel = 0.6;
    this.astroVx += this.joystick.dx * accel;
    this.astroVy += this.joystick.dy * accel;
    this.astroVx *= 0.88; this.astroVy *= 0.88;

    // Conveyor belts push player when on top of them
    for (const c of this.conveyors) {
      const dx = this.astronaut.x - c.x;
      const dy = this.astronaut.y - c.y;
      if (Math.abs(dx) < c.beltWidth / 2 && Math.abs(dy) < 24) {
        this.astroVx += c.dir * 0.3;
      }
    }

    const sp = Math.hypot(this.astroVx, this.astroVy);
    if (sp > 4) { this.astroVx = (this.astroVx / sp) * 4; this.astroVy = (this.astroVy / sp) * 4; }
    this.astronaut.x += this.astroVx;
    this.astronaut.y += this.astroVy;
    this.astronaut.x = Phaser.Math.Clamp(this.astronaut.x, 24, W - 24);
    this.astronaut.y = Phaser.Math.Clamp(this.astronaut.y, 70, H - 24);

    // Bolt rescue
    for (const b of this.bolts) {
      if (b.rescued) continue;
      const d = Phaser.Math.Distance.Between(this.astronaut.x, this.astronaut.y, b.x, b.y);
      if (d < 32) this.rescueBolt(b);
    }

    // Saw blades
    for (const saw of this.saws) {
      const d = Phaser.Math.Distance.Between(saw.x, saw.y, this.astronaut.x, this.astronaut.y);
      if (d < saw.collisionRadius + 14) this.takeHit("Saw blade hit!");
    }

    // Electric arcs (only if active)
    for (const a of this.arcs) {
      if (!a.active) continue;
      const [p1, p2] = a.endpoints;
      // Check if astronaut is near the line segment
      const lineLen = Math.hypot(p2.x - p1.x, p2.y - p1.y);
      const t = Math.max(0, Math.min(1, ((this.astronaut.x - p1.x) * (p2.x - p1.x) + (this.astronaut.y - p1.y) * (p2.y - p1.y)) / (lineLen * lineLen)));
      const closestX = p1.x + t * (p2.x - p1.x);
      const closestY = p1.y + t * (p2.y - p1.y);
      const distToLine = Math.hypot(this.astronaut.x - closestX, this.astronaut.y - closestY);
      if (distToLine < 16) this.takeHit("Electric shock!");
    }

    // Boss projectiles
    for (const proj of this.bossProjectiles) {
      proj.x += proj.vx;
      proj.y += proj.vy;
      const d = Phaser.Math.Distance.Between(this.astronaut.x, this.astronaut.y, proj.x, proj.y);
      if (d < proj.collisionRadius + 12) {
        this.takeHit("Boss laser!");
        proj.destroy();
        this.bossProjectiles = this.bossProjectiles.filter(p => p !== proj);
        continue;
      }
      if (proj.x < -30 || proj.x > W + 30 || proj.y < -30 || proj.y > H + 30) {
        proj.destroy();
        this.bossProjectiles = this.bossProjectiles.filter(p => p !== proj);
      }
    }

    // Boss collision — hit the core (player damages boss by ramming when boss is vulnerable)
    if (this.boss && this.bossHP > 0) {
      const d = Phaser.Math.Distance.Between(this.astronaut.x, this.astronaut.y, this.boss.x, this.boss.y);
      if (d < 40) {
        // Player rammed boss core
        if (!this.bossInvincible) {
          this.damageBoss();
        }
      }
    }

    // Exit portal
    if (this.exitPortal && this.exitPortal.unlocked) {
      const d = Phaser.Math.Distance.Between(this.exitPortal.x, this.exitPortal.y, this.astronaut.x, this.astronaut.y);
      if (d < this.exitPortal.collisionRadius) this.complete();
    }
  }

  damageBoss() {
    this.bossInvincible = true;
    this.bossHP--;
    // Update HP bar
    const w = (this.bossHP / this.bossMaxHP) * 178;
    this.tweens.add({ targets: this.bossHpFill, width: w, duration: 200 });
    // Flash boss red
    this.tweens.add({ targets: this.boss, alpha: { from: 0.3, to: 1 }, duration: 150, yoyo: true, repeat: 2 });
    this.cameras.main.shake(120, 0.006);
    // Knock player back
    const ang = Math.atan2(this.astronaut.y - this.boss.y, this.astronaut.x - this.boss.x);
    this.astroVx = Math.cos(ang) * 10;
    this.astroVy = Math.sin(ang) * 10;
    this.time.delayedCall(800, () => this.bossInvincible = false);

    if (this.bossHP <= 0) {
      this.bossDefeated();
    }
  }

  bossDefeated() {
    // Boss death animation
    this.tweens.add({
      targets: this.boss, alpha: 0, scale: 0.3, angle: 360, duration: 1500,
      onComplete: () => this.boss.destroy(),
    });
    this.cameras.main.flash(600, 255, 255, 200);
    this.cameras.main.shake(400, 0.02);
    this.bossAttackEvent?.remove();
    showDangerPrompt(this, "BOSS DEFEATED!", 0x80FFE0);
    this.bossDown = true;
    this.checkExitUnlock();
  }

  rescueBolt(b) {
    b.rescued = true;
    showSpeechBubble(this, b.x, b.y, getAlienGreeting("bolt"), 0xA8862F);
    Audio.rescue();
    trackDailyProgress(this, "rescue");
    this.tweens.add({ targets: b.obj, scale: 0.7, alpha: 0.7, duration: 400 });
    this.tweens.add({ targets: b.obj, x: this.astronaut.x - 30 + Math.random() * 60, y: this.astronaut.y + 24, duration: 500 });
    for (let i = 0; i < 8; i++) {
      const angle = Math.random() * Math.PI * 2;
      const sp = this.add.circle(b.x, b.y, 2, 0xFFE060);
      this.tweens.add({ targets: sp, x: b.x + Math.cos(angle) * 30, y: b.y + Math.sin(angle) * 30, alpha: 0, duration: 500, onComplete: () => sp.destroy() });
    }
    this.rescued++;
    STATE.xp += 30;
    saveGame(STATE);
    this.scoreText.setText(`🔧 ${this.rescued}/3`);
    updateGoalBanner(this, this.rescued);
    this.checkExitUnlock();
  }

  // Single source of truth — runs after every state change
  checkExitUnlock() {
    if (this.exitPortal.unlocked) return;
    const bothDone = this.rescued >= 3 && this.bossDown;
    if (bothDone) {
      this.exitPortal.unlock();
      showObjective(this, "🌟 Mission complete! Reach the EXIT below ↓");
      this.cameras.main.flash(400, 255, 240, 180);
    } else if (this.rescued >= 3) {
      showObjective(this, "All Bolts saved — now defeat the boss!");
    } else if (this.bossDown) {
      showObjective(this, `Boss down! Save remaining Bolts (${this.rescued}/3)`);
    }
  }

  takeHit(message) {
    if (this.invincible) return;
    this.invincible = true;
    this.health--;
    this.healthIcons[this.health]?.setAlpha(0.2);
    showDangerPrompt(this, message);
    this.cameras.main.shake(150, 0.008);
    this.cameras.main.flash(150, 255, 100, 50);
    this.tweens.add({ targets: this.astronaut, alpha: { from: 0.3, to: 1 }, duration: 200, yoyo: true, repeat: 3 });
    this.time.delayedCall(isKidMode() ? 1500 : 900, () => this.invincible = false);
    if (this.health <= 0) this.gameOver();
  }

  complete() {
    this.gameEnded = true;
    this.joystick.destroy();
    this.bossAttackEvent?.remove();
    const reward = awardLevel(this.levelNum, this);
    saveGame(STATE);
    showMissionResult(this, {
      passed: true,
      levelNum: this.levelNum,
      passSubtitle: reward.newAlien ? `🏆 FINAL VICTORY! ${ALIENS[reward.newAlien].name} joined your crew!` : "🏆 FINAL VICTORY! Mekanos cleared!",
      rewards: { xp: 100, habitability: reward.newPoints },
    });
  }

  gameOver() {
    if (this.gameEnded) return;
    this.gameEnded = true;
    this.joystick.destroy();
    if (this.iceSpawnEvent) this.iceSpawnEvent.remove();
    if (this.avalancheTimer) this.avalancheTimer.remove();
    if (this.bossAttackEvent) this.bossAttackEvent.remove();
    if (this.flareEvent) this.flareEvent.remove();
    showMissionResult(this, {
      passed: false,
      levelNum: this.levelNum,
      failSubtitle: `${this.rescued || 0}/3 Bolts saved. The boss is tough — try again!`,
    });
  }

  exit() {
    this.joystick?.destroy();
    this.bossAttackEvent?.remove();
    this.scene.start("LevelSelectScene");
  }
}

  constructor() { super("VolcanoQuestScene"); }
  create() {
    const W = this.scale.width, H = this.scale.height;
    this.W = W; this.H = H;

    // Volcano-themed background
    const bg = this.add.graphics();
    bg.fillGradientStyle(0xC03018, 0x802018, 0x401008, 0x180404);
    bg.fillRect(0, 0, W, H);

    // Distant volcano peaks (silhouette)
    const peaks = this.add.graphics();
    peaks.fillStyle(0x301008, 0.7);
    let px = 0;
    while (px < W + 40) {
      const peakH = 60 + Math.random() * 60;
      peaks.fillTriangle(px, H * 0.5, px + 30, H * 0.5 - peakH, px + 60, H * 0.5);
      px += 50;
    }

    // Floating embers
    for (let i = 0; i < 18; i++) {
      const ex = Math.random() * W;
      const ey = H * 0.4 + Math.random() * H * 0.6;
      const ember = this.add.circle(ex, ey, 1 + Math.random() * 2, 0xFFA040, 0.7);
      this.tweens.add({ targets: ember, y: ember.y - 100, alpha: 0, duration: 4000 + Math.random() * 3000, repeat: -1, delay: Math.random() * 3000 });
    }

    // Title bar
    this.add.rectangle(0, 0, W, 56, 0x000000, 0.7).setOrigin(0, 0).setDepth(200);
    this.add.text(W / 2, 22, "🌋 VOLCANO QUEST", {
      fontFamily: "system-ui", fontSize: 20, fontStyle: "bold", color: "#FFE060", letterSpacing: 3,
    }).setOrigin(0.5).setDepth(201);

    const completed = (STATE.volcanoCompleted || []).length;
    this.add.text(W / 2, 42, `${completed} / 3 levels complete`, {
      fontFamily: "system-ui", fontSize: 15, color: "#FFC080",
    }).setOrigin(0.5).setDepth(201);

    createBackButton(this, "← back", () => this.scene.start("CareerPickerScene"));

    // Story header
    const storyY = 84;
    this.add.text(W / 2, storyY, "The supervolcano is going to erupt!", {
      fontFamily: "system-ui", fontSize: 17, fontStyle: "bold", color: "#FFFFFF",
      align: "center", wordWrap: { width: W - 32 },
    }).setOrigin(0.5);
    this.add.text(W / 2, storyY + 22, "Help the Magmite village evacuate before lava reaches their homes.", {
      fontFamily: "system-ui", fontSize: 15, color: "#FFC080",
      align: "center", wordWrap: { width: W - 32 },
    }).setOrigin(0.5);

    // Three level cards
    this.drawLevelCards();
  }

  drawLevelCards() {
    const W = this.W, H = this.H;
    const startY = 160;
    const cardW = Math.min(W - 32, 360);
    const cardH = Math.min((H - startY - 60) / 3 - 8, 100);

    VOLCANO_QUEST_LEVELS.forEach((lvl, i) => {
      const completed = (STATE.volcanoCompleted || []).includes(lvl.id);
      // Unlock logic: V1 always unlocked. V2 needs V1 done. V3 needs V2 done.
      const prevDone = lvl.id === 1 || (STATE.volcanoCompleted || []).includes(lvl.id - 1);
      const unlocked = prevDone;

      const y = startY + i * (cardH + 12) + cardH / 2;
      const card = this.add.container(W / 2, y);

      const cardBg = this.add.rectangle(0, 0, cardW, cardH,
        completed ? 0x3A4020 : (unlocked ? 0x602010 : 0x301010),
        0.95
      ).setStrokeStyle(3, completed ? 0x5DBE9A : (unlocked ? 0xFFA040 : 0x444444));

      // Level number badge
      const badgeColor = completed ? 0x5DBE9A : (unlocked ? 0xFFA040 : 0x666666);
      const badge = this.add.circle(-cardW / 2 + 26, -cardH / 2 + 22, 14, badgeColor).setStrokeStyle(1.5, 0x000000, 0.5);
      const numTxt = this.add.text(-cardW / 2 + 26, -cardH / 2 + 22, `V${lvl.id}`, {
        fontFamily: "system-ui", fontSize: 15, fontStyle: "bold", color: "#FFFFFF",
      }).setOrigin(0.5);

      // Level name
      const name = this.add.text(-cardW / 2 + 50, -cardH / 2 + 18, lvl.name, {
        fontFamily: "system-ui", fontSize: 19, fontStyle: "bold",
        color: unlocked ? "#FFFFFF" : "#888888",
      }).setOrigin(0, 0.5);

      // Description
      const desc = this.add.text(-cardW / 2 + 50, -cardH / 2 + 42, lvl.desc, {
        fontFamily: "system-ui", fontSize: 15,
        color: unlocked ? "#FFC080" : "#666666",
      }).setOrigin(0, 0.5);

      // Right-side state
      if (completed) {
        const check = this.add.text(cardW / 2 - 20, 0, "✓", {
          fontFamily: "system-ui", fontSize: 30, fontStyle: "bold", color: "#5DBE9A",
        }).setOrigin(0.5);
        card.add(check);
      } else if (!unlocked) {
        const lock = this.add.text(cardW / 2 - 20, 0, "🔒", { fontSize: 26 }).setOrigin(0.5).setAlpha(0.7);
        card.add(lock);
      } else {
        // PLAY button
        const playBtn = this.add.rectangle(cardW / 2 - 50, 0, 76, 36, 0xFFA040).setStrokeStyle(2, 0x804020);
        const playTxt = this.add.text(cardW / 2 - 50, 0, "▶ PLAY", {
          fontFamily: "system-ui", fontSize: 16, fontStyle: "bold", color: "#FFFFFF",
        }).setOrigin(0.5);
        card.add([playBtn, playTxt]);
      }

      card.add([cardBg, badge, numTxt, name, desc]);

      if (unlocked) {
        cardBg.setInteractive({ useHandCursor: true });
        cardBg.on("pointerdown", () => {
          Audio.click();
          this.launchLevel(lvl);
        });
      }
    });

    // If all 3 done, show celebration footer
    if ((STATE.volcanoCompleted || []).length >= 3) {
      const footerY = startY + 3 * (Math.min((this.H - startY - 60) / 3 - 8, 100) + 12);
      this.add.text(this.W / 2, footerY + 20, "🌋✨ Quest Complete! The Magmite village is saved! ✨🌋", {
        fontFamily: "system-ui", fontSize: 16, fontStyle: "bold", color: "#FFE060",
        align: "center", wordWrap: { width: this.W - 24 },
      }).setOrigin(0.5);
    }
  }

  launchLevel(lvl) {
    // Show a brief loading transition then start PyrosScene with the volcano cfg
    this.cameras.main.fadeOut(400, 0, 0, 0);
    this.cameras.main.once("camerafadeoutcomplete", () => {
      this.scene.start("PyrosScene", {
        levelNum: 4, // dummy — won't write to levelsCompleted because volcanoQuestId branches early
        startZone: 1,
        cfg: lvl.cfg,
      });
    });
  }
}

// ══════════════════════════════════════════════════════════════════
// HQ SCENE — astronaut base that grows with progress
// ══════════════════════════════════════════════════════════════════
class HQScene extends Phaser.Scene {
  constructor() { super("HQScene"); }
  create() {
    const W = this.scale.width, H = this.scale.height;
    this.W = W; this.H = H;
    this.mobile = isMobile();

    // Floor color and atmosphere change with progress
    const progress = STATE.hqProgress || 0;
    this.progress = progress;
    this.decoratingMode = false;
    this.placedDecorationRefs = []; // visual game objects for placed decorations

    // Base ambient — space view through window
    this.drawSpaceWindow();
    // Background room walls
    this.drawWalls();
    // Floor
    this.drawFloor();
    // Decorations grow with progress (the built-in stage-based ones)
    this.drawDecorations();
    // Player-placed decorations
    this.drawPlacedDecorations();
    // Aliens that have joined
    this.drawAliens();
    // Player astronaut at center
    this.drawAstronaut();

    // Title bar
    this.add.rectangle(0, 0, W, 56, 0x000000, 0.7).setOrigin(0, 0).setDepth(800);
    this.titleText = this.add.text(W / 2, 28, `🏠 YOUR HQ — STAGE ${progress}/10`, {
      fontFamily: "system-ui", fontSize: 18, fontStyle: "bold", color: "#FFE9A8", letterSpacing: 2,
    }).setOrigin(0.5).setDepth(801);
    createBackButton(this, "← back", () => {
      this.joystick?.destroy();
      this.chatterTimer?.remove();
      this.scene.start("LevelSelectScene");
    });

    // Star Coin counter (top-right of title bar)
    this.coinDisplay = this.add.container(W - 12, 28).setDepth(801);
    const coinBg = this.add.rectangle(0, 0, 90, 30, 0x000000, 0.55).setStrokeStyle(1.5, 0xFFE060, 0.9).setOrigin(1, 0.5);
    const coinIcon = this.add.text(-78, 0, "⭐", { fontSize: 18 }).setOrigin(0, 0.5);
    this.coinText = this.add.text(-58, 0, `${STATE.starCoins || 0}`, {
      fontFamily: "system-ui", fontSize: 17, fontStyle: "bold", color: "#FFE060",
    }).setOrigin(0, 0.5);
    this.coinDisplay.add([coinBg, coinIcon, this.coinText]);

    // 🎨 Decorate button (right side, below title bar) — only outside decorating mode
    this.decorateBtn = this.add.rectangle(W - 60, 76, 100, 36, 0xC080FF, 0.92).setStrokeStyle(2, 0xFFFFFF, 0.85).setDepth(180).setInteractive({ useHandCursor: true });
    this.decorateBtnTxt = this.add.text(W - 60, 76, "🎨 Decorate", {
      fontFamily: "system-ui", fontSize: 16, fontStyle: "bold", color: "#FFFFFF",
    }).setOrigin(0.5).setDepth(181);
    this.decorateBtn.on("pointerdown", (p, x, y, e) => {
      if (e && e.stopPropagation) e.stopPropagation();
      Audio.click();
      this.enterDecorateMode();
    });

    // Progress meter at bottom
    this.drawProgressMeter();

    // Tap-an-alien-for-dialogue + auto-chatter
    this.scheduleAlienChatter();
  }

  drawPlacedDecorations() {
    // Render all placed decorations from STATE
    this.placedDecorationRefs.forEach(r => r.obj?.destroy());
    this.placedDecorationRefs = [];
    (STATE.placedDecorations || []).forEach(p => {
      const def = getDecorationById(p.itemId);
      if (!def) return;
      const obj = def.render(this, p.x, p.y);
      if (obj) {
        obj.setDepth(50);
        this.placedDecorationRefs.push({ obj, placement: p });
      }
    });
  }

  drawSpaceWindow() {
    const W = this.W, H = this.H;
    // Big circular window in upper area showing space
    const winR = Math.min(W * 0.28, 100);
    const cx = W / 2, cy = H * 0.22;
    // Outer frame
    const frame = this.add.circle(cx, cy, winR + 8, 0x404870).setStrokeStyle(3, 0x808890);
    // Glass / space view
    const glass = this.add.circle(cx, cy, winR, 0x051030);
    // Stars in window
    for (let i = 0; i < 18; i++) {
      const angle = Math.random() * Math.PI * 2;
      const r = Math.random() * (winR - 8);
      const sx = cx + Math.cos(angle) * r;
      const sy = cy + Math.sin(angle) * r;
      const star = this.add.circle(sx, sy, 0.5 + Math.random() * 1.2, 0xFFFFFF, 0.7 + Math.random() * 0.3);
      this.tweens.add({ targets: star, alpha: { from: 0.3, to: 1 }, duration: 800 + Math.random() * 1200, yoyo: true, repeat: -1 });
    }
    // Earth visible if habitability > 50
    if (STATE.habitability >= 50) {
      const earth = this.add.circle(cx + winR * 0.45, cy - winR * 0.25, 14, 0x80B0E0).setStrokeStyle(1, 0x60A0D0);
      const land = this.add.circle(cx + winR * 0.45 + 3, cy - winR * 0.25, 6, 0x5DBE9A, 0.85);
    }
    // Window highlight reflection
    const reflect = this.add.ellipse(cx - winR * 0.4, cy - winR * 0.5, winR * 0.5, winR * 0.18, 0xFFFFFF, 0.18);
  }

  drawWalls() {
    const W = this.W, H = this.H;
    // Wall behind everything
    const wall = this.add.rectangle(0, 56, W, H * 0.55 - 28, 0x2A3850).setOrigin(0, 0);
    // Subtle vertical panel lines
    for (let x = 60; x < W; x += 80) {
      this.add.line(0, 0, x, 56, x, H * 0.55, 0x4A5870, 0.5).setOrigin(0, 0).setLineWidth(1);
    }
    // Horizontal trim
    this.add.rectangle(0, H * 0.55 - 4, W, 4, 0x808890).setOrigin(0, 0);
  }

  drawFloor() {
    const W = this.W, H = this.H;
    // Floor color shifts based on progress (drab → cozy)
    const baseColor = this.progress < 3 ? 0x202830 : (this.progress < 6 ? 0x3A4858 : 0x4A5070);
    this.add.rectangle(0, H * 0.55, W, H - H * 0.55, baseColor).setOrigin(0, 0);
    // Floor tiles (grid lines)
    for (let x = 0; x < W; x += 40) {
      this.add.line(0, 0, x, H * 0.55, x, H, 0x101820, 0.4).setOrigin(0, 0).setLineWidth(1);
    }
    // Carpet appears at progress 4+
    if (this.progress >= 4) {
      const carpet = this.add.rectangle(this.W / 2, H * 0.78, this.W * 0.7, H * 0.18, 0x803040, 0.7);
      carpet.setStrokeStyle(2, 0xA04050, 0.6);
    }
  }

  drawDecorations() {
    const W = this.W, H = this.H;
    const p = this.progress;

    // Stage 1+: a small plant in left corner
    if (p >= 1) {
      const potX = W * 0.08, potY = H * 0.62;
      const pot = this.add.rectangle(potX, potY + 10, 16, 14, 0x6A4030).setStrokeStyle(1, 0x301008);
      const leaf1 = this.add.ellipse(potX - 4, potY - 2, 10, 6, 0x5DBE9A);
      const leaf2 = this.add.ellipse(potX + 4, potY - 4, 10, 6, 0x5DBE9A);
      const leaf3 = this.add.ellipse(potX, potY - 8, 8, 8, 0x80D0A8);
      this.tweens.add({ targets: [leaf1, leaf2, leaf3], scaleY: 0.92, duration: 2000, yoyo: true, repeat: -1, ease: "Sine.easeInOut" });
    }
    // Stage 2+: another plant on right
    if (p >= 2) {
      const potX = W * 0.92, potY = H * 0.62;
      const pot = this.add.rectangle(potX, potY + 10, 16, 14, 0x6A4030).setStrokeStyle(1, 0x301008);
      const palm = this.add.ellipse(potX - 6, potY - 6, 14, 4, 0x5DBE9A);
      palm.setRotation(-0.3);
      const palm2 = this.add.ellipse(potX + 6, potY - 6, 14, 4, 0x5DBE9A);
      palm2.setRotation(0.3);
      const palm3 = this.add.ellipse(potX, potY - 12, 14, 4, 0x80D0A8);
      this.tweens.add({ targets: [palm, palm2, palm3], y: potY - 8, duration: 1800, yoyo: true, repeat: -1, ease: "Sine.easeInOut" });
    }
    // Stage 3+: computer console on left side
    if (p >= 3) {
      const cx = W * 0.18, cy = H * 0.50;
      const desk = this.add.rectangle(cx, cy, 60, 36, 0x404858).setStrokeStyle(1.5, 0x202830);
      const screen = this.add.rectangle(cx, cy - 4, 50, 22, 0x102050).setStrokeStyle(1, 0x405080);
      const code1 = this.add.text(cx, cy - 8, "▮ ▮▮ ▮", { fontSize: 12, color: "#80FFE0" }).setOrigin(0.5);
      const code2 = this.add.text(cx, cy + 1, "▮▮ ▮▮▮", { fontSize: 12, color: "#80FFE0" }).setOrigin(0.5);
      this.tweens.add({ targets: [code1, code2], alpha: { from: 0.5, to: 1 }, duration: 600, yoyo: true, repeat: -1 });
    }
    // Stage 4+: ceiling lights on
    if (p >= 4) {
      for (let i = 0; i < 3; i++) {
        const lx = W * 0.25 + i * (W * 0.25);
        const lampshade = this.add.rectangle(lx, 70, 24, 6, 0xFFE9A8, 0.85);
        const lampGlow = this.add.circle(lx, 75, 22, 0xFFE9A8, 0.18);
        this.tweens.add({ targets: lampGlow, scale: { from: 0.9, to: 1.1 }, alpha: { from: 0.12, to: 0.25 }, duration: 1500 + i * 200, yoyo: true, repeat: -1 });
      }
    }
    // Stage 5+: bookshelf on right
    if (p >= 5) {
      const bx = W * 0.82, by = H * 0.45;
      const shelf = this.add.rectangle(bx, by, 70, 60, 0x6A4030).setStrokeStyle(1.5, 0x301008);
      // Books
      const colors = [0xFF4060, 0x5DBE9A, 0x80E5FF, 0xFFE060, 0xC080FF];
      for (let row = 0; row < 2; row++) {
        for (let col = 0; col < 5; col++) {
          const book = this.add.rectangle(bx - 28 + col * 11, by - 14 + row * 18, 8, 14, colors[(row + col) % colors.length]);
          book.setStrokeStyle(0.5, 0x000000, 0.5);
        }
      }
    }
    // Stage 6+: trophy on shelf or table
    if (p >= 6) {
      const tx = W * 0.5, ty = H * 0.50;
      const base = this.add.rectangle(tx, ty + 12, 30, 20, 0x6A5030).setStrokeStyle(1, 0x301008);
      const trophy = this.add.text(tx, ty + 2, "🏆", { fontSize: 30 }).setOrigin(0.5);
      this.tweens.add({ targets: trophy, y: ty - 1, duration: 1400, yoyo: true, repeat: -1, ease: "Sine.easeInOut" });
      // Sparkle
      this.time.addEvent({ delay: 1800, loop: true, callback: () => {
        const s = this.add.text(tx + (Math.random() - 0.5) * 30, ty + (Math.random() - 0.5) * 20, "✦", { fontSize: 14, color: "#FFE060" }).setOrigin(0.5);
        this.tweens.add({ targets: s, alpha: 0, scale: 1.5, duration: 800, onComplete: () => s.destroy() });
      } });
    }
    // Stage 7+: window banner with crew names
    if (p >= 7) {
      const banner = this.add.rectangle(W / 2, H * 0.08, W * 0.6, 20, 0xFFE9A8, 0.92).setStrokeStyle(1, 0x804020);
      const banText = this.add.text(W / 2, H * 0.08, "🌟 CREW HQ 🌟", {
        fontFamily: "system-ui", fontSize: 15, fontStyle: "bold", color: "#1A2543", letterSpacing: 2,
      }).setOrigin(0.5);
      this.tweens.add({ targets: banner, scaleX: 0.98, duration: 2000, yoyo: true, repeat: -1, ease: "Sine.easeInOut" });
    }
    // Stage 8+: party balloons
    if (p >= 8) {
      const balloonColors = [0xFF4060, 0x5DBE9A, 0x80E5FF, 0xFFE060];
      for (let i = 0; i < 4; i++) {
        const bx = W * 0.15 + i * (W * 0.23) + Math.random() * 30;
        const by = 100 + Math.random() * 30;
        const ballg = this.add.ellipse(bx, by, 14, 18, balloonColors[i]).setStrokeStyle(1, 0x000000, 0.3);
        const ballString = this.add.line(0, 0, bx, by + 9, bx, by + 30, 0xFFFFFF, 0.5).setLineWidth(1);
        this.tweens.add({ targets: ballg, y: by - 8, duration: 2000 + i * 200, yoyo: true, repeat: -1, ease: "Sine.easeInOut" });
      }
    }
    // Stage 9+: cake table
    if (p >= 9) {
      const cx = W * 0.5, cy = H * 0.74;
      const table = this.add.rectangle(cx, cy + 10, 80, 14, 0x804020).setStrokeStyle(1, 0x301008);
      const cake = this.add.rectangle(cx, cy, 36, 22, 0xFFC0E0).setStrokeStyle(1, 0x804060);
      const candleL = this.add.rectangle(cx - 8, cy - 14, 2, 8, 0xFFFFFF);
      const candleR = this.add.rectangle(cx + 8, cy - 14, 2, 8, 0xFFFFFF);
      const flameL = this.add.ellipse(cx - 8, cy - 19, 3, 5, 0xFFE060);
      const flameR = this.add.ellipse(cx + 8, cy - 19, 3, 5, 0xFFE060);
      this.tweens.add({ targets: [flameL, flameR], scaleY: { from: 0.8, to: 1.2 }, duration: 200, yoyo: true, repeat: -1 });
    }
    // Stage 10: confetti
    if (p >= 10) {
      this.time.addEvent({ delay: 400, loop: true, callback: () => {
        const colors = [0xFF4060, 0x5DBE9A, 0x80E5FF, 0xFFE060, 0xC080FF];
        for (let i = 0; i < 3; i++) {
          const cx = Math.random() * W;
          const conf = this.add.rectangle(cx, 60, 4, 6, colors[Math.floor(Math.random() * colors.length)]);
          this.tweens.add({ targets: conf, y: H, angle: 360, alpha: 0, duration: 4000 + Math.random() * 2000, onComplete: () => conf.destroy() });
        }
      } });
    }
  }

  drawAliens() {
    const W = this.W, H = this.H;
    const p = this.progress;
    const crew = STATE.alienCrew || [];

    this.alienSprites = [];
    // Place each alien if they're in the crew, with positions varying based on progress
    const spots = {
      squidlet:   { x: W * 0.30, y: H * 0.66 },
      magmite:    { x: W * 0.46, y: H * 0.68 },
      frostie:    { x: W * 0.62, y: H * 0.66 },
      sproutling: { x: W * 0.34, y: H * 0.84 },
      bolt:       { x: W * 0.66, y: H * 0.84 },
    };

    crew.forEach(alienId => {
      const spot = spots[alienId];
      if (!spot) return;
      let sprite = null;
      if (alienId === "squidlet") sprite = createSquidlet(this, spot.x, spot.y);
      else if (alienId === "magmite") sprite = createMagmite(this, spot.x, spot.y);
      else if (alienId === "frostie") sprite = createFrostie(this, spot.x, spot.y);
      else if (alienId === "sproutling") sprite = createSproutling(this, spot.x, spot.y);
      else if (alienId === "bolt") sprite = createBolt(this, spot.x, spot.y);
      if (sprite) {
        sprite.setDepth(60);
        sprite.setScale(1.3);
        // Make tappable for chatter
        sprite.setInteractive(new Phaser.Geom.Circle(0, 0, 20), Phaser.Geom.Circle.Contains);
        sprite.alienId = alienId;
        sprite.on("pointerdown", () => this.alienChatter(sprite));
        this.alienSprites.push(sprite);

}
    });

    // Friendly hint if crew is empty
    if (crew.length === 0) {
      this.add.text(W / 2, H * 0.72, "Rescue aliens to fill your HQ!", {
        fontFamily: "system-ui", fontSize: 17, color: "#A8D0FF", fontStyle: "italic",
      }).setOrigin(0.5).setDepth(60);
    }
  }

  drawAstronaut() {
    const W = this.W, H = this.H;
    // Player astronaut starts at center-back of room
    this.astronaut = createAstronaut(this, W * 0.5, H * 0.58, STATE.avatar);
    this.astronaut.setScale(1.4);
    this.astronaut.setDepth(55);
    this.astroVx = 0;
    this.astroVy = 0;
    // Floor walking bounds — must stay on the floor area
    this.floorTopY = H * 0.55 + 20;   // top of floor
    this.floorBotY = H - 24;          // bottom (above progress meter)
    this.floorLeftX = 24;
    this.floorRightX = W - 24;
    // Joystick (no destroy on shutdown — handled below)
    this.joystick = new VirtualJoystick(this);
    // Track which aliens we've recently greeted so we don't spam-bubble them
    this._recentlyGreeted = new Set();
  }

  update() {
    if (!this.astronaut || !this.joystick) return;
    // Calm movement — slower than combat scenes
    const accel = 0.45;
    const maxSpeed = 3;
    this.astroVx += this.joystick.dx * accel;
    this.astroVy += this.joystick.dy * accel;
    this.astroVx *= 0.86;
    this.astroVy *= 0.86;
    const sp = Math.hypot(this.astroVx, this.astroVy);
    if (sp > maxSpeed) {
      this.astroVx = (this.astroVx / sp) * maxSpeed;
      this.astroVy = (this.astroVy / sp) * maxSpeed;
    }
    this.astronaut.x += this.astroVx;
    this.astronaut.y += this.astroVy;
    // Clamp to floor area
    this.astronaut.x = Phaser.Math.Clamp(this.astronaut.x, this.floorLeftX, this.floorRightX);
    this.astronaut.y = Phaser.Math.Clamp(this.astronaut.y, this.floorTopY, this.floorBotY);
    // Face direction of movement
    if (this.astroVx > 0.3) this.astronaut.setScale(1.4, 1.4);
    else if (this.astroVx < -0.3) this.astronaut.setScale(-1.4, 1.4);

    // Proximity greet: if astronaut walks near an alien, they say hi
    if (this.alienSprites) {
      for (const a of this.alienSprites) {
        if (!a || !a.scene) continue;
        const d = Phaser.Math.Distance.Between(this.astronaut.x, this.astronaut.y, a.x, a.y);
        const wasNear = this._recentlyGreeted.has(a.alienId);
        if (d < 50 && !wasNear) {
          this._recentlyGreeted.add(a.alienId);
          this.alienChatter(a);
          // Allow re-greet after a few seconds of distance
          this.time.delayedCall(4000, () => this._recentlyGreeted.delete(a.alienId));
        }
      }
    }
  }

  drawProgressMeter() {
    const W = this.W, H = this.H;
    const meterY = H - 70;
    const meterW = Math.min(W - 32, 360);

    const bg = this.add.rectangle(W / 2, meterY, meterW, 28, 0x000000, 0.7).setStrokeStyle(1.5, 0xFFE9A8, 0.7).setDepth(180);
    const fill = this.add.rectangle(W / 2 - meterW / 2 + 4, meterY, (meterW - 8) * (this.progress / 10), 20, 0x5DBE9A).setOrigin(0, 0.5).setDepth(181);
    const lbl = this.add.text(W / 2, meterY, `HQ Stage ${this.progress}/10  ·  ${this.progress < 10 ? "Beat more levels to grow!" : "MAX! 🎉"}`, {
      fontFamily: "system-ui", fontSize: 15, fontStyle: "bold", color: "#FFFFFF",
    }).setOrigin(0.5).setDepth(182);
  }

  scheduleAlienChatter() {
    // Random alien shows speech bubble every ~6s if any present
    if (!this.alienSprites || this.alienSprites.length === 0) return;
    this.chatterTimer = this.time.addEvent({
      delay: 6000 + Math.random() * 3000, loop: true,
      callback: () => {
        const a = this.alienSprites[Math.floor(Math.random() * this.alienSprites.length)];
        if (a && a.scene) this.alienChatter(a);
      }
    });
  }

  alienChatter(sprite) {
    if (!sprite || !sprite.alienId) return;
    const lines = ALIEN_GREETINGS[sprite.alienId] || ["Hello!"];
    const a = ALIENS[sprite.alienId];
    const color = a ? a.color : 0xFFFFFF;
    const greeting = lines[Math.floor(Math.random() * lines.length)];
    showSpeechBubble(this, sprite.x, sprite.y - 22, greeting, color);
  }

  enterDecorateMode() {
    this.decoratingMode = true;
    this.decorateBtn?.setVisible(false);
    this.decorateBtnTxt?.setVisible(false);
    this.chatterTimer?.remove();
    this.titleText.setText("🎨 DECORATE MODE");
    this.openShopPanel();
    this.makeDecorationsEditable();
    this.drawDoneButton();
    this.helpHint = this.add.text(this.W / 2, 100, "Tap a decoration to buy & place — tap a placed item to move/delete", {
      fontFamily: "system-ui", fontSize: 15, color: "#FFE9A8", align: "center",
      backgroundColor: "#000000", padding: { x: 8, y: 4 },
    }).setOrigin(0.5).setDepth(820).setAlpha(0.95);
    this.time.delayedCall(3500, () => this.tweens.add({ targets: this.helpHint, alpha: 0, duration: 400, onComplete: () => this.helpHint?.destroy() }));
  }

  exitDecorateMode() {
    this.decoratingMode = false;
    saveGame(STATE);
    this.shopPanel?.destroy();
    this.shopPanel = null;
    this.doneBtn?.destroy();
    this.doneBtnTxt?.destroy();
    this.decorateBtn?.setVisible(true);
    this.decorateBtnTxt?.setVisible(true);
    this.titleText.setText(`🏠 YOUR HQ — STAGE ${this.progress}/10`);
    this.scheduleAlienChatter();
    if (this.placingItem) {
      this.placingItem.obj?.destroy();
      this.placingItem = null;
      this.cleanupPlacementUI();
    }
  }

  drawDoneButton() {
    const W = this.W;
    this.doneBtn = this.add.rectangle(W - 60, 76, 100, 36, 0x5DBE9A, 0.95).setStrokeStyle(2, 0x3E8E6C).setDepth(820).setInteractive({ useHandCursor: true });
    this.doneBtnTxt = this.add.text(W - 60, 76, "✓ Done", {
      fontFamily: "system-ui", fontSize: 17, fontStyle: "bold", color: "#FFFFFF",
    }).setOrigin(0.5).setDepth(821);
    this.doneBtn.on("pointerdown", (p, x, y, e) => {
      if (e && e.stopPropagation) e.stopPropagation();
      Audio.click();
      this.exitDecorateMode();
    });
  }

  openShopPanel() {
    const W = this.W, H = this.H;
    const panelW = Math.min(140, W * 0.36);
    const panelH = H * 0.62;
    const panelX = W - panelW / 2 - 8;
    const panelY = H * 0.5;
    this.shopPanel = this.add.container(panelX, panelY).setDepth(810);
    const bg = this.add.rectangle(0, 0, panelW, panelH, 0x101830, 0.96).setStrokeStyle(2, 0xC080FF);
    const title = this.add.text(0, -panelH / 2 + 16, "SHOP", {
      fontFamily: "system-ui", fontSize: 16, fontStyle: "bold", color: "#FFE9A8", letterSpacing: 2,
    }).setOrigin(0.5);
    this.shopPanel.add([bg, title]);

    this.shopScrollY = 0;
    this.shopContent = this.add.container(0, -panelH / 2 + 36).setDepth(811);
    this.shopPanel.add(this.shopContent);

    const categories = ["Plants", "Furniture", "Tech", "Trophies"];
    let yPos = 0;
    this.shopItemRefs = [];
    categories.forEach(cat => {
      const head = this.add.text(0, yPos, cat.toUpperCase(), {
        fontFamily: "system-ui", fontSize: 14, fontStyle: "bold", color: "#A8D0FF", letterSpacing: 2,
      }).setOrigin(0.5);
      this.shopContent.add(head);
      yPos += 18;

      const items = DECORATIONS.filter(d => d.category === cat);
      items.forEach(item => {
        const owned = STATE.ownedDecorations.includes(item.id);
        const canAfford = (STATE.starCoins || 0) >= item.price;
        const itemRow = this.add.container(0, yPos);
        const rowBg = this.add.rectangle(0, 0, panelW - 16, 36, owned ? 0x1A3050 : (canAfford ? 0x202840 : 0x1A1A28), 0.95).setStrokeStyle(1, owned ? 0x80E5FF : (canAfford ? 0xFFE060 : 0x444455));
        const icon = this.add.text(-panelW / 2 + 18, 0, item.icon, { fontSize: 20 }).setOrigin(0.5);
        const name = this.add.text(-panelW / 2 + 36, -7, item.name, {
          fontFamily: "system-ui", fontSize: 13, fontStyle: "bold", color: "#FFFFFF",
        }).setOrigin(0, 0.5);
        const priceLabel = owned ? "OWNED ✓" : `⭐ ${item.price}`;
        const priceColor = owned ? "#5DBE9A" : (canAfford ? "#FFE060" : "#666677");
        const price = this.add.text(-panelW / 2 + 36, 6, priceLabel, {
          fontFamily: "system-ui", fontSize: 13, fontStyle: "bold", color: priceColor,
        }).setOrigin(0, 0.5);

        itemRow.add([rowBg, icon, name, price]);
        this.shopContent.add(itemRow);

        rowBg.setInteractive({ useHandCursor: true });
        rowBg.on("pointerdown", (p, lx, ly, e) => {
          if (e && e.stopPropagation) e.stopPropagation();
          this.handleShopItemTap(item);
        });

        this.shopItemRefs.push({ item, row: itemRow, rowBg, name, price });
        yPos += 40;
      });
      yPos += 8;
    });

    const totalContent = yPos;
    const visibleArea = panelH - 56;
    if (totalContent > visibleArea) {
      const upBtn = this.add.text(0, -panelH / 2 + 4, "▲", { fontSize: 16, color: "#FFFFFF" }).setOrigin(0.5).setDepth(815).setInteractive({ useHandCursor: true });
      const downBtn = this.add.text(0, panelH / 2 - 8, "▼", { fontSize: 16, color: "#FFFFFF" }).setOrigin(0.5).setDepth(815).setInteractive({ useHandCursor: true });
      this.shopPanel.add([upBtn, downBtn]);
      const maxScroll = totalContent - visibleArea + 36;
      upBtn.on("pointerdown", () => {
        this.shopScrollY = Math.max(0, this.shopScrollY - 60);
        this.tweens.add({ targets: this.shopContent, y: -panelH / 2 + 36 - this.shopScrollY, duration: 200 });
      });
      downBtn.on("pointerdown", () => {
        this.shopScrollY = Math.min(maxScroll, this.shopScrollY + 60);
        this.tweens.add({ targets: this.shopContent, y: -panelH / 2 + 36 - this.shopScrollY, duration: 200 });
      });
    }
  }

  refreshShopUI() {
    if (!this.shopItemRefs) return;
    this.shopItemRefs.forEach(r => {
      const owned = STATE.ownedDecorations.includes(r.item.id);
      const canAfford = (STATE.starCoins || 0) >= r.item.price;
      r.rowBg.setFillStyle(owned ? 0x1A3050 : (canAfford ? 0x202840 : 0x1A1A28), 0.95);
      r.rowBg.setStrokeStyle(1, owned ? 0x80E5FF : (canAfford ? 0xFFE060 : 0x444455));
      r.price.setText(owned ? "OWNED ✓" : `⭐ ${r.item.price}`);
      r.price.setColor(owned ? "#5DBE9A" : (canAfford ? "#FFE060" : "#666677"));
    });
    this.coinText?.setText(`${STATE.starCoins || 0}`);
  }

  handleShopItemTap(item) {
    const owned = STATE.ownedDecorations.includes(item.id);
    if (owned) {
      Audio.click();
      this.startPlacingItem(item);
      return;
    }
    if ((STATE.starCoins || 0) < item.price) {
      this.cameras.main.shake(80, 0.003);
      const flash = this.add.text(this.W / 2, this.H / 2, "Not enough coins!", {
        fontFamily: "system-ui", fontSize: 18, fontStyle: "bold", color: "#FF6080",
        backgroundColor: "#000000", padding: { x: 10, y: 6 },
      }).setOrigin(0.5).setDepth(990);
      this.tweens.add({ targets: flash, alpha: 0, y: flash.y - 30, duration: 1200, onComplete: () => flash.destroy() });
      Audio.fail();
      return;
    }
    STATE.starCoins -= item.price;
    STATE.ownedDecorations.push(item.id);
    saveGame(STATE);
    Audio.unlock();
    const float = this.add.text(this.W - 60, 28, `-${item.price}`, {
      fontFamily: "system-ui", fontSize: 18, fontStyle: "bold", color: "#FF6080",
    }).setOrigin(0.5).setDepth(990);
    this.tweens.add({ targets: float, y: 60, alpha: 0, duration: 800, onComplete: () => float.destroy() });
    this.refreshShopUI();
    this.startPlacingItem(item);
  }

  startPlacingItem(item) {
    if (this.placingItem) {
      this.placingItem.obj?.destroy();
      this.placingItem = null;
    }
    const W = this.W, H = this.H;
    const startX = W / 2, startY = H * 0.7;
    const ghost = item.render(this, startX, startY);
    if (!ghost) return;
    ghost.setAlpha(0.85);
    ghost.setDepth(70);
    this.placingItem = { item, obj: ghost, x: startX, y: startY };
    this.placeHint = this.add.text(W / 2, H * 0.46, "Drag to place • ✓ Keep • ✕ Cancel", {
      fontFamily: "system-ui", fontSize: 14, fontStyle: "bold", color: "#FFE060",
      backgroundColor: "#000000", padding: { x: 8, y: 4 },
    }).setOrigin(0.5).setDepth(821);
    this.placeConfirm = this.add.rectangle(W / 2 - 60, H * 0.51, 56, 32, 0x5DBE9A).setStrokeStyle(2, 0x3E8E6C).setDepth(821).setInteractive({ useHandCursor: true });
    this.placeConfirmTxt = this.add.text(W / 2 - 60, H * 0.51, "✓ Keep", { fontFamily: "system-ui", fontSize: 15, fontStyle: "bold", color: "#FFFFFF" }).setOrigin(0.5).setDepth(822);
    this.placeCancel = this.add.rectangle(W / 2 + 60, H * 0.51, 56, 32, 0xFF4060).setStrokeStyle(2, 0xA02040).setDepth(821).setInteractive({ useHandCursor: true });
    this.placeCancelTxt = this.add.text(W / 2 + 60, H * 0.51, "✕ Cancel", { fontFamily: "system-ui", fontSize: 15, fontStyle: "bold", color: "#FFFFFF" }).setOrigin(0.5).setDepth(822);
    this.placeConfirm.on("pointerdown", (p, x, y, e) => {
      if (e && e.stopPropagation) e.stopPropagation();
      Audio.click();
      this.commitPlacement();
    });
    this.placeCancel.on("pointerdown", (p, x, y, e) => {
      if (e && e.stopPropagation) e.stopPropagation();
      Audio.click();
      this.cancelPlacement();
    });
    this._placingMoveHandler = (pointer) => {
      if (!this.placingItem) return;
      if (!pointer.isDown) return;
      if (this.shopPanel && pointer.x > this.W - 150) return;
      if (pointer.y < 110) return;
      if (pointer.y > this.H - 90) return;
      this.placingItem.x = pointer.x;
      this.placingItem.y = pointer.y;
      this.placingItem.obj.x = pointer.x;
      this.placingItem.obj.y = pointer.y;
    };
    this._placingDownHandler = (pointer) => {
      if (!this.placingItem) return;
      if (Math.abs(pointer.x - (this.W / 2 - 60)) < 30 && Math.abs(pointer.y - this.H * 0.51) < 20) return;
      if (Math.abs(pointer.x - (this.W / 2 + 60)) < 30 && Math.abs(pointer.y - this.H * 0.51) < 20) return;
      if (this.shopPanel && pointer.x > this.W - 150) return;
      if (pointer.y < 110) return;
      if (pointer.y > this.H - 90) return;
      this.placingItem.x = pointer.x;
      this.placingItem.y = pointer.y;
      this.placingItem.obj.x = pointer.x;
      this.placingItem.obj.y = pointer.y;
    };
    this.input.on("pointermove", this._placingMoveHandler);
    this.input.on("pointerdown", this._placingDownHandler);
  }

  commitPlacement() {
    if (!this.placingItem) return;
    const placement = { itemId: this.placingItem.item.id, x: this.placingItem.x, y: this.placingItem.y };
    if (!STATE.placedDecorations) STATE.placedDecorations = [];
    STATE.placedDecorations.push(placement);
    saveGame(STATE);
    for (let i = 0; i < 8; i++) {
      const angle = (i / 8) * Math.PI * 2;
      const sp = this.add.circle(this.placingItem.x, this.placingItem.y, 2, 0xFFE060).setDepth(75);
      this.tweens.add({ targets: sp, x: sp.x + Math.cos(angle) * 24, y: sp.y + Math.sin(angle) * 24, alpha: 0, duration: 500, onComplete: () => sp.destroy() });
    }
    Audio.victory();
    this.placedDecorationRefs.push({ obj: this.placingItem.obj, placement });
    this.placingItem.obj.setAlpha(1);
    this.placingItem.obj.setDepth(50);
    this.placingItem = null;
    this.cleanupPlacementUI();
    this.makeDecorationsEditable();
  }

  cancelPlacement() {
    if (!this.placingItem) return;
    this.placingItem.obj?.destroy();
    this.placingItem = null;
    this.cleanupPlacementUI();
  }

  cleanupPlacementUI() {
    this.placeHint?.destroy(); this.placeHint = null;
    this.placeConfirm?.destroy(); this.placeConfirm = null;
    this.placeConfirmTxt?.destroy(); this.placeConfirmTxt = null;
    this.placeCancel?.destroy(); this.placeCancel = null;
    this.placeCancelTxt?.destroy(); this.placeCancelTxt = null;
    if (this._placingMoveHandler) this.input.off("pointermove", this._placingMoveHandler);
    if (this._placingDownHandler) this.input.off("pointerdown", this._placingDownHandler);
  }

  makeDecorationsEditable() {
    this.placedDecorationRefs.forEach(r => {
      if (!r.obj || r.editable) return;
      r.editable = true;
      r.obj.setSize(40, 40);
      r.obj.setInteractive(new Phaser.Geom.Rectangle(-20, -20, 40, 40), Phaser.Geom.Rectangle.Contains);
      r.obj.on("pointerdown", (p, lx, ly, e) => {
        if (!this.decoratingMode) return;
        if (e && e.stopPropagation) e.stopPropagation();
        this.openItemMenu(r);
      });
    });
  }

  openItemMenu(ref) {
    if (this.itemMenu) this.itemMenu.destroy();
    const W = this.W;
    const x = Math.min(Math.max(ref.obj.x, 60), W - 180);
    const y = ref.obj.y - 40;
    this.itemMenu = this.add.container(x, y).setDepth(900);
    const bg = this.add.rectangle(0, 0, 130, 32, 0x000000, 0.92).setStrokeStyle(1.5, 0xFFE060);
    const moveBtn = this.add.rectangle(-32, 0, 56, 24, 0x4080A0).setStrokeStyle(1, 0xFFFFFF, 0.5).setInteractive({ useHandCursor: true });
    const moveTxt = this.add.text(-32, 0, "Move", { fontFamily: "system-ui", fontSize: 14, fontStyle: "bold", color: "#FFFFFF" }).setOrigin(0.5);
    const delBtn = this.add.rectangle(32, 0, 56, 24, 0xFF4060).setStrokeStyle(1, 0xA02040).setInteractive({ useHandCursor: true });
    const delTxt = this.add.text(32, 0, "Remove", { fontFamily: "system-ui", fontSize: 14, fontStyle: "bold", color: "#FFFFFF" }).setOrigin(0.5);
    this.itemMenu.add([bg, moveBtn, moveTxt, delBtn, delTxt]);
    moveBtn.on("pointerdown", (p, lx, ly, e) => {
      if (e && e.stopPropagation) e.stopPropagation();
      Audio.click();
      const item = getDecorationById(ref.placement.itemId);
      if (!item) return;
      STATE.placedDecorations = STATE.placedDecorations.filter(p => p !== ref.placement);
      saveGame(STATE);
      ref.obj?.destroy();
      this.placedDecorationRefs = this.placedDecorationRefs.filter(r => r !== ref);
      this.itemMenu?.destroy(); this.itemMenu = null;
      this.startPlacingItem(item);
    });
    delBtn.on("pointerdown", (p, lx, ly, e) => {
      if (e && e.stopPropagation) e.stopPropagation();
      Audio.click();
      STATE.placedDecorations = STATE.placedDecorations.filter(p => p !== ref.placement);
      saveGame(STATE);
      this.tweens.add({ targets: ref.obj, alpha: 0, scale: 0.4, duration: 250, onComplete: () => ref.obj?.destroy() });
      this.placedDecorationRefs = this.placedDecorationRefs.filter(r => r !== ref);
      this.itemMenu?.destroy(); this.itemMenu = null;
    });
    this.time.delayedCall(4000, () => {
      this.itemMenu?.destroy(); this.itemMenu = null;
    });
  }
}

// BONUS SCENE — 5 themed bonus worlds (post-game content)
// ══════════════════════════════════════════════════════════════════
class BonusScene extends Phaser.Scene {
  constructor() { super("BonusScene"); }
  init(data) {
    this.levelNum = data?.levelNum || 11;
    const lvl = LEVELS.find(l => l.num === this.levelNum);
    this.bonus = lvl?.bonus || "gemstone";
    this.lvlInfo = lvl;
  }
  create() {
    const W = this.scale.width, H = this.scale.height;
    this.W = W; this.H = H;
    this.mobile = isMobile();

    try {

    // Themed background per bonus type
    if (this.bonus === "gemstone") this.setupGemstoneBackdrop();
    else if (this.bonus === "voidspace") this.setupVoidspaceBackdrop();
    else if (this.bonus === "mirror") this.setupMirrorBackdrop();
    else if (this.bonus === "solar") this.setupSolarBackdrop();
    else if (this.bonus === "galactic") this.setupGalacticBackdrop();
    else {
      // Unknown bonus type — fall back to gemstone visuals
      console.warn("Unknown bonus type:", this.bonus, "— defaulting to gemstone");
      this.bonus = "gemstone";
      this.setupGemstoneBackdrop();
    }

    // Title bar (themed accent color)
    this.add.rectangle(0, 0, W, 56, 0x000000, 0.7).setOrigin(0, 0).setDepth(800);
    createBackButton(this, "← levels", () => this.exit());
    createPauseButton(this, () => showPauseMenu(this, { world: "bonus" }));
    Audio.startMusic("bonus");

    this.events.once("shutdown", () => { Audio.stopMusic(); this.geyserEvent?.remove(); this.iceTitanEvent?.remove(); });
    this.add.text(W / 2, 22, this.lvlInfo.world.toUpperCase(), {
      fontFamily: "system-ui", fontSize: 18, fontStyle: "bold",
      color: `#${this.lvlInfo.color.toString(16).padStart(6, '0')}`, letterSpacing: 2,
    }).setOrigin(0.5).setDepth(801);
    this.scoreText = this.add.text(W - 12, 28, "✨ 0/5", {
      fontFamily: "system-ui", fontSize: 14, fontStyle: "bold",
      color: `#${this.lvlInfo.color.toString(16).padStart(6, '0')}`,
    }).setOrigin(1, 0.5).setDepth(801).setAlpha(0.7);
    // Goal banner (BONUS levels — emphasize their challenge)
    setupGoalBanner(this, { icon: "✨", label: this.lvlInfo.world + " — collect all", total: 5, y: 60 });

    // Setup gameplay per theme
    if (this.bonus === "gemstone") this.setupGemstoneGame();
    else if (this.bonus === "voidspace") this.setupVoidspaceGame();
    else if (this.bonus === "mirror") this.setupMirrorGame();
    else if (this.bonus === "solar") this.setupSolarGame();
    else if (this.bonus === "galactic") this.setupGalacticGame();

    // Astronaut + joystick
    this.astronaut = createAstronaut(this, W * 0.5, H * 0.18, STATE.avatar);
    this.astronaut.setScale(1.5);
    this.astronaut.setDepth(50);
    this.astroVx = 0; this.astroVy = 0;
    this.joystick = new VirtualJoystick(this);
    this.tweens.timeScale = isKidMode() ? 0.6 : 1;

    // Health
    this.health = isKidMode() ? 6 : 4;
    this.healthIcons = [];
    for (let i = 0; i < 4; i++) {
      const heart = this.add.text(16 + i * 22, 64, "❤️", { fontSize: 18 }).setDepth(801);
      this.healthIcons.push(heart);
    }

    this.collected = 0;
    this.target = 5;
    this.gameEnded = false;

    // Banner — delayed slightly so it doesn't overlap briefing modal close
    this.time.delayedCall(300, () => {
      showZoneBanner(this, this.levelNum, this.lvlInfo.name, this.lvlInfo.color);
    });

    } catch (err) {
      console.error("BonusScene create error for bonus type:", this.bonus, err);
      // Show a visible error message instead of black screen
      const errBg = this.add.rectangle(W / 2, H / 2, W, H, 0x200020, 1).setDepth(900);
      this.add.text(W / 2, H / 2 - 40, "⚠️ Level Loading Error", {
        fontFamily: "system-ui", fontSize: 24, fontStyle: "bold", color: "#FF8080",
      }).setOrigin(0.5).setDepth(901);
      this.add.text(W / 2, H / 2, `Bonus type: ${this.bonus || 'unknown'}`, {
        fontFamily: "system-ui", fontSize: 14, color: "#FFFFFF",
      }).setOrigin(0.5).setDepth(901);
      this.add.text(W / 2, H / 2 + 28, (err && err.message) ? err.message : "Unknown error", {
        fontFamily: "system-ui", fontSize: 12, color: "#A8D0FF",
        wordWrap: { width: W - 40 }, align: "center",
      }).setOrigin(0.5).setDepth(901);
      const back = this.add.rectangle(W / 2, H / 2 + 80, 200, 44, 0x5DBE9A).setStrokeStyle(2, 0x3E8E6C).setInteractive({ useHandCursor: true }).setDepth(901);
      this.add.text(W / 2, H / 2 + 80, "← Back to levels", {
        fontFamily: "system-ui", fontSize: 16, fontStyle: "bold", color: "#FFFFFF",
      }).setOrigin(0.5).setDepth(902);
      back.on("pointerdown", () => this.scene.start("LevelSelectScene"));
    }
  }

  // ━━━ GEMSTONE ━━━ Crystal Palace — refract rainbow lasers through crystals
  setupGemstoneBackdrop() {
    const W = this.W, H = this.H;
    const bg = this.add.graphics();
    bg.fillGradientStyle(0xFF80C0, 0xC080FF, 0x4030A0, 0x100530);
    bg.fillRect(0, 0, W, H);
    // Floating crystal shards in background
    for (let i = 0; i < 18; i++) {
